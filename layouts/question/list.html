{{ define "main" }}
{{ partial "back-button.html" . }}
{{ $qpages := where .Site.RegularPages "Section" "question" }}
<div class="content-area content-area-wide">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="question-toolbar">
    <select id="filter-source" data-filter="source">
      <option value="">全部题源</option>
      <option value="408真题">408真题</option>
      <option value="模拟题">模拟题</option>
      <option value="课后题">章节习题</option>
    </select>
    <select id="filter-exam-year" data-filter="exam-year" class="source-dependent source-exam">
      <option value="">全部年份</option>
      {{ range seq 2009 2026 }}<option value="{{ . }}">{{ . }}</option>{{ end }}
    </select>
    <select id="filter-set" data-filter="set" class="source-dependent source-simulate">
      <option value="">全部卷</option>
      {{ range seq 1 8 }}<option value="{{ . }}">第{{ . }}套</option>{{ end }}
    </select>
    <select id="filter-subject" data-filter="subject">
      <option value="">全部科目</option>
    </select>
    <select id="filter-chapter" data-filter="chapter" class="source-dependent source-exercise">
      <option value="">全部章节</option>
    </select>
    <select id="filter-type" data-filter="type">
      <option value="">全部题型</option>
      <option value="choice">选择题</option>
      <option value="comprehensive">解答题</option>
    </select>
    <input type="text" id="filter-search" data-filter="search" placeholder="搜索题目…">
  </div>

  <div class="question-list-status" id="question-list-status" aria-live="polite"></div>
  <div class="question-grid" id="question-grid"></div>
  <nav class="question-pagination" id="question-pagination" aria-label="题目分页"></nav>

  <div class="border-top-section">
    <a href="{{ "exam/" | relURL }}" class="btn btn-ghost">← 返回刷题中心</a>
  </div>
</div>

<script type="application/json" id="question-data">
[
  {{ range $index, $page := $qpages.ByParam "number" }}
    {{ if $index }},{{ end }}
    {{ $sk := default "" (index $page.Params.subjects 0) }}
    {{ $tp := split $page.Title " 第" }}
    {{ $chapter := index $tp 0 }}
    {{ $plain := replaceRE "(?s)\\[tag_link\\].*$" "" $page.Plain }}
    {{ $plain = replaceRE "(?s)\\n\\s*[A-D][.、．].*$" "" $plain }}
    {{ $plain = trim $plain " \n\r\t" }}
    {{ dict "url" $page.RelPermalink "years" $page.Params.years "subject" $sk "chapter" $chapter "type" $page.Params.question_type "source" $page.Params.source "set" $page.Params.set "number" (default 0 $page.Params.number) "difficulty" (default 1 $page.Params.difficulty) "title" $page.Title "stem" $plain "content_html" ($page.Content | string) | jsonify | safeJS }}
  {{ end }}
]
</script>

<style>
.question-toolbar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; padding: 1rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 1rem; }
.question-toolbar select, .question-toolbar input { padding: .45rem .75rem; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: var(--fs-sm); font-family: var(--font-body); }
.question-toolbar input { flex: 1; min-width: 180px; }
.question-toolbar select:focus, .question-toolbar input:focus { outline: none; border-color: var(--accent); }
.source-dependent { display: none; }
.source-dependent.visible { display: inline-block; }
.question-list-status { color: var(--text-muted); font-size: var(--fs-sm); margin: 0 0 .75rem; }
.question-pagination { display: flex; align-items: center; justify-content: center; gap: .5rem; margin: 1.5rem 0; }
.question-page-gap { color: var(--text-muted); }
.question-page-btn { min-width: 2.25rem; height: 2.25rem; padding: 0 .6rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-secondary); background: var(--bg-card); font: inherit; cursor: pointer; }
.question-page-btn:hover:not(:disabled), .question-page-btn.active { border-color: var(--accent); color: var(--accent); }
.question-page-btn.active { background: rgba(57,186,230,.1); font-weight: 600; }
.question-page-btn:disabled { cursor: not-allowed; opacity: .45; }

/* Interactive question card styles */
.question-grid { display: block; }
.question-grid .question-block { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); }
.q-number { font-size: .9rem; font-weight: 700; color: var(--accent); margin-bottom: .5rem; }
.q-subject-tag { font-size: .75rem; font-weight: 400; color: var(--text-muted); background: var(--bg-secondary); padding: 1px 6px; border-radius: 3px; margin-left: .5rem; }
.q-body img { background: #fff; padding: 8px; border-radius: 4px; max-width: 100%; }
.answer-panel { margin-top: .5rem; padding: .75rem; background: var(--bg-secondary); border-radius: 6px; border-left: 3px solid var(--accent); }
.answer-title { font-weight: 700; margin-bottom: .25rem; }
.analysis-title { font-weight: 700; color: var(--accent); margin: .5rem 0 .25rem; }
.exam-option { padding: .4rem .6rem; margin: .2rem 0; border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; transition: all .15s; }
.exam-option:hover { background: var(--bg-secondary); }
.exam-option.selected { border-color: var(--accent); background: rgba(57,186,230,.1); }
.exam-option.correct { border-color: #4caf50; background: rgba(76,175,80,.15); }
.exam-option.wrong { border-color: #f44336; background: rgba(244,67,54,.15); }
.question-block .question-actions { margin-top: .5rem; display: flex; gap: .5rem; align-items: center; }
.question-block .reveal-btn, .question-block .favorite-btn {
  padding: .4rem .9rem; border-radius: var(--radius-sm); cursor: pointer;
  font-size: var(--fs-sm); font-weight: 500; transition: all .2s;
}
.question-block .reveal-btn { background: var(--accent); color: white; border: none; }
.question-block .reveal-btn:hover { opacity: .9; }
.question-block .favorite-btn {
  background: transparent; border: 1px solid var(--border-color);
  color: var(--text-primary);
}
.question-block .favorite-btn:hover { color: var(--accent); border-color: var(--accent); }
.favorite-btn.collected { color: #f0c040; border-color: #f0c040; }
.question-actions { margin: 1.5rem 0; display: flex; gap: .75rem; align-items: center; }
</style>

<script>
function toggleAnswer(btn) {
  var block = btn.closest('.question-block');
  if (!block) return;
  var panel = block.querySelector('.answer-panel');
  if (!panel) return;
  if (panel.style.display === 'none' || panel.style.display === '') {
    panel.style.display = 'block';
    btn.textContent = '隐藏答案';
    var correct = panel.getAttribute('data-answer');
    if (correct) {
      block.querySelectorAll('.exam-option').forEach(function(opt) {
        if (opt.getAttribute('data-opt') === correct) opt.classList.add('correct');
        else if (opt.classList.contains('selected')) opt.classList.add('wrong');
      });
    }
  } else {
    panel.style.display = 'none';
    btn.textContent = '查看答案与解析';
    block.querySelectorAll('.exam-option').forEach(function(o) { o.classList.remove('correct', 'wrong'); });
  }
}
</script>

{{ $js := resources.Get "js/question-list.js" | resources.Minify | resources.Fingerprint }}
<script src="{{ $js.RelPermalink }}"></script>
{{ end }}
