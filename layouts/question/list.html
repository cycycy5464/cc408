{{ define "main" }}
{{ partial "back-button.html" . }}
{{ $qpages := where .Site.RegularPages "Section" "question" }}
<div class="content-area content-area-wide">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="question-toolbar">
    <select id="filter-source" data-filter="source">
      <option value="">全部题源</option>
      <option value="408真题">408真题</option>
      <option value="模拟题">模拟题</option>
      <option value="课后题">章节习题</option>
    </select>
    <select id="filter-exam-year" data-filter="exam-year" class="source-dependent source-exam">
      <option value="">全部年份</option>
      {{ range seq 2009 2026 }}<option value="{{ . }}">{{ . }}</option>{{ end }}
    </select>
    <select id="filter-set" data-filter="set" class="source-dependent source-simulate">
      <option value="">全部卷</option>
      {{ range seq 1 8 }}<option value="{{ . }}">第{{ . }}套</option>{{ end }}
    </select>
    <select id="filter-subject" data-filter="subject">
      <option value="">全部科目</option>
    </select>
    <select id="filter-chapter" data-filter="chapter" class="source-dependent source-exercise">
      <option value="">全部章节</option>
    </select>
    <select id="filter-type" data-filter="type">
      <option value="">全部题型</option>
      <option value="choice">选择题</option>
      <option value="comprehensive">解答题</option>
    </select>
    <input type="text" id="filter-search" data-filter="search" placeholder="搜索题目…">
  </div>

  <div class="question-list-status" id="question-list-status" aria-live="polite"></div>
  <div class="question-grid" id="question-grid"></div>
  <nav class="question-pagination" id="question-pagination" aria-label="题目分页"></nav>

  <div class="border-top-section">
    <a href="{{ "exam/" | relURL }}" class="btn btn-ghost">← 返回刷题中心</a>
  </div>
</div>

<script type="application/json" id="question-data">
[
  {{ range $index, $page := $qpages.ByParam "number" }}
    {{ if $index }},{{ end }}
    {{ $sk := default "" (index $page.Params.subjects 0) }}
    {{ $tp := split $page.Title " 第" }}
    {{ $chapter := index $tp 0 }}
    {{ $plain := replaceRE "(?s)\\[tag_link\\].*$" "" $page.Plain }}
    {{ $plain = replaceRE "(?s)\\n\\s*[A-D][.、．].*$" "" $plain }}
    {{ $plain = strings.TrimSpace $plain }}
    {{ dict "url" $page.RelPermalink "years" $page.Params.years "subject" $sk "chapter" $chapter "type" $page.Params.question_type "source" $page.Params.source "set" $page.Params.set "number" (default 0 $page.Params.number) "difficulty" (default 1 $page.Params.difficulty) "title" $page.Title "stem" $plain | jsonify | safeJS }}
  {{ end }}
]
</script>

<style>
.question-toolbar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; padding: 1rem; background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 1rem; }
.question-toolbar select, .question-toolbar input { padding: .45rem .75rem; background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: var(--fs-sm); font-family: var(--font-body); }
.question-toolbar input { flex: 1; min-width: 180px; }
.question-toolbar select:focus, .question-toolbar input:focus { outline: none; border-color: var(--accent); }
.source-dependent { display: none; }
.source-dependent.visible { display: inline-block; }
.question-list-status { color: var(--text-muted); font-size: var(--fs-sm); margin: 0 0 .75rem; }
.question-pagination { display: flex; align-items: center; justify-content: center; gap: .5rem; margin: 1.5rem 0; }
.question-page-gap { color: var(--text-muted); }
.question-page-btn { min-width: 2.25rem; height: 2.25rem; padding: 0 .6rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-secondary); background: var(--bg-card); font: inherit; cursor: pointer; }
.question-page-btn:hover:not(:disabled), .question-page-btn.active { border-color: var(--accent); color: var(--accent); }
.question-page-btn.active { background: rgba(57,186,230,.1); font-weight: 600; }
.question-page-btn:disabled { cursor: not-allowed; opacity: .45; }
</style>

{{ $js := resources.Get "js/question-list.js" | resources.Minify | resources.Fingerprint }}
<script src="{{ $js.RelPermalink }}"></script>
{{ end }}
