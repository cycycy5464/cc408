{{ define "main" }}
<div class="content-area content-area-wide">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <h2 style="margin-top:2rem">知识点列表</h2>
  <div style="display:grid;gap:1rem">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card">
      <div style="font-weight:600;margin-bottom:.5rem">{{ .Title }}</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        {{ with .Params.difficulty }}{{ $d := . }}{{ range seq 1 3 }}{{ if le . $d }}<span class="diff-star">★</span>{{ else }}<span class="diff-star-empty">☆</span>{{ end }}{{ end }}{{ end }}
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
