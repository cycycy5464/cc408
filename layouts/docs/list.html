{{ define "main" }}
<div class="content-area" style="max-width: 900px;">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <!-- List of all topics in this section -->
  <div style="margin-top: 2rem;">
    <h2>知识点列表</h2>
    <div style="display: grid; gap: 1rem;">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" style="padding: 1rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; text-decoration: none; color: var(--text-primary); transition: all 0.2s ease;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border-color)'">
        <div style="font-weight: 600; margin-bottom: 0.5rem;">{{ .Title }}</div>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
          {{ with .Params.difficulty }}
          <span class="difficulty-stars">
            {{ range seq 1 3 }}
              {{ if le . $.Params.difficulty }}★{{ else }}<span class="empty">☆</span>{{ end }}
            {{ end }}
          </span>
          {{ end }}
          {{ range .Params.tags }}
          <span class="tag">{{ . }}</span>
          {{ end }}
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
