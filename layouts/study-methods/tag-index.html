{{ define "main" }}
{{ partial "back-button.html" . }}
<div class="content-area content-area-wide" id="tag-index-app">
  <h1>🏷️ 408 真题标签索引</h1>
  <p class="meta-sm" style="margin-bottom:2rem">全部 408 真题按知识点标签分类索引，点击标签名可查看所有题目</p>

  <div class="tag-controls" style="display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center">
    <input type="text" id="ti-search" placeholder="搜索标签..." style="padding:.5rem .75rem;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:var(--fs-sm);font-family:var(--font-body);flex:1;min-width:200px;outline:none">
    <span id="ti-count" style="font-size:var(--fs-sm);color:var(--text-muted)"></span>
  </div>

  <div id="ti-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.25rem"></div>
</div>

<script>
(function() {
  var app = document.getElementById('tag-index-app');
  if (!app) return;

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '{{ "data/tags-data.json" | relURL }}', true);
  xhr.onload = function() {
    try {
      var raw = JSON.parse(xhr.responseText);
      render(raw.tagData);
    } catch(e) { app.innerHTML = '<p style="color:var(--color-co);padding:2rem;text-align:center">数据解析失败</p>'; }
  };
  xhr.onerror = function() { app.innerHTML = '<p style="color:var(--color-co);padding:2rem;text-align:center">数据加载失败</p>'; };
  xhr.send();

  var SUBJECT_COLORS = {
    '数据结构': '#58d6c0', '组成原理': '#f59e0b',
    '操作系统': '#8b5cf6', '计算机网络': '#3b82f6'
  };
  var SUBJECT_NAMES = ['数据结构', '组成原理', '操作系统', '计算机网络'];

  function render(tagData) {
    var grid = document.getElementById('ti-grid');
    var search = document.getElementById('ti-search');
    var countEl = document.getElementById('ti-count');

    // Build flat list
    var allTags = [];
    SUBJECT_NAMES.forEach(function(subj) {
      var kps = tagData[subj] || {};
      Object.keys(kps).forEach(function(kp) {
        allTags.push({ name: kp, subject: subj, count: kps[kp].length });
      });
    });
    allTags.sort(function(a, b) { return b.count - a.count; });
    countEl.textContent = '共 ' + allTags.length + ' 个标签';

    function renderGrid(q) {
      var filtered = q ? allTags.filter(function(t) { return t.name.toLowerCase().indexOf(q) !== -1; }) : allTags;
      if (!filtered.length) {
        grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;padding:2rem;text-align:center">没有匹配的标签</p>';
        return;
      }
      var html = '';
      var currentSubj = '';
      filtered.forEach(function(t) {
        if (t.subject !== currentSubj) {
          currentSubj = t.subject;
          html += '<div style="grid-column:1/-1;font-weight:700;font-size:var(--fs-h3);color:' + (SUBJECT_COLORS[t.subject] || '#888') + ';margin-top:.5rem;border-bottom:1px solid var(--border-color);padding-bottom:.35rem">' + t.subject + '</div>';
        }
        html += '<a href="{{ "knowledge_points/" | relURL }}' + encodeURIComponent(t.name) + '/" class="card" style="padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem">' +
          '<span style="font-weight:500;font-size:var(--fs-sm)">' + t.name + '</span>' +
          '<span style="font-size:var(--fs-xs);color:var(--text-muted);flex-shrink:0;background:rgba(57,186,230,.1);padding:.15em .6em;border-radius:3px;font-weight:600">' + t.count + ' 题</span>' +
          '</a>';
      });
      grid.innerHTML = html;
    }

    renderGrid('');

    var debounceTimer;
    search.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      var q = this.value.trim().toLowerCase();
      debounceTimer = setTimeout(function() { renderGrid(q); }, 200);
    });
  }
})();
</script>

<style>
#ti-grid .card { transition: all .15s; }
#ti-grid .card:hover { border-color: var(--accent); box-shadow: var(--shadow-glow); transform: translateY(-1px); }
#ti-search:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }
</style>
{{ end }}
