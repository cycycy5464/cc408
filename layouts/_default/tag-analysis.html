{{ define "main" }}
<div class="content-area content-area-wide" id="tag-analysis-app">
  <h1>📊 408 真题分析</h1>
  <p class="meta-sm" style="margin-bottom:2rem">基于全部 408 真题的知识点标签统计</p>

  <!-- Stats Grid -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-value" id="stat-subjects">-</div><div class="stat-label">科目</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-tags">-</div><div class="stat-label">知识点标签</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-questions">-</div><div class="stat-label">题目总数</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-years">-</div><div class="stat-label">年份跨度</div></div>
  </div>

  <!-- Global Controls -->
  <div class="tag-controls">
    <div class="control-group">
      <label>科目筛选</label>
      <select id="filter-subject"><option value="all">全部科目</option></select>
    </div>
    <div class="control-group">
      <label>题型筛选</label>
      <select id="filter-type"><option value="all">全部题型</option></select>
    </div>
    <div class="control-group">
      <label>搜索标签</label>
      <input type="text" id="filter-search" placeholder="输入标签名称...">
    </div>
    <div class="control-group" style="justify-content:flex-end">
      <button id="reset-filters" class="btn btn-ghost" style="margin-top:auto;padding:.4rem .8rem;font-size:var(--fs-sm)">↺ 重置</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tag-tabs">
    <button class="tag-tab active" data-tab="overview">📈 概览</button>
    <button class="tag-tab" data-tab="subjects">📚 科目分布</button>
    <button class="tag-tab" data-tab="details">🏷️ 标签详情</button>
  </div>

  <!-- Tab: Overview -->
  <div id="tab-overview" class="tag-tab-content active">
    <div class="section-card">
      <div class="section-card-header">
        <h3>知识点频率分布</h3>
        <span class="tag-count-badge" id="overview-count">全部</span>
      </div>
      <p class="meta-sm" style="margin-bottom:1rem">按题目数量排序，表格在前，图表在后</p>
      <div class="data-table-section" id="chart-data-table"></div>
      <div class="chart-wrapper" id="chart-container-inner">
        <canvas id="all-tags-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- Tab: Subjects -->
  <div id="tab-subjects" class="tag-tab-content">
    <div class="section-card">
      <h3>科目统计</h3>
      <p class="meta-sm" style="margin-bottom:1rem">各科目知识点分布和热门标签</p>
      <div class="subject-grid" id="subject-grid"></div>
    </div>
  </div>

  <!-- Tab: Details -->
  <div id="tab-details" class="tag-tab-content">
    <div class="section-card">
      <h3>标签列表</h3>
      <p class="meta-sm" style="margin-bottom:1rem">按科目分组，支持搜索和筛选</p>
      <div class="tag-grid" id="tag-grid"></div>
    </div>
  </div>
</div>

<style>
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2rem}
.stat-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:1.5rem;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-value{font-size:2.2rem;font-weight:800;color:var(--accent);font-family:var(--font-display);line-height:1.2}
.stat-label{font-size:var(--fs-sm);color:var(--text-muted);margin-top:.35rem}

/* Controls */
.tag-controls{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;padding:1.25rem;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-md);margin-bottom:1.5rem}
.control-group{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:140px}
.control-group label{font-size:var(--fs-xs);color:var(--text-muted);font-weight:500}
.control-group select,.control-group input{padding:.5rem .75rem;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:var(--fs-sm);font-family:var(--font-body);transition:border-color .2s}
.control-group select:focus,.control-group input:focus{outline:none;border-color:var(--accent)}

/* Tabs */
.tag-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border-color);padding-bottom:.75rem}
.tag-tab{padding:.6rem 1.5rem;background:transparent;color:var(--text-secondary);border:none;border-radius:var(--radius-sm);font-size:var(--fs-sm);cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.tag-tab:hover{color:var(--text-primary);background:var(--bg-hover)}
.tag-tab.active{background:rgba(57,186,230,.12);color:var(--accent);font-weight:600}
.tag-tab-content{display:none}
.tag-tab-content.active{display:block}

/* Sections */
.section-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:1.75rem;margin-bottom:1.5rem}
.section-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.section-card h3{font-size:1.15rem;margin:0}
.tag-count-badge{background:rgba(57,186,230,.1);color:var(--accent);padding:.2em .7em;border-radius:4px;font-size:var(--fs-sm);font-weight:500}

/* Chart */
.chart-wrapper{width:100%;min-height:400px;position:relative;overflow-y:auto;padding-right:.5rem;margin-top:1.5rem;border-top:1px solid var(--border-color);padding-top:1rem}
.chart-wrapper canvas{width:100% !important}

/* Data Table */
.data-table-section{margin-top:0}
.data-table-wrapper{overflow-x:auto;max-height:800px;overflow-y:auto}
.data-table{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.data-table th{position:sticky;top:0;background:var(--bg-secondary);color:var(--text-muted);font-weight:600;padding:.6rem .75rem;text-align:left;border-bottom:1px solid var(--border-color);z-index:1}
.data-table td{padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text-primary)}
.data-table tr:hover td{background:var(--bg-hover);cursor:pointer}
.td-num{color:var(--text-muted);width:2.5rem;text-align:center;font-size:var(--fs-xs)}
.td-name{font-weight:500}
.td-count{text-align:center;width:4rem}
.td-year{color:var(--text-muted);font-size:var(--fs-xs);width:7rem}
.count-badge{display:inline-block;background:rgba(57,186,230,.12);color:var(--accent);padding:.15em .6em;border-radius:3px;font-weight:600;font-size:var(--fs-xs)}
.subject-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:.4rem;vertical-align:middle}

/* Subject Grid */
.subject-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.25rem}
.subject-card-detail{background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:1.5rem}
.subject-card-detail h3{margin:0 0 .75rem;font-size:1.05rem}
.subject-stat{display:flex;justify-content:space-between;padding:.4rem 0;font-size:var(--fs-sm);border-bottom:1px solid var(--border-color)}
.subject-stat:last-child{border-bottom:none}

/* Tag Grid */
.tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.75rem}
.tag-item{background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:1rem 1.25rem;cursor:pointer;transition:all .2s}
.tag-item:hover{border-color:var(--accent);box-shadow:var(--shadow-glow);background:var(--bg-card)}
.tag-item-name{font-weight:600;font-size:var(--fs-sm);margin-bottom:.35rem;color:var(--accent)}
.tag-item-name span{font-weight:400}
.tag-item-meta{font-size:var(--fs-xs);color:var(--text-muted);line-height:1.5}
.tag-item.hidden{display:none}

@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:1rem}
  .subject-grid{grid-template-columns:1fr}
  .tag-controls{flex-direction:column}
  .control-group{min-width:100%}
  .tag-tabs{overflow-x:auto}
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<script>
(function() {
  'use strict';

  function themeIsLight() {
    return document.documentElement.getAttribute('data-theme') === 'light';
  }

  var SUBJECT_COLORS = {
    '数据结构': '#58d6c0',
    '组成原理': '#f59e0b',
    '操作系统': '#8b5cf6',
    '计算机网络': '#3b82f6'
  };
  var SUBJECT_NAMES = ['数据结构', '组成原理', '操作系统', '计算机网络'];
  var SUBJECT_FULL = {
    '数据结构': '数据结构',
    '组成原理': '计算机组成原理',
    '操作系统': '操作系统',
    '计算机网络': '计算机网络'
  };

  var rawData = null;
  var allTagsData = [];  // [{name, subject, count, items, years, hasChoice, hasComprehensive}]
  var chartInstance = null;
  var currentFiltered = [];

  // ── Data Loading ──
  function loadData() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '{{ "data/tags-data.json" | relURL }}', true);
    xhr.onload = function() {
      try {
        rawData = JSON.parse(xhr.responseText);
        buildAllTags();
        initApp();
      } catch(e) {
        showError('数据解析失败');
      }
    };
    xhr.onerror = function() { showError('数据加载失败'); };
    xhr.send();
  }

  function showError(msg) {
    document.getElementById('tag-analysis-app').innerHTML =
      '<p style="color:var(--color-co);padding:3rem;text-align:center">' + msg + '</p>';
  }

  // ── Build Master Tag List ──
  function buildAllTags() {
    allTagsData = [];
    var tagData = rawData.tagData;
    if (!tagData) return;

    SUBJECT_NAMES.forEach(function(subj) {
      var kps = tagData[subj] || {};
      Object.keys(kps).forEach(function(kp) {
        var items = kps[kp];
        var years = {};
        items.forEach(function(q) { years[q.year] = true; });
        var yearKeys = Object.keys(years).sort();
        var hasChoice = items.some(function(q) { return q.quiz_type === '选择题'; });
        var hasComp = items.some(function(q) { return q.quiz_type === '综合题'; });

        allTagsData.push({
          name: kp,
          subject: subj,
          count: items.length,
          items: items,
          yearMin: yearKeys[0] || '-',
          yearMax: yearKeys[yearKeys.length - 1] || '-',
          hasChoice: hasChoice,
          hasComprehensive: hasComp
        });
      });
    });

    allTagsData.sort(function(a, b) { return b.count - a.count; });
  }

  // ── Filter Logic ──
  function getFilteredTags() {
    var subj = document.getElementById('filter-subject').value;
    var type = document.getElementById('filter-type').value;
    var search = document.getElementById('filter-search').value.toLowerCase();

    return allTagsData.filter(function(t) {
      if (subj !== 'all' && t.subject !== subj) return false;
      if (type !== 'all') {
        if (type === '选择题' && !t.hasChoice) return false;
        if (type === '综合题' && !t.hasComprehensive) return false;
      }
      if (search && t.name.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
  }

  function onFilterChange() {
    var filtered = getFilteredTags();
    updateStats(filtered);
    renderOverviewChart(filtered);
    renderSubjectCards(filtered);
    renderTagGrid(filtered);
  }

  // ── Init ──
  function initApp() {
    // Populate filter dropdowns
    var subjSel = document.getElementById('filter-subject');
    SUBJECT_NAMES.forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s; opt.textContent = SUBJECT_FULL[s] || s;
      subjSel.appendChild(opt);
    });

    var typeSel = document.getElementById('filter-type');
    ['选择题', '综合题'].forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t; opt.textContent = t;
      typeSel.appendChild(opt);
    });

    // Tab switching
    document.querySelectorAll('.tag-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tag-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tag-tab-content').forEach(function(tc) { tc.classList.remove('active'); });
        this.classList.add('active');
        document.getElementById('tab-' + this.getAttribute('data-tab')).classList.add('active');
      });
    });

    // Filter events
    document.getElementById('filter-subject').addEventListener('change', onFilterChange);
    document.getElementById('filter-type').addEventListener('change', onFilterChange);
    document.getElementById('filter-search').addEventListener('input', onFilterChange);
    document.getElementById('reset-filters').addEventListener('click', function() {
      document.getElementById('filter-subject').value = 'all';
      document.getElementById('filter-type').value = 'all';
      document.getElementById('filter-search').value = '';
      onFilterChange();
    });

    // Initial render
    onFilterChange();

    // 主题切换时重绘图表（轴标签/网格颜色随主题变化）
    window.addEventListener('cc408:themechange', function() {
      try { onFilterChange(); } catch (e) {}
    });
  }

  // ── Update Stats ──
  function updateStats(filtered) {
    var totalQuestions = 0;
    var subjects = {};
    var years = {};

    filtered.forEach(function(t) {
      totalQuestions += t.count;
      subjects[t.subject] = true;
      t.items.forEach(function(q) { years[q.year] = true; });
    });

    document.getElementById('stat-tags').textContent = filtered.length;
    document.getElementById('stat-questions').textContent = totalQuestions;
    document.getElementById('stat-subjects').textContent = Object.keys(subjects).length;
    document.getElementById('stat-years').textContent = (function() {
      var y = Object.keys(years).sort();
      return y.length ? y[0] + '~' + y[y.length - 1] : '-';
    })();

    document.getElementById('overview-count').textContent = filtered.length + '个标签';
  }

  // ── Overview Chart (ALL tags, long format) ──
  function renderOverviewChart(filtered) {
    currentFiltered = filtered;
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    var count = filtered.length;
    if (!count) {
      document.getElementById('chart-container-inner').innerHTML = '<p style="color:var(--text-muted);padding:2rem;text-align:center">没有匹配的标签</p>';
      document.getElementById('chart-data-table').innerHTML = '';
      return;
    }

    var labels = filtered.map(function(t) { return t.name; });
    var values = filtered.map(function(t) { return t.count; });
    var colors = filtered.map(function(t) { return SUBJECT_COLORS[t.subject] || '#888'; });

    // Height: 64px per bar (48px bar + 16px gap), min 800px
    var barHeight = 48;
    var gapHeight = 16;
    var perItem = barHeight + gapHeight;
    var totalHeight = Math.max(800, count * perItem + 100);

    var ctx = document.getElementById('all-tags-chart').getContext('2d');
    ctx.canvas.style.height = totalHeight + 'px';

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: '题目数',
          data: values,
          backgroundColor: colors,
          borderWidth: 0,
          borderRadius: 3,
          barThickness: barHeight,
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: themeIsLight() ? '#ffffff' : '#181e28',
            titleColor: themeIsLight() ? '#1f2a38' : '#e2e8f0',
            bodyColor: themeIsLight() ? '#44566a' : '#8899a9',
            borderColor: themeIsLight() ? '#dde3ed' : '#232a35',
            borderWidth: 1,
            callbacks: {
              afterLabel: function(ctx) {
                var t = filtered[ctx.dataIndex];
                return (SUBJECT_FULL[t.subject] || t.subject) + ' ' + t.yearMin + '~' + t.yearMax;
              }
            }
          },
          datalabels: { color: 'auto', font: { size: 11, weight: '600' } }
        },
        onClick: function(e) {
          var active = chartInstance.getElementsAtEventForMode(e, 'index', { intersect: true });
          if (active.length) {
            var t = filtered[active[0].index];
            window.location.href = '{{ "knowledge_points/" | relURL }}' + encodeURIComponent(t.name) + '/';
          }
        },
        scales: {
          x: {
            grid: { color: themeIsLight() ? 'rgba(15,23,42,.08)' : 'rgba(255,255,255,.08)' },
            ticks: { color: themeIsLight() ? '#66788a' : '#8899a9', stepSize: 5, font: { size: 11 } }
          },
          y: {
            grid: { display: false },
            ticks: {
              color: themeIsLight() ? '#1f2a38' : '#e2e8f0',
              font: { size: 11 },
              autoSkip: false
            }
          }
        }
      },
      plugins: [ChartDataLabels]
    });

    // Build data table below chart
    buildDataTable(filtered);
  }

  // ── Data Table (always visible, shows all values) ──
  function buildDataTable(filtered) {
    var container = document.getElementById('chart-data-table');
    if (!filtered.length) {
      container.innerHTML = '<p style="color:var(--text-muted);padding:1rem">暂无数据</p>';
      return;
    }

    var html = '<div class="data-table-wrapper"><table class="data-table">'
      + '<thead><tr><th>#</th><th>知识点</th><th>科目</th><th>题数</th><th>年份</th></tr></thead><tbody>';

    filtered.forEach(function(t, idx) {
      html += '<tr class="clickable-row" data-kp="' + t.name.replace(/"/g, '&quot;') + '">'
        + '<td class="td-num">' + (idx + 1) + '</td>'
        + '<td class="td-name">' + t.name + '</td>'
        + '<td><span class="subject-dot" style="background:' + (SUBJECT_COLORS[t.subject] || '#888') + '"></span>' + (SUBJECT_FULL[t.subject] || t.subject) + '</td>'
        + '<td class="td-count"><span class="count-badge">' + t.count + '</span></td>'
        + '<td class="td-year">' + t.yearMin + '~' + t.yearMax + '</td>'
        + '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;

    // Add click handlers to table rows
    container.querySelectorAll('.clickable-row').forEach(function(row) {
      row.addEventListener('click', function() {
        var kp = this.getAttribute('data-kp');
        window.location.href = '{{ "knowledge_points/" | relURL }}' + encodeURIComponent(kp) + '/';
      });
    });
  }

  // ── Subject Cards ──
  function renderSubjectCards(filtered) {
    var grid = document.getElementById('subject-grid');
    grid.innerHTML = '';

    SUBJECT_NAMES.forEach(function(subj) {
      var subjTags = filtered.filter(function(t) { return t.subject === subj; });
      var totalQ = 0;
      subjTags.forEach(function(t) { totalQ += t.count; });

      var card = document.createElement('div');
      card.className = 'subject-card-detail';
      card.style.borderTop = '3px solid ' + (SUBJECT_COLORS[subj] || '#888');

      var html = '<h3>' + (SUBJECT_FULL[subj] || subj) + '</h3>';
      html += '<div class="subject-stat"><span>标签数</span><span style="font-weight:600">' + subjTags.length + '</span></div>';
      html += '<div class="subject-stat"><span>题目数</span><span style="font-weight:600">' + totalQ + '</span></div>';

      // Top 5 hot tags
      var top5 = subjTags.slice(0, 5);
      if (top5.length) {
        html += '<div style="margin-top:.75rem;margin-bottom:.35rem;font-size:var(--fs-xs);color:var(--text-muted)">🏆 热门标签</div>';
        top5.forEach(function(t) {
          html += '<div class="subject-stat" style="font-size:var(--fs-xs);border-bottom-color:rgba(255,255,255,.03)"><span>' + t.name + '</span><span>' + t.count + '题</span></div>';
        });
      }

      card.innerHTML = html;
      grid.appendChild(card);
    });
  }

  // ── Tag Grid ──
  function renderTagGrid(filtered) {
    var grid = document.getElementById('tag-grid');
    grid.innerHTML = '';

    filtered.forEach(function(t) {
      var item = document.createElement('div');
      item.className = 'tag-item';

      var yearRange = t.yearMin + '~' + t.yearMax;
      var typeStr = t.hasChoice ? '选择题' : '';
      if (t.hasComprehensive) typeStr += (typeStr ? ' + ' : '') + '综合题';

      item.innerHTML = '<div class="tag-item-name">' + t.name + ' <span>(' + t.count + '题)</span></div>'
        + '<div class="tag-item-meta">' + (SUBJECT_FULL[t.subject] || t.subject) + ' · ' + yearRange + (typeStr ? ' · ' + typeStr : '') + '</div>';

      // Click → navigate to knowledge point page
      item.addEventListener('click', function() {
        window.location.href = '{{ "knowledge_points/" | relURL }}' + encodeURIComponent(t.name) + '/';
      });

      grid.appendChild(item);
    });

    if (!filtered.length) {
      grid.innerHTML = '<p style="color:var(--text-muted);grid-column:1/-1;padding:2rem;text-align:center">没有匹配的标签</p>';
    }
  }

  // ── Start ──
  loadData();
})();
</script>
{{ end }}
