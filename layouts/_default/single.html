{{ define "main" }}
<div class="content-area">
  <div class="meta-row">
    {{ with .Params.subject }}
    <span class="tag">{{ . | title }}</span>
    {{ end }}
    {{ with .Params.difficulty }}
    <span>{{ $d := . }}{{ range seq 1 3 }}{{ if le . $d }}<span class="diff-star">★</span>{{ else }}<span class="diff-star-empty">☆</span>{{ end }}{{ end }}</span>
    {{ end }}
    {{ range .Params.tags }}
    <span class="tag">{{ . }}</span>
    {{ end }}
  </div>
  <article>{{ .Content }}</article>
  <div style="margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border-color)">
    <a href="/docs/" class="btn btn-ghost">← 返回知识点列表</a>
  </div>
</div>
{{ end }}
