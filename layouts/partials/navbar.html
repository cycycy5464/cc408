<nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
            height: 60px; display: flex; align-items: center; padding: 0 2rem;">
  <a href="/" style="font-weight: 700; font-size: 1.25rem; color: var(--accent); text-decoration: none; margin-right: 2rem;">
    CC408
  </a>
  <div style="display: flex; gap: 1.5rem; align-items: center;">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;
         transition: color 0.2s;"
       onmouseover="this.style.color='var(--accent)'"
       onmouseout="this.style.color='var(--text-secondary)'">

    {{ end }}
  </div>
  <div style="margin-left: auto;">
    <a href="https://cycycy5464.github.io/" style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;">
      个人主页 →
    </a>
  </div>
