{{ define "main" }}
<div style="min-height: 80vh; background: var(--bg-primary);">
  <h1 style="text-align: center; padding: 2rem 0 1rem;">🗺️ 408 知识图谱</h1>
  <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">
    拖拽调整布局 · 滚轮缩放 · 点击查看详情 · 双击跳转
  </p>

  <!-- Search Box -->
  <div style="position: absolute; top: 100px; left: 2rem; z-index: 10;">
    <input type="text" id="graph-search" placeholder="搜索知识点..."
      style="padding: 0.5rem 1rem; background: var(--bg-card); color: var(--text-primary);
             border: 1px solid var(--border-color); border-radius: 8px; width: 250px;">
  </div>

  <!-- Graph Container -->
  <div id="knowledge-graph" style="width: 100vw; height: 70vh; position: relative;"></div>

  <!-- Info Panel -->
  <div id="node-info" style="position: fixed; right: 2rem; top: 100px; width: 280px;
       background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px;
       padding: 1.5rem; display: none; z-index: 100;">
    <h3 id="info-title" style="margin-top: 0;"></h3>
    <div id="info-meta" style="color: var(--text-secondary); font-size: 0.85rem;"></div>
    <div id="info-tags" style="margin-top: 0.75rem;"></div>
    <a id="info-link" href="#" class="btn-solid" style="margin-top: 1rem; display: inline-block; font-size: 0.85rem;">查看详情 →</a>
    <button onclick="document.getElementById('node-info').style.display='none'"
      style="position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none;
             color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;">✕</button>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js" integrity="sha384-+D3fDz5Z0Bm5jLk1eSjqHPHnqi2DFPqvD4KmKlMrWyqdbo3E7Nn0k0qJ0q6q7j1" crossorigin="anonymous"></script>
<script src="/js/knowledge-graph.js"></script>
{{ end }}
