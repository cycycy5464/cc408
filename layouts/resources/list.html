{{ define "main" }}
<div class="content-area content-area-wide">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:2rem">
    {{ range .Pages }}
    <div class="card">
      <div style="font-weight:600;margin-bottom:.5rem">{{ .Title }}</div>
      <div style="font-size:var(--fs-sm);color:var(--text-muted);margin-bottom:.5rem">{{ with .Params.file_size }}📁 {{ . }}{{ end }}</div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">{{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}</div>
      <a href="{{ .RelPermalink }}" class="btn btn-ghost" style="font-size:var(--fs-xs)">查看详情 →</a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
