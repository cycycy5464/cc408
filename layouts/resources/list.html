{{ define "main" }}
<div class="content-area" style="max-width: 900px;">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 2rem;">
    {{ range .Pages }}
    <div class="card-glass" style="padding: 1.5rem;">
      <div style="font-weight: 600; margin-bottom: 0.5rem;">{{ .Title }}</div>
      <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem;">
        {{ with .Params.file_size }}📁 {{ . }}{{ end }}
      </div>
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;">
        {{ range .Params.tags }}
        <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
      <a href="{{ .RelPermalink }}" class="btn-outline" style="font-size: 0.85rem;">查看详情 →</a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
