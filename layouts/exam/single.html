{{ define "main" }}
<div class="content-area">
  <div class="meta-row">
    <span class="tag">{{ with .Params.source }}{{ . }}{{ else }}综合{{ end }}</span>
    <span class="tag">{{ .Params.year }}年</span>
    {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
  </div>

  <article class="exam-content">{{ .Content }}</article>

  <div class="border-top-section">
    <a href="{{ "exam/408quiz/" | relURL }}" class="btn btn-ghost">← 返回真题列表</a>
  </div>
</div>

<style>
.exam-content .q-wrap { margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
.exam-content .option { display: block; padding: .5rem .75rem; margin: .25rem 0; border: 1px solid var(--border-color); border-radius: var(--radius-sm); cursor: pointer; transition: all .15s; }
.exam-content .option:hover { border-color: var(--accent); background: rgba(57,186,230,.05); }
.exam-content .option.selected { border-color: var(--accent); background: rgba(57,186,230,.12); color: var(--accent); font-weight: 600; }
.exam-content .option.correct { border-color: #4ade80; background: rgba(74,222,128,.1); color: #4ade80; }
.exam-content .option.wrong { border-color: #f87171; background: rgba(248,113,113,.1); color: #f87171; }
.exam-content .answer-fold { display: none; }
.exam-content .answer-reveal-btn {
  display: inline-block; margin-top: .5rem; padding: .3rem 1rem;
  background: rgba(57,186,230,.1); border: 1px solid var(--accent);
  color: var(--accent); border-radius: var(--radius-sm); cursor: pointer;
  font-size: var(--fs-sm); transition: all .2s;
}
.exam-content .answer-reveal-btn:hover { background: rgba(57,186,230,.2); }
.exam-content .answers-quickref { margin-bottom: 1rem; padding: .75rem; background: var(--bg-secondary); border-radius: var(--radius-md); font-size: var(--fs-sm); }
</style>

<script>
(function() {
  document.querySelectorAll('.exam-content').forEach(function(article) {
    var html = article.innerHTML;

    // Step 1: Make choice options selectable
    // Pattern: lines like "A. xxx\nB. xxx\nC. xxx\nD. xxx" after a question
    html = html.replace(
      /(<h5[^>]*>[^<]*<\/h5>[\s\S]*?)(?=(?:<h5|$))/g,
      function(match) {
        var options = match.match(/^([A-D])[.、．]([^\n]*)$/gm);
        if (!options) return match;
        return match.replace(
          /^([A-D])[.、．]([^\n]*)$/gm,
          '<span class="option" data-opt="$1">$1. $2</span>'
        );
      }
    );

    // Step 2: Wrap "正确答案：X" in collapsible section
    html = html.replace(
      /(正确答案[：:]\s*[ABCDabcd][^<\n]*)/g,
      '<span class="answer-fold">$1</span><button class="answer-reveal-btn" onclick="var p=this.previousElementSibling;var h=p.style.display!=\'inline\';p.style.display=h?\'inline\':\'none\';this.textContent=h?\'隐藏答案\':\'显示答案\'">显示答案</button>'
    );

    article.innerHTML = html;

    // Step 3: Handle option clicks - mark selected, check answer
    article.querySelectorAll('.option').forEach(function(opt) {
      opt.addEventListener('click', function() {
        var questionBlock = this.closest('h5') ? this.closest('h5').nextElementSibling : null;
        // Deselect siblings
        this.parentElement.querySelectorAll('.option').forEach(function(o) {
          o.classList.remove('selected');
        });
        this.classList.add('selected');
      });
    });
  });
})();
</script>
{{ end }}
