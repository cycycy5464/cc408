# SITE SETUP
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: dark
  color: blue

# SEO
marketing:
  seo:
    site_type: Organization
    local_business_type: ''
    org_name: 'CC408'
    description: '408考研知识整理平台 — 知识点 · 刷题 · 知识图谱'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: true
    show_theme_chooser: false
    logo:
      text: "CC408"

# Site footer
footer:
  copyright:
    notice: '© {year} CC408. 408考研知识整理'
    license:
      enable: false

# Localization
locale:
  date_format: '2006-01-02'
  time_format: '15:04'

# Site features
features:
  math:
    enable: true
  privacy_pack:
    enable: false
