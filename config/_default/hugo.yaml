# Configuration of Hugo
# Guide: https://docs.hugoblox.com/tutorial/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings

# Website name
title: CC408
# Website URL
baseURL: 'https://cycycy5464.github.io/cc408/'

############################
## LANGUAGE
############################

defaultContentLanguage: zh
hasCJKLanguage: true
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## ADVANCED
############################

build:
  writeStats: false
  hugo_version: '0.135.0'
  enableGitInfo: false
  summaryLength: 30
  pagination:
    pagerSize: 10
  enableEmoji: true
  enableRobotsTXT: true
  footnotereturnlinkcontents: <sup>^</sup>
  ignoreFiles:
    - \.ipynb$
    - \.ipynb_checkpoints$
    - \.Rmd$
    - \.Rmarkdown$
    - _cache$
    - backup
    - \.?backup-
    - \.~
  disableAliases: true

permalinks:
  question: '/question/:filename/'

outputs:
  home: [HTML]
  section: [HTML]
  page: [HTML]
imaging:
  resampleFilter: lanczos
  quality: 80
  anchor: smart
timeout: 600000
taxonomies:
  tag: tags
  year: years
  subject: subjects
  knowledge_point: knowledge_points
markup:
  _merge: deep
  highlight:
    lineNos: false
    # noClasses:false → 输出 .chroma 等 class（非行内样式），配色由 assets/css/_chroma.scss 控制，
    # 以跟随浅/深双主题。Hugo 会按 style 自动注入 monokai 样式表，但已被 _chroma.scss 用更高特异性覆盖。
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
security:
  _merge: deep
sitemap:
  _merge: deep

############################
## 题目标签远端同步（方案 A · Serverless 代理）
## 留空 = 仅本地（localStorage）；填入 Worker 地址即启用「同步到仓库」
## 详见 serverless/README.md
params:
  tagProxyEndpoint: ''
