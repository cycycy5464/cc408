\\n\\n了解线性表的概念，不会直接考察。还是会考察 **顺序表** 和 **链表** 这两种具体实现方案。\\n\\n### 线性表定义\\n\\n\\n![](/images/docs/data-structure/250c0eaeaf.svg)\\n\\n线性表 Linear ListL = \\\\(a₁, a₂, …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;线性表\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;线性表定义与基本操作\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch01-linear-list/definition/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n本章是每年必考的重点，**补码** 、**有符号数** 和 **无符号数** 每年都会在选择题考查，也会在大题直接或间接考查，并且本章是组成原理的基础，必须 **完全掌握** 。\\n\\n### BCD 码\\n\\n**BCD** （Binary-Coded Decimal）码是一种 **二进 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;数据表示\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;整数的表示\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch01-data-representation/integers/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\nIEEE 浮点数表示的方法非常重要，每年选择题都必考，需要能够熟练计算 IEEE 浮点数的二进制和十进制之间的关联。\\n\\n### 实数的二进制表示\\n\\n实数在计算机中的存储遵循 [IEEE 浮点数标 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;数据表示\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;浮点数表示\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch01-data-representation/float/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n### 进程和线程\\n\\n🔥 高优先级\\n\\n**进程的相关概念** 是历年操作系统选择题必考，关键在于几点：进程和线程、进程状态转换、进程内存空间的架构。\\n\\n在多道程序环境下，允许多个程序并发执行，为此操作系统引入了 **进程** \\\\(Process\\\\) 的概念，以便更好地描述和控制程序的并发执行，实现 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;进程管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;进程与线程\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch01-process/process-thread/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n关于顺序表，一般不会直接考察本节中介绍的这些操作，因为太简单了。更多的是考察基于顺序表（数组）的 **算法设计** ，但是这些操作是更高级算法设计的基础。\\n\\n### 顺序表定义\\n\\n**顺序表（Seq u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch01-data-representation/circuits/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n关于栈直接考查其定义和概念比较少，**更多的是考查应用** ，但是这一节还是 **作为基础** ，需要熟悉下。\\n\\n### 定义\\n\\n**栈** 是一个元素的集合，加入元素的操作叫做 **“压栈”（push）** ，而移除元素的操作叫做 **“出栈”（pop）** 。它遵循 **后进先 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;栈\u0026#34;,\u0026#34;队列\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;栈\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch02-stack-queue/stack/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章是重中之重，在选择题和大题中每年都会考察，需要理解通透。其中 cache 和虚拟存储器常常和操作系统中的相关知识放在一起考察，需要能够将两门课相关内容联系起来。\\n![](/images/docs/computer-org/image-20260612222133958.png)\\n## 存储器分 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;存储系统\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch02-memory/memory-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n直接考察不是很多，偶尔在选择题考察相关概念，另外要留意 **循环队列** 往年在解答题中考察过。\\n\\n### 定义\\n\\n队列是一种遵循 **先入先出** \\\\(FIFO, First In First Out\\\\) 原则的线性数据结构。元素在 **队尾** 添加，在 **队首** 删除。 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;栈\u0026#34;,\u0026#34;队列\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;队列\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch02-stack-queue/queue/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n**同步问题设计** 是操作系统解答题必考题，本节的几个经典问题虽然不会直接考察，但是其中的设计思想还是需要深入掌握。\\n\\n### 生产者消费者问题\\n\\n**Producer**\\n\\n\\n![](/images/docs/os/aa1263419a.svg) …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;进程管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;经典同步问题\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch01-process/classic- 、入栈出栈序列。\\n\\n### 二叉表达式树\\n\\n\\n![](/images/docs/data-structure/b21610e69a.svg)\\n\\n**二叉表达式树** 是一种特殊的二叉树，用于表示算术或逻辑表 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;栈\u0026#34;,\u0026#34;队列\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;栈和队列的应用\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch02-stack-queue/application/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n### DRAM 芯片\\n\\n[DRAM](\\u0026lt;/constitution_principle/storage/defs/#dram\\u0026gt;) 芯片是一种 **动态随机存取存储器** ，通过 **1T1C** （1 晶体管 \u0026#43;1 电容器）存储单元以行列矩阵形式组织数据，依靠电容器电荷存储比特，需定期 **刷 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;内存\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch02-memory/ram/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n内容与[存储系统](\\u0026lt;/constitution_principle/storage/\\u0026gt;)关联很大，放在一起对比复习。\\n![](/images/docs/os/image-20260611221932175.png)\\n    \\n\\n## 基础\\n\\n- 基本概念：虚拟和逻辑地址，地址转换，内存共享，内存 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;内存管理\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch02-memory/memory-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章以选择题形式考察，需要熟练掌握栈和队列的操作以及应用，另外还需要了解如何用数组实现栈和队列，可能会在代码题中考察。\\n\\n学习思维导图：\\n![](/images/docs/data-structure/image-20260612084819344.png)\\n\\n## 栈和队列基本概念\\n\\n## 栈和 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[],\u0026#34;title\u0026#34;:\u0026#34;线性数据结构\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch02-stack-queue/linear-data-structure/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n💡 低优先级\\n\\n较少考查，了解下几种组帧方法的原理即可。\\n\\n数据链路层的主要功能之一就是 **组帧** 。\\n\\n帧（frame）代表数据链路层的数据发送单位，在接收到来自于网络层的报文（packet）时如何为其添加帧头和帧尾，并且以何种方式进行 **帧定界** （接收方区别连续不同的帧）。 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;数据链路层\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;组帧\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch02-datalink/framing/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n这个没必要多说了，408 中绝对的重点，每年都必考而且占分值很多，**cache** 和 **虚拟页式存储器** 在 计算机组成原理/操作系统 中的地位就是 **耶路撒冷** 在西方的地位。\\n\\n一整章都是重点，映射方式、地址结构、写策略等都务必 **深入** 掌握。\\n\\n### …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;Cache\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch02-memory/cache/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n💡 低优先级\\n\\n说实话本节细节极多但是考查频率很低，考的话一般是在选择题考一题，这一节的几个知识点说实话只能硬背了，大家可以根据自身精力决定要不要搏一搏这可能出现的两分。\\n\\n### 分类\\n\\n  * **检错编码** ：奇偶校验码、循环冗余码\\n  * **纠错编码** ：海明码\\n\\n### …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;CPU\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;差错控制\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch02-datalink/error-control/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章可能在选择题中出现，掌握 KMP 算法的思想，能够手工模拟 KMP 过程即可。\\n\\n* * *\\n\\n##### [定义和实现](\\u0026lt;/data_structure/strings/def/\\u0026gt;)\\n\\n##### [模式匹配](\\u0026lt;/data_structure/strings/match/\\u0026gt;)\\n\\n\\n##  …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;基础概念\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;串概述\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch03-string/string-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n页式虚拟存储的细节都在 [组成原理章节](\\u0026lt;/constitution_principle/storage/virtual/\\u0026gt;)，对于本节，重点掌握 **动态分区分配算法** 以及 **几种内存管理方式** （页式、段式、段页式）的概念和特点。\\n\\n### 内存管理\\n\\n#### 基础 …\u0026#34;,\ :[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;虚拟内存管理\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch02-memory/virtual/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n这一节要考的话其实就是 kmp 算法，会考察下 **next 数组的构建** 和 **调整位置的方式** 。虽然历年考查得其实也不是很多，但是这种涉及算法的还是得多留个心眼，因为有可能在今年的大题就考查了。\\n\\n**字符串模式匹配** 是计算机科学中的基础问题，主要是在一个 **主字 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;串\u0026#34;,\u0026#34;字符串\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;串的模式匹配\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch03-string/pattern-matching/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n数据链路层的另一个重点（之前一个是 ARQ 协议），重点掌握 **CSMA/CD** 的细节，会在选择题和解答题中考查。多路复用和 CSMA/CA 也要熟悉下，会在选择题中考查。\\n\\nALOHA 协议说实话没考察过，但是出现过在考纲中，所以还是加在教程中。\\n\\n### …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;CPU\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;介质访问控制\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch02-datalink/mac/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n主要在选择题中考察，在大题中也会涉及到对概念的考察。文件的物理结构以及外存空闲空间管理方法要熟练掌握。\\n![](/images/docs/os/image-20260611223145928.png)\\n## 文件\\n\\n- 基本概念\\n- 元数据和索引结点\\n- 文件的操作\\n- 文件的保护\\n- 文件的逻辑 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;文件管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;文件管理\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch03-file/file-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n虚拟存储器 和 cache 一样重要，而且考察的方式往往是复合考察，将两者的知识融合在一起放到大题中考察，需要能够从存储系统全局看待这两者的关联。\\n\\n**虚拟存储器** 是一种 **计算机内存管理技术** ，它在 **物理内存** 和 **磁盘存储** 之间创建了一个抽象的、扩展的 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;存储系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;虚拟存储器\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch02-memory/virtual/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n本节主要关注以太网的传输介质和帧格式，往年在解答题出现了传输介质的名称，如果不知道对应的带宽就难搞了。VLAN 和 广域网的概念考查频率低一些，但也比较简单，熟悉下能在选择题应对就可。\\n\\n### 局域网\\n\\n局域网（Local Area Network，LAN）是一种覆盖范围较小、用 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;基础概念\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;局域网与广域网\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch02-datalink/lan-wan/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n在选择题偶尔会考察，**多维数组的存储是** 和 **矩阵的几种压缩存储方式** 要了解一下。\\n\\n### 多维数组的存储\\n\\n在计算机内存中，数组元素是 **连续存放** 的。对于一个二维数组来说，它实际上只是对一维数组的一种逻辑抽象。理解其存储方式的关键在于：** …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[],\u0026#34;title\u0026#34;:\u0026#34;数组和特殊矩阵\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch03-string/array-matrix/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n这一节是操作系统文件管理中最重要的一节，每个知识点的知识都要深入掌握，尤其是文件的物理结构，在大题中也经常考察。\\n\\n### 文件元信息\\n\\n\\n![](/images/docs/os/5e52aecf90.svg)\\n\\n在 **UNIX** 和类 **UNIX** 操作系统中， …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;文件管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;文件\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch03-file/file-basics/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章也是重点，常常在大题中与 CPU 放在一起考察。需要熟练掌握指令的格式以及寻址方式，并且能够根据题目灵活应变。\\n![](/images/docs/computer-org/image-20260612224139501.png)\\n## 基本概念\\n\\n## 指令格式\\n\\n## 寻址方式\\n\\n## 数据 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;指令系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;指令系统\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch03-instruction/instruction-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n选择题中会考察 **目录** 以及 **硬链接和软链接** 的概念。\\n\\n### 目录概念\\n\\n目录是计算机文件系统中用于组织和存储文件和其他目录的一种 **重要概念** 。目录也被称为文件夹，它是文件系统中的一个 **关键组成部分** ，用于创建层次结构，方便用户管理和浏览文件。 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;文件管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;目录\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch03-file/directory/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n树和图每年都是必考，这一节每个知识点都十分重要。\\n\\n### 树的基本概念\\n\\n#### 结点属性\\n\\n  * **双亲** （parent）：如果一个结点包含子结点，则该结点被称为其子结点的双亲。\\n  * **兄弟** （sibling）：具有相同双亲结点的结点互称为兄弟结点。\\n  * …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;树\u0026#34;,\u0026#34;二叉树\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;树\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch04-tree/tree/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n需要了解三点：转发表结构、交换机转发流程 以及 交换方式，选择题会考查，也作为解答题的基础。\\n\\n### 交换机\\n\\n交换机（Switch）是网络中用于连接设备并转发数据帧的二层设备。它通过分析数据帧中的 MAC 地址，将数据帧从接收端口精准转发到 **目标设备所在的端口** 。 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;设备管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;数据链路层设备\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch02-datalink/devices/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n### 指令体系结构\\n\\n💡 低优先级\\n\\n指令体系结构 偶尔在选择题中考查，概念看一看，留个印象，基本就没问题。\\n\\n**指令体系结构** （Instruction Set Architecture，简称 ISA） 是计算机体系结构中定义处理器 **指令集** 的规范。它是硬件与软件之间的接口，规定了 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;指令系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;指令集种类\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch03-instruction/types/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章在选择题中考察，需熟练掌握树的各种概念，并且能够手工模拟基于树的各种算法流程。\\n\\n学习思维导图\\n![](/images/docs/data-structure/image-20260612092437321.png)\\n\\n## 树的基本概念\\n\\n## 二叉树\\n\\n- 定义和主要特性\\n- 顺序存储结构 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;树\u0026#34;,\u0026#34;二叉树\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;树与二叉树\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch04-tree/tree-and-binary-tree/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章是计算机网络中的重点，会在选择题中考察，其中知识点也会与其他知识结合，放在大题中考察，需要熟练掌握 IP 协议以及 IP 数据包从一台主机发送到另一台主机的逻辑过程。\\n\\n学习思维导图：\\n    \\n    \\n    \\n## 网络层功能\\n\\n- 异构网络互联\\n- 路由和转发\\n- SDN基本概念\\n-  …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;网络层\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;网络层\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch03-network/nw-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n本节的重点在于外存空间管理的方法，其他几个知识点也偶有考察，稍微了解下概念就行。\\n\\n### 功能\\n\\n文件系统（**File System** ）作为操作系统与存储设备之间的桥梁，负责数据的存储、访问、管理和保护。简单来说，文件系统主要包含以下功能：\\n\\n  1. **数据存储与组 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;文件管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;文件系统\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch03-file/filesystem/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n组成原理说实话就 **两大块** ：cache 和 虚拟存储器，这两个要放在一起。指令系统 和 CPU，这两个也要放一起。两大块内部的知识点都是相互耦合的，需要综合理解。\\n\\n### 指令格式\\n\\n\\n\\n\\n指令的功能就是 **对某些数据** 进行 **某种操作** 。\\n\\n所以指令中主要包 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;指令系统\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;指令格式与寻址方式\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch03-instruction/format-addressing/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n内容与[总线和输入输出系统](\\u0026lt;/constitution_principle/bus/\\u0026gt;)关联很大，放在一起对比复习。应熟练掌握磁盘的调度算法。\\n![](/images/docs/os/image-20260611223626016.png)\\n## I/O管理基础\\n\\n- 设备的基本概念\\n- …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34; 6#34;:\u0026#34;\\n### 编译过程\\n\\n💡 低优先级\\n\\n考查得很少，大致了解 **编译的具体流程** 和 **每个阶段的具体任务** 就行。\\n\\n\\n![](/images/docs/computer-org/image-20260612225720932.png)\\n\\n一个传统的 C 程序从源代码到可执行二进制程序的过程 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;基础概念\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;高级语言与机器码\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch03-instruction/hll-machine/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n💡 低优先级\\n\\n低频考点，大致了解下这节的三个概念：缓冲区、设备分配和回收、SPOOLing 就行，在选择题偶尔会考察。\\n\\n### 缓冲区\\n\\n**缓冲区** 是一块预留在内存中的区域，用于临时存放数据，从而使得输入/输出操作与其他处理操作可以相对独立地进行。**缓冲区** 的使用可以减少 _I/O …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;设备管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;设备管理\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch04-io/device-mgmt/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章在选择题中考察，也有可能作为一道概念题在大题中出现，需要熟练掌握图的存储结构（代码实现），并且要求在概念上理解图的应用，要求能够手工模拟。\\n\\n学习思维导图：\\n![](/images/docs/data-structure/image-20260612103007668.png)\\n    \\n## …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;基础概念\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;图概述\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch05-graph/graph-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n需掌握 DHCP 的功能和流程，可能在选择题中考察，也会在大题中考查一小问。\\n\\n动态主机配置协议（DHCP）是一个网络管理协议，用于自动分配 **IP 地址** 和其他网络配置参数给网络设备，从而允许它们连接到 **IP 网络** 。\\n\\n当你连接到一个网络中时，不管是通过 **无线 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;体系结构\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;DHCP协议\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/network/ch03-network/dhcp/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n### 磁盘管理\\n\\n⭐ 中优先级\\n\\n选择题中考察，重点掌握两点：1. **物理格式化和逻辑格式化的区别** 。2. **系统引导流程** 。\\n\\n#### 磁盘初始化\\n\\n一个新的磁盘只是一个磁性记录材料的空白盘。在磁盘可以存储数据之前，必须对其进行 **物理格式化** （也叫做 **低级格式化** …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;os\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;设备管理\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;磁盘\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/os/ch04-io/disk/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n树和图都是每年必考，其定义是后续应用的基础，需牢固掌握 **图的概念** 以及 邻接矩阵和邻接表这两种 **存储方式** 。\\n\\n### 图的概念\\n\\n**图** 是由 **顶点** 和 **边** 组成的非线性数据结构。**顶点** 有时也被称为节点，而 **边** 是连接图中任意两 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;data-structure\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;图\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;图的定义\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/data-structure/ch05-graph/definition/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n本章是重中之重，几乎每年都会在大题和选择题中考察。需要熟练掌握 CPU 的结构、寄存器类型以及指令执行的流程，关于 CPU 的考察也常常和指令系统混合在一起，需要能够从一个高维的角度，思考 CPU、指令、控制器以及外部设备的关系。 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;CPU\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;中央处理器\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch04-cpu/cpu-index/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n🔥 高优先级\\n\\n本节很重要，其实应该不需要我再强调了。本节要和指令系统放在一起理解，主要两点：1. 理解 CPU 的 **架构方式** 。2. 理解 CPU 中 **各种寄存器的功能细节** 。\\n\\n### CPU\\n\\n作为计算机的“大脑”，CPU（中央处理器）是执行程序指令、处理数据的关键部件。从宏 …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;computer-org\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;基础概念\u0026#34;],\u0026#34;title\u0026#34;:\u0026#34;CPU功能与结构\u0026#34;,\u0026#34;url\u0026#34;:\u0026#34;/cc408/docs/computer-org/ch04-cpu/function-structure/\u0026#34;},{\u0026#34;excerpt\u0026#34;:\u0026#34;\\n⭐ 中优先级\\n\\n本节细节比较多，但是考察得比较多的还是 RIP 协议，可以把 RIP 的一些知识点多看些，然后 OSPF 和 BGP 稍微了解下。\\n\\n### 路由\\n\\n这一节我们首先通过三个问题来认识什么是 **路由** ，接下来再在此基础上介绍 **路由协议** 。\\n\\n什么是 **路由** ？\\n\\n …\u0026#34;,\u0026#34;subject\u0026#34;:\u0026#34;network\u0026#34;,\u0026#34;tags\u0026#34;:[\u0026#34;网络层\
