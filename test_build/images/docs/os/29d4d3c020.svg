<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 700"><rect width="1e3" height="700" fill="none"/><text x="500" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#2c3e50">ARQ 协议 (Automatic Repeat reQuest)</text><text x="500" y="70" text-anchor="middle" font-size="16" fill="#7f8c8d">可靠数据传输协议</text><rect x="50" y="100" width="900" height="120" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="10"/><text x="70" y="130" font-size="18" font-weight="bold" fill="#2c3e50">核心思想：</text><text x="90" y="155" font-size="14" fill="#2c3e50">• 发送方发送数据后，必须等待接收方的确认（ACK）</text><text x="90" y="175" font-size="14" fill="#2c3e50">• 超时未收到确认，认为数据丢失或出错，进行重传</text><text x="90" y="195" font-size="14" fill="#2c3e50">• 在不可靠信道上实现可靠通信</text><text x="500" y="270" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">三种主要ARQ协议</text><g><rect x="50" y="300" width="280" height="350" fill="#fff3cd" stroke="#f39c12" stroke-width="2" rx="8"/><text x="190" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#d68910">停等ARQ</text><text x="190" y="350" text-anchor="middle" font-size="12" fill="#b7950b">(Stop-and-Wait)</text><line x1="120" y1="380" x2="120" y2="600" stroke="#34495e" stroke-width="2"/><line x1="260" y1="380" x2="260" y2="600" stroke="#34495e" stroke-width="2"/><text x="120" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">发送方</text><text x="260" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">接收方</text><line x1="120" y1="400" x2="250" y2="420" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="185" y="405" font-size="10" fill="#c0392b">数据1</text><line x1="260" y1="440" x2="130" y2="460" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><text x="195" y="445" font-size="10" fill="#229954">ACK1</text><line x1="120" y1="480" x2="250" y2="500" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="185" y="485" font-size="10" fill="#c0392b">数据2</text><text x="70" y="620" font-size="13" fill="#d68910">特点：发送一帧等待确认</text><text x="70" y="635" font-size="13" fill="#d68910">效率低，适合简单场景</text></g><g><rect x="360" y="300" width="280" height="350" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2" rx="8"/><text x="500" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#138496">回退N帧ARQ</text><text x="500" y="350" text-anchor="middle" font-size="12" fill="#117a8b">(Go-Back-N)</text><line x1="430" y1="380" x2="430" y2="600" stroke="#34495e" stroke-width="2"/><line x1="570" y1="380" x2="570" y2="600" stroke="#34495e" stroke-width="2"/><text x="430" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">发送方</text><text x="570" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">接收方</text><line x1="430" y1="400" x2="560" y2="410" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="430" y1="415" x2="560" y2="425" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="430" y1="430" x2="560" y2="440" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="430" y1="445" x2="520" y2="455" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,5"/><text x="380" y="405" font-size="9" fill="#c0392b">1,2,3</text><text x="475" y="460" font-size="9" fill="#c0392b">4丢失</text><line x1="570" y1="480" x2="440" y2="490" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><text x="485" y="480" font-size="10" fill="#229954">ACK3</text><line x1="430" y1="510" x2="560" y2="520" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/><text x="470" y="510" font-size="9" fill="#d68910">重传4,5,6...</text><text x="380" y="620" font-size="13" fill="#138496">特点：连续发送，出错回退</text><text x="380" y="635" font-size="13" fill="#138496">效率中等，实现相对简单</text></g><g><rect x="670" y="300" width="280" height="350" fill="#d4edda" stroke="#28a745" stroke-width="2" rx="8"/><text x="810" y="330" text-anchor="middle" font-size="16" font-weight="bold" fill="#155724">选择性重传ARQ</text><text x="810" y="350" text-anchor="middle" font-size="12" fill="#0f5132">(Selective Repeat)</text><line x1="740" y1="380" x2="740" y2="600" stroke="#34495e" stroke-width="2"/><line x1="880" y1="380" x2="880" y2="600" stroke="#34495e" stroke-width="2"/><text x="740" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">发送方</text><text x="880" y="375" text-anchor="middle" font-size="12" fill="#2c3e50">接收方</text><line x1="740" y1="400" x2="870" y2="410" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="740" y1="415" x2="870" y2="425" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="740" y1="430" x2="830" y2="440" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,5"/><line x1="740" y1="445" x2="870" y2="455" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="695" y="405" font-size="9" fill="#c0392b">1,2</text><text x="785" y="440" font-size="9" fill="#c0392b">3丢失</text><text x="805" y="455" font-size="9" fill="#c0392b">4</text><line x1="880" y1="480" x2="750" y2="485" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowhead)"/><line x1="880" y1="495" x2="750" y2="500" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowhead)"/><text x="800" y="475" font-size="9" fill="#229954">ACK1,2,4</text><line x1="740" y1="520" x2="870" y2="530" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/><text x="785" y="520" font-size="10" fill="#d68910">只重传3</text><text x="690" y="620" font-size="13" fill="#155724">特点：只重传出错帧</text><text x="690" y="635" font-size="13" fill="#155724">效率最高，实现最复杂</text></g><rect x="360" y="680" width="280" height="18" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="1" rx="5"/><text x="500" y="694" text-anchor="middle" font-size="14" fill="#2d3436">连续ARQ协议</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/></marker></defs></svg>