<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><style>.title{font:700 18px sans-serif;fill:#2c3e50}.label{font:700 14px sans-serif;fill:#34495e}.text{font:12px sans-serif;fill:#2c3e50}.char-box{stroke:#3498db;stroke-width:2;fill:#ecf0f1}.pattern-box{stroke:#e74c3c;stroke-width:2;fill:#fdf2f2}.match-box{stroke:#27ae60;stroke-width:3;fill:#e8f5e8}.arrow{stroke:#7f8c8d;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.concept-bg{fill:#f8f9fa;stroke:#dee2e6;stroke-width:1;rx:8}</style><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/></marker></defs><text x="400" y="25" class="title" text-anchor="middle">模式匹配算法核心概念</text><text x="50" y="70" class="label">主串 (Str):</text><text x="50" y="90" class="text">待搜索的完整字符串</text><g transform="translate(50, 105)"><rect x="0" y="0" width="25" height="25" class="char-box"/><text x="12.5" y="17" class="text" text-anchor="middle">A</text><text x="12.5" y="40" class="text" text-anchor="middle">0</text><rect x="25" y="0" width="25" height="25" class="char-box"/><text x="37.5" y="17" class="text" text-anchor="middle">B</text><text x="37.5" y="40" class="text" text-anchor="middle">1</text><rect x="50" y="0" width="25" height="25" class="char-box"/><text x="62.5" y="17" class="text" text-anchor="middle">A</text><text x="62.5" y="40" class="text" text-anchor="middle">2</text><rect x="75" y="0" width="25" height="25" class="char-box"/><text x="87.5" y="17" class="text" text-anchor="middle">B</text><text x="87.5" y="40" class="text" text-anchor="middle">3</text><rect x="100" y="0" width="25" height="25" class="char-box"/><text x="112.5" y="17" class="text" text-anchor="middle">C</text><text x="112.5" y="40" class="text" text-anchor="middle">4</text><rect x="125" y="0" width="25" height="25" class="char-box"/><text x="137.5" y="17" class="text" text-anchor="middle">A</text><text x="137.5" y="40" class="text" text-anchor="middle">5</text><rect x="150" y="0" width="25" height="25" class="char-box"/><text x="162.5" y="17" class="text" text-anchor="middle">B</text><text x="162.5" y="40" class="text" text-anchor="middle">6</text><rect x="175" y="0" width="25" height="25" class="char-box"/><text x="187.5" y="17" class="text" text-anchor="middle">D</text><text x="187.5" y="40" class="text" text-anchor="middle">7</text></g><text x="50" y="190" class="label">模式串 (Pattern):</text><text x="50" y="210" class="text">要在主串中查找的目标字符串</text><g transform="translate(50, 225)"><rect x="0" y="0" width="25" height="25" class="pattern-box"/><text x="12.5" y="17" class="text" text-anchor="middle">C</text><rect x="25" y="0" width="25" height="25" class="pattern-box"/><text x="37.5" y="17" class="text" text-anchor="middle">A</text><rect x="50" y="0" width="25" height="25" class="pattern-box"/><text x="62.5" y="17" class="text" text-anchor="middle">B</text></g><text x="50" y="295" class="label">匹配结果:</text><g transform="translate(50, 315)"><rect x="0" y="0" width="25" height="25" class="char-box"/><text x="12.5" y="17" class="text" text-anchor="middle">A</text><text x="12.5" y="40" class="text" text-anchor="middle">0</text><rect x="25" y="0" width="25" height="25" class="char-box"/><text x="37.5" y="17" class="text" text-anchor="middle">B</text><text x="37.5" y="40" class="text" text-anchor="middle">1</text><rect x="50" y="0" width="25" height="25" class="char-box"/><text x="62.5" y="17" class="text" text-anchor="middle">A</text><text x="62.5" y="40" class="text" text-anchor="middle">2</text><rect x="75" y="0" width="25" height="25" class="char-box"/><text x="87.5" y="17" class="text" text-anchor="middle">B</text><text x="87.5" y="40" class="text" text-anchor="middle">3</text><rect x="100" y="0" width="25" height="25" class="match-box"/><text x="112.5" y="17" class="text" text-anchor="middle">C</text><text x="112.5" y="40" class="text" text-anchor="middle">4</text><rect x="125" y="0" width="25" height="25" class="match-box"/><text x="137.5" y="17" class="text" text-anchor="middle">A</text><text x="137.5" y="40" class="text" text-anchor="middle">5</text><rect x="150" y="0" width="25" height="25" class="match-box"/><text x="162.5" y="17" class="text" text-anchor="middle">B</text><text x="162.5" y="40" class="text" text-anchor="middle">6</text><rect x="175" y="0" width="25" height="25" class="char-box"/><text x="187.5" y="17" class="text" text-anchor="middle">D</text><text x="187.5" y="40" class="text" text-anchor="middle">7</text></g><path d="M150 3e2V280" class="arrow"/><text x="150" y="270" class="text" text-anchor="middle">匹配位置: 4</text><rect x="420" y="60" width="350" height="380" class="concept-bg"/><text x="440" y="85" class="label">核心概念:</text><text x="440" y="110" class="label" fill="#3498db">■ 主串 (Str)</text><text x="440" y="125" class="text">完整的待搜索字符串</text><text x="440" y="140" class="text">示例: "ABABCABD"</text><text x="440" y="165" class="label" fill="#2c3e50">■ 子串 (Substr)</text><text x="440" y="180" class="text">主串中的任意连续片段</text><text x="440" y="195" class="text">示例: "CAB" (位置4-6)</text><text x="440" y="220" class="label" fill="#e74c3c">■ 模式串 (Pattern)</text><text x="440" y="235" class="text">要查找的目标字符串</text><text x="440" y="250" class="text">示例: "CAB"</text><text x="440" y="280" class="label">匹配术语:</text><text x="440" y="305" class="label" fill="#27ae60">✓ 匹配</text><text x="440" y="320" class="text">找到与模式串完全相同的子串</text><text x="440" y="345" class="label" fill="#f39c12">⚡ 匹配位置</text><text x="440" y="360" class="text">模式串在主串中的起始索引</text><text x="440" y="375" class="text">本例中匹配位置为 4</text><text x="440" y="400" class="label" fill="#e67e22">✗ 失配</text><text x="440" y="415" class="text">当前比较的字符不相同</text><rect x="50" y="380" width="320" height="80" class="concept-bg"/><text x="60" y="400" class="label">算法目标:</text><text x="60" y="420" class="text">在主串中找到所有与模式串完全匹配的子串，</text><text x="60" y="435" class="text">并返回它们的起始位置。</text><text x="60" y="450" class="text">这就是模式匹配算法要解决的核心问题。</text></svg>