<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720" font-family="'PingFang SC','Microsoft YaHei',sans-serif"><rect width="860" height="720" fill="none" rx="12"/><rect x="180" y="18" width="500" height="46" rx="23" fill="#3b5bdb"/><text x="430" y="48" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold">进程控制块 PCB</text><rect x="290" y="90" width="280" height="300" rx="10" fill="#fff" stroke="#3b5bdb" stroke-width="2.5"/><rect x="290" y="90" width="280" height="38" rx="10" fill="#3b5bdb"/><rect x="290" y="114" width="280" height="14" fill="#3b5bdb"/><text x="430" y="116" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">PCB（进程控制块）</text><rect x="300" y="138" width="260" height="52" rx="6" fill="#e7f5ff"/><rect x="300" y="138" width="8" height="52" rx="3" fill="#4dabf7"/><text x="318" y="159" fill="#1864ab" font-size="12" font-weight="bold">进程标识信息</text><text x="318" y="179" fill="#495057" font-size="11">PID（进程标识符）· UID（用户标识符）</text><rect x="300" y="198" width="260" height="52" rx="6" fill="#fff0f6"/><rect x="300" y="198" width="8" height="52" rx="3" fill="#f783ac"/><text x="318" y="219" fill="#a61e4d" font-size="12" font-weight="bold">进程控制信息</text><text x="318" y="239" fill="#495057" font-size="11">进程状态 · 进程优先级</text><rect x="300" y="258" width="260" height="52" rx="6" fill="#ebfbee"/><rect x="300" y="258" width="8" height="52" rx="3" fill="#51cf66"/><text x="318" y="279" fill="#1a6631" font-size="12" font-weight="bold">处理机状态信息</text><text x="318" y="299" fill="#495057" font-size="11">PC · 通用寄存器 · PSW（程序状态字）</text><rect x="300" y="318" width="260" height="52" rx="6" fill="#fff9db"/><rect x="300" y="318" width="8" height="52" rx="3" fill="#fcc419"/><text x="318" y="339" fill="#7d5a00" font-size="12" font-weight="bold">资源信息</text><text x="318" y="359" fill="#495057" font-size="11">打开的文件 · 内存指针 · 其他资源</text><text x="430" y="403" text-anchor="middle" fill="#868e96" font-size="10.5" font-style="italic">常驻内存，随进程生命周期存在</text><rect x="30" y="450" width="220" height="110" rx="10" fill="#fff" stroke="#4dabf7" stroke-width="2"/><rect x="30" y="450" width="220" height="32" rx="10" fill="#4dabf7"/><rect x="30" y="468" width="220" height="14" fill="#4dabf7"/><text x="140" y="472" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">① 进程创建与终止</text><text x="46" y="496" fill="#212529" font-size="11">• 创建时，OS 为进程新建 PCB</text><text x="46" y="514" fill="#212529" font-size="11">• PCB 常驻内存，可随时存取</text><text x="46" y="532" fill="#212529" font-size="11">• 进程结束时，PCB 被删除</text><text x="46" y="550" fill="#1864ab" font-size="10.5" font-style="italic">PCB 是进程存在的唯一标志</text><rect x="610" y="450" width="220" height="110" rx="10" fill="#fff" stroke="#f783ac" stroke-width="2"/><rect x="610" y="450" width="220" height="32" rx="10" fill="#f783ac"/><rect x="610" y="468" width="220" height="14" fill="#f783ac"/><text x="720" y="472" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">② 进程调度</text><text x="626" y="496" fill="#212529" font-size="11">• OS 读取 PCB 中优先级/状态</text><text x="626" y="514" fill="#212529" font-size="11">• 决定哪个进程获得 CPU</text><text x="626" y="532" fill="#212529" font-size="11">• 调度结果写回 PCB 状态字段</text><text x="626" y="550" fill="#a61e4d" font-size="10.5" font-style="italic">PCB 是调度决策的依据</text><rect x="250" y="580" width="360" height="112" rx="10" fill="#fff" stroke="#51cf66" stroke-width="2"/><rect x="250" y="580" width="360" height="32" rx="10" fill="#51cf66"/><rect x="250" y="598" width="360" height="14" fill="#51cf66"/><text x="430" y="602" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">③ 进程切换（上下文切换）</text><text x="268" y="626" fill="#212529" font-size="11">• 切换时保存当前进程 CPU 现场 → PCB</text><text x="268" y="644" fill="#212529" font-size="11">• 从 PCB 恢复下一进程的 CPU 现场</text><text x="268" y="662" fill="#212529" font-size="11">• 关键字段：PC、寄存器组、PSW</text><text x="268" y="681" fill="#1a6631" font-size="10.5" font-style="italic">PCB 保存/恢复处理机状态信息，实现进程切换</text><line x1="290" y1="310" x2="260" y2="490" stroke="#4dabf7" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/><line x1="570" y1="218" x2="620" y2="490" stroke="#f783ac" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-pink)"/><line x1="430" y1="390" x2="430" y2="578" stroke="#51cf66" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/><rect x="30" y="90" width="220" height="130" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1.5"/><text x="140" y="112" text-anchor="middle" fill="#343a40" font-size="12" font-weight="bold">四类信息说明</text><rect x="46" y="122" width="12" height="12" rx="2" fill="#4dabf7"/><text x="64" y="133" fill="#212529" font-size="11">标识信息：唯一标识进程</text><rect x="46" y="142" width="12" height="12" rx="2" fill="#f783ac"/><text x="64" y="153" fill="#212529" font-size="11">控制信息：调度与管理</text><rect x="46" y="162" width="12" height="12" rx="2" fill="#51cf66"/><text x="64" y="173" fill="#212529" font-size="11">处理机信息：保存 CPU 现场</text><rect x="46" y="182" width="12" height="12" rx="2" fill="#fcc419"/><text x="64" y="193" fill="#212529" font-size="11">资源信息：记录占用资源</text><defs><marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0V6L8 3z" fill="#4dabf7"/></marker><marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0V6L8 3z" fill="#f783ac"/></marker><marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0V6L8 3z" fill="#51cf66"/></marker><marker id="arrow-gray" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0 0V6L7 3z" fill="#adb5bd"/></marker></defs></svg>