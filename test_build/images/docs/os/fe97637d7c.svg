<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><style>.title{font-family:Arial,sans-serif;font-size:20px;font-weight:700;fill:#2c3e50}.subtitle{font-family:Arial,sans-serif;font-size:16px;font-weight:700;fill:#34495e}.label{font-family:Arial,sans-serif;font-size:14px;fill:#2c3e50}.small-label{font-family:Arial,sans-serif;font-size:12px;fill:#555}.formula{font-family:courier new,monospace;font-size:13px;fill:#16a085}.highlight{fill:#3498db}.highlight2{fill:#e74c3c}.box-stroke{stroke:#2c3e50;stroke-width:2;fill:none}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#7f8c8d"/></marker></defs><text x="400" y="30" class="title" text-anchor="middle">虚拟地址与物理地址格式</text><g id="virtual-address"><text x="50" y="80" class="subtitle">虚拟地址 (Virtual Address)</text><rect x="50" y="100" width="700" height="60" class="box-stroke"/><rect x="50" y="100" width="450" height="60" class="highlight" opacity=".3"/><text x="275" y="135" class="label" text-anchor="middle" font-weight="bold">VPN (Virtual Page Number)</text><text x="275" y="150" class="small-label" text-anchor="middle">虚拟页框号</text><rect x="500" y="100" width="250" height="60" class="highlight2" opacity=".3"/><text x="625" y="135" class="label" text-anchor="middle" font-weight="bold">VPO</text><text x="625" y="150" class="small-label" text-anchor="middle">页内偏移</text><line x1="50" y1="175" x2="500" y2="175" stroke="#7f8c8d" stroke-width="1"/><line x1="50" y1="175" x2="50" y2="185" stroke="#7f8c8d" stroke-width="1"/><line x1="500" y1="175" x2="500" y2="185" stroke="#7f8c8d" stroke-width="1"/><text x="275" y="200" class="small-label" text-anchor="middle">VPN 位数</text><line x1="500" y1="175" x2="750" y2="175" stroke="#7f8c8d" stroke-width="1"/><line x1="750" y1="175" x2="750" y2="185" stroke="#7f8c8d" stroke-width="1"/><text x="625" y="200" class="small-label" text-anchor="middle">offset 位数</text><text x="50" y="230" class="formula">虚拟页面个数 = 2^VPN</text><text x="400" y="230" class="formula">页面大小 = 2^offset</text></g><g id="physical-address"><text x="50" y="280" class="subtitle">物理地址 (Physical Address)</text><rect x="50" y="300" width="700" height="60" class="box-stroke"/><rect x="50" y="300" width="500" height="60" class="highlight" opacity=".3"/><text x="300" y="335" class="label" text-anchor="middle" font-weight="bold">PPN (Physical Page Number)</text><text x="300" y="350" class="small-label" text-anchor="middle">物理页框号</text><rect x="550" y="300" width="200" height="60" class="highlight2" opacity=".3"/><text x="650" y="335" class="label" text-anchor="middle" font-weight="bold">PPO</text><text x="650" y="350" class="small-label" text-anchor="middle">页内偏移</text><line x1="50" y1="375" x2="550" y2="375" stroke="#7f8c8d" stroke-width="1"/><line x1="50" y1="375" x2="50" y2="385" stroke="#7f8c8d" stroke-width="1"/><line x1="550" y1="375" x2="550" y2="385" stroke="#7f8c8d" stroke-width="1"/><text x="300" y="400" class="small-label" text-anchor="middle">PPN 位数</text><line x1="550" y1="375" x2="750" y2="375" stroke="#7f8c8d" stroke-width="1"/><line x1="750" y1="375" x2="750" y2="385" stroke="#7f8c8d" stroke-width="1"/><text x="650" y="400" class="small-label" text-anchor="middle">offset 位数</text><text x="50" y="430" class="formula">物理页面个数 = 2^PPN</text><text x="400" y="430" class="formula">页面大小 = 2^offset</text></g><g id="key-relationship"><line x1="625" y1="160" x2="650" y2="300" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/><rect x="200" y="470" width="400" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="10"/><text x="400" y="500" class="subtitle" text-anchor="middle">⭐ 关键特性</text><text x="400" y="525" class="label" text-anchor="middle" fill="#e74c3c" font-weight="bold">VPO = PPO = offset</text><text x="400" y="545" class="small-label" text-anchor="middle">虚拟地址和物理地址的页内偏移量相同</text><text x="400" y="560" class="small-label" text-anchor="middle">这使得页表只需要映射页框号，简化了地址转换</text></g></svg>