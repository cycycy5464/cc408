<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 800"><defs><style>.title{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#2c3e50}.subtitle{font-family:Arial,sans-serif;font-size:16px;fill:#34495e}.label{font-family:Arial,sans-serif;font-size:14px;fill:#2c3e50}.small-label{font-family:Arial,sans-serif;font-size:12px;fill:#555}.bit-label{font-family:monospace;font-size:11px;fill:#666}.desc-text{font-family:Arial,sans-serif;font-size:13px;fill:#555}.field-box{stroke:#34495e;stroke-width:2}.ppn{fill:#3498db}.valid{fill:#2ecc71}.dirty{fill:#e74c3c}.accessed{fill:#f39c12}.protection{fill:#9b59b6}.cache{fill:#1abc9c}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#555"/></marker></defs><text x="500" y="35" class="title" text-anchor="middle">页表项（PTE）结构</text><text x="500" y="60" class="subtitle" text-anchor="middle">Page Table Entry</text><g id="pte-structure"><rect x="100" y="100" width="300" height="60" class="field-box ppn" rx="4"/><text x="250" y="135" class="label" text-anchor="middle" font-weight="bold">物理页框号 (PPN)</text><text x="250" y="152" class="small-label" text-anchor="middle">Physical Page Number</text><rect x="420" y="100" width="60" height="60" class="field-box valid" rx="4"/><text x="450" y="127" class="label" text-anchor="middle" font-weight="bold">V</text><text x="450" y="145" class="small-label" text-anchor="middle">有效位</text><rect x="500" y="100" width="60" height="60" class="field-box dirty" rx="4"/><text x="530" y="127" class="label" text-anchor="middle" font-weight="bold">D</text><text x="530" y="145" class="small-label" text-anchor="middle">修改位</text><rect x="580" y="100" width="60" height="60" class="field-box accessed" rx="4"/><text x="610" y="127" class="label" text-anchor="middle" font-weight="bold">A</text><text x="610" y="145" class="small-label" text-anchor="middle">访问位</text><rect x="660" y="100" width="100" height="60" class="field-box protection" rx="4"/><text x="710" y="127" class="label" text-anchor="middle" font-weight="bold">Prot</text><text x="710" y="145" class="small-label" text-anchor="middle">保护位</text><rect x="780" y="100" width="100" height="60" class="field-box cache" rx="4"/><text x="830" y="127" class="label" text-anchor="middle" font-weight="bold">Cache</text><text x="830" y="145" class="small-label" text-anchor="middle">缓存位</text></g><g id="bit-markers"><text x="250" y="85" class="bit-label" text-anchor="middle">通常 20-52 位</text><text x="450" y="85" class="bit-label" text-anchor="middle">1 位</text><text x="530" y="85" class="bit-label" text-anchor="middle">1 位</text><text x="610" y="85" class="bit-label" text-anchor="middle">1 位</text><text x="710" y="85" class="bit-label" text-anchor="middle">2-3 位</text><text x="830" y="85" class="bit-label" text-anchor="middle">1-2 位</text></g><g id="descriptions"><line x1="250" y1="160" x2="250" y2="200" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="120" y="205" width="260" height="75" fill="#ecf0f1" stroke="#3498db" stroke-width="2" rx="6"/><text x="250" y="225" class="desc-text" text-anchor="middle" font-weight="bold">物理页框号</text><text x="250" y="245" class="desc-text" text-anchor="middle">指向实际物理内存中的</text><text x="250" y="262" class="desc-text" text-anchor="middle">页框地址</text><line x1="450" y1="160" x2="450" y2="300" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="360" y="305" width="180" height="75" fill="#ecf0f1" stroke="#2ecc71" stroke-width="2" rx="6"/><text x="450" y="325" class="desc-text" text-anchor="middle" font-weight="bold">有效位</text><text x="450" y="345" class="desc-text" text-anchor="middle">1 = 页面有效</text><text x="450" y="362" class="desc-text" text-anchor="middle">0 = 页面无效/未分配</text><line x1="530" y1="160" x2="530" y2="395" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="440" y="400" width="180" height="75" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2" rx="6"/><text x="530" y="420" class="desc-text" text-anchor="middle" font-weight="bold">修改位</text><text x="530" y="440" class="desc-text" text-anchor="middle">1 = 页面已被修改</text><text x="530" y="457" class="desc-text" text-anchor="middle">需要写回磁盘</text><line x1="610" y1="160" x2="610" y2="490" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="520" y="495" width="180" height="75" fill="#ecf0f1" stroke="#f39c12" stroke-width="2" rx="6"/><text x="610" y="515" class="desc-text" text-anchor="middle" font-weight="bold">访问位</text><text x="610" y="535" class="desc-text" text-anchor="middle">1 = 页面已被访问</text><text x="610" y="552" class="desc-text" text-anchor="middle">用于页面置换算法</text><line x1="710" y1="160" x2="710" y2="585" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="615" y="590" width="190" height="90" fill="#ecf0f1" stroke="#9b59b6" stroke-width="2" rx="6"/><text x="710" y="610" class="desc-text" text-anchor="middle" font-weight="bold">保护位</text><text x="710" y="630" class="desc-text" text-anchor="middle">R = 可读</text><text x="710" y="647" class="desc-text" text-anchor="middle">W = 可写</text><text x="710" y="664" class="desc-text" text-anchor="middle">X = 可执行</text><line x1="830" y1="160" x2="830" y2="300" stroke="#1abc9c" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="735" y="305" width="190" height="75" fill="#ecf0f1" stroke="#1abc9c" stroke-width="2" rx="6"/><text x="830" y="325" class="desc-text" text-anchor="middle" font-weight="bold">缓存位</text><text x="830" y="345" class="desc-text" text-anchor="middle">控制是否允许</text><text x="830" y="362" class="desc-text" text-anchor="middle">高速缓存该页面</text></g><rect x="50" y="690" width="900" height="80" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8"/><text x="500" y="715" class="desc-text" text-anchor="middle" font-weight="bold">📌 重要提示</text><text x="500" y="735" class="desc-text" text-anchor="middle">在单级页表中，虚拟页框号（VPN）不需要存储在页表项中</text><text x="500" y="752" class="desc-text" text-anchor="middle">它隐式地作为页表项的索引（下标）使用</text></svg>