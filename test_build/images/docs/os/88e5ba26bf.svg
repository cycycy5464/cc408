<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200"><g transform="translate(10, 10)"><text x="0" y="2" font-family="monospace" font-size="14" fill="#333">32位整数: 0x12345678</text><g transform="translate(0, 25)"><text x="0" y="12" font-family="monospace" font-size="12" fill="#666">字节分解:</text><rect x="80" y="0" width="40" height="25" fill="#e3f2fd" stroke="#1976d2"/><text x="100" y="17" font-family="monospace" font-size="11" text-anchor="middle">0x12</text><rect x="120" y="0" width="40" height="25" fill="#f3e5f5" stroke="#7b1fa2"/><text x="140" y="17" font-family="monospace" font-size="11" text-anchor="middle">0x34</text><rect x="160" y="0" width="40" height="25" fill="#fff3e0" stroke="#f57c00"/><text x="180" y="17" font-family="monospace" font-size="11" text-anchor="middle">0x56</text><rect x="200" y="0" width="40" height="25" fill="#f1f8e9" stroke="#689f38"/><text x="220" y="17" font-family="monospace" font-size="11" text-anchor="middle">0x78</text><text x="100" y="-5" font-size="10" fill="#1976d2" text-anchor="middle">高位字节</text><text x="220" y="-5" font-size="10" fill="#689f38" text-anchor="middle">低位字节</text></g><g transform="translate(0, 80)"><text x="0" y="0" font-family="monospace" font-size="12" fill="#666">内存存储:</text><g transform="translate(80, 0)"><text x="-10" y="17" font-family="monospace" font-size="10" fill="#999" text-anchor="end">0x1000:</text><text x="-10" y="42" font-family="monospace" font-size="10" fill="#999" text-anchor="end">0x1001:</text><text x="-10" y="67" font-family="monospace" font-size="10" fill="#999" text-anchor="end">0x1002:</text><text x="-10" y="92" font-family="monospace" font-size="10" fill="#999" text-anchor="end">0x1003:</text><rect x="0" y="5" width="40" height="20" fill="#e3f2fd" stroke="#1976d2"/><text x="20" y="18" font-family="monospace" font-size="11" text-anchor="middle">0x12</text><rect x="0" y="30" width="40" height="20" fill="#f3e5f5" stroke="#7b1fa2"/><text x="20" y="43" font-family="monospace" font-size="11" text-anchor="middle">0x34</text><rect x="0" y="55" width="40" height="20" fill="#fff3e0" stroke="#f57c00"/><text x="20" y="68" font-family="monospace" font-size="11" text-anchor="middle">0x56</text><rect x="0" y="80" width="40" height="20" fill="#f1f8e9" stroke="#689f38"/><text x="20" y="93" font-family="monospace" font-size="11" text-anchor="middle">0x78</text><text x="55" y="18" font-size="10" fill="#999">← 低地址</text><text x="55" y="93" font-size="10" fill="#999">← 高地址</text></g></g><g stroke="#999" stroke-width="1" fill="none" stroke-dasharray="2,2"><path d="M1e2 50V85"/><path d="M140 50l-30 60"/><path d="M180 50l-70 85"/><path d="M220 50 110 160"/></g><g transform="translate(250, 90)"><rect x="0" y="0" width="180" height="60" fill="#fffde7" stroke="#f9a825" rx="5"/><text x="90" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">大端序特征</text><text x="10" y="35" font-size="10" fill="#666">• 高位字节 → 低地址</text><text x="10" y="50" font-size="10" fill="#666">• 低位字节 → 高地址</text></g></g></svg>