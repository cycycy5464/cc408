</text><text x="140" y="225" font-size="12" fill="#2c3e50">已换出</text><text x="140" y="275" font-size="12" fill="#2c3e50">在内存</text><text x="140" y="325" font-size="12" fill="#2c3e50">已换出</text><text x="140" y="375" font-size="12" fill="#2c3e50">在内存</text><text x="140" y="425" font-size="12" fill="#2c3e50">已换出</text><text x="140" y="475" font-size="12" fill="#2c3e50">已换出</text></g><g id="arrows"><line x1="130" y1="130" x2="430" y2="130" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="130" y1="180" x2="430" y2="180" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="130" y1="280" x2="430" y2="280" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="130" y1="380" x2="430" y2="380" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/></g><g id="physical-memory"><rect x="450" y="70" width="300" height="450" fill="#e8f8e8" stroke="#27ae60" stroke-width="2" rx="10"/><text x="600" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">物理内存 (RAM)</text><rect x="470" y="110" width="260" height="280" fill="#d5f4e6" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5" rx="5"/><text x="600" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">驻留集 (Resident Set)</text><g id="physical-frames"><rect x="490" y="150" width="60" height="40" fill="#3498db" stroke="#2980b9" stroke-width="1"/><text x="520" y="173" text-anchor="middle" font-size="12" fill="#fff">Page 0</text><rect x="560" y="150" width="60" height="40" fill="#3498db" stroke="#2980b9" stroke-width="1"/><text x="590" y="173" text-anchor="middle" font-size="12" fill="#fff">Page 1</text><rect x="630" y="150" width="60" height="40" fill="#3498db" stroke="#2980b9" stroke-width="1"/><text x="660" y="173" text-anchor="middle" font-size="12" fill="#fff">Page 3</text><rect x="490" y="200" width="60" height="40" fill="#3498db" stroke="#2980b9" stroke-width="1"/><text x="520" y="223" text-anchor="middle" font-size="12" fill="#fff">Page 5</text><rect x="560" y="200" width="60" height="40" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/><text x="590" y="223" text-anchor="middle" font-size="12" fill="#fff">其他</text><rect x="630" y="200" width="60" height="40" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/><text x="660" y="223" text-anchor="middle" font-size="12" fill="#fff">其他</text><rect x="490" y="250" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="520" y="273" text-anchor="middle" font-size="12" fill="#7f8c8d">空闲</text><rect x="560" y="250" width="60" height="40" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/><text x="590" y="273" text-anchor="middle" font-size="12" fill="#fff">其他</text><rect x="630" y="250" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="660" y="273" text-anchor="middle" font-size="12" fill="#7f8c8d">空闲</text></g><text x="600" y="310" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">驻留集大小 = 4 页</text></g><g id="disk-storage"><rect x="450" y="420" width="300" height="100" fill="#fef5e7" stroke="#f39c12" stroke-width="2" rx="10"/><text x="600" y="445" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">磁盘存储 (交换区)</text><rect x="490" y="460" width="60" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/><text x="520" y="483" text-anchor="middle" font-size="12" fill="#fff">Page 2</text><rect x="560" y="460" width="60" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/><text x="590" y="483" text-anchor="middle" font-size="12" fill="#fff">Page 4</text><rect x="630" y="460" width="60" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/><text x="660" y="483" text-anchor="middle" font-size="12" fill="#fff">Page 6</text></g><g id="legend"><text x="50" y="550" font-size="14" font-weight="bold" fill="#2c3e50">图例：</text><rect x="120" y="540" width="20" height="15" fill="#3498db"/><text x="150" y="552" font-size="12" fill="#2c3e50">在物理内存中的页面</text><rect x="280" y="540" width="20" height="15" fill="#e74c3c"/><text x="310" y="552" font-size="12" fill="#2c3e50">已换出到磁盘的页面</text><rect x="460" y="540" width="20" height="15" fill="#95a5a6"/><text x="490" y="552" font-size="12" fill="#2c3e50">其他进程的页面</text><rect x="600" y="540" width="20" height="15" fill="#ecf0f1" stroke="#bdc3c7"/><text x="630" y="552" font-size="12" fill="#2c3e50">空闲页框</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs></svg>