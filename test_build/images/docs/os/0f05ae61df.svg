<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560"><text x="400" y="25" text-anchor="middle" font-size="20" font-weight="bold" fill="#2563eb">内存置换策略</text><g><rect x="50" y="50" width="300" height="30" fill="#dc2626" rx="5"/><text x="200" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">局部置换 (Local Replacement)</text><text x="60" y="105" font-size="12" font-weight="bold" fill="#991b1b">初始状态 - 物理内存</text><g transform="translate(60, 110)"><rect x="0" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="20" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A1</text><rect x="40" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="60" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A2</text><rect x="80" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="100" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A3</text><rect x="130" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="150" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B1</text><rect x="170" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="190" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B2</text><rect x="220" y="0" width="40" height="35" fill="#bbf7d0" stroke="#059669" stroke-width="2"/><text x="240" y="22" text-anchor="middle" font-size="10" fill="#047857">C1</text><text x="60" y="50" text-anchor="middle" font-size="10" fill="#991b1b">进程A</text><text x="180" y="50" text-anchor="middle" font-size="10" fill="#1d4ed8">进程B</text><text x="240" y="50" text-anchor="middle" font-size="10" fill="#047857">进程C</text></g><text x="60" y="190" font-size="12" font-weight="bold" fill="#991b1b">进程A发生缺页，需要载入A4</text><g transform="translate(60, 195)"><rect x="0" y="0" width="40" height="35" fill="#fed7d7" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,3"/><text x="20" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A4</text><rect x="40" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="60" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A2</text><rect x="80" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="100" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A3</text><rect x="130" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="150" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B1</text><rect x="170" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="190" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B2</text><rect x="220" y="0" width="40" height="35" fill="#bbf7d0" stroke="#059669" stroke-width="2"/><text x="240" y="22" text-anchor="middle" font-size="10" fill="#047857">C1</text><text x="20" y="50" text-anchor="middle" font-size="9" fill="#ef4444">A1被A4置换</text><text x="180" y="50" text-anchor="middle" font-size="9" fill="#1d4ed8">不受影响</text><text x="240" y="50" text-anchor="middle" font-size="9" fill="#047857">不受影响</text></g><rect x="60" y="265" width="280" height="50" fill="#fef2f2" stroke="#fecaca" stroke-width="1" rx="5"/><text x="70" y="285" font-size="11" fill="#991b1b">• 只在进程自身页面内选择置换</text><text x="70" y="300" font-size="11" fill="#991b1b">• 不影响其他进程的内存页面</text></g><line x1="400" y1="50" x2="400" y2="550" stroke="#e2e8f0" stroke-width="2"/><g><rect x="450" y="50" width="300" height="30" fill="#7c3aed" rx="5"/><text x="600" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">全局置换 (Global Replacement)</text><text x="460" y="105" font-size="12" font-weight="bold" fill="#6b21a8">初始状态 - 物理内存</text><g transform="translate(460, 110)"><rect x="0" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="20" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A1</text><rect x="40" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="60" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A2</text><rect x="80" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="100" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A3</text><rect x="130" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="150" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B1</text><rect x="170" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="190" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B2</text><rect x="220" y="0" width="40" height="35" fill="#bbf7d0" stroke="#059669" stroke-width="2"/><text x="240" y="22" text-anchor="middle" font-size="10" fill="#047857">C1</text><text x="60" y="50" text-anchor="middle" font-size="10" fill="#991b1b">进程A</text><text x="180" y="50" text-anchor="middle" font-size="10" fill="#1d4ed8">进程B</text><text x="240" y="50" text-anchor="middle" font-size="10" fill="#047857">进程C</text></g><text x="460" y="190" font-size="12" font-weight="bold" fill="#6b21a8">进程A发生缺页，需要载入A4</text><g transform="translate(460, 195)"><rect x="0" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="20" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A1</text><rect x="40" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="60" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A2</text><rect x="80" y="0" width="40" height="35" fill="#fecaca" stroke="#dc2626" stroke-width="2"/><text x="100" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A3</text><rect x="130" y="0" width="40" height="35" fill="#fed7d7" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,3"/><text x="150" y="22" text-anchor="middle" font-size="10" fill="#991b1b">A4</text><rect x="170" y="0" width="40" height="35" fill="#bfdbfe" stroke="#2563eb" stroke-width="2"/><text x="190" y="22" text-anchor="middle" font-size="10" fill="#1d4ed8">B2</text><rect x="220" y="0" width="40" height="35" fill="#bbf7d0" stroke="#059669" stroke-width="2"/><text x="240" y="22" text-anchor="middle" font-size="10" fill="#047857">C1</text><text x="60" y="50" text-anchor="middle" font-size="9" fill="#991b1b">不受影响</text><text x="150" y="50" text-anchor="middle" font-size="9" fill="#a855f7">B1被A4置换</text><text x="215" y="50" text-anchor="middle" font-size="9" fill="#1d4ed8">B2</text><text x="240" y="50" text-anchor="middle" font-size="9" fill="#047857">C1</text></g><g transform="translate(460, 260)"><rect x="0" y="0" width="260" height="20" fill="none" stroke="#a855f7" stroke-width="2" stroke-dasharray="5,5"/><text x="130" y="35" text-anchor="middle" font-size="10" fill="#a855f7">全局选择范围 - 可以选择任何进程的页面</text></g><rect x="460" y="305" width="280" height="50" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" rx="5"/><text x="470" y="325" font-size="11" fill="#6b21a8">• 可在整个系统内存中选择置换</text><text x="470" y="340" font-size="11" fill="#6b21a8">• 一个进程的缺页可能影响其他进程</text></g><g transform="translate(50, 380)"><rect x="0" y="0" width="700" height="120" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" rx="10"/><text x="350" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">策略对比</text><g transform="translate(20, 40)"><text x="0" y="0" font-size="12" font-weight="bold" fill="#dc2626">局部置换:</text><text x="0" y="18" font-size="10" fill="#059669">✓ 进程间相互独立，不会互相干扰</text><text x="0" y="32" font-size="10" fill="#059669">✓ 每个进程的性能相对稳定</text><text x="0" y="46" font-size="10" fill="#dc2626">✗ 可能导致内存利用率较低</text><text x="0" y="60" font-size="10" fill="#dc2626">✗ 无法充分利用全局最优策略</text></g><g transform="translate(360, 40)"><text x="0" y="0" font-size="12" font-weight="bold" fill="#7c3aed">全局置换:</text><text x="0" y="18" font-size="10" fill="#059669">✓ 系统整体内存利用率更高</text><text x="0" y="32" font-size="10" fill="#059669">✓ 可以实现全局最优的置换策略</text><text x="0" y="46" font-size="10" fill="#dc2626">✗ 进程间会相互影响</text><text x="0" y="60" font-size="10" fill="#dc2626">✗ 可能导致某些进程性能不稳定</text></g></g><rect x="50" y="520" width="700" height="35" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5"/><text x="60" y="540" font-size="12" font-weight="bold" fill="#334155">总结: 局部置换保证进程独立性，全局置换提高系统整体效率</text></svg>