<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="#f8f9fa"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">HTTP 组成部分</text><rect x="50" y="80" width="120" height="80" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="110" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">客户端</text><text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">(浏览器)</text><rect x="630" y="80" width="120" height="80" rx="8" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="690" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">服务器</text><text x="690" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">(Web服务器)</text><path d="M180 1e2H620" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowhead-green)"/><text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">HTTP 请求</text><path d="M620 140H180" stroke="#e67e22" stroke-width="3" fill="none" marker-end="url(#arrowhead-orange)"/><text x="400" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">HTTP 响应</text><defs><marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker><marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/></marker></defs><rect x="50" y="200" width="180" height="160" rx="8" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/><text x="140" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">HTTP 方法</text><text x="60" y="240" font-family="Arial, sans-serif" font-size="11" fill="#fff">• GET - 获取资源</text><text x="60" y="255" font-family="Arial, sans-serif" font-size="11" fill="#fff">• POST - 提交数据</text><text x="60" y="270" font-family="Arial, sans-serif" font-size="11" fill="#fff">• PUT - 更新资源</text><text x="60" y="285" font-family="Arial, sans-serif" font-size="11" fill="#fff">• DELETE - 删除资源</text><text x="60" y="300" font-family="Arial, sans-serif" font-size="11" fill="#fff">• HEAD - 获取头部</text><text x="60" y="315" font-family="Arial, sans-serif" font-size="11" fill="#fff">• OPTIONS - 通信选项</text><text x="60" y="330" font-family="Arial, sans-serif" font-size="11" fill="#fff">• PATCH - 部分修改</text><text x="60" y="345" font-family="Arial, sans-serif" font-size="11" fill="#fff">• CONNECT, TRACE...</text><rect x="260" y="200" width="180" height="160" rx="8" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="350" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">状态码</text><text x="270" y="240" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 200 OK - 请求成功</text><text x="270" y="255" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 404 Not Found - 未找到</text><text x="270" y="270" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 500 Internal Server Error</text><text x="270" y="285" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 1xx - 信息响应</text><text x="270" y="300" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 2xx - 成功响应</text><text x="270" y="315" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 3xx - 重定向</text><text x="270" y="330" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 4xx - 客户端错误</text><text x="270" y="345" font-family="Arial, sans-serif" font-size="11" fill="#fff">• 5xx - 服务器错误</text><rect x="470" y="200" width="150" height="160" rx="8" fill="#1abc9c" stroke="#16a085" stroke-width="2"/><text x="545" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">头部字段</text><text x="480" y="240" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Content-Type</text><text x="480" y="255" font-family="Arial, sans-serif" font-size="11" fill="#fff">• User-Agent</text><text x="480" y="270" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Authorization</text><text x="480" y="285" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Accept</text><text x="480" y="300" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Content-Length</text><text x="480" y="315" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Cache-Control</text><text x="480" y="330" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Cookie</text><text x="480" y="345" font-family="Arial, sans-serif" font-size="11" fill="#fff">• Set-Cookie</text><rect x="650" y="200" width="120" height="160" rx="8" fill="#34495e" stroke="#2c3e50" stroke-width="2"/><text x="710" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">消息体</text><text x="660" y="250" font-family="Arial, sans-serif" font-size="11" fill="#fff">请求数据:</text><text x="660" y="265" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">• JSON 数据</text><text x="660" y="280" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">• 表单数据</text><text x="660" y="295" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">• 文件上传</text><text x="660" y="320" font-family="Arial, sans-serif" font-size="11" fill="#fff">响应内容:</text><text x="660" y="335" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">• HTML 页面</text><text x="660" y="350" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">• JSON 数据</text><rect x="50" y="390" width="340" height="180" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/><text x="220" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">HTTP 请求结构</text><rect x="60" y="420" width="320" height="140" fill="#fff" stroke="#bdc3c7"/><text x="70" y="440" font-family="monospace" font-size="12" fill="#2c3e50">GET /api/users HTTP/1.1</text><text x="70" y="455" font-family="monospace" font-size="12" fill="#27ae60">Host: example.com</text><text x="70" y="470" font-family="monospace" font-size="12" fill="#27ae60">User-Agent: Mozilla/5.0...</text><text x="70" y="485" font-family="monospace" font-size="12" fill="#27ae60">Accept: application/json</text><text x="70" y="500" font-family="monospace" font-size="12" fill="#27ae60">Authorization: Bearer token</text><text x="70" y="520" font-family="monospace" font-size="12" fill="#95a5a6">[空行]</text><text x="70" y="540" font-family="monospace" font-size="12" fill="#e67e22">[请求体 - 如果有的话]</text><rect x="410" y="390" width="340" height="180" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/><text x="580" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">HTTP 响应结构</text><rect x="420" y="420" width="320" height="140" fill="#fff" stroke="#bdc3c7"/><text x="430" y="440" font-family="monospace" font-size="12" fill="#2c3e50">HTTP/1.1 200 OK</text><text x="430" y="455" font-family="monospace" font-size="12" fill="#27ae60">Content-Type: application/json</text><text x="430" y="470" font-family="monospace" font-size="12" fill="#27ae60">Content-Length: 1234</text><text x="430" y="485" font-family="monospace" font-size="12" fill="#27ae60">Set-Cookie: session=abc123</text><text x="430" y="500" font-family="monospace" font-size="12" fill="#27ae60">Cache-Control: no-cache</text><text x="430" y="520" font-family="monospace" font-size="12" fill="#95a5a6">[空行]</text><text x="430" y="540" font-family="monospace" font-size="12" fill="#e67e22">{"users": [...]}</text></svg>