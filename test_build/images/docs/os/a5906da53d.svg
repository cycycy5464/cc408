<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">AOE网络中的活动时间余量</text><g transform="translate(50, 70)"><circle cx="80" cy="150" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="80" y="140" text-anchor="middle" font-size="10" fill="#fff">V1</text><text x="80" y="160" text-anchor="middle" font-size="12" fill="#fff">0/0</text><circle cx="250" cy="100" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="250" y="90" text-anchor="middle" font-size="10" fill="#fff">Vi</text><text x="250" y="110" text-anchor="middle" font-size="12" fill="#fff">ve(i)</text><circle cx="450" cy="100" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="450" y="90" text-anchor="middle" font-size="10" fill="#fff">Vj</text><text x="450" y="110" text-anchor="middle" font-size="12" fill="#fff">vl(j)</text><circle cx="600" cy="150" r="25" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="600" y="140" text-anchor="middle" font-size="10" fill="#fff">Vn</text><text x="600" y="160" text-anchor="middle" font-size="12" fill="#fff">T/T</text><path d="M105 150H575" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrowRed)"/><text x="340" y="170" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">关键路径（余量=0）</text><path d="M275 1e2H425" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/><text x="350" y="85" text-anchor="middle" font-size="11" fill="#27ae60">A(i→j)</text><text x="350" y="75" text-anchor="middle" font-size="9" fill="#27ae60">dij</text><path d="M105 140l120-30" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowGray)"/><path d="M475 110l1e2 30" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowGray)"/></g><defs><marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#27ae60"/></marker><marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 8 2.5, 0 5" fill="#7f8c8d"/></marker></defs><g transform="translate(50, 280)"><rect x="0" y="0" width="700" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="8"/><text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">时间余量计算公式</text><text x="350" y="50" text-anchor="middle" font-size="14" fill="#e74c3c">时间余量 = vl(j) - ve(i) - dij</text><text x="50" y="75" font-size="12" fill="#34495e">• ve(i)：事件i的最早发生时间</text><text x="50" y="95" font-size="12" fill="#34495e">• vl(j)：事件j的最晚发生时间</text><text x="350" y="75" font-size="12" fill="#34495e">• dij：活动A(i→j)的持续时间</text><text x="350" y="95" font-size="12" fill="#34495e">• 关键路径上的活动：时间余量 = 0</text></g><g transform="translate(50, 420)"><rect x="0" y="0" width="700" height="140" fill="#fff" stroke="#3498db" stroke-width="2" rx="8"/><text x="350" y="25" text-anchor="middle" font-size="16" font-weight="bold" fill="#3498db">示例计算</text><text x="50" y="50" font-size="12" fill="#2c3e50">假设：ve(i) = 5天，vl(j) = 12天，dij = 3天</text><text x="50" y="70" font-size="12" fill="#27ae60">时间余量 = 12 - 5 - 3 = 4天</text><text x="50" y="95" font-size="11" fill="#7f8c8d">含义：活动A(i→j)可以延迟最多4天而不影响项目总工期</text><g transform="translate(450, 45)"><line x1="0" y1="20" x2="200" y2="20" stroke="#34495e" stroke-width="2"/><line x1="25" y1="15" x2="25" y2="25" stroke="#27ae60" stroke-width="2"/><text x="25" y="10" text-anchor="middle" font-size="9" fill="#27ae60">ve(i)=5</text><rect x="25" y="17" width="45" height="6" fill="#f39c12" opacity=".7"/><text x="47" y="33" text-anchor="middle" font-size="8" fill="#f39c12">3天</text><rect x="70" y="17" width="60" height="6" fill="#95a5a6" opacity=".5"/><text x="100" y="40" text-anchor="middle" font-size="8" fill="#7f8c8d">余量4天</text><line x1="130" y1="15" x2="130" y2="25" stroke="#e74c3c" stroke-width="2"/><text x="130" y="10" text-anchor="middle" font-size="9" fill="#e74c3c">vl(j)=12</text></g></g><g transform="translate(520, 40)"><rect x="0" y="0" width="230" height="100" fill="#fff3cd" stroke="#ffc107" stroke-width="1" rx="5"/><text x="115" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">💡 关键理解</text><text x="10" y="40" font-size="10" fill="#856404">• 时间余量 > 0：非关键活动</text><text x="10" y="55" font-size="10" fill="#856404">• 时间余量 = 0：关键活动</text><text x="10" y="70" font-size="10" fill="#856404">• 余量越大，调度灵活性越高</text><text x="10" y="85" font-size="10" fill="#856404">• 关键路径决定项目最短工期</text></g></svg>