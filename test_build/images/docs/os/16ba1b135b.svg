<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">内存碎片形成过程</text><g><text x="150" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">阶段1：初始状态</text><rect x="50" y="70" width="200" height="120" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,5"/><text x="150" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">连续空闲内存</text><text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">1000KB</text><text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">✓ 大块连续空间，易分配</text></g><g><text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">阶段2：进程陆续分配</text><rect x="300" y="70" width="200" height="30" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">进程A (200KB)</text><rect x="300" y="100" width="200" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,3"/><text x="400" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">剩余 800KB</text><rect x="300" y="125" width="200" height="35" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="400" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">进程B (300KB)</text><rect x="300" y="160" width="200" height="30" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,3"/><text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">剩余 500KB</text><text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f39c12">⚠ 空间逐渐减少</text></g><g><text x="650" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">阶段3：进程释放</text><rect x="550" y="70" width="200" height="20" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="8,4"/><text x="650" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b4513" font-weight="bold">碎片 (200KB)</text><rect x="550" y="90" width="200" height="40" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/><text x="650" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">进程C (350KB)</text><rect x="550" y="130" width="200" height="15" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="8,4"/><text x="650" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8b4513" font-weight="bold">碎片 (150KB)</text><rect x="550" y="145" width="200" height="25" fill="#1abc9c" stroke="#16a085" stroke-width="2"/><text x="650" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">进程D (200KB)</text><rect x="550" y="170" width="200" height="10" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="8,4"/><text x="650" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8b4513" font-weight="bold">碎片 (100KB)</text><text x="650" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">✗ 产生多个小碎片</text></g><path d="M250 130h50" fill="none" stroke="#34495e" stroke-width="2" marker-end="url(#arrow1)"/><path d="M5e2 130h50" fill="none" stroke="#34495e" stroke-width="2" marker-end="url(#arrow2)"/><defs><marker id="arrow1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/></marker><marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/></marker></defs><g><text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e74c3c">碎片问题演示</text><rect x="50" y="280" width="120" height="40" fill="#ff6b6b" stroke="#ff5252" stroke-width="2"/><text x="110" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">新进程E</text><text x="110" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">需要 250KB</text><g transform="translate(200, 280)"><text x="200" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">当前内存状态</text><rect x="0" y="10" width="80" height="30" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/><text x="40" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b4513" font-weight="bold">200KB</text><rect x="80" y="10" width="120" height="30" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="140" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">进程运行中</text><rect x="200" y="10" width="60" height="30" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/><text x="230" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b4513" font-weight="bold">150KB</text><rect x="260" y="10" width="80" height="30" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="300" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold">进程</text><rect x="340" y="10" width="50" height="30" fill="#f1c40f" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/><text x="365" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8b4513" font-weight="bold">100KB</text></g><text x="110" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">无法分配！</text><g transform="translate(450, 340)"><rect x="0" y="0" width="200" height="60" fill="#fff" stroke="#bdc3c7" stroke-width="2" rx="5"/><text x="100" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">空间分析</text><text x="20" y="35" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">碎片总空间：450KB</text><text x="20" y="50" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">最大连续空间：200KB &lt; 250KB</text></g><g transform="translate(170, 300)"><circle cx="0" cy="0" r="15" fill="#e74c3c"/><line x1="-8" y1="-8" x2="8" y2="8" stroke="#fff" stroke-width="3"/><line x1="8" y1="-8" x2="-8" y2="8" stroke="#fff" stroke-width="3"/></g></g><g><text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">内存碎片的影响与解决</text><g transform="translate(50, 450)"><rect x="0" y="0" width="300" height="80" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="5"/><text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#856404">负面影响</text><text x="15" y="35" font-family="Arial, sans-serif" font-size="11" fill="#856404">• 内存利用率降低</text><text x="15" y="50" font-family="Arial, sans-serif" font-size="11" fill="#856404">• 无法分配足够大的连续空间</text><text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#856404">• 系统性能下降</text></g><g transform="translate(450, 450)"><rect x="0" y="0" width="300" height="80" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2" rx="5"/><text x="150" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c5460">解决方案</text><text x="15" y="35" font-family="Arial, sans-serif" font-size="11" fill="#0c5460">• 内存压缩整理</text><text x="15" y="50" font-family="Arial, sans-serif" font-size="11" fill="#0c5460">• 分页存储管理</text><text x="15" y="65" font-family="Arial, sans-serif" font-size="11" fill="#0c5460">• 虚拟内存技术</text></g></g><g><rect x="250" y="560" width="300" height="30" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="3"/><text x="400" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#495057">碎片：太小无法被进程利用的空闲内存块</text></g></svg>