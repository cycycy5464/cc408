ize="14" text-anchor="middle" x="385" y="-359.3">Windows Boot Manager</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="385" y="-344.3">- Windows系统专用</text></g><g class="edge" id="edge4"><title>bootloader-&gt;windows_boot</title><path d="M316.82-426.27c12.45 12.75 29.26 29.94 43.07 44.07" fill="none" stroke="#000"></path><polygon fill="#000" points="362.72,-384.31 367.2,-374.71 357.71,-379.42 362.72,-384.31" stroke="#000"></polygon></g><g class="node" id="node6"><title>load_kernel</title><polygon fill="#add8e6" points="383.5,-292 214.5,-292 214.5,-239 383.5,-239 383.5,-292" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="299" y="-276.8">4. 加载操作系统内核</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="299" y="-261.8">- 从存储设备加载到内存</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="299" y="-246.8">- 交给内核控制权</text></g><g class="edge" id="edge5"><title>grub-&gt;load_kernel</title><path d="M239.04-328.57C247.78-319.53 257.7-309.26 266.92-299.71" fill="none" stroke="#000"></path><polygon fill="#000" points="269.71,-301.87 274.14,-292.24 264.67,-297 269.71,-301.87" stroke="#000"></polygon></g><g class="edge" id="edge6"><title>windows_boot-&gt;load_kernel</title><path d="M367.18-336.27c-10.45 10.69-23.95 24.51-36.19 37.03" fill="none" stroke="#000"></path><polygon fill="#000" points="333.46,-296.76 323.97,-292.05 328.46,-301.65 333.46,-296.76" stroke="#000"></polygon></g><g class="node" id="node7"><title>kernel_init</title><polygon fill="#90ee90" points="263,-202 123,-202 123,-119 263,-119 263,-202" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="193" y="-186.8">5. 内核初始化</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="193" y="-171.8">- 检测配置硬件资源</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="193" y="-156.8">- 设置中断</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="193" y="-141.8">- 初始化设备驱动</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="193" y="-126.8">- 建立内存管理结构</text></g><g class="edge" id="edge7"><title>load_kernel-&gt;kernel_init</title><path d="M272.53-238.77c-9.26999999999998 9-20 19.42-30.51 29.64" fill="none" stroke="#000"></path><polygon fill="#000" points="244.4,-206.57 234.79,-202.11 239.53,-211.59 244.4,-206.57" stroke="#000"></polygon></g><g class="node" id="node10"><title>storage</title><polygon fill="#d3d3d3" points="343.5,-53 254.5,-53 254.5,-15 343.5,-15 343.5,-53" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="299" y="-37.8">存储设备</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="299" y="-22.8">(硬盘/SSD)</text></g><g class="edge" id="edge10"><title>load_kernel-&gt;storage</title><path d="M299-238.62c0 43.32.0 130.18.0 175.16" fill="none" stroke="#000" stroke-dasharray="5,2"></path><polygon fill="#000" points="302.5,-63.24 299,-53.24 295.5,-63.24 302.5,-63.24" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="328" y="-156.8">从中加载</text></g><g class="node" id="node11"><title>memory</title><polygon fill="#ffb6c1" points="436,-53 362,-53 362,-15 436,-15 436,-53" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="399" y="-37.8">系统内存</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="399" y="-22.8">(RAM)</text></g><g class="edge" id="edge11"><title>load_kernel-&gt;memory</title><path d="M330.84-238.99C341.9-228.61 353.42-215.8 361-202c24.43 44.44 33.17 103.78 36.29 138.45" fill="none" stroke="#000" stroke-dasharray="5,2"></path><polygon fill="#000" points="400.81,-63.46 398.12,-53.21 393.83,-62.9 400.81,-63.46" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="411.5" y="-156.8">加载到</text></g><g class="node" id="node8"><title>system_services</title><polygon fill="#e0ffff" points="140,-60.5 0,-60.5 0,-7.5 140,-7.5 140,-60.5" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="70" y="-45.3">6. 启动系统服务</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="70" y="-30.3">和守护进程</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="70" y="-15.3">- 管理各种系统任务</text></g><g class="edge" id="edge8"><title>kernel_init-&gt;system_services</title><path d="M152.73-118.73c-16.26 16.45-34.77 35.19-50.16 50.76" fill="none" stroke="#000"></path><polygon fill="#000" points="104.81,-65.26 95.29,-60.6 99.83,-70.18 104.81,-65.26" stroke="#000"></polygon></g><g class="node" id="node12"><title>hardware</title><polygon fill="#b0c4de" points="233.5,-68 158.5,-68 158.5,0 233.5,0 233.5,-68" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="196" y="-52.8">硬件资源</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="196" y="-37.8">- CPU</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="196" y="-22.8">- 内存</text><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="196" y="-7.8">- I/O设备</text></g><g class="edge" id="edge12"><title>kernel_init-&gt;hardware</title><path d="M193.98-118.73C194.29-105.86 194.64-91.6 194.95-78.54" fill="none" stroke="#000" stroke-dasharray="5,2"></path><polygon fill="#000" points="198.45,-78.46 195.2,-68.38 191.46,-78.29 198.45,-78.46" stroke="#000"></polygon><text font-family="Microsoft Yahei" font-size="14" text-anchor="middle" x="224" y="-89.8">检测配置</text></g><g class="node" id="node13"><title>title</title><polygon fill="lightgrey" points="498,-739 218,-739 218,-703 498,-703 498,-739" stroke="transparent"></polygon><text font-family="Microsoft Yahei" font-size="20" text-anchor="middle" x="358" y="-716