<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650"><defs><style>.title{font-family:microsoft yahei,Arial,sans-serif;font-size:18px;font-weight:700;fill:#2c3e50}.subtitle{font-family:microsoft yahei,Arial,sans-serif;font-size:14px;fill:#34495e}.char-box{stroke:#3498db;stroke-width:2;fill:#ecf0f1}.char-text{font-family:courier new,monospace;font-size:16px;font-weight:700;text-anchor:middle;fill:#2c3e50}.prefix-highlight{fill:#e74c3c;opacity:.3}.suffix-highlight{fill:#27ae60;opacity:.3}.overlap-highlight{fill:#f39c12;opacity:.5}.label{font-family:microsoft yahei,Arial,sans-serif;font-size:12px;fill:#7f8c8d}.key-text{font-family:microsoft yahei,Arial,sans-serif;font-size:12px;fill:#e74c3c;font-weight:700}.arrow{stroke:#95a5a6;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.bracket{stroke:#34495e;stroke-width:2;fill:none}</style><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#95a5a6"/></marker></defs><text x="400" y="30" class="title" text-anchor="middle">前后缀概念图解 - 字符串 "abcdabc"</text><g transform="translate(200, 70)"><rect x="0" y="0" width="40" height="40" class="char-box"/><rect x="40" y="0" width="40" height="40" class="char-box"/><rect x="80" y="0" width="40" height="40" class="char-box"/><rect x="120" y="0" width="40" height="40" class="char-box"/><rect x="160" y="0" width="40" height="40" class="char-box"/><rect x="200" y="0" width="40" height="40" class="char-box"/><rect x="240" y="0" width="40" height="40" class="char-box"/><text x="20" y="26" class="char-text">a</text><text x="60" y="26" class="char-text">b</text><text x="100" y="26" class="char-text">c</text><text x="140" y="26" class="char-text">d</text><text x="180" y="26" class="char-text">a</text><text x="220" y="26" class="char-text">b</text><text x="260" y="26" class="char-text">c</text><text x="20" y="55" class="label" text-anchor="middle">0</text><text x="60" y="55" class="label" text-anchor="middle">1</text><text x="100" y="55" class="label" text-anchor="middle">2</text><text x="140" y="55" class="label" text-anchor="middle">3</text><text x="180" y="55" class="label" text-anchor="middle">4</text><text x="220" y="55" class="label" text-anchor="middle">5</text><text x="260" y="55" class="label" text-anchor="middle">6</text></g><g transform="translate(50, 150)"><text x="0" y="0" class="subtitle">前缀 (Prefix):</text><text x="0" y="20" class="label">从字符串开头开始的子串</text><g transform="translate(0, 40)"><rect x="0" y="0" width="40" height="30" class="prefix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="50" y="20" class="key-text">"a" (长度1)</text></g><g transform="translate(0, 80)"><rect x="0" y="0" width="40" height="30" class="prefix-highlight"/><rect x="40" y="0" width="40" height="30" class="prefix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="60" y="20" class="char-text">b</text><text x="90" y="20" class="key-text">"ab" (长度2)</text></g><g transform="translate(0, 120)"><rect x="0" y="0" width="40" height="30" class="prefix-highlight"/><rect x="40" y="0" width="40" height="30" class="prefix-highlight"/><rect x="80" y="0" width="40" height="30" class="prefix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><rect x="80" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="60" y="20" class="char-text">b</text><text x="100" y="20" class="char-text">c</text><text x="130" y="20" class="key-text">"abc" (长度3)</text></g><g transform="translate(0, 160)"><rect x="0" y="0" width="40" height="30" class="prefix-highlight"/><rect x="40" y="0" width="40" height="30" class="prefix-highlight"/><rect x="80" y="0" width="40" height="30" class="prefix-highlight"/><rect x="120" y="0" width="40" height="30" class="prefix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><rect x="80" y="0" width="40" height="30" class="char-box"/><rect x="120" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="60" y="20" class="char-text">b</text><text x="100" y="20" class="char-text">c</text><text x="140" y="20" class="char-text">d</text><text x="170" y="20" class="key-text">"abcd" (长度4)</text></g></g><g transform="translate(450, 150)"><text x="0" y="0" class="subtitle">后缀 (Suffix):</text><text x="0" y="20" class="label">到字符串末尾结束的子串</text><g transform="translate(0, 40)"><rect x="0" y="0" width="40" height="30" class="suffix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">c</text><text x="50" y="20" class="key-text">"c" (长度1)</text></g><g transform="translate(0, 80)"><rect x="0" y="0" width="40" height="30" class="suffix-highlight"/><rect x="40" y="0" width="40" height="30" class="suffix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">b</text><text x="60" y="20" class="char-text">c</text><text x="90" y="20" class="key-text">"bc" (长度2)</text></g><g transform="translate(0, 120)"><rect x="0" y="0" width="40" height="30" class="suffix-highlight"/><rect x="40" y="0" width="40" height="30" class="suffix-highlight"/><rect x="80" y="0" width="40" height="30" class="suffix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><rect x="80" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="60" y="20" class="char-text">b</text><text x="100" y="20" class="char-text">c</text><text x="130" y="20" class="key-text">"abc" (长度3)</text></g><g transform="translate(0, 160)"><rect x="0" y="0" width="40" height="30" class="suffix-highlight"/><rect x="40" y="0" width="40" height="30" class="suffix-highlight"/><rect x="80" y="0" width="40" height="30" class="suffix-highlight"/><rect x="120" y="0" width="40" height="30" class="suffix-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><rect x="80" y="0" width="40" height="30" class="char-box"/><rect x="120" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">d</text><text x="60" y="20" class="char-text">a</text><text x="100" y="20" class="char-text">b</text><text x="140" y="20" class="char-text">c</text><text x="170" y="20" class="key-text">"dabc" (长度4)</text></g></g><g transform="translate(100, 420)"><text x="300" y="0" class="title" text-anchor="middle">关键发现：相同的前后缀</text><g transform="translate(200, 30)"><rect x="0" y="0" width="40" height="30" class="overlap-highlight"/><rect x="40" y="0" width="40" height="30" class="overlap-highlight"/><rect x="80" y="0" width="40" height="30" class="overlap-highlight"/><rect x="0" y="0" width="40" height="30" class="char-box"/><rect x="40" y="0" width="40" height="30" class="char-box"/><rect x="80" y="0" width="40" height="30" class="char-box"/><text x="20" y="20" class="char-text">a</text><text x="60" y="20" class="char-text">b</text><text x="100" y="20" class="char-text">c</text><text x="60" y="-10" class="key-text" text-anchor="middle">前缀 "abc"</text><line x1="60" y1="45" x2="60" y2="65" class="arrow"/><rect x="0" y="80" width="40" height="30" class="overlap-highlight"/><rect x="40" y="80" width="40" height="30" class="overlap-highlight"/><rect x="80" y="80" width="40" height="30" class="overlap-highlight"/><rect x="0" y="80" width="40" height="30" class="char-box"/><rect x="40" y="80" width="40" height="30" class="char-box"/><rect x="80" y="80" width="40" height="30" class="char-box"/><text x="20" y="100" class="char-text">a</text><text x="60" y="100" class="char-text">b</text><text x="100" y="100" class="char-text">c</text><text x="60" y="130" class="key-text" text-anchor="middle">后缀 "abc"</text></g><text x="300" y="180" class="subtitle" text-anchor="middle">在 "abcdabc" 中，"abc" 既是前缀也是后缀</text><text x="300" y="200" class="subtitle" text-anchor="middle">这就是 KMP 算法的核心思想！</text><text x="300" y="220" class="label" text-anchor="middle">当匹配失败时，我们可以利用这个信息跳过一些不必要的比较</text></g></svg>