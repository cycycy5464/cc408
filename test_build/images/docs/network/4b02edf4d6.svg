<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1e3" viewBox="0 0 800 1e3"><defs><style>.process-box{fill:#e3f2fd;stroke:#1976d2;stroke-width:2}.decision-box{fill:#fff3e0;stroke:#f57c00;stroke-width:2}.action-box{fill:#e8f5e9;stroke:#388e3c;stroke-width:2}.critical-box{fill:#ffebee;stroke:#d32f2f;stroke-width:2}.text{font-family:microsoft yahei,sans-serif;font-size:14px;text-anchor:middle}.title-text{font-family:microsoft yahei,sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.arrow{stroke:#424242;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.dashed-arrow{stroke:#757575;stroke-width:1.5;fill:none;stroke-dasharray:5,5;marker-end:url(#arrowhead-gray)}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#424242"/></marker><marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#757575"/></marker></defs><text x="400" y="30" class="title-text">哲学家就餐问题流程图（非对称解法）</text><ellipse cx="400" cy="80" rx="60" ry="30" class="process-box"/><text x="400" y="85" class="text">开始</text><path d="M4e2 110v30" class="arrow"/><path d="M4e2 150l80 40-80 40-80-40z" class="decision-box"/><text x="400" y="185" class="text">判断哲学家</text><text x="400" y="200" class="text">编号 i</text><path d="M320 190H250" class="arrow"/><text x="270" y="180" class="text" font-size="12">i &lt; N-1</text><path d="M480 190h70" class="arrow"/><text x="515" y="180" class="text" font-size="12">i = N-1</text><g id="left-branch"><rect x="170" y="220" width="100" height="40" rx="5" class="action-box"/><text x="220" y="245" class="text">思考</text><path d="M220 260v30" class="arrow"/><rect x="160" y="290" width="120" height="50" rx="5" class="critical-box"/><text x="220" y="310" class="text">P(fork[i])</text><text x="220" y="325" class="text" font-size="12">拿左叉子</text><path d="M220 340v30" class="arrow"/><rect x="160" y="370" width="120" height="50" rx="5" class="critical-box"/><text x="220" y="390" class="text">P(fork[(i+1)%N])</text><text x="220" y="405" class="text" font-size="12">拿右叉子</text><path d="M220 420v30" class="arrow"/><rect x="150" y="450" width="140" height="60" rx="5" class="action-box"/><text x="220" y="475" class="text">吃饭</text><text x="220" y="495" class="text" font-size="12">（临界区）</text><path d="M220 510v30" class="arrow"/><rect x="160" y="540" width="120" height="50" rx="5" class="process-box"/><text x="220" y="560" class="text">V(fork[i])</text><text x="220" y="575" class="text" font-size="12">放左叉子</text><path d="M220 590v30" class="arrow"/><rect x="160" y="620" width="120" height="50" rx="5" class="process-box"/><text x="220" y="640" class="text">V(fork[(i+1)%N])</text><text x="220" y="655" class="text" font-size="12">放右叉子</text><path d="M220 670v30H120V240h50" class="arrow"/></g><g id="right-branch"><rect x="530" y="220" width="100" height="40" rx="5" class="action-box"/><text x="580" y="245" class="text">思考</text><path d="M580 260v30" class="arrow"/><rect x="520" y="290" width="120" height="50" rx="5" class="critical-box"/><text x="580" y="310" class="text">P(fork[(i+1)%N])</text><text x="580" y="325" class="text" font-size="12">拿右叉子</text><path d="M580 340v30" class="arrow"/><rect x="520" y="370" width="120" height="50" rx="5" class="critical-box"/><text x="580" y="390" class="text">P(fork[i])</text><text x="580" y="405" class="text" font-size="12">拿左叉子</text><path d="M580 420v30" class="arrow"/><rect x="510" y="450" width="140" height="60" rx="5" class="action-box"/><text x="580" y="475" class="text">吃饭</text><text x="580" y="495" class="text" font-size="12">（临界区）</text><path d="M580 510v30" class="arrow"/><rect x="520" y="540" width="120" height="50" rx="5" class="process-box"/><text x="580" y="560" class="text">V(fork[(i+1)%N])</text><text x="580" y="575" class="text" font-size="12">放右叉子</text><path d="M580 590v30" class="arrow"/><rect x="520" y="620" width="120" height="50" rx="5" class="process-box"/><text x="580" y="640" class="text">V(fork[i])</text><text x="580" y="655" class="text" font-size="12">放左叉子</text><path d="M580 670v30H680V240H630" class="arrow"/></g><g id="annotations"><rect x="20" y="780" width="350" height="180" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/><text x="195" y="805" class="text" font-weight="bold">前 N-1 个哲学家策略</text><text x="180" y="830" class="text" text-anchor="start" font-size="13">1. 先拿左边的叉子 (fork[i])</text><text x="180" y="855" class="text" text-anchor="start" font-size="13">2. 再拿右边的叉子 (fork[(i+1)%N])</text><text x="180" y="880" class="text" text-anchor="start" font-size="13">3. 进餐</text><text x="180" y="905" class="text" text-anchor="start" font-size="13">4. 按相同顺序放下叉子</text><text x="180" y="935" class="text" text-anchor="start" font-size="13">✓ 顺时针获取资源</text><rect x="430" y="780" width="350" height="180" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/><text x="605" y="805" class="text" font-weight="bold">最后一个哲学家策略</text><text x="590" y="830" class="text" text-anchor="start" font-size="13">1. 先拿右边的叉子 (fork[(i+1)%N])</text><text x="590" y="855" class="text" text-anchor="start" font-size="13">2. 再拿左边的叉子 (fork[i])</text><text x="590" y="880" class="text" text-anchor="start" font-size="13">3. 进餐</text><text x="590" y="905" class="text" text-anchor="start" font-size="13">4. 按相同顺序放下叉子</text><text x="590" y="935" class="text" text-anchor="start" font-size="13">✓ 逆时针获取资源（打破循环等待）</text></g><rect x="200" y="730" width="400" height="30" rx="5" fill="#ffecb3" stroke="#ffa726" stroke-width="1"/><text x="400" y="750" class="text" font-weight="bold">关键：非对称策略避免了循环等待，从而防止死锁</text></svg>