向 h 的栈顶</text></g><text x="640" y="362" text-anchor="end" fill="#185FA5" style="fill:#3d3d3a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">h 的</text><text x="640" y="376" text-anchor="end" fill="#185FA5" style="fill:#3d3d3a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">活跃</text><text x="640" y="390" text-anchor="end" fill="#185FA5" style="fill:#3d3d3a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">栈帧</text><line x1="120" y1="134" x2="400" y2="134" stroke="var(--t)" stroke-width=".5" opacity=".3" style="fill:#000;stroke:#73726c;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:.3;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><line x1="120" y1="204" x2="400" y2="204" stroke="var(--t)" stroke-width=".5" opacity=".3" style="fill:#000;stroke:#73726c;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:.3;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/></svg>