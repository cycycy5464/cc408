<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" role="img" style=""><title style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">栈指针寄存器 BP 与 SP 示意图</title><desc style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">展示函数嵌套调用时栈段的逻辑结构，以及 BP 和 SP 寄存器的指向位置</desc><defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1 8 5 2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="340" y="34" text-anchor="middle" style="fill:#141413;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">栈指针寄存器：BP 与 SP</text><text x="110" y="60" text-anchor="end" style="fill:#3d3d3a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">高地址</text><text x="110" y="80" text-anchor="end" style="fill:#3d3d3a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:end;dominant-baseline:auto">SS →</text><g style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"><rect x="120" y="60" width="280" height="70" rx="4" stroke-width=".5" style="fill:#f1efe8;stroke:#5f5e5a;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="260" y="92" text-anchor="middle" dominant-baseline="central" style="fill:#444441;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">main 的函数栈</text><text x="260" y="112" text-anchor="middle" dominant-baseline="central" style="fill:#5f5e5a;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">调用方 · 最早压栈</text></g><g style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"><rect x="120" y="134" width="280" height="66" rx="4" stroke-width=".5" style="fill:#e1f5ee;stroke:#0f6e56;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="260" y="162" text-anchor="middle" dominant-baseline="central" style="fill:#085041;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;s