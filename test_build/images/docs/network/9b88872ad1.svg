tral">栈帧链·用于函数返回</text></g><g style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"><rect x="120" y="324" width="280" height="44" rx="4" stroke-width=".5" style="fill:#e6f1fb;stroke:#185fa5;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="260" y="344" text-anchor="middle" dominant-baseline="central" style="fill:#0c447c;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">函数参数</text><text x="260" y="360" text-anchor="middle" dominant-baseline="central" style="fill:#185fa5;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">调用时传入的实参</text></g><g style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"><rect x="120" y="372" width="280" height="44" rx="4" stroke-width=".5" style="fill:#e6f1fb;stroke:#185fa5;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="260" y="391" text-anchor="middle" dominant-baseline="central" style="fill:#0c447c;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">局部变量</text><text x="260" y="407" text-anchor="middle" dominant-baseline="central" style="fill:#185fa5;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">函数内分配的变量</text></g><g style="fill:#000;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"><rect x="120" y="420" width="280" height="44" rx="4" stroke-width=".5" style="fill:#eeedfe;stroke:#534ab7;color:#000;stroke-width:.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/><text x="260" y="439" text-anchor="middle" dominant-baseline="central" style="fill:#3c3489;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">← 栈顶（空闲区域）</text><text x="260" y="455" text-anchor="middle" dominant-baseline="central" style="fill:#534ab7;stroke:none;color:#000;stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:anthropic sans,-apple-system,BlinkMacSystemFont,segoe ui,sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:central">下次 push 将写入此处</text></g><text x="340" 