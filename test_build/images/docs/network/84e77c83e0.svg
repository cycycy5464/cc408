<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="physicalGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#4CAF50;stop-opacity:.8"/><stop offset="100%" style="stop-color:#2E7D32;stop-opacity:.9"/></linearGradient><linearGradient id="virtualGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#2196F3;stop-opacity:.8"/><stop offset="100%" style="stop-color:#1565C0;stop-opacity:.9"/></linearGradient><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity=".3"/></filter></defs><text x="400" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">物理内存与虚拟内存架构</text><g id="virtual-memory"><rect x="50" y="70" width="280" height="480" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow)"/><text x="190" y="95" font-size="18" font-weight="bold" text-anchor="middle" fill="#1565C0">虚拟内存空间</text><rect x="70" y="120" width="240" height="150" rx="5" fill="url(#virtualGrad)" stroke="#1976D2" stroke-width="2"/><text x="190" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">进程 1 虚拟地址空间</text><rect x="85" y="155" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="175" font-size="12" fill="#333">0x0000 - 代码段</text><rect x="85" y="190" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="210" font-size="12" fill="#333">0x1000 - 数据段</text><rect x="85" y="225" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="245" font-size="12" fill="#333">0x2000 - 堆</text><rect x="70" y="290" width="240" height="150" rx="5" fill="url(#virtualGrad)" stroke="#1976D2" stroke-width="2"/><text x="190" y="310" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">进程 2 虚拟地址空间</text><rect x="85" y="325" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="345" font-size="12" fill="#333">0x0000 - 代码段</text><rect x="85" y="360" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="380" font-size="12" fill="#333">0x1000 - 数据段</text><rect x="85" y="395" width="210" height="30" fill="rgba(255,255,255,0.9)" stroke="#1565C0" stroke-width="1"/><text x="95" y="415" font-size="12" fill="#333">0x2000 - 栈</text><text x="190" y="470" font-size="13" font-weight="bold" text-anchor="middle" fill="#1565C0">虚拟地址 (Virtual Address)</text><text x="190" y="490" font-size="11" text-anchor="middle" fill="#666">连续且独立的地址空间</text></g><g id="mmu"><path d="M330 2e2H430" stroke="#FF9800" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/><path d="M330 370l1e2-90" stroke="#FF9800" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/><rect x="350" y="250" width="100" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/><text x="400" y="273" font-size="14" font-weight="bold" text-anchor="middle" fill="#E65100">MMU</text><text x="400" y="290" font-size="11" text-anchor="middle" fill="#E65100">地址转换</text><text x="400" y="304" font-size="9" text-anchor="middle" fill="#666">(页表映射)</text></g><g id="physical-memory"><rect x="470" y="70" width="280" height="480" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="2" filter="url(#shadow)"/><text x="610" y="95" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E7D32">物理内存 (RAM)</text><rect x="490" y="120" width="240" height="360" rx="5" fill="url(#physicalGrad)" stroke="#388E3C" stroke-width="2"/><rect x="505" y="140" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="160" font-size="12" fill="#333">0x00000 - 进程1代码</text><rect x="505" y="185" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="205" font-size="12" fill="#333">0x10000 - 进程2数据</text><rect x="505" y="230" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="250" font-size="12" fill="#333">0x20000 - 进程1堆</text><rect x="505" y="275" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="295" font-size="12" fill="#333">0x30000 - 进程2代码</text><rect x="505" y="320" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="340" font-size="12" fill="#333">0x40000 - 进程1数据</text><rect x="505" y="365" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="385" font-size="12" fill="#333">0x50000 - 空闲</text><rect x="505" y="410" width="210" height="35" fill="rgba(255,255,255,0.9)" stroke="#2E7D32" stroke-width="1"/><text x="515" y="430" font-size="12" fill="#333">0x60000 - 进程2栈</text><text x="610" y="500" font-size="13" font-weight="bold" text-anchor="middle" fill="#2E7D32">物理地址 (Physical Address)</text><text x="610" y="520" font-size="11" text-anchor="middle" fill="#666">实际硬件内存位置</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#FF9800"/></marker></defs><rect x="50" y="560" width="700" height="35" rx="5" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/><text x="400" y="580" font-size="12" text-anchor="middle" fill="#333">💡 每个进程拥有独立的虚拟地址空间,通过 MMU 映射到分散的物理内存位置</text></svg>