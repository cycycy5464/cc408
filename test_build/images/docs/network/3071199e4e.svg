<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#2563eb">原码（Sign-Magnitude）表示法</text><text x="50" y="70" font-size="16" font-weight="bold" fill="#1f2937">8位原码结构：</text><g transform="translate(50, 90)"><text x="15" y="15" text-anchor="middle" font-size="12" fill="#6b7280">7</text><text x="55" y="15" text-anchor="middle" font-size="12" fill="#6b7280">6</text><text x="95" y="15" text-anchor="middle" font-size="12" fill="#6b7280">5</text><text x="135" y="15" text-anchor="middle" font-size="12" fill="#6b7280">4</text><text x="175" y="15" text-anchor="middle" font-size="12" fill="#6b7280">3</text><text x="215" y="15" text-anchor="middle" font-size="12" fill="#6b7280">2</text><text x="255" y="15" text-anchor="middle" font-size="12" fill="#6b7280">1</text><text x="295" y="15" text-anchor="middle" font-size="12" fill="#6b7280">0</text><rect x="0" y="20" width="30" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="15" y="44" text-anchor="middle" font-size="14" font-weight="bold" fill="#d97706">S</text><rect x="40" y="20" width="270" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><text x="175" y="44" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">数值位（Magnitude Bits）</text><text x="15" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97706">符号位</text><text x="175" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#2563eb">绝对值的二进制表示</text></g><g transform="translate(400, 90)"><text x="0" y="20" font-size="16" font-weight="bold" fill="#1f2937">符号位规则：</text><g transform="translate(0, 40)"><rect x="0" y="0" width="25" height="25" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">0</text><text x="35" y="17" font-size="14" fill="#1f2937">= 正数</text></g><g transform="translate(0, 75)"><rect x="0" y="0" width="25" height="25" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="12" y="17" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">1</text><text x="35" y="17" font-size="14" fill="#1f2937">= 负数</text></g></g><text x="50" y="210" font-size="18" font-weight="bold" fill="#1f2937">示例：</text><g transform="translate(50, 240)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#16a34a">正数：+25</text><text x="0" y="25" font-size="14" fill="#6b7280">25的二进制：11001</text><g transform="translate(0, 45)"><rect x="0" y="0" width="30" height="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#16a34a">0</text><rect x="35" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="50" y="20" text-anchor="middle" font-size="14">0</text><rect x="65" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="80" y="20" text-anchor="middle" font-size="14">0</text><rect x="95" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="110" y="20" text-anchor="middle" font-size="14">1</text><rect x="125" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="140" y="20" text-anchor="middle" font-size="14">1</text><rect x="155" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="170" y="20" text-anchor="middle" font-size="14">0</text><rect x="185" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="200" y="20" text-anchor="middle" font-size="14">0</text><rect x="215" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="230" y="20" text-anchor="middle" font-size="14">1</text><text x="125" y="50" text-anchor="middle" font-size="12" fill="#6b7280">00011001 = +25</text></g></g><g transform="translate(50, 360)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#dc2626">负数：-25</text><text x="0" y="25" font-size="14" fill="#6b7280">25的二进制：11001（绝对值相同）</text><g transform="translate(0, 45)"><rect x="0" y="0" width="30" height="30" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">1</text><rect x="35" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="50" y="20" text-anchor="middle" font-size="14">0</text><rect x="65" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="80" y="20" text-anchor="middle" font-size="14">0</text><rect x="95" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="110" y="20" text-anchor="middle" font-size="14">1</text><rect x="125" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="140" y="20" text-anchor="middle" font-size="14">1</text><rect x="155" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="170" y="20" text-anchor="middle" font-size="14">0</text><rect x="185" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="200" y="20" text-anchor="middle" font-size="14">0</text><rect x="215" y="0" width="30" height="30" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/><text x="230" y="20" text-anchor="middle" font-size="14">1</text><text x="125" y="50" text-anchor="middle" font-size="12" fill="#6b7280">10011001 = -25</text></g></g><g transform="translate(400, 240)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#7c3aed">零的表示：</text><g transform="translate(0, 30)"><text x="0" y="0" font-size="14" fill="#7c3aed">+0：</text><rect x="40" y="-15" width="20" height="20" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/><text x="50" y="-2" text-anchor="middle" font-size="12" fill="#16a34a">0</text><text x="70" y="-2" font-size="12" fill="#6b7280">0000000</text></g><g transform="translate(0, 60)"><text x="0" y="0" font-size="14" fill="#7c3aed">-0：</text><rect x="40" y="-15" width="20" height="20" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/><text x="50" y="-2" text-anchor="middle" font-size="12" fill="#dc2626">1</text><text x="70" y="-2" font-size="12" fill="#6b7280">0000000</text></g><text x="0" y="90" font-size="12" fill="#6b7280">（实际应用中通常只使用+0）</text></g><g transform="translate(400, 360)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#1f2937">原码特点：</text><text x="0" y="25" font-size="14" fill="#6b7280">• 符号位独立于数值位</text><text x="0" y="45" font-size="14" fill="#6b7280">• 正负数的数值位相同</text><text x="0" y="65" font-size="14" fill="#6b7280">• 直观易懂</text><text x="0" y="85" font-size="14" fill="#6b7280">• 运算复杂（需要判断符号）</text><text x="0" y="105" font-size="14" fill="#6b7280">• 存在+0和-0两个零</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/></marker></defs><line x1="65" y1="140" x2="400" y2="140" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/></svg>