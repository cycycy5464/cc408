<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400"><rect width="700" height="400" fill="none"/><text x="350" y="25" text-anchor="middle" fill="#2c3e50" font-size="18" font-weight="bold">HTTP Cookie 工作原理</text><g id="browser"><rect x="50" y="60" width="120" height="80" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="110" y="85" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">浏览器</text><text x="110" y="100" text-anchor="middle" fill="#fff" font-size="10">客户端</text><rect x="60" y="110" width="100" height="20" rx="4" fill="#e74c3c" opacity=".8"/><text x="110" y="123" text-anchor="middle" fill="#fff" font-size="9">Cookie 存储</text></g><g id="server"><rect x="530" y="60" width="120" height="80" rx="8" fill="#27ae60" stroke="#229954" stroke-width="2"/><text x="590" y="85" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">服务器</text><text x="590" y="100" text-anchor="middle" fill="#fff" font-size="10">Web Server</text><rect x="540" y="110" width="100" height="20" rx="4" fill="#f39c12" opacity=".8"/><text x="590" y="123" text-anchor="middle" fill="#fff" font-size="9">会话数据</text></g><g id="first-request"><text x="50" y="180" fill="#2c3e50" font-size="14" font-weight="bold">1. 首次请求（无状态）</text><defs><marker id="arrowhead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs><line x1="170" y1="195" x2="450" y2="195" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead1)"/><text x="310" y="190" text-anchor="middle" fill="#e74c3c" font-size="10">GET /login</text><defs><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs><line x1="450" y1="210" x2="170" y2="210" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead2)"/><text x="310" y="225" text-anchor="middle" fill="#27ae60" font-size="10">Set-Cookie: sessionId=abc123</text></g><g id="subsequent-request"><text x="50" y="270" fill="#2c3e50" font-size="14" font-weight="bold">2. 后续请求（有状态）</text><defs><marker id="arrowhead3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/></marker></defs><line x1="170" y1="285" x2="450" y2="285" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowhead3)"/><text x="310" y="280" text-anchor="middle" fill="#8e44ad" font-size="10">GET /dashboard</text><text x="310" y="295" text-anchor="middle" fill="#8e44ad" font-size="10">Cookie: sessionId=abc123</text><defs><marker id="arrowhead4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a085"/></marker></defs><line x1="450" y1="305" x2="170" y2="305" stroke="#16a085" stroke-width="2" marker-end="url(#arrowhead4)"/><text x="310" y="320" text-anchor="middle" fill="#16a085" font-size="10">200 OK (个性化内容)</text></g><g id="features"><rect x="50" y="340" width="600" height="50" rx="8" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="60" y="358" fill="#2c3e50" font-size="12" font-weight="bold">Cookie 关键特点：</text><text x="60" y="375" fill="#2c3e50" font-size="10">• 自动发送：浏览器自动在请求中包含匹配的 Cookie</text><text x="350" y="375" fill="#2c3e50" font-size="10">• 状态保持：服务器通过 Cookie 识别用户身份</text></g><g id="legend"><circle cx="180" cy="50" r="3" fill="#e74c3c"/><text x="190" y="55" fill="#e74c3c" font-size="10">首次请求</text><circle cx="280" cy="50" r="3" fill="#27ae60"/><text x="290" y="55" fill="#27ae60" font-size="10">设置Cookie</text><circle cx="380" cy="50" r="3" fill="#8e44ad"/><text x="390" y="55" fill="#8e44ad" font-size="10">携带Cookie</text><circle cx="480" cy="50" r="3" fill="#16a085"/><text x="490" y="55" fill="#16a085" font-size="10">识别用户</text></g></svg>