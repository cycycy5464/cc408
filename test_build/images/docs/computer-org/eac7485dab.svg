<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><style>.array-cell{fill:#e3f2fd;stroke:#1976d2;stroke-width:2}.array-cell-highlight{fill:#ffeb3b;stroke:#f57f17;stroke-width:3}.array-cell-new{fill:#c8e6c9;stroke:#388e3c;stroke-width:3}.array-text{font-family:Arial,sans-serif;font-size:14px;text-anchor:middle;dominant-baseline:middle}.title-text{font-family:Arial,sans-serif;font-size:16px;font-weight:700;text-anchor:middle}.step-text{font-family:Arial,sans-serif;font-size:14px;font-weight:700}.arrow{stroke:#f44336;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.move-arrow{stroke:#ff9800;stroke-width:2;fill:none;marker-end:url(#arrowhead2)}</style><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/></marker></defs><text x="400" y="30" class="title-text" fill="#1976d2">顺序表插入过程图解：在位置 3 插入元素 99</text><text x="50" y="40" class="step-text" fill="#333">步骤1：初始状态</text><g transform="translate(50, 100)"><rect x="0" y="0" width="50" height="40" class="array-cell"/><rect x="50" y="0" width="50" height="40" class="array-cell"/><rect x="100" y="0" width="50" height="40" class="array-cell"/><rect x="150" y="0" width="50" height="40" class="array-cell"/><rect x="200" y="0" width="50" height="40" class="array-cell"/><rect x="250" y="0" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><rect x="300" y="0" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><text x="25" y="20" class="array-text">10</text><text x="75" y="20" class="array-text">20</text><text x="125" y="20" class="array-text">30</text><text x="175" y="20" class="array-text">40</text><text x="225" y="20" class="array-text">50</text><text x="25" y="55" class="array-text" font-size="12" fill="#666">1</text><text x="75" y="55" class="array-text" font-size="12" fill="#666">2</text><text x="125" y="55" class="array-text" font-size="12" fill="#666">3</text><text x="175" y="55" class="array-text" font-size="12" fill="#666">4</text><text x="225" y="55" class="array-text" font-size="12" fill="#666">5</text><text x="275" y="55" class="array-text" font-size="12" fill="#666">6</text><text x="325" y="55" class="array-text" font-size="12" fill="#666">7</text><text x="400" y="20" class="step-text" fill="#666">length = 5</text></g><line x1="175" y1="85" x2="175" y2="95" class="arrow"/><text x="175" y="65" class="array-text" fill="#f44336" font-weight="bold">插入位置 pos=3</text><text x="50" y="200" class="step-text" fill="#333">步骤2：从尾部开始，向后移动元素</text><g transform="translate(50, 240)"><rect x="0" y="0" width="50" height="40" class="array-cell"/><rect x="50" y="0" width="50" height="40" class="array-cell"/><rect x="100" y="0" width="50" height="40" class="array-cell"/><rect x="150" y="0" width="50" height="40" class="array-cell"/><rect x="200" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="250" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="300" y="0" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><text x="25" y="20" class="array-text">10</text><text x="75" y="20" class="array-text">20</text><text x="125" y="20" class="array-text">30</text><text x="175" y="20" class="array-text">40</text><text x="225" y="20" class="array-text">50</text><text x="275" y="20" class="array-text">50</text><path d="M215-15q12-10 35 10" class="move-arrow"/><text x="237" y="-30" class="array-text" font-size="12" fill="#ff9800">移动</text></g><g transform="translate(50, 300)"><rect x="0" y="0" width="50" height="40" class="array-cell"/><rect x="50" y="0" width="50" height="40" class="array-cell"/><rect x="100" y="0" width="50" height="40" class="array-cell"/><rect x="150" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="200" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="250" y="0" width="50" height="40" class="array-cell"/><rect x="300" y="0" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><text x="25" y="20" class="array-text">10</text><text x="75" y="20" class="array-text">20</text><text x="125" y="20" class="array-text">30</text><text x="175" y="20" class="array-text">40</text><text x="225" y="20" class="array-text">40</text><text x="275" y="20" class="array-text">50</text><path d="M165-15q12-10 35 10" class="move-arrow"/><text x="187" y="-30" class="array-text" font-size="12" fill="#ff9800">移动</text></g><g transform="translate(50, 360)"><rect x="0" y="0" width="50" height="40" class="array-cell"/><rect x="50" y="0" width="50" height="40" class="array-cell"/><rect x="100" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="150" y="0" width="50" height="40" class="array-cell-highlight"/><rect x="200" y="0" width="50" height="40" class="array-cell"/><rect x="250" y="0" width="50" height="40" class="array-cell"/><rect x="300" y="0" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><text x="25" y="20" class="array-text">10</text><text x="75" y="20" class="array-text">20</text><text x="125" y="20" class="array-text">30</text><text x="175" y="20" class="array-text">30</text><text x="225" y="20" class="array-text">40</text><text x="275" y="20" class="array-text">50</text><path d="M115-15q12-10 35 10" class="move-arrow"/><text x="137" y="-30" class="array-text" font-size="12" fill="#ff9800">移动</text></g><text x="50" y="440" class="step-text" fill="#333">步骤3：插入新元素并更新长度</text><g transform="translate(50, 480)"><rect x="0" y="10" width="50" height="40" class="array-cell"/><rect x="50" y="10" width="50" height="40" class="array-cell"/><rect x="100" y="10" width="50" height="40" class="array-cell-new"/><rect x="150" y="10" width="50" height="40" class="array-cell"/><rect x="200" y="10" width="50" height="40" class="array-cell"/><rect x="250" y="10" width="50" height="40" class="array-cell"/><rect x="300" y="10" width="50" height="40" style="fill:#f5f5f5;stroke:#ccc;stroke-width:1"/><text x="25" y="30" class="array-text">10</text><text x="75" y="30" class="array-text">20</text><text x="125" y="30" class="array-text" fill="#388e3c" font-weight="bold">99</text><text x="175" y="30" class="array-text">30</text><text x="225" y="30" class="array-text">40</text><text x="275" y="30" class="array-text">50</text><line x1="125" y1="-5" x2="125" y2="5" class="arrow"/><text x="125" y="-25" class="array-text" fill="#f44336" font-weight="bold">新元素 99</text><text x="400" y="30" class="step-text" fill="#666">length = 6</text></g><rect x="470" y="200" width="320" height="200" fill="#fff3e0" stroke="#ff9800"/><text x="600" y="220" class="step-text" fill="#e65100">关键要点：</text><text x="620" y="245" class="array-text" fill="#333" text-anchor="start" font-size="13">1. 检查插入位置合法性：1 ≤ pos ≤ length+1</text><text x="620" y="265" class="array-text" fill="#333" text-anchor="start" font-size="13">2. 检查数组是否已满：length &lt; MAXSIZE</text><text x="620" y="285" class="array-text" fill="#333" text-anchor="start" font-size="13">3. 从后往前移动元素，避免覆盖</text><text x="620" y="305" class="array-text" fill="#333" text-anchor="start" font-size="13">4. 循环：for (i = length; i ≥ pos; i--)</text><text x="620" y="325" class="array-text" fill="#333" text-anchor="start" font-size="13">5. 移动操作：data[i] = data[i-1]</text><text x="620" y="345" class="array-text" fill="#333" text-anchor="start" font-size="13">6. 插入新元素：data[pos-1] = e</text><text x="620" y="365" class="array-text" fill="#333" text-anchor="start" font-size="13">7. 更新长度：length++</text><text x="620" y="385" class="array-text" fill="#e65100" text-anchor="start" font-size="13" font-weight="bold">时间复杂度：O(n)</text></svg>