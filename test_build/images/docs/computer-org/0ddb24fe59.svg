<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><rect width="800" height="400" fill="#f8f9fa"/><text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">m阶B树的关键特性</text><rect x="50" y="60" width="700" height="320" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/><circle cx="80" cy="110" r="4" fill="#2563eb"/><text x="100" y="115" font-size="16" font-weight="bold" fill="#2563eb">特性1：结点容量限制</text><text x="120" y="135" font-size="14" fill="#475569">• 每个结点最多有 m 棵子树</text><text x="120" y="155" font-size="14" fill="#475569">• 每个结点最多有 m-1 个关键字</text><text x="120" y="175" font-size="14" fill="#475569">• 关键字数量 = 子树数量 - 1</text><circle cx="80" cy="210" r="4" fill="#059669"/><text x="100" y="215" font-size="16" font-weight="bold" fill="#059669">特性2：根节点特殊规则</text><text x="120" y="235" font-size="14" fill="#475569">• 如果根节点不是叶子结点，至少有 2 棵子树</text><text x="120" y="255" font-size="14" fill="#475569">• 即：根节点至少有 1 个关键字（非叶子时）</text><circle cx="80" cy="290" r="4" fill="#dc2626"/><text x="100" y="295" font-size="16" font-weight="bold" fill="#dc2626">特性3：非叶节点最小限制</text><text x="120" y="315" font-size="14" fill="#475569">• 除根节点外，非叶节点至少有 ⌈m/2⌉ 棵子树</text><text x="120" y="335" font-size="14" fill="#475569">• 即：至少有 ⌈m/2⌉-1 个关键字</text><text x="120" y="355" font-size="14" fill="#475569">• 保证树的平衡性和搜索效率</text><rect x="450" y="100" width="280" height="130" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="590" y="125" text-anchor="middle" font-size="16" font-weight="bold" fill="#0284c7">4阶B树示例计算</text><text x="470" y="150" font-size="14" fill="#0c4a6e">• 最多子树数：m = 4</text><text x="470" y="170" font-size="14" fill="#0c4a6e">• 最多关键字：m-1 = 3</text><text x="470" y="190" font-size="14" fill="#0c4a6e">• 非叶节点最少子树：⌈4/2⌉ = 2</text><text x="470" y="210" font-size="14" fill="#0c4a6e">• 非叶节点最少关键字：2-1 = 1</text><rect x="450" y="250" width="280" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="590" y="275" text-anchor="middle" font-size="16" font-weight="bold" fill="#92400e">一般公式</text><text x="470" y="295" font-size="14" fill="#92400e">• 关键字范围：1 ~ m-1</text><text x="470" y="315" font-size="14" fill="#92400e">• 子树范围：2 ~ m（根节点）</text><text x="470" y="335" font-size="14" fill="#92400e">• 非叶节点：⌈m/2⌉-1 ~ m-1 个关键字</text></svg>