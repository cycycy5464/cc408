<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">内存保护机制</text><text x="120" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#34495e">物理内存</text><rect x="50" y="80" width="140" height="400" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/><rect x="60" y="90" width="120" height="40" fill="#3498db" stroke="#2980b9"/><text x="120" y="115" text-anchor="middle" font-size="12" fill="#fff">页面0 (4KB)</text><rect x="60" y="140" width="120" height="40" fill="#e74c3c" stroke="#c0392b"/><text x="120" y="165" text-anchor="middle" font-size="12" fill="#fff">页面1 (4KB)</text><rect x="60" y="190" width="120" height="40" fill="#2ecc71" stroke="#27ae60"/><text x="120" y="215" text-anchor="middle" font-size="12" fill="#fff">页面2 (4KB)</text><rect x="60" y="240" width="120" height="40" fill="#9b59b6" stroke="#8e44ad"/><text x="120" y="265" text-anchor="middle" font-size="12" fill="#fff">页面3 (4KB)</text><rect x="60" y="290" width="120" height="40" fill="#f39c12" stroke="#e67e22"/><text x="120" y="315" text-anchor="middle" font-size="12" fill="#fff">页面4 (4KB)</text><rect x="60" y="340" width="120" height="40" fill="#1abc9c" stroke="#16a085"/><text x="120" y="365" text-anchor="middle" font-size="12" fill="#fff">页面5 (4KB)</text><rect x="250" y="150" width="140" height="200" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/><text x="320" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">操作系统</text><text x="320" y="180" text-anchor="middle" font-size="14" fill="#fff">页表管理</text><text x="320" y="200" text-anchor="middle" font-size="14" fill="#fff">访问权限控制</text><text x="320" y="220" text-anchor="middle" font-size="14" fill="#fff">地址转换</text><rect x="260" y="240" width="120" height="100" fill="#34495e" stroke="#2c3e50"/><text x="320" y="260" text-anchor="middle" font-size="12" fill="#fff">页表</text><text x="320" y="280" text-anchor="middle" font-size="10" fill="#ecf0f1">虚拟→物理</text><text x="320" y="295" text-anchor="middle" font-size="10" fill="#ecf0f1">0x1000→页面0</text><text x="320" y="310" text-anchor="middle" font-size="10" fill="#ecf0f1">0x2000→页面1</text><text x="320" y="325" text-anchor="middle" font-size="10" fill="#ecf0f1">权限检查</text><text x="500" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#34495e">进程A</text><text x="680" y="70" text-anchor="middle" font-size="16" font-weight="bold" fill="#34495e">进程B</text><rect x="430" y="80" width="140" height="180" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/><rect x="440" y="90" width="120" height="35" fill="#3498db" stroke="#2980b9"/><text x="500" y="110" text-anchor="middle" font-size="11" fill="#fff">代码段 (RX)</text><rect x="440" y="130" width="120" height="35" fill="#e74c3c" stroke="#c0392b"/><text x="500" y="150" text-anchor="middle" font-size="11" fill="#fff">数据段 (RW)</text><rect x="440" y="170" width="120" height="35" fill="#2ecc71" stroke="#27ae60"/><text x="500" y="190" text-anchor="middle" font-size="11" fill="#fff">堆 (RW)</text><rect x="440" y="210" width="120" height="35" fill="#9b59b6" stroke="#8e44ad"/><text x="500" y="230" text-anchor="middle" font-size="11" fill="#fff">栈 (RW)</text><rect x="610" y="80" width="140" height="180" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2"/><rect x="620" y="90" width="120" height="35" fill="#f39c12" stroke="#e67e22"/><text x="680" y="110" text-anchor="middle" font-size="11" fill="#fff">代码段 (RX)</text><rect x="620" y="130" width="120" height="35" fill="#1abc9c" stroke="#16a085"/><text x="680" y="150" text-anchor="middle" font-size="11" fill="#fff">数据段 (RW)</text><rect x="620" y="170" width="120" height="35" fill="#e67e22" stroke="#d35400"/><text x="680" y="190" text-anchor="middle" font-size="11" fill="#fff">堆 (RW)</text><rect x="620" y="210" width="120" height="35" fill="#8e44ad" stroke="#7d3c98"/><text x="680" y="230" text-anchor="middle" font-size="11" fill="#fff">栈 (RW)</text><path d="M430 180l-40 70" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M610 180 430 250" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M250 250H190" stroke="#34495e" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><rect x="430" y="300" width="320" height="80" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/><text x="590" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="#856404">内存隔离</text><text x="590" y="345" text-anchor="middle" font-size="12" fill="#856404">进程B无法访问进程A的内存</text><text x="590" y="365" text-anchor="middle" font-size="12" fill="#856404">操作系统强制执行访问权限</text><rect x="50" y="500" width="700" height="80" fill="#d1ecf1" stroke="#bee5eb" stroke-width="2"/><text x="400" y="525" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c5460">访问权限</text><text x="120" y="545" text-anchor="middle" font-size="12" fill="#0c5460">R - 读取</text><text x="250" y="545" text-anchor="middle" font-size="12" fill="#0c5460">W - 写入</text><text x="380" y="545" text-anchor="middle" font-size="12" fill="#0c5460">X - 执行</text><text x="550" y="545" text-anchor="middle" font-size="12" fill="#0c5460">违反权限→异常</text><text x="400" y="565" text-anchor="middle" font-size="11" fill="#0c5460">每个段/页面都有独立的权限设置，保护系统免受非法访问</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/></marker></defs><circle cx="590" cy="200" r="25" fill="none" stroke="#e74c3c" stroke-width="3"/><line x1="575" y1="185" x2="605" y2="215" stroke="#e74c3c" stroke-width="3"/></svg>