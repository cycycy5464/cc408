<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><style>.title{font-size:18px;font-weight:700;fill:#333}.subtitle{font-size:14px;font-weight:700;fill:#555}.text{font-size:12px;fill:#333}.small-text{font-size:10px;fill:#666}.station-a{fill:#ff6b6b;stroke:#ff6b6b}.station-b{fill:#4ecdc4;stroke:#4ecdc4}.signal{stroke-width:2;fill:none}.box{fill:none;stroke:#999;stroke-width:1}.arrow{stroke:#333;stroke-width:2;marker-end:url(#arrowhead)}.chip{fill:#fff;stroke:#333;stroke-width:1}</style><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker></defs><text x="400" y="25" text-anchor="middle" class="title">CDMA码分多址工作原理</text><rect x="50" y="50" width="300" height="120" class="box"/><text x="60" y="70" class="subtitle station-a">站点A (发送比特1)</text><text x="60" y="90" class="text">码片序列: (+1, +1, -1, -1)</text><g transform="translate(60, 100)"><rect x="0" y="0" width="30" height="20" class="chip"/><text x="15" y="12" text-anchor="middle" class="small-text">+1</text><rect x="35" y="0" width="30" height="20" class="chip"/><text x="50" y="12" text-anchor="middle" class="small-text">+1</text><rect x="70" y="0" width="30" height="20" class="chip"/><text x="85" y="12" text-anchor="middle" class="small-text">-1</text><rect x="105" y="0" width="30" height="20" class="chip"/><text x="120" y="12" text-anchor="middle" class="small-text">-1</text></g><text x="60" y="145" class="small-text">比特时间被分为4个码片</text><rect x="450" y="50" width="300" height="120" class="box"/><text x="460" y="70" class="subtitle station-b">站点B (发送比特0)</text><text x="460" y="90" class="text">码片序列: (+1, -1, +1, -1)</text><text x="460" y="105" class="text">发送反码: (-1, +1, -1, +1)</text><g transform="translate(460, 110)"><rect x="0" y="0" width="30" height="20" class="chip"/><text x="15" y="12" text-anchor="middle" class="small-text">-1</text><rect x="35" y="0" width="30" height="20" class="chip"/><text x="50" y="12" text-anchor="middle" class="small-text">+1</text><rect x="70" y="0" width="30" height="20" class="chip"/><text x="85" y="12" text-anchor="middle" class="small-text">-1</text><rect x="105" y="0" width="30" height="20" class="chip"/><text x="120" y="12" text-anchor="middle" class="small-text">+1</text></g><line x1="200" y1="180" x2="300" y2="220" class="arrow"/><line x1="600" y1="180" x2="500" y2="220" class="arrow"/><rect x="300" y="200" width="200" height="80" class="box"/><text x="400" y="220" text-anchor="middle" class="subtitle">信道中线性叠加</text><text x="400" y="240" text-anchor="middle" class="text">A信号 + B信号</text><text x="400" y="255" text-anchor="middle" class="text">(+1,+1,-1,-1) + (-1,+1,-1,+1)</text><text x="400" y="270" text-anchor="middle" class="text">= (0,+2,-2,0)</text><line x1="400" y1="290" x2="400" y2="320" class="arrow"/><rect x="50" y="340" width="700" height="180" class="box"/><text x="400" y="360" text-anchor="middle" class="subtitle">接收端分离信号</text><rect x="70" y="380" width="300" height="60" class="box"/><text x="220" y="400" text-anchor="middle" class="text station-a">恢复站点A的信号</text><text x="220" y="415" text-anchor="middle" class="small-text">接收信号 · A码片序列 = (0,+2,-2,0) · (+1,+1,-1,-1)</text><text x="220" y="430" text-anchor="middle" class="small-text">= 1/4 × (0+2+2+0) = +1 → 比特1</text><rect x="430" y="380" width="300" height="60" class="box"/><text x="580" y="400" text-anchor="middle" class="text station-b">恢复站点B的信号</text><text x="580" y="415" text-anchor="middle" class="small-text">接收信号 · B码片序列 = (0,+2,-2,0) · (+1,-1,+1,-1)</text><text x="580" y="430" text-anchor="middle" class="small-text">= 1/4 × (0-2-2+0) = -1 → 比特0</text><rect x="150" y="460" width="500" height="50" class="box"/><text x="400" y="480" text-anchor="middle" class="subtitle">正交性保证</text><text x="400" y="495" text-anchor="middle" class="small-text">A · B = 1/4 × ((+1)×(+1) + (+1)×(-1) + (-1)×(+1) + (-1)×(-1)) = 1/4 × (1-1-1+1) = 0</text><text x="50" y="550" class="small-text">注：码片序列必须相互正交，这样才能在接收端成功分离各路信号</text><text x="50" y="570" class="small-text">发送比特1时发送原码片序列，发送比特0时发送反码片序列</text></svg>