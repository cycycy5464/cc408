ddle" font-size="8" fill="#fff">X</text><text x="255" y="340" font-size="8" fill="#333">在磁盘</text><rect x="190" y="350" width="25" height="15" fill="#4CAF50"/><text x="202" y="360" text-anchor="middle" font-size="8" fill="#fff">2</text><rect x="220" y="350" width="25" height="15" fill="#4CAF50"/><text x="232" y="360" text-anchor="middle" font-size="8" fill="#fff">1</text><text x="255" y="360" font-size="8" fill="#333">在内存</text><rect x="190" y="370" width="25" height="15" fill="#F44336"/><text x="202" y="380" text-anchor="middle" font-size="8" fill="#fff">3</text><rect x="220" y="370" width="25" height="15" fill="#F44336"/><text x="232" y="380" text-anchor="middle" font-size="8" fill="#fff">X</text><text x="255" y="380" font-size="8" fill="#333">在磁盘</text></g><rect x="50" y="70" width="120" height="80" fill="#E8F5E8" stroke="#4CAF50" stroke-width="2" rx="3"/><text x="110" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">虚拟地址空间</text><g><rect x="60" y="100" width="100" height="15" fill="#81C784"/><text x="110" y="110" text-anchor="middle" font-size="10" fill="#fff">页面 0</text><rect x="60" y="115" width="100" height="15" fill="#FFCDD2"/><text x="110" y="125" text-anchor="middle" font-size="10" fill="#D32F2F">页面 1 (缺页)</text><rect x="60" y="130" width="100" height="15" fill="#81C784"/><text x="110" y="140" text-anchor="middle" font-size="10" fill="#fff">页面 2</text></g><rect x="370" y="70" width="120" height="120" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" rx="3"/><text x="430" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">物理内存</text><g><rect x="380" y="100" width="100" height="15" fill="#FFA726"/><text x="430" y="110" text-anchor="middle" font-size="10" fill="#fff">页框 0 (页面0)</text><rect x="380" y="115" width="100" height="15" fill="#FFA726"/><text x="430" y="125" text-anchor="middle" font-size="10" fill="#fff">页框 1 (页面2)</text><rect x="380" y="130" width="100" height="15" fill="#BDBDBD"/><text x="430" y="140" text-anchor="middle" font-size="10" fill="#666">页框 2 (空闲)</text><rect x="380" y="145" width="100" height="15" fill="#FFA726"/><text x="430" y="155" text-anchor="middle" font-size="10" fill="#fff">页框 3 (页面0)</text><rect x="380" y="160" width="100" height="15" fill="#BDBDBD"/><text x="430" y="170" text-anchor="middle" font-size="10" fill="#666">页框 4 (空闲)</text></g><rect x="550" y="70" width="120" height="120" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" rx="3"/><text x="610" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#7B1FA2">磁盘存储</text><g><rect x="560" y="105" width="100" height="15" fill="#BA68C8"/><text x="610" y="115" text-anchor="middle" font-size="10" fill="#fff">页面 1 (交换区)</text><rect x="560" y="125" width="100" height="15" fill="#BA68C8"/><text x="610" y="135" text-anchor="middle" font-size="10" fill="#fff">页面 3 (交换区)</text><rect x="560" y="145" width="100" height="15" fill="#CE93D8"/><text x="610" y="155" text-anchor="middle" font-size="10" fill="#fff">程序映像文件</text><rect x="560" y="165" width="100" height="15" fill="#CE93D8"/><text x="610" y="175" text-anchor="middle" font-size="10" fill="#fff">其他页面...</text></g><line x1="130" y1="210" x2="200" y2="210" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/><text x="165" y="205" text-anchor="middle" font-size="9" fill="#333">虚拟地址</text><line x1="245" y1="250" x2="245" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="310" y1="340" x2="370" y2="130" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrowhead)"/><text x="340" y="220" font-size="9" fill="#4CAF50">页面存在</text><line x1="310" y1="360" x2="550" y2="140" stroke="#F44336" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/><text x="430" y="250" font-size="9" fill="#F44336">缺页中断</text><path d="M550 160q-50 40-1e2 20" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/><text x="500" y="190" text-anchor="middle" font-size="9" fill="#9C27B0">页面调入</text><rect x="50" y="430" width="700" height="60" fill="#ECEFF1" stroke="#607D8B" stroke-width="1" rx="3"/><text x="60" y="450" font-size="12" font-weight="bold" fill="#263238">工作流程:</text><text x="60" y="465" font-size="11" fill="#37474F">① CPU发出虚拟地址 → ② MMU查询页表 → ③ 若页面在内存则直接访问</text><text x="60" y="480" font-size="11" fill="#37474F">④ 若缺页则触发中断 → ⑤ 操作系统从磁盘调入页面 → ⑥ 更新页表并继续执行</text><rect x="700" y="250" width="90" height="90" fill="#F1F8E9" stroke="#8BC34A" stroke-width="1" rx="3"/><text x="745" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#33691E">核心优势</text><text x="710" y="285" font-size="9" fill="#33691E">• 内存扩展</text><text x="710" y="298" font-size="9" fill="#33691E">• 进程隔离</text><text x="710" y="311" font-size="9" fill="#33691E">• 按需加载</text><text x="710" y="324" font-size="9" fill="#33691E">• 内存共享</text></svg>