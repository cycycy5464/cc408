<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520"><defs><style>.title{font:700 18px sans-serif;fill:#2c3e50}.section-title{font:700 14px sans-serif;fill:#34495e}.text{font:12px monospace;fill:#2c3e50}.comment{font:11px sans-serif;fill:#7f8c8d;font-style:italic}.box{fill:#ecf0f1;stroke:#34495e;stroke-width:2}.highlight-box{fill:#e8f4f8;stroke:#3498db;stroke-width:2}.arrow{stroke:#e74c3c;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.symbol{fill:#e74c3c;font:700 16px sans-serif}.parallel{fill:#27ae60;font:700 16px sans-serif}.note{font:10px sans-serif;fill:#95a5a6}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/></marker></defs><rect class="highlight-box" x="20" y="20" width="360" height="110" rx="5"/><text class="section-title" x="35" y="42">① 赋值符号 ←</text><text class="text" x="50" y="65">R1 ← R2 + R3</text><text class="comment" x="50" y="85">目标寄存器 ← 源操作数</text><text class="note" x="50" y="105">等价写法：R1 ← (R2) + (R3)</text><text class="note" x="50" y="120">() 表示读取寄存器内容</text><rect class="highlight-box" x="400" y="20" width="380" height="110" rx="5"/><text class="section-title" x="415" y="42">② 并行操作（同一时钟周期）</text><text class="text" x="430" y="65">PC ← PC + 4</text><text class="parallel" x="523" y="65">,</text><text class="text" x="540" y="65">MAR ← PC</text><rect x="518" y="50" width="15" height="20" fill="none" stroke="#27ae60" stroke-width="2" rx="3"/><text class="comment" x="430" y="85">逗号分隔 = 同时执行</text><text class="note" x="430" y="105">两个传送操作在一个</text><text class="note" x="430" y="120">时钟周期内完成</text><rect class="highlight-box" x="20" y="150" width="360" height="150" rx="5"/><text class="section-title" x="35" y="172">③ 顺序操作（多个时钟周期）</text><text class="text" x="50" y="200">MAR ← PC</text><text class="comment" x="200" y="200">T1 周期</text><rect x="40" y="186" width="145" height="20" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,3" rx="2"/><text class="text" x="50" y="225">MDR ← M[MAR]</text><text class="comment" x="200" y="225">T2 周期</text><rect x="40" y="211" width="145" height="20" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,3" rx="2"/><text class="text" x="50" y="250">IR ← MDR</text><text class="comment" x="200" y="250">T3 周期</text><rect x="40" y="236" width="145" height="20" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="3,3" rx="2"/><text class="note" x="50" y="270">不同行 = 不同时钟周期</text><text class="note" x="50" y="285">按顺序逐个执行</text><rect class="highlight-box" x="400" y="150" width="380" height="210" rx="5"/><text class="section-title" x="415" y="172">④ 存储器访问</text><text class="section-title" x="430" y="195" style="font-size:12px;fill:#16a085">读存储器：</text><text class="text" x="445" y="215">MAR ← PC</text><text class="comment" x="600" y="215">设置地址</text><text class="text" x="445" y="235">MDR ← M[MAR]</text><text class="comment" x="600" y="235">读取数据</text><rect x="540" y="202" width="40" height="18" fill="#fff3cd" stroke="#f39c12" stroke-width="1" rx="2"/><text x="545" y="215" style="font:700 11px sans-serif;fill:#f39c12">MAR</text><rect x="540" y="222" width="40" height="18" fill="#d4edda" stroke="#28a745" stroke-width="1" rx="2"/><text x="545" y="235" style="font:700 11px sans-serif;fill:#28a745">MDR</text><text class="section-title" x="430" y="265" style="font-size:12px;fill:#c0392b">写存储器：</text><text class="text" x="445" y="285">MAR ← R1</text><text class="parallel" x="555" y="285">,</text><text class="text" x="565" y="285">MDR ← R2</text><text class="text" x="445" y="305">M[MAR] ← MDR</text><text class="comment" x="600" y="305">写入数据</text><rect x="510" y="272" width="40" height="18" fill="#fff3cd" stroke="#f39c12" stroke-width="1" rx="2"/><text x="515" y="285" style="font:700 11px sans-serif;fill:#f39c12">MAR</text><rect x="635" y="272" width="40" height="18" fill="#d4edda" stroke="#28a745" stroke-width="1" rx="2"/><text x="640" y="285" style="font:700 11px sans-serif;fill:#28a745">MDR</text><text class="note" x="445" y="330">MAR = 存储器地址寄存器</text><text class="note" x="445" y="345">MDR = 存储器数据寄存器</text><rect class="box" x="20" y="380" width="760" height="120" rx="5"/><text class="section-title" x="35" y="402">关键要点</text><circle cx="50" cy="425" r="4" fill="#3498db"/><text class="text" x="65" y="430">← 表示数据传送方向，从右到左</text><circle cx="50" cy="450" r="4" fill="#27ae60"/><text class="text" x="65" y="455">逗号(,) 表示并行执行，多行表示顺序执行</text><circle cx="50" cy="475" r="4" fill="#e74c3c"/><text class="text" x="65" y="480">存储器访问必须通过 MAR(地址) 和 MDR(数据)</text><circle cx="420" cy="425" r="4" fill="#9b59b6"/><text class="text" x="435" y="430">M[地址] 表示访问存储器指定地址</text><circle cx="420" cy="450" r="4" fill="#f39c12"/><text class="text" x="435" y="455">(R1) 和 R1 含义相同，都表示读取寄存器</text><circle cx="420" cy="475" r="4" fill="#16a085"/><text class="text" x="435" y="480">时钟周期：并行操作在1个周期，顺序操作需多个周期</text></svg>