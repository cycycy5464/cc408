<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">顺序表 SeqList 数据结构</text><rect x="50" y="60" width="300" height="180" fill="#e8f4fd" stroke="#3498db" stroke-width="2" rx="8"/><text x="200" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">结构体定义</text><text x="70" y="110" font-family="Courier New, monospace" font-size="14" fill="#34495e">typedef struct {</text><text x="90" y="130" font-family="Courier New, monospace" font-size="14" fill="#e74c3c">ElementType data[MAXSIZE];</text><text x="90" y="150" font-family="Courier New, monospace" font-size="14" fill="#27ae60">int length;</text><text x="70" y="170" font-family="Courier New, monospace" font-size="14" fill="#34495e">} SeqList;</text><text x="70" y="200" font-family="Courier New, monospace" font-size="12" fill="#7f8c8d">MAXSIZE = 100</text><text x="70" y="220" font-family="Courier New, monospace" font-size="12" fill="#7f8c8d">初始化: L->length = 0</text><text x="450" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">内存布局</text><text x="450" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">data[MAXSIZE] 数组</text><g><text x="380" y="145" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">索引:</text><rect x="420" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><rect x="460" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><rect x="500" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><rect x="540" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><rect x="580" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><text x="625" y="170" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">...</text><rect x="650" y="150" width="40" height="30" fill="#fff" stroke="#e74c3c" stroke-width="2"/><text x="440" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">0</text><text x="480" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">1</text><text x="520" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">2</text><text x="560" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">3</text><text x="600" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">4</text><text x="670" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">99</text><text x="440" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text><text x="480" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text><text x="520" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text><text x="560" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text><text x="600" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text><text x="670" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">空</text></g><text x="450" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#27ae60">length 长度字段</text><rect x="420" y="235" width="60" height="30" fill="#d5f4e6" stroke="#27ae60" stroke-width="2"/><text x="450" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">0</text><text x="490" y="255" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">(初始值)</text><rect x="50" y="300" width="700" height="250" fill="#f8f9fa" stroke="#95a5a6" stroke-width="1" rx="8"/><text x="400" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">初始化过程说明</text><circle cx="80" cy="355" r="15" fill="#3498db"/><text x="80" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">1</text><text x="110" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">定义顺序表结构：包含固定大小数组 data[MAXSIZE] 和长度字段 length</text><circle cx="80" cy="385" r="15" fill="#e67e22"/><text x="80" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">2</text><text x="110" y="390" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">MAXSIZE = 100，表示数组最多可存储100个元素</text><circle cx="80" cy="415" r="15" fill="#27ae60"/><text x="80" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">3</text><text x="110" y="420" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">InitList(L) 函数：将 length 设置为 0，表示当前表为空表</text><circle cx="80" cy="445" r="15" fill="#9b59b6"/><text x="80" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">4</text><text x="110" y="450" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">初始化后：数组预分配了空间，但 length=0 表示没有有效元素</text><rect x="70" y="480" width="660" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="80" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">特点：</text><text x="80" y="520" font-family="Arial, sans-serif" font-size="13" fill="#34495e">• 固定大小：数组大小在编译时确定，不能动态改变</text><text x="400" y="520" font-family="Arial, sans-serif" font-size="13" fill="#34495e">• 顺序存储：元素在内存中连续存放</text><path d="M3e2 210q50 0 120 35" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><text x="320" y="200" font-family="Arial, sans-serif" font-size="12" fill="#27ae60">初始化后 length = 0</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs></svg>