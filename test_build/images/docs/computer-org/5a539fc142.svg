<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430"><defs><style>.node-circle{fill:#e3f2fd;stroke:#1976d2;stroke-width:2}.unbalanced-node{fill:#ffebee;stroke:#d32f2f;stroke-width:2}.text{font-family:Arial,sans-serif;font-size:12px;text-anchor:middle}.title-text{font-family:Arial,sans-serif;font-size:14px;font-weight:700;text-anchor:middle}.balance-factor{font-family:Arial,sans-serif;font-size:12px;text-anchor:middle;fill:#1976d2}.edge{stroke:#666;stroke-width:1.5;fill:none}.highlight-edge{stroke:#d32f2f;stroke-width:2;fill:none}.concept-box{fill:#f5f5f5;stroke:#999;stroke-width:1}.concept-text{font-family:Arial,sans-serif;font-size:11px}</style></defs><text x="400" y="20" class="title-text">AVL树核心概念</text><g transform="translate(80, 50)"><text x="100" y="20" class="title-text" fill="#1976d2">平衡的AVL树</text><line x1="100" y1="50" x2="70" y2="90" class="edge"/><line x1="100" y1="50" x2="130" y2="90" class="edge"/><line x1="70" y1="90" x2="50" y2="130" class="edge"/><line x1="70" y1="90" x2="90" y2="130" class="edge"/><line x1="130" y1="90" x2="150" y2="130" class="edge"/><circle cx="100" cy="50" r="15" class="node-circle"/><text x="100" y="55" class="text">5</text><text x="125" y="42" class="balance-factor">0</text><circle cx="70" cy="90" r="15" class="node-circle"/><text x="70" y="95" class="text">3</text><text x="95" y="82" class="balance-factor">0</text><circle cx="130" cy="90" r="15" class="node-circle"/><text x="130" y="95" class="text">7</text><text x="155" y="82" class="balance-factor">-1</text><circle cx="50" cy="130" r="15" class="node-circle"/><text x="50" y="135" class="text">2</text><text x="70" y="122" class="balance-factor">0</text><circle cx="90" cy="130" r="15" class="node-circle"/><text x="90" y="135" class="text">4</text><text x="110" y="122" class="balance-factor">0</text><circle cx="150" cy="130" r="15" class="node-circle"/><text x="150" y="135" class="text">8</text><text x="170" y="122" class="balance-factor">0</text></g><g transform="translate(400, 50)"><text x="100" y="20" class="title-text" fill="#d32f2f">不平衡的树</text><line x1="100" y1="50" x2="70" y2="90" class="highlight-edge"/><line x1="100" y1="50" x2="130" y2="90" class="edge"/><line x1="70" y1="90" x2="40" y2="130" class="highlight-edge"/><line x1="40" y1="130" x2="25" y2="170" class="highlight-edge"/><circle cx="100" cy="50" r="15" class="unbalanced-node"/><text x="100" y="55" class="text">5</text><text x="120" y="42" class="balance-factor" fill="#d32f2f">2</text><circle cx="70" cy="90" r="15" class="unbalanced-node"/><text x="70" y="95" class="text">3</text><text x="93" y="90" class="balance-factor" fill="#d32f2f">2</text><circle cx="130" cy="90" r="15" class="node-circle"/><text x="130" y="95" class="text">7</text><text x="150" y="82" class="balance-factor">0</text><circle cx="40" cy="130" r="15" class="node-circle"/><text x="40" y="135" class="text">2</text><text x="60" y="122" class="balance-factor">1</text><circle cx="25" cy="170" r="15" class="node-circle"/><text x="25" y="175" class="text">1</text><text x="45" y="162" class="balance-factor">0</text><rect x="10" y="75" width="120" height="110" fill="none" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,5"/><text x="70" y="200" class="concept-text" fill="#d32f2f">最小不平衡子树</text></g><g transform="translate(80, 280)"><rect x="0" y="0" width="200" height="80" class="concept-box"/><text x="10" y="20" class="concept-text" font-weight="bold">平衡因子 (Balance Factor)</text><text x="10" y="35" class="concept-text">BF = 左子树高度 - 右子树高度</text><text x="10" y="50" class="concept-text">• 平衡：|BF| ≤ 1</text><text x="10" y="65" class="concept-text">• 不平衡：|BF| > 1</text><rect x="220" y="0" width="250" height="80" class="concept-box"/><text x="230" y="20" class="concept-text" font-weight="bold">最小不平衡子树</text><text x="230" y="35" class="concept-text">• 整棵树中最小的不平衡子树</text><text x="230" y="50" class="concept-text">• 旋转的起始点：从该子树根节点开始</text><text x="230" y="65" class="concept-text">• 旋转后可使整棵树重新平衡</text><rect x="490" y="0" width="200" height="80" class="concept-box"/><text x="500" y="20" class="concept-text" font-weight="bold">旋转目的</text><text x="500" y="35" class="concept-text">• 维持树的平衡性</text><text x="500" y="50" class="concept-text">• 保证 O(log n) 复杂度</text><text x="500" y="65" class="concept-text">• 在插入/删除后恢复平衡</text></g><g transform="translate(80, 380)"><text x="0" y="15" class="concept-text" font-weight="bold">图例：</text><circle cx="80" cy="10" r="8" class="node-circle"/><text x="100" y="15" class="concept-text">平衡节点</text><circle cx="200" cy="10" r="8" class="unbalanced-node"/><text x="220" y="15" class="concept-text">不平衡节点</text><text x="320" y="15" class="concept-text" fill="#1976d2">蓝色数字：平衡因子</text><line x1="450" y1="10" x2="470" y2="10" class="highlight-edge"/><text x="480" y="15" class="concept-text">不平衡路径</text></g><g transform="translate(315, 120)"><path d="M0 0Q20-20 40 0" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><text x="20" y="-30" class="concept-text" fill="#d32f2f">需要旋转</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d32f2f"/></marker></defs></svg>