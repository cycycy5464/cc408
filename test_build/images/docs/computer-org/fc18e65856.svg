 stroke="#229954" stroke-width="3" rx="8"/><text x="180" y="405" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">独立运行</text><text x="180" y="425" text-anchor="middle" font-size="12" fill="#fff">完全独立的</text><text x="180" y="440" text-anchor="middle" font-size="12" fill="#fff">二进制文件</text><text x="600" y="70" text-anchor="middle" font-size="20" font-weight="bold" fill="#f39c12">动态链接</text><text x="450" y="110" font-size="14" font-weight="bold" fill="#34495e">编译时：</text><rect x="450" y="130" width="80" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/><text x="490" y="155" text-anchor="middle" font-size="12" fill="#fff">源代码</text><text x="490" y="168" text-anchor="middle" font-size="12" fill="#fff">main.c</text><rect x="450" y="200" width="80" height="50" fill="#e67e22" stroke="#d68910" stroke-width="2" rx="5"/><text x="490" y="220" text-anchor="middle" font-size="11" fill="#fff">动态库引用</text><text x="490" y="235" text-anchor="middle" font-size="11" fill="#fff">lib.so/.dll</text><path d="M540 155l80 25" fill="none" stroke="#f39c12" stroke-width="3" marker-end="url(#arrowhead2)"/><path d="M540 225h80" fill="none" stroke="#f39c12" stroke-width="3" marker-end="url(#arrowhead2)" stroke-dasharray="5,5"/><rect x="620" y="160" width="120" height="90" fill="#3498db" stroke="#2980b9" stroke-width="3" rx="8"/><text x="680" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">可执行文件</text><text x="680" y="200" text-anchor="middle" font-size="12" fill="#fff">app.exe</text><rect x="635" y="215" width="90" height="15" fill="#2980b9" stroke="#21618c" stroke-width="1" rx="3"/><text x="680" y="225" text-anchor="middle" font-size="9" fill="#fff">主程序代码</text><rect x="635" y="235" width="90" height="10" fill="#e67e22" stroke="#d68910" stroke-width="1" rx="2"/><text x="680" y="242" text-anchor="middle" font-size="8" fill="#fff">库引用</text><rect x="620" y="270" width="120" height="50" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="5"/><text x="680" y="295" text-anchor="middle" font-size="12" fill="#fff">动态库文件</text><text x="680" y="308" text-anchor="middle" font-size="12" fill="#fff">lib.so / lib.dll</text><text x="450" y="360" font-size="14" font-weight="bold" fill="#34495e">运行时：</text><rect x="480" y="380" width="80" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/><text x="520" y="405" text-anchor="middle" font-size="11" fill="#fff">可执行文件</text><text x="520" y="418" text-anchor="middle" font-size="11" fill="#fff">运行中</text><rect x="600" y="380" width="80" height="50" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="5"/><text x="640" y="400" text-anchor="middle" font-size="11" fill="#fff">动态库</text><text x="640" y="413" text-anchor="middle" font-size="11" fill="#fff">运行时加载</text><path d="M570 405h20" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead3)"/><text x="580" y="390" text-anchor="middle" font-size="10" fill="#e74c3c">动态加载</text><text x="50" y="520" font-size="14" font-weight="bold" fill="#2c3e50">特点：</text><text x="70" y="540" font-size="12" fill="#27ae60">✓ 文件较大，包含所有代码</text><text x="70" y="555" font-size="12" fill="#27ae60">✓ 运行时无需外部依赖</text><text x="70" y="570" font-size="12" fill="#27ae60">✓ 启动速度快</text><text x="450" y="520" font-size="14" font-weight="bold" fill="#2c3e50">特点：</text><text x="470" y="540" font-size="12" fill="#f39c12">✓ 文件较小，只含引用</text><text x="470" y="555" font-size="12" fill="#f39c12">✓ 可共享库文件</text><text x="470" y="570" font-size="12" fill="#f39c12">✓ 节省内存空间</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/></marker><marker id="arrowhead3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/></marker>