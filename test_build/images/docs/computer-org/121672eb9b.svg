<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 800"><defs><style>.title{font:700 24px sans-serif;fill:#2c3e50}.subtitle{font:700 18px sans-serif;fill:#34495e}.label{font:14px sans-serif;fill:#2c3e50}.key{font:700 13px sans-serif;fill:#2c3e50}.value{font:12px sans-serif;fill:#7f8c8d}.node-box{fill:#ecf0f1;stroke:#34495e;stroke-width:2}.leaf-box{fill:#d5f4e6;stroke:#27ae60;stroke-width:2}.internal-box{fill:#fdebd0;stroke:#f39c12;stroke-width:2}.arrow{stroke:#e74c3c;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.link{stroke:#95a5a6;stroke-width:1.5;fill:none}.highlight{fill:#e74c3c}.note{font:italic 12px sans-serif;fill:#7f8c8d}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/></marker></defs><text x="500" y="30" text-anchor="middle" class="title">B树 vs B+树：操作对比</text><text x="50" y="70" class="subtitle">1. 查找操作</text><text x="80" y="95" class="label">B树：可在内部节点结束</text><rect x="70" y="105" width="180" height="40" class="internal-box" rx="5"/><text x="100" y="128" class="key">15:V1</text><text x="160" y="128" class="key">30:V2</text><circle cx="210" cy="125" r="8" class="highlight"/><text x="260" y="128" class="note">✓ 找到30</text><text x="520" y="95" class="label">B+树：必须到达叶节点</text><rect x="510" y="105" width="180" height="40" class="internal-box" rx="5"/><text x="550" y="128" class="key">15</text><text x="610" y="128" class="key">30</text><line x1="600" y1="145" x2="600" y2="165" class="arrow"/><rect x="510" y="170" width="180" height="40" class="leaf-box" rx="5"/><text x="535" y="193" class="key">30:V2</text><text x="605" y="193" class="key">45:V3</text><circle cx="585" cy="190" r="8" class="highlight"/><text x="700" y="193" class="note">✓ 找到30</text><text x="50" y="250" class="subtitle">2. 插入操作（节点分裂）</text><text x="80" y="275" class="label">B树：中间键值对整体上移</text><rect x="70" y="285" width="240" height="40" class="internal-box" rx="5"/><text x="90" y="308" class="key">10:V1</text><text x="145" y="308" class="key">20:V2</text><text x="200" y="308" class="key">30:V3</text><text x="255" y="308" class="key">40:V4</text><text x="320" y="305" class="note">满了</text><text x="170" y="345" class="label">↓ 插入25后分裂</text><rect x="130" y="360" width="100" height="35" class="internal-box" rx="5"/><text x="155" y="382" class="key">25:V2.5</text><circle cx="215" cy="378" r="8" class="highlight"/><line x1="140" y1="395" x2="100" y2="415" class="link"/><line x1="210" y1="395" x2="240" y2="415" class="link"/><rect x="50" y="420" width="110" height="35" class="internal-box" rx="5"/><text x="65" y="442" class="key">10:V1 20:V2</text><rect x="200" y="420" width="110" height="35" class="internal-box" rx="5"/><text x="210" y="442" class="key">30:V3 40:V4</text><text x="80" y="475" class="note">中间KV整体上移</text><text x="520" y="275" class="label">B+树：中间键复制到父节点</text><rect x="510" y="285" width="240" height="40" class="leaf-box" rx="5"/><text x="525" y="308" class="key">10:V1</text><text x="575" y="308" class="key">20:V2</text><text x="625" y="308" class="key">30:V3</text><text x="675" y="308" class="key">40:V4</text><text x="760" y="305" class="note">满了</text><text x="610" y="345" class="label">↓ 插入25后分裂</text><rect x="570" y="360" width="80" height="35" class="internal-box" rx="5"/><text x="590" y="382" class="key">25</text><circle cx="620" cy="378" r="8" class="highlight"/><text x="660" y="382" class="note">仅键</text><line x1="580" y1="395" x2="540" y2="415" class="link"/><line x1="640" y1="395" x2="680" y2="415" class="link"/><rect x="480" y="420" width="120" height="35" class="leaf-box" rx="5"/><text x="492" y="442" class="key">10:V1 20:V2</text><rect x="640" y="420" width="130" height="35" class="leaf-box" rx="5"/><text x="648" y="442" class="key">25:V2.5 30:V3</text><circle cx="690" cy="455" r="8" class="highlight"/><line x1="600" y1="437" x2="640" y2="437" class="link" stroke-dasharray="3,3"/><text x="520" y="475" class="note">叶节点保留所有KV</text><text x="50" y="530" class="subtitle">3. 删除操作</text><text x="80" y="555" class="label">B树：内部节点删除复杂</text><rect x="120" y="565" width="100" height="35" class="internal-box" rx="5"/><text x="145" y="587" class="key">20:V2</text><circle cx="170" cy="583" r="10" fill="none" stroke="#e74c3c" stroke-width="2"/><line x1="160" y1="573" x2="180" y2="593" stroke="#e74c3c" stroke-width="2"/><line x1="180" y1="573" x2="160" y2="593" stroke="#e74c3c" stroke-width="2"/><line x1="130" y1="600" x2="90" y2="625" class="link"/><line x1="210" y1="600" x2="250" y2="625" class="link"/><rect x="50" y="630" width="80" height="30" class="internal-box" rx="5"/><text x="65" y="650" class="key">10:V1</text><rect x="200" y="630" width="90" height="30" class="internal-box" rx="5"/><text x="210" y="650" class="key">25:V3</text><circle cx="255" cy="645" r="8" class="highlight"/><text x="80" y="685" class="note">需用后继/前驱替换</text><line x1="245" y1="630" x2="170" y2="600" class="arrow"/><text x="520" y="555" class="label">B+树：仅在叶节点删除</text><rect x="560" y="565" width="80" height="35" class="internal-box" rx="5"/><text x="585" y="587" class="key">20</text><text x="645" y="587" class="note">索引</text><line x1="570" y1="600" x2="540" y2="625" class="link"/><line x1="630" y1="600" x2="660" y2="625" class="link"/><rect x="490" y="630" width="100" height="30" class="leaf-box" rx="5"/><text x="510" y="650" class="key">10:V1</text><rect x="620" y="630" width="100" height="30" class="leaf-box" rx="5"/><text x="633" y="650" class="key">20:V2</text><circle cx="663" cy="645" r="10" fill="none" stroke="#e74c3c" stroke-width="2"/><line x1="655" y1="637" x2="671" y2="653" stroke="#e74c3c" stroke-width="2"/><line x1="671" y1="637" x2="655" y2="653" stroke="#e74c3c" stroke-width="2"/><text x="530" y="685" class="note">只删叶节点，内部键仅调整</text><rect x="50" y="720" width="900" height="60" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="70" y="742" class="label" font-weight="bold">核心区别：</text><text x="70" y="762" class="label">• B树：所有节点存KV对，查找/插入/删除都涉及内部节点操作</text><text x="520" y="762" class="label">• B+树：仅叶节点存KV对，操作更简单，叶节点形成链表</text><rect x="850" y="100" width="120" height="90" fill="#fff" stroke="#95a5a6" stroke-width="1" rx="3"/><text x="860" y="118" class="label" font-weight="bold">图例</text><rect x="860" y="125" width="40" height="15" class="internal-box" rx="2"/><text x="905" y="136" class="label" font-size="11">内部节点</text><rect x="860" y="145" width="40" height="15" class="leaf-box" rx="2"/><text x="905" y="156" class="label" font-size="11">叶节点</text><circle cx="870" cy="170" r="6" class="highlight"/><text x="885" y="174" class="label" font-size="11">关键操作</text></svg>