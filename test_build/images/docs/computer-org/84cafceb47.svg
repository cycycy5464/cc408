<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700"><defs><style>.title{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#2c3e50}.subtitle{font-family:Arial,sans-serif;font-size:14px;font-weight:700;fill:#34495e}.desc{font-family:Arial,sans-serif;font-size:12px;fill:#7f8c8d}.element{font-family:Arial,sans-serif;font-size:12px;fill:#fff;text-anchor:middle}.arrow{stroke:#e74c3c;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.highlight{stroke:#e74c3c;stroke-width:2;fill:none}</style><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs><text x="360" y="30" class="title" text-anchor="middle">排序算法一趟操作特征图解</text><g id="bubble-sort" transform="translate(50, 60)"><text x="0" y="15" class="subtitle">冒泡排序</text><text x="0" y="30" class="desc">相邻比较，最大元素"冒"到末尾</text><rect x="0" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="15" y="56" class="element">5</text><rect x="35" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="50" y="56" class="element">2</text><rect x="70" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="85" y="56" class="element">8</text><rect x="105" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="120" y="56" class="element">1</text><rect x="140" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="155" y="56" class="element">9</text><path d="M180 52h30" class="arrow"/><rect x="220" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="235" y="56" class="element">2</text><rect x="255" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="270" y="56" class="element">5</text><rect x="290" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="305" y="56" class="element">1</text><rect x="325" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="340" y="56" class="element">8</text><rect x="360" y="40" width="30" height="25" fill="#e74c3c" rx="3"/><text x="375" y="56" class="element">9</text><text x="400" y="56" class="desc">最大值到位</text></g><g id="selection-sort" transform="translate(50, 140)"><text x="0" y="15" class="subtitle">选择排序</text><text x="0" y="30" class="desc">找最小值放到起始位置</text><rect x="0" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="15" y="56" class="element">5</text><rect x="35" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="50" y="56" class="element">2</text><rect x="70" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="85" y="56" class="element">8</text><rect x="105" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="120" y="56" class="element">1</text><rect x="140" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="155" y="56" class="element">9</text><path d="M180 52h30" class="arrow"/><rect x="220" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="235" y="56" class="element">1</text><rect x="255" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="270" y="56" class="element">5</text><rect x="290" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="305" y="56" class="element">8</text><rect x="325" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="340" y="56" class="element">2</text><rect x="360" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="375" y="56" class="element">9</text><text x="400" y="56" class="desc">最小值就位</text></g><g id="insertion-sort" transform="translate(50, 220)"><text x="0" y="15" class="subtitle">插入排序</text><text x="0" y="30" class="desc">新元素插入已排序部分</text><rect x="0" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="15" y="56" class="element">2</text><rect x="35" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="50" y="56" class="element">5</text><rect x="70" y="40" width="30" height="25" fill="#f39c12" rx="3"/><text x="85" y="56" class="element">1</text><rect x="105" y="40" width="30" height="25" fill="#95a5a6" rx="3"/><text x="120" y="56" class="element">8</text><rect x="140" y="40" width="30" height="25" fill="#95a5a6" rx="3"/><text x="155" y="56" class="element">9</text><path d="M180 52h30" class="arrow"/><rect x="220" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="235" y="56" class="element">1</text><rect x="255" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="270" y="56" class="element">2</text><rect x="290" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="305" y="56" class="element">5</text><rect x="325" y="40" width="30" height="25" fill="#95a5a6" rx="3"/><text x="340" y="56" class="element">8</text><rect x="360" y="40" width="30" height="25" fill="#95a5a6" rx="3"/><text x="375" y="56" class="element">9</text><text x="400" y="48" class="desc">已排序</text><text x="400" y="62" class="desc">未排序</text></g><g id="quick-sort" transform="translate(50, 300)"><text x="0" y="15" class="subtitle">快速排序</text><text x="0" y="30" class="desc">基准分区，左小右大</text><rect x="0" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="15" y="56" class="element">3</text><rect x="35" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="50" y="56" class="element">7</text><rect x="70" y="40" width="30" height="25" fill="#f39c12" rx="3"/><text x="85" y="56" class="element">5</text><rect x="105" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="120" y="56" class="element">1</text><rect x="140" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="155" y="56" class="element">9</text><path d="M180 52h30" class="arrow"/><rect x="220" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="235" y="56" class="element">3</text><rect x="255" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="270" y="56" class="element">1</text><rect x="290" y="40" width="30" height="25" fill="#e74c3c" rx="3"/><text x="305" y="56" class="element">5</text><rect x="325" y="40" width="30" height="25" fill="#9b59b6" rx="3"/><text x="340" y="56" class="element">7</text><rect x="360" y="40" width="30" height="25" fill="#9b59b6" rx="3"/><text x="375" y="56" class="element">9</text><text x="220" y="82" class="desc">&lt; 基准</text><text x="290" y="82" class="desc">基准</text><text x="335" y="82" class="desc">&gt; 基准</text></g><g id="merge-sort" transform="translate(50, 400)"><text x="0" y="15" class="subtitle">归并排序</text><text x="0" y="30" class="desc">合并相邻有序子数组</text><rect x="0" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="15" y="56" class="element">1</text><rect x="35" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="50" y="56" class="element">5</text><rect x="80" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="95" y="56" class="element">2</text><rect x="115" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="130" y="56" class="element">8</text><rect x="150" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="165" y="56" class="element">9</text><path d="M190 52h30" class="arrow"/><rect x="230" y="40" width="30" height="25" fill="#e67e22" rx="3"/><text x="245" y="56" class="element">1</text><rect x="265" y="40" width="30" height="25" fill="#e67e22" rx="3"/><text x="280" y="56" class="element">2</text><rect x="300" y="40" width="30" height="25" fill="#e67e22" rx="3"/><text x="315" y="56" class="element">5</text><rect x="335" y="40" width="30" height="25" fill="#e67e22" rx="3"/><text x="350" y="56" class="element">8</text><rect x="370" y="40" width="30" height="25" fill="#e67e22" rx="3"/><text x="385" y="56" class="element">9</text><text x="10" y="82" class="desc">子数组1</text><text x="95" y="82" class="desc">子数组2</text><text x="300" y="82" class="desc">合并有序</text></g><g id="heap-sort" transform="translate(50, 500)"><text x="0" y="15" class="subtitle">堆排序</text><text x="0" y="30" class="desc">堆顶元素移到末尾</text><rect x="0" y="40" width="30" height="25" fill="#e74c3c" rx="3"/><text x="15" y="56" class="element">9</text><rect x="35" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="50" y="56" class="element">5</text><rect x="70" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="85" y="56" class="element">8</text><rect x="105" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="120" y="56" class="element">2</text><rect x="140" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="155" y="56" class="element">1</text><path d="M180 52h30" class="arrow"/><rect x="220" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="235" y="56" class="element">8</text><rect x="255" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="270" y="56" class="element">5</text><rect x="290" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="305" y="56" class="element">1</text><rect x="325" y="40" width="30" height="25" fill="#3498db" rx="3"/><text x="340" y="56" class="element">2</text><rect x="360" y="40" width="30" height="25" fill="#27ae60" rx="3"/><text x="375" y="56" class="element">9</text><text x="5" y="82" class="desc">堆顶(最大)</text><text x="365" y="82" class="desc">已排序</text></g><g id="radix-sort" transform="translate(50, 600)"><text x="0" y="15" class="subtitle">基数排序</text><text x="0" y="30" class="desc">按数位稳定排序</text><rect x="0" y="40" width="35" height="25" fill="#3498db" rx="3"/><text x="17" y="56" class="element">123</text><rect x="40" y="40" width="35" height="25" fill="#3498db" rx="3"/><text x="57" y="56" class="element">456</text><rect x="80" y="40" width="35" height="25" fill="#3498db" rx="3"/><text x="97" y="56" class="element">321</text><rect x="120" y="40" width="35" height="25" fill="#3498db" rx="3"/><text x="137" y="56" class="element">654</text><path d="M165 52h25" class="arrow"/><text x="165" y="35" class="desc">按个位</text><rect x="200" y="40" width="35" height="25" fill="#e67e22" rx="3"/><text x="217" y="56" class="element">321</text><rect x="240" y="40" width="35" height="25" fill="#e67e22" rx="3"/><text x="257" y="56" class="element">123</text><rect x="280" y="40" width="35" height="25" fill="#e67e22" rx="3"/><text x="297" y="56" class="element">654</text><rect x="320" y="40" width="35" height="25" fill="#e67e22" rx="3"/><text x="337" y="56" class="element">456</text><text x="220" y="82" class="desc">按个位数字排序</text></g><g id="legend" transform="translate(520, 100)"><text x="0" y="15" class="subtitle">图例说明</text><rect x="0" y="30" width="20" height="15" fill="#3498db" rx="2"/><text x="25" y="42" class="desc">未排序元素</text><rect x="0" y="55" width="20" height="15" fill="#27ae60" rx="2"/><text x="25" y="67" class="desc">已排序/就位元素</text><rect x="0" y="80" width="20" height="15" fill="#e74c3c" rx="2"/><text x="25" y="92" class="desc">关键元素(基准/堆顶)</text><rect x="0" y="105" width="20" height="15" fill="#f39c12" rx="2"/><text x="25" y="117" class="desc">当前处理元素</text><rect x="0" y="130" width="20" height="15" fill="#9b59b6" rx="2"/><text x="25" y="142" class="desc">大于基准的元素</text><rect x="0" y="155" width="20" height="15" fill="#e67e22" rx="2"/><text x="25" y="167" class="desc">合并/处理后的元素</text></g><g id="summary" transform="translate(520, 300)"><text x="0" y="15" class="subtitle">一趟操作核心特征</text><text x="0" y="40" class="desc">• 冒泡：最值逐渐"浮"到边界</text><text x="0" y="60" class="desc">• 选择：直接定位最值到指定位置</text><text x="0" y="80" class="desc">• 插入：维护前缀有序性</text><text x="0" y="100" class="desc">• 快排：基准分区，确定相对位置</text><text x="0" y="120" class="desc">• 归并：小有序段合并成大有序段</text><text x="0" y="140" class="desc">• 堆排：利用堆性质找极值</text><text x="0" y="160" class="desc">• 基数：按数位逐步细化排序</text></g></svg>