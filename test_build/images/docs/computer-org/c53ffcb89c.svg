<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="40" text-anchor="middle" class="title" fill="#1e293b" font-size="28" font-weight="bold">香农定理</text><rect x="50" y="70" width="700" height="80" rx="8" fill="#3b82f6" opacity=".1" stroke="#3b82f6" stroke-width="2"/><text x="400" y="100" text-anchor="middle" fill="#1e40af" font-size="24" font-weight="bold">C = B × log₂(1 + S/N)</text><text x="400" y="130" text-anchor="middle" fill="#64748b" font-size="16">信道容量 = 带宽 × log₂(1 + 信噪比)</text><g transform="translate(60, 180)"><text x="0" y="0" fill="#1e293b" font-size="18" font-weight="bold">参数说明：</text><circle cx="20" cy="35" r="8" fill="#ef4444"/><text x="40" y="40" fill="#1e293b" font-size="16" font-weight="bold">C - 信道容量 (bps)</text><text x="40" y="58" fill="#64748b" font-size="14">理论最大传输速率</text><circle cx="20" cy="85" r="8" fill="#10b981"/><text x="40" y="90" fill="#1e293b" font-size="16" font-weight="bold">B - 带宽 (Hz)</text><text x="40" y="108" fill="#64748b" font-size="14">可用频率范围</text><circle cx="20" cy="135" r="8" fill="#f59e0b"/><text x="40" y="140" fill="#1e293b" font-size="16" font-weight="bold">S/N - 信噪比</text><text x="40" y="158" fill="#64748b" font-size="14">信号功率 / 噪声功率</text></g><g transform="translate(400, 200)"><rect x="0" y="0" width="80" height="60" rx="8" fill="#3b82f6" opacity=".8"/><text x="40" y="25" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">发送端</text><text x="40" y="40" text-anchor="middle" fill="#fff" font-size="12">信号 S</text><rect x="120" y="10" width="140" height="40" rx="20" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/><text x="190" y="25" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">有噪信道</text><text x="190" y="38" text-anchor="middle" fill="#64748b" font-size="11">带宽: B</text><path d="M130 55q10-10 20 0t20 0 20 0 20 0 20 0 20 0" stroke="#ef4444" stroke-width="2" fill="none"/><text x="190" y="75" text-anchor="middle" fill="#ef4444" font-size="11">噪声 N</text><rect x="300" y="0" width="80" height="60" rx="8" fill="#10b981" opacity=".8"/><text x="340" y="25" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">接收端</text><text x="340" y="40" text-anchor="middle" fill="#fff" font-size="12">S + N</text><path d="M85 30h30" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/><path d="M265 30h30" stroke="#64748b" stroke-width="3" marker-end="url(#arrowhead)"/></g><g transform="translate(60, 370)"><text x="0" y="0" fill="#1e293b" font-size="18" font-weight="bold">核心思想：</text><rect x="0" y="15" width="680" height="80" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2"/><text x="20" y="40" fill="#0c4a6e" font-size="16">当传输速率 ≤ 信道容量 C 时，通过适当的编码技术</text><text x="20" y="65" fill="#0c4a6e" font-size="16">可以实现几乎无差错的数据传输，即使存在噪声干扰！</text></g><g transform="translate(60, 500)"><text x="0" y="0" fill="#1e293b" font-size="18" font-weight="bold">影响因素：</text><g transform="translate(0, 30)"><text x="0" y="0" fill="#10b981" font-size="14" font-weight="bold">带宽 B ↗</text><path d="M70-5h40" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead-green)"/><text x="120" y="0" fill="#10b981" font-size="14" font-weight="bold">信道容量 C ↗</text></g><g transform="translate(0, 60)"><text x="0" y="0" fill="#f59e0b" font-size="14" font-weight="bold">信噪比 S/N ↗</text><path d="M1e2-5h40" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrowhead-yellow)"/><text x="150" y="0" fill="#f59e0b" font-size="14" font-weight="bold">信道容量 C ↗</text></g><g transform="translate(350, 30)"><rect x="0" y="-10" width="320" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/><text x="10" y="10" fill="#92400e" font-size="14" font-weight="bold">实际应用：WiFi、4G/5G、光纤通信等</text><text x="10" y="28" fill="#92400e" font-size="12">都基于此定理优化传输性能</text></g></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker><marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/></marker><marker id="arrowhead-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/></marker></defs></svg>