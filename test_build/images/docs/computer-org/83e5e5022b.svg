<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><linearGradient id="senderGrad" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#e3f2fd;stop-opacity:1"/><stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1"/></linearGradient><linearGradient id="receiverGrad" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#f3e5f5;stop-opacity:1"/><stop offset="100%" style="stop-color:#e1bee7;stop-opacity:1"/></linearGradient><linearGradient id="networkGrad" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#e8f5e8;stop-opacity:1"/><stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/></linearGradient><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity=".3"/></filter></defs><rect width="800" height="500" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">TCP 三种窗口</text><rect x="50" y="80" width="280" height="320" rx="10" fill="url(#senderGrad)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/><text x="190" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2">发送方</text><rect x="70" y="125" width="240" height="70" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/><text x="190" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff9800">拥塞窗口 (cwnd)</text><text x="75" y="165" font-family="Arial, sans-serif" font-size="11" fill="#666">• 避免网络拥塞</text><text x="75" y="180" font-family="Arial, sans-serif" font-size="11" fill="#666">• 根据ACK/丢包动态调整</text><rect x="70" y="210" width="240" height="70" rx="5" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/><text x="190" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4caf50">发送窗口 (swnd)</text><text x="75" y="250" font-family="Arial, sans-serif" font-size="11" fill="#666">swnd = min(cwnd, rwnd)</text><text x="75" y="265" font-family="Arial, sans-serif" font-size="11" fill="#666">• 实际可发送数据量</text><path d="M190 195v15" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="350" y="200" width="100" height="80" rx="10" fill="url(#networkGrad)" stroke="#4caf50" stroke-width="2"/><text x="400" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">网络传输</text><text x="400" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">数据包</text><text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">ACK回复</text><rect x="470" y="80" width="280" height="320" rx="10" fill="url(#receiverGrad)" stroke="#7b1fa2" stroke-width="2" filter="url(#shadow)"/><text x="610" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7b1fa2">接收方</text><rect x="490" y="125" width="240" height="85" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/><text x="610" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e91e63">接收窗口 (rwnd)</text><text x="495" y="165" font-family="Arial, sans-serif" font-size="11" fill="#666">• 流量控制</text><text x="495" y="180" font-family="Arial, sans-serif" font-size="11" fill="#666">• 基于缓冲区余量</text><text x="495" y="195" font-family="Arial, sans-serif" font-size="11" fill="#666">• 应用层消费速率</text><rect x="490" y="230" width="240" height="60" rx="5" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1"/><text x="610" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#757575">接收缓冲区</text><rect x="500" y="260" width="60" height="20" fill="#4caf50"/><rect x="560" y="260" width="60" height="20" fill="#4caf50"/><rect x="620" y="260" width="60" height="20" fill="#e0e0e0"/><rect x="680" y="260" width="40" height="20" fill="#e0e0e0"/><text x="610" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">已用 | 可用</text><rect x="490" y="320" width="240" height="50" rx="5" fill="#fff8e1" stroke="#ffc107" stroke-width="1"/><text x="610" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f57c00">应用层处理</text><text x="610" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">消费数据速率影响rwnd</text><path d="M310 240h40" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowhead)"/><text x="330" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4caf50">数据</text><path d="M350 260H310" stroke="#e91e63" stroke-width="2" marker-end="url(#arrowhead)"/><text x="330" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e91e63">ACK+rwnd</text><path d="M450 240h40" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowhead)"/><path d="M610 290v30" stroke="#ffc107" stroke-width="2" marker-end="url(#arrowhead)"/><path d="M610 210v20" stroke="#e91e63" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="250" y="430" width="300" height="40" rx="5" fill="#fff" stroke="#666" stroke-width="1"/><text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">核心关系</text><text x="400" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">swnd = min(cwnd, rwnd)</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="currentColor"/></marker></defs></svg>