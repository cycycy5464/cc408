<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="grad1" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#4A90E2;stop-opacity:1"/><stop offset="100%" style="stop-color:#357ABD;stop-opacity:1"/></linearGradient><linearGradient id="grad2" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#E85D75;stop-opacity:1"/><stop offset="100%" style="stop-color:#D4456E;stop-opacity:1"/></linearGradient><filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity=".3"/></filter></defs><text x="400" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#2C3E50">指令长度设计的两大挑战及解决方案</text><line x1="400" y1="50" x2="400" y2="580" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="5,5"/><g id="fixed-length"><rect x="30" y="70" width="340" height="50" rx="8" fill="url(#grad1)" filter="url(#shadow)"/><text x="200" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">问题 1：地址字段数量不统一</text><text x="200" y="112" font-size="12" text-anchor="middle" fill="#fff">定长指令 · 不同指令需要的地址字段数不同</text><text x="50" y="155" font-size="14" font-weight="bold" fill="#2C3E50">三地址指令</text><g transform="translate(50, 165)"><rect x="0" y="0" width="60" height="35" fill="#3498DB" stroke="#2980B9" stroke-width="2"/><text x="30" y="22" font-size="11" text-anchor="middle" fill="#fff">操作码</text><rect x="60" y="0" width="60" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="90" y="22" font-size="11" text-anchor="middle" fill="#fff">地址1</text><rect x="120" y="0" width="60" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="150" y="22" font-size="11" text-anchor="middle" fill="#fff">地址2</text><rect x="180" y="0" width="60" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="210" y="22" font-size="11" text-anchor="middle" fill="#fff">地址3</text></g><text x="310" y="187" font-size="11" fill="#7F8C8D">← 刚好填满</text><text x="50" y="230" font-size="14" font-weight="bold" fill="#2C3E50">二地址指令</text><g transform="translate(50, 240)"><rect x="0" y="0" width="60" height="35" fill="#3498DB" stroke="#2980B9" stroke-width="2"/><text x="30" y="22" font-size="11" text-anchor="middle" fill="#fff">操作码</text><rect x="60" y="0" width="60" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="90" y="22" font-size="11" text-anchor="middle" fill="#fff">地址1</text><rect x="120" y="0" width="60" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="150" y="22" font-size="11" text-anchor="middle" fill="#fff">地址2</text><rect x="180" y="0" width="60" height="35" fill="#95A5A6" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="3,3"/><text x="210" y="22" font-size="10" text-anchor="middle" fill="#555">无效字段</text></g><text x="310" y="262" font-size="11" fill="#E67E22">← 需要填充!</text><rect x="30" y="300" width="340" height="40" rx="6" fill="#27AE60" opacity=".9"/><text x="200" y="325" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">✓ 解决方案：无效字段填充</text><g transform="translate(40, 355)"><circle cx="5" cy="0" r="3" fill="#27AE60"/><text x="15" y="4" font-size="12" fill="#34495E">指令长度保持一致(如32位)</text><circle cx="5" cy="25" r="3" fill="#27AE60"/><text x="15" y="29" font-size="12" fill="#34495E">地址字段不足时用填充值占位</text><circle cx="5" cy="50" r="3" fill="#27AE60"/><text x="15" y="54" font-size="12" fill="#34495E">填充值不影响执行,仅用于对齐</text><circle cx="5" cy="75" r="3" fill="#27AE60"/><text x="15" y="79" font-size="12" fill="#34495E">简化硬件解码逻辑</text></g><rect x="40" y="450" width="320" height="110" rx="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1.5"/><text x="200" y="472" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">💡 定长指令的优势</text><text x="55" y="495" font-size="11" fill="#555">• 解码简单：固定位置提取字段</text><text x="55" y="515" font-size="11" fill="#555">• 流水线高效：指令长度可预测</text><text x="55" y="535" font-size="11" fill="#555">• 取指快速：按固定步长即可</text></g><g id="variable-length"><rect x="430" y="70" width="340" height="50" rx="8" fill="url(#grad2)" filter="url(#shadow)"/><text x="600" y="95" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">问题 2：如何识别指令边界</text><text x="600" y="112" font-size="12" text-anchor="middle" fill="#fff">变长指令 · 不同指令长度不同</text><text x="450" y="155" font-size="14" font-weight="bold" fill="#2C3E50">指令流示例</text><g transform="translate(450, 165)"><rect x="0" y="0" width="30" height="35" fill="#9B59B6" stroke="#8E44AD" stroke-width="2"/><text x="15" y="22" font-size="10" text-anchor="middle" fill="#fff">前缀</text><rect x="30" y="0" width="80" height="35" fill="#3498DB" stroke="#2980B9" stroke-width="2"/><text x="70" y="22" font-size="11" text-anchor="middle" fill="#fff">8位指令</text></g><text x="565" y="187" font-size="10" fill="#7F8C8D">16位</text><g transform="translate(450, 215)"><rect x="0" y="0" width="30" height="35" fill="#9B59B6" stroke="#8E44AD" stroke-width="2"/><text x="15" y="22" font-size="10" text-anchor="middle" fill="#fff">前缀</text><rect x="30" y="0" width="150" height="35" fill="#E67E22" stroke="#D35400" stroke-width="2"/><text x="105" y="22" font-size="11" text-anchor="middle" fill="#fff">16位指令</text></g><text x="635" y="237" font-size="10" fill="#7F8C8D">24位</text><g transform="translate(450, 265)"><rect x="0" y="0" width="30" height="35" fill="#9B59B6" stroke="#8E44AD" stroke-width="2"/><text x="15" y="22" font-size="10" text-anchor="middle" fill="#fff">前缀</text><rect x="30" y="0" width="250" height="35" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/><text x="155" y="22" font-size="11" text-anchor="middle" fill="#fff">32位指令</text></g><text x="735" y="287" font-size="10" fill="#7F8C8D">40位</text><rect x="430" y="320" width="340" height="40" rx="6" fill="#8E44AD" opacity=".9"/><text x="600" y="345" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">✓ 解决方案：指令前缀标识</text><g transform="translate(440, 375)"><circle cx="5" cy="0" r="3" fill="#8E44AD"/><text x="15" y="4" font-size="12" fill="#34495E">在指令开头设置前缀字段</text><circle cx="5" cy="25" r="3" fill="#8E44AD"/><text x="15" y="29" font-size="12" fill="#34495E">前缀标识该指令的长度/类型</text><circle cx="5" cy="50" r="3" fill="#8E44AD"/><text x="15" y="54" font-size="12" fill="#34495E">CPU先读前缀,再提取完整指令</text><circle cx="5" cy="75" r="3" fill="#8E44AD"/><text x="15" y="79" font-size="12" fill="#34495E">增加解码复杂度,换取编码灵活性</text></g><rect x="440" y="470" width="320" height="90" rx="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1.5"/><text x="600" y="492" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">💡 变长指令的优势</text><text x="455" y="515" font-size="11" fill="#555">• 编码紧凑：指令密度更高</text><text x="455" y="535" font-size="11" fill="#555">• 功能丰富：可支持复杂操作</text></g><rect x="50" y="575" width="700" height="2" fill="#3498DB" opacity=".3"/></svg>