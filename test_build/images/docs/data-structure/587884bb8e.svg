<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600"><rect width="900" height="600" fill="none"/><text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">CSMA/CD 载波监听多路访问/碰撞检测</text><rect x="100" y="220" width="700" height="40" fill="#3498db" stroke="#2980b9" stroke-width="3" rx="20"/><text x="450" y="205" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#000">共享通信介质</text><g id="deviceA"><rect x="50" y="140" width="80" height="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/><text x="90" y="160" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 A</text><text x="90" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">正在发送</text><path d="M130 170l50 30" stroke="#e74c3c" stroke-width="4" marker-end="url(#arrowhead-red)"/><text x="140" y="165" font-family="Arial" font-size="9" fill="#e74c3c">发送数据</text><path d="M90 2e2q0 10 10 20" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-red)"/><text x="45" y="215" font-family="Arial" font-size="9" fill="#e74c3c">持续监听</text></g><g id="deviceB"><rect x="770" y="140" width="80" height="60" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="5"/><text x="810" y="160" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 B</text><text x="810" y="175" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">正在发送</text><path d="M770 170l-50 30" stroke="#f39c12" stroke-width="4" marker-end="url(#arrowhead-orange)"/><text x="725" y="165" font-family="Arial" font-size="9" fill="#f39c12">发送数据</text><path d="M810 2e2q0 10-10 20" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead-orange)"/><text x="820" y="215" font-family="Arial" font-size="9" fill="#f39c12">持续监听</text></g><g id="collision"><ellipse cx="450" cy="240" rx="80" ry="25" fill="#ff6b6b" stroke="#e55555" stroke-width="3" opacity=".8"/><text x="520" y="236" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">碰撞!</text><text x="380" y="235" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">数据损坏</text><g opacity=".7"><path d="M450 240l10-15 5 10 10-5-5 12 10 6-12 2 7 10-10-5-5 10-10-7-10 7-5-10-10 5 7-10-12-2 10-6-5-12 10 5 5-10z" fill="#ff4757" stroke="#ff3838" stroke-width="1"/></g></g><g id="timeline"><line x1="100" y1="320" x2="800" y2="320" stroke="#7f8c8d" stroke-width="2"/><text x="450" y="310" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">时间线</text><g id="timepoints"><line x1="200" y1="315" x2="200" y2="325" stroke="#34495e" stroke-width="2"/><text x="200" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#34495e">t1: 开始发送</text><line x1="450" y1="315" x2="450" y2="325" stroke="#e74c3c" stroke-width="3"/><text x="450" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">t2: 碰撞发生</text><line x1="500" y1="315" x2="500" y2="325" stroke="#f39c12" stroke-width="2"/><text x="500" y="360" text-anchor="middle" font-family="Arial" font-size="11" fill="#f39c12">t3: 检测到碰撞</text><line x1="550" y1="315" x2="550" y2="325" stroke="#27ae60" stroke-width="2"/><text x="550" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">t4: 停止发送</text></g></g><g id="comparison"><rect x="50" y="380" width="380" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="5"/><text x="240" y="405" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">CSMA (原始版本)</text><text x="60" y="425" font-family="Arial" font-size="12" fill="#2c3e50">✓ 发送前载波监听</text><text x="60" y="440" font-family="Arial" font-size="12" fill="#2c3e50">✗ 发送时不监听</text><text x="60" y="455" font-family="Arial" font-size="12" fill="#2c3e50">✗ 碰撞后才知道失败</text><text x="60" y="470" font-family="Arial" font-size="12" fill="#e74c3c">→ 浪费带宽和时间</text><text x="60" y="485" font-family="Arial" font-size="12" fill="#e74c3c">→ 效率较低</text><rect x="470" y="380" width="380" height="120" fill="#d5f4e6" stroke="#27ae60" stroke-width="2" rx="5"/><text x="660" y="405" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">CSMA/CD (改进版本)</text><text x="480" y="425" font-family="Arial" font-size="12" fill="#2c3e50">✓ 发送前载波监听</text><text x="480" y="440" font-family="Arial" font-size="12" fill="#27ae60">✓ 发送时持续监听</text><text x="480" y="455" font-family="Arial" font-size="12" fill="#27ae60">✓ 实时检测碰撞</text><text x="480" y="470" font-family="Arial" font-size="12" fill="#27ae60">→ 立即停止发送</text><text x="480" y="485" font-family="Arial" font-size="12" fill="#27ae60">→ 提高网络效率</text></g><g id="cdProcess"><text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#34495e">碰撞检测(CD)工作流程</text><g id="steps"><circle cx="150" cy="100" r="20" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="150" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">1</text><text x="150" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">载波监听</text><path d="M170 1e2h40" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="230" cy="100" r="20" fill="#27ae60" stroke="#229954" stroke-width="2"/><text x="230" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">2</text><text x="230" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">开始发送</text><path d="M250 1e2h40" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="310" cy="100" r="20" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="310" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">3</text><text x="310" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">持续监听</text><path d="M330 1e2h40" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="390" cy="100" r="20" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="390" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">4</text><text x="390" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">检测碰撞</text><path d="M410 1e2h40" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><circle cx="470" cy="100" r="20" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/><text x="470" y="105" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">5</text><text x="470" y="135" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">立即停止</text></g></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/></marker><marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/></marker></defs><g id="carrier-explanation"><rect x="330" y="520" width="280" height="50" fill="#fff3cd" stroke="#ffeaa7" stroke-width="2" rx="285"/><text x="470" y="540" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">载波监听器件 (Carrier)</text><text x="370" y="555" font-family="Arial" font-size="11" fill="#2c3e50">发送期间持续工作，实时检测信号异常</text></g></svg>