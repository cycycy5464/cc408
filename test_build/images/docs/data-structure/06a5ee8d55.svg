<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#f8f9fa"/><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold">顺序表删除操作 Delete(L, pos, e)</text><text x="50" y="80" font-size="16" font-weight="bold" fill="#34495e">删除前:</text><g transform="translate(50, 100)"><rect x="0" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="60" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="120" y="0" width="60" height="40" fill="#e74c3c" stroke="#2c3e50" stroke-width="3"/><rect x="180" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="240" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="300" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><rect x="360" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">10</text><text x="90" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">20</text><text x="150" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">30</text><text x="210" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">40</text><text x="270" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">50</text><text x="30" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">1</text><text x="90" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">2</text><text x="150" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#e74c3c">3</text><text x="210" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">4</text><text x="270" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">5</text><text x="330" y="60" text-anchor="middle" font-size="12" fill="#bdc3c7">6</text><text x="390" y="60" text-anchor="middle" font-size="12" fill="#bdc3c7">7</text><path d="M150-20V-5" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="150" y="-30" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">pos = 3</text></g><text x="500" y="125" font-size="14" fill="#34495e">length = 5</text><text x="500" y="145" font-size="14" fill="#e74c3c">删除元素: *e = 30</text><text x="50" y="200" font-size="16" font-weight="bold" fill="#34495e">操作步骤:</text><text x="70" y="230" font-size="14" fill="#2c3e50">1. 保存要删除的元素: *e = L->data[pos-1] = L->data[2] = 30</text><text x="70" y="260" font-size="14" fill="#2c3e50">2. 后续元素前移:</text><g transform="translate(50, 280)"><rect x="0" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="60" y="0" width="60" height="40" fill="#3498db" stroke="#2c3e50" stroke-width="2"/><rect x="120" y="0" width="60" height="40" fill="#ecf0f1" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/><rect x="180" y="0" width="60" height="40" fill="#f39c12" stroke="#2c3e50" stroke-width="2"/><rect x="240" y="0" width="60" height="40" fill="#f39c12" stroke="#2c3e50" stroke-width="2"/><rect x="300" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><rect x="360" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">10</text><text x="90" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">20</text><text x="150" y="25" text-anchor="middle" font-size="12" fill="#bdc3c7">被删除</text><text x="210" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">40</text><text x="270" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">50</text><path d="M190 20H140" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead2)"/><path d="M250 20H2e2" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead2)"/><text x="165" y="65" text-anchor="middle" font-size="12" fill="#e74c3c">i=4: data[2]=data[3]</text><text x="225" y="85" text-anchor="middle" font-size="12" fill="#e74c3c">i=5: data[3]=data[4]</text></g><text x="50" y="400" font-size="16" font-weight="bold" fill="#34495e">删除后:</text><g transform="translate(50, 420)"><rect x="0" y="0" width="60" height="40" fill="#27ae60" stroke="#2c3e50" stroke-width="2"/><rect x="60" y="0" width="60" height="40" fill="#27ae60" stroke="#2c3e50" stroke-width="2"/><rect x="120" y="0" width="60" height="40" fill="#27ae60" stroke="#2c3e50" stroke-width="2"/><rect x="180" y="0" width="60" height="40" fill="#27ae60" stroke="#2c3e50" stroke-width="2"/><rect x="240" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><rect x="300" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><rect x="360" y="0" width="60" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">10</text><text x="90" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">20</text><text x="150" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">40</text><text x="210" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">50</text><text x="30" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">1</text><text x="90" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">2</text><text x="150" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">3</text><text x="210" y="60" text-anchor="middle" font-size="12" fill="#7f8c8d">4</text><text x="270" y="60" text-anchor="middle" font-size="12" fill="#bdc3c7">5</text><text x="330" y="60" text-anchor="middle" font-size="12" fill="#bdc3c7">6</text><text x="390" y="60" text-anchor="middle" font-size="12" fill="#bdc3c7">7</text></g><text x="500" y="445" font-size="14" fill="#27ae60" font-weight="bold">length = 4</text><text x="500" y="465" font-size="14" fill="#27ae60">删除成功: return true</text><rect x="50" y="500" width="700" height="80" fill="#2c3e50" rx="5"/><text x="60" y="520" font-size="14" fill="#ecf0f1" font-weight="bold">代码关键点:</text><text x="60" y="540" font-size="12" fill="#ecf0f1">• 位置检查: if (pos &lt; 1 || pos &gt; L-&gt;length) return false;</text><text x="60" y="555" font-size="12" fill="#ecf0f1">• 保存元素: *e = L-&gt;data[pos - 1]; // 数组下标从0开始</text><text x="60" y="570" font-size="12" fill="#ecf0f1">• 前移操作: for (int i = pos; i &lt; L-&gt;length; i++) L-&gt;data[i-1] = L-&gt;data[i];</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs></svg>