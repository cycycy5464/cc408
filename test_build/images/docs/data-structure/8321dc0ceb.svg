<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320"><rect width="600" height="320" fill="none" stroke="#e9ecef" stroke-width="2" rx="8"/><text x="300" y="25" text-anchor="middle" fill="#2c3e50" font-size="18" font-weight="bold">FTP 控制连接 (TCP 端口 21)</text><rect x="50" y="80" width="120" height="80" fill="#3498db" rx="8" stroke="#2980b9" stroke-width="2"/><text x="110" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">FTP 客户端</text><text x="110" y="125" text-anchor="middle" fill="#fff" font-size="12">发送命令</text><text x="110" y="145" text-anchor="middle" fill="#fff" font-size="12">接收响应</text><rect x="430" y="80" width="120" height="80" fill="#27ae60" rx="8" stroke="#229954" stroke-width="2"/><text x="490" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">FTP 服务器</text><text x="490" y="125" text-anchor="middle" fill="#fff" font-size="12">处理命令</text><text x="490" y="145" text-anchor="middle" fill="#fff" font-size="12">返回状态码</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs><line x1="170" y1="110" x2="430" y2="110" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/><line x1="430" y1="130" x2="170" y2="130" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/><rect x="240" y="95" width="120" height="50" fill="#fff" stroke="#e74c3c" stroke-width="2" rx="5"/><text x="300" y="115" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">控制连接</text><text x="300" y="130" text-anchor="middle" fill="#e74c3c" font-size="11">持久连接</text><rect x="30" y="190" width="540" height="110" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="50" y="210" fill="#2c3e50" font-size="13" font-weight="bold">常见 FTP 命令与响应：</text><text x="70" y="230" fill="#3498db" font-size="11" font-weight="bold">命令：</text><text x="120" y="230" fill="#34495e" font-size="11">USER username</text><text x="250" y="230" fill="#34495e" font-size="11">PASS password</text><text x="370" y="230" fill="#34495e" font-size="11">LIST</text><text x="420" y="230" fill="#34495e" font-size="11">CWD /path</text><text x="70" y="250" fill="#27ae60" font-size="11" font-weight="bold">响应：</text><text x="120" y="250" fill="#34495e" font-size="11">220 Ready</text><text x="250" y="250" fill="#34495e" font-size="11">230 Login OK</text><text x="370" y="250" fill="#34495e" font-size="11">150 Opening</text><text x="470" y="250" fill="#34495e" font-size="11">250 OK</text><text x="70" y="275" fill="#e74c3c" font-size="11" font-weight="bold">特点：</text><text x="120" y="275" fill="#34495e" font-size="11">• 始终保持打开状态</text><text x="280" y="275" fill="#34495e" font-size="11">• 传输命令和状态码</text><text x="450" y="275" fill="#34495e" font-size="11">• 使用 TCP 端口 21</text><text x="120" y="290" fill="#34495e" font-size="11">• QUIT 命令关闭连接</text><text x="280" y="290" fill="#34495e" font-size="11">• 控制整个 FTP 会话</text></svg>