<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">抖动 (Thrashing) 现象图解</text><rect x="50" y="80" width="200" height="400" fill="#e8f4fd" stroke="#3498db" stroke-width="2"/><text x="150" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2980b9">物理内存</text><rect x="60" y="100" width="180" height="40" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="150" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">页面 A</text><rect x="60" y="150" width="180" height="40" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="150" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">页面 B</text><rect x="60" y="200" width="180" height="40" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="150" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">页面 C</text><rect x="60" y="250" width="180" height="40" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/><text x="150" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e17055">内存不足!</text><rect x="550" y="80" width="200" height="400" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/><text x="650" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e67e22">磁盘存储</text><rect x="560" y="100" width="180" height="30" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="650" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">页面 D</text><rect x="560" y="140" width="180" height="30" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="650" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">页面 E</text><rect x="560" y="180" width="180" height="30" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="650" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">页面 F</text><rect x="560" y="220" width="180" height="30" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><text x="650" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">页面 G</text><text x="650" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">...</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs><path d="M250 150q150-30 3e2-20" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrowhead)"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/></path><text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">换出到磁盘</text><path d="M550 2e2q-150 30-3e2 20" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowhead2)"><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin=".75s"/></path><text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">从磁盘换入</text><rect x="300" y="320" width="200" height="120" fill="#f8f9fa" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/><text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">工作集过大</text><text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">进程需要的活跃页面</text><text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#34495e">超过了物理内存容量</text><text x="400" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">↓ 导致频繁缺页中断 ↓</text><text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">刚换出的页面立即需要换入</text><rect x="50" y="500" width="200" height="80" fill="#fff2f2" stroke="#e74c3c" stroke-width="2"/><text x="150" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">CPU 使用率</text><rect x="70" y="530" width="160" height="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/><rect x="70" y="530" width="40" height="20" fill="#e74c3c"><animate attributeName="width" values="160;40;160;40" dur="3s" repeatCount="indefinite"/></rect><text x="150" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">大部分时间在等待I/O</text><rect x="550" y="500" width="200" height="80" fill="#fff2f2" stroke="#e74c3c" stroke-width="2"/><text x="650" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c0392b">系统性能</text><text x="650" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">吞吐量 ↓ 响应时间 ↑</text><text x="650" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">系统变得迟钝无响应</text><text x="650" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" font-weight="bold">抖动现象!</text><ellipse cx="400" cy="180" rx="80" ry="40" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,3"><animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/></ellipse><text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="bold">频繁交换区域</text></svg>