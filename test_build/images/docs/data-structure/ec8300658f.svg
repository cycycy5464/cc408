<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="headerGrad" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#4a90e2;stop-opacity:1"/><stop offset="100%" style="stop-color:#357abd;stop-opacity:1"/></linearGradient><linearGradient id="mechGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#ff6b6b;stop-opacity:.2"/><stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:.1"/></linearGradient><linearGradient id="funcGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#4ecdc4;stop-opacity:.2"/><stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:.1"/></linearGradient><linearGradient id="procGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#45b7d1;stop-opacity:.2"/><stop offset="100%" style="stop-color:#45b7d1;stop-opacity:.1"/></linearGradient><linearGradient id="elecGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#f9ca24;stop-opacity:.2"/><stop offset="100%" style="stop-color:#f9ca24;stop-opacity:.1"/></linearGradient></defs><rect width="800" height="600" fill="#f8f9fa"/><rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)"/><text x="400" y="35" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold">物理层接口特性</text><g transform="translate(20, 80)"><rect x="0" y="0" width="360" height="240" fill="url(#mechGrad)" stroke="#ff6b6b" stroke-width="2" rx="8"/><rect x="10" y="10" width="340" height="30" fill="#ff6b6b" rx="4"/><text x="180" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">机械特性</text><rect x="30" y="60" width="50" height="30" fill="#333" rx="3"/><rect x="32" y="62" width="46" height="26" fill="#666" rx="2"/><text x="55" y="105" text-anchor="middle" font-size="10" fill="#666">RJ45</text><rect x="110" y="60" width="40" height="20" fill="#333" rx="10"/><rect x="112" y="62" width="36" height="16" fill="#666" rx="8"/><text x="130" y="95" text-anchor="middle" font-size="10" fill="#666">USB</text><g transform="translate(200, 60)"><circle cx="0" cy="15" r="12" fill="#8b4513" stroke="#654321" stroke-width="2"/><circle cx="0" cy="15" r="6" fill="#fd4"/><text x="0" y="40" text-anchor="middle" font-size="10" fill="#666">光纤</text></g><text x="20" y="150" font-size="14" fill="#333">• 接口形状和规范</text><text x="20" y="170" font-size="14" fill="#333">• 引脚数量和排列</text><text x="20" y="190" font-size="14" fill="#333">• 电缆类型选择</text><text x="20" y="210" font-size="14" fill="#666">外部物理形态定义</text></g><g transform="translate(420, 80)"><rect x="0" y="0" width="360" height="240" fill="url(#funcGrad)" stroke="#4ecdc4" stroke-width="2" rx="8"/><rect x="10" y="10" width="340" height="30" fill="#4ecdc4" rx="4"/><text x="180" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">功能特性</text><g transform="translate(50, 60)"><rect x="0" y="0" width="120" height="60" fill="#333" stroke="#666" stroke-width="1" rx="4"/><circle cx="15" cy="15" r="5" fill="#f44"/><text x="25" y="20" font-size="10" fill="#fff">Tx</text><circle cx="15" cy="30" r="5" fill="#4f4"/><text x="25" y="35" font-size="10" fill="#fff">Rx</text><circle cx="15" cy="45" r="5" fill="#44f"/><text x="25" y="50" font-size="10" fill="#fff">GND</text><circle cx="105" cy="15" r="5" fill="#ff4"/><text x="75" y="20" font-size="10" fill="#fff">RTS</text><circle cx="105" cy="30" r="5" fill="#f4f"/><text x="75" y="35" font-size="10" fill="#fff">CTS</text><circle cx="105" cy="45" r="5" fill="#4ff"/><text x="75" y="50" font-size="10" fill="#fff">VCC</text></g><g transform="translate(200, 70)"><path d="M0 10H70" stroke="#f44" stroke-width="3" marker-end="url(#arrowhead)"/><text x="75" y="15" font-size="12" fill="#f44">发送</text><path d="M70 30H0" stroke="#4f4" stroke-width="3" marker-end="url(#arrowhead2)"/><text x="75" y="35" font-size="12" fill="#4f4">接收</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f44"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4f4"/></marker></defs><text x="20" y="150" font-size="14" fill="#333">• 数据发送引脚 (Tx)</text><text x="20" y="170" font-size="14" fill="#333">• 数据接收引脚 (Rx)</text><text x="20" y="190" font-size="14" fill="#333">• 控制信号引脚</text><text x="20" y="210" font-size="14" fill="#666">各引脚功能定义</text></g><g transform="translate(20, 340)"><rect x="0" y="0" width="360" height="240" fill="url(#procGrad)" stroke="#45b7d1" stroke-width="2" rx="8"/><rect x="10" y="10" width="340" height="30" fill="#45b7d1" rx="4"/><text x="180" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">过程特性</text><g transform="translate(30, 45)"><line x1="0" y1="75" x2="300" y2="75" stroke="#333" stroke-width="1"/><text x="150" y="90" text-anchor="middle" font-size="10" fill="#666">时间</text><rect x="20" y="35" width="15" height="25" fill="#45b7d1" opacity=".7"/><text x="27" y="30" text-anchor="middle" font-size="10" fill="#666">START</text><rect x="60" y="45" width="10" height="15" fill="#4ecdc4"/><rect x="80" y="35" width="10" height="25" fill="#4ecdc4"/><rect x="100" y="45" width="10" height="15" fill="#4ecdc4"/><rect x="120" y="35" width="10" height="25" fill="#4ecdc4"/><text x="90" y="30" text-anchor="middle" font-size="10" fill="#666">数据位</text><rect x="160" y="35" width="15" height="25" fill="#ff6b6b" opacity=".7"/><text x="167" y="30" text-anchor="middle" font-size="10" fill="#666">STOP</text><g transform="translate(200, 30)"><path d="M0 0V10H10V20H20V30H30V40" stroke="#f9ca24" stroke-width="2" fill="none"/><text x="15" y="-5" text-anchor="middle" font-size="10" fill="#666">时钟同步</text></g></g><text x="20" y="150" font-size="14" fill="#333">• 传输起始与终止</text><text x="20" y="170" font-size="14" fill="#333">• 信号同步机制</text><text x="20" y="190" font-size="14" fill="#333">• 比特间隔定义</text><text x="20" y="210" font-size="14" fill="#666">数据传输过程控制</text></g><g transform="translate(420, 340)"><rect x="0" y="0" width="360" height="240" fill="url(#elecGrad)" stroke="#f9ca24" stroke-width="2" rx="8"/><rect x="10" y="10" width="340" height="30" fill="#f9ca24" rx="4"/><text x="180" y="30" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">电气特性</text><g transform="translate(50, 50)"><line x1="0" y1="50" x2="200" y2="50" stroke="#666" stroke-width="1"/><line x1="20" y1="0" x2="20" y2="80" stroke="#666" stroke-width="1"/><line x1="20" y1="20" x2="60" y2="20" stroke="#f9ca24" stroke-width="3"/><line x1="60" y1="20" x2="60" y2="50" stroke="#f9ca24" stroke-width="3"/><text x="40" y="15" text-anchor="middle" font-size="10" fill="#666">+5V</text><line x1="60" y1="50" x2="100" y2="50" stroke="#f9ca24" stroke-width="3"/><line x1="100" y1="50" x2="100" y2="20" stroke="#f9ca24" stroke-width="3"/><text x="80" y="65" text-anchor="middle" font-size="10" fill="#666">0V</text><line x1="100" y1="20" x2="140" y2="20" stroke="#f9ca24" stroke-width="3"/><line x1="140" y1="20" x2="140" y2="50" stroke="#f9ca24" stroke-width="3"/><line x1="140" y1="50" x2="180" y2="50" stroke="#f9ca24" stroke-width="3"/><text x="100" y="95" text-anchor="middle" font-size="10" fill="#666">电压波形</text></g><g transform="translate(280, 60)"><rect x="0" y="0" width="50" height="30" fill="none" stroke="#666" stroke-width="1" rx="4"/><text x="25" y="20" text-anchor="middle" font-size="12" fill="#333">100M</text><text x="25" y="45" text-anchor="middle" font-size="10" fill="#666">bps</text></g><text x="20" y="150" font-size="14" fill="#333">• 电压幅值范围</text><text x="20" y="170" font-size="14" fill="#333">• 电流大小限制</text><text x="20" y="190" font-size="14" fill="#333">• 传输速率和距离</text><text x="20" y="210" font-size="14" fill="#666">信号电气属性规范</text></g></svg>