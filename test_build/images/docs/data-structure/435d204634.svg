<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="mainMemGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#e3f2fd;stop-opacity:1"/><stop offset="100%" style="stop-color:#90caf9;stop-opacity:1"/></linearGradient><linearGradient id="cacheGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#fff3e0;stop-opacity:1"/><stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1"/></linearGradient><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity=".3"/></filter><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#333"/></marker></defs><text x="600" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#1a237e">Cache 映射方式：主存块 → Cache 块的对应规则</text><g id="mainMemory"><rect x="50" y="80" width="200" height="600" rx="8" fill="url(#mainMemGrad)" stroke="#1976d2" stroke-width="2" filter="url(#shadow)"/><text x="150" y="110" font-size="18" font-weight="bold" text-anchor="middle" fill="#0d47a1">主存储器</text><text x="150" y="135" font-size="13" text-anchor="middle" fill="#555">(容量大，速度慢)</text><g id="memBlocks"><rect x="70" y="160" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="182" font-size="14" text-anchor="middle" fill="#0d47a1">块 0</text><rect x="70" y="200" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="222" font-size="14" text-anchor="middle" fill="#0d47a1">块 1</text><rect x="70" y="240" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="262" font-size="14" text-anchor="middle" fill="#0d47a1">块 2</text><rect x="70" y="280" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="302" font-size="14" text-anchor="middle" fill="#0d47a1">块 3</text><text x="150" y="340" font-size="20" text-anchor="middle" fill="#666">⋮</text><rect x="70" y="360" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="382" font-size="14" text-anchor="middle" fill="#0d47a1">块 N-2</text><rect x="70" y="400" width="160" height="35" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/><text x="150" y="422" font-size="14" text-anchor="middle" fill="#0d47a1">块 N-1</text></g></g><g id="cache"><rect x="950" y="80" width="200" height="600" rx="8" fill="url(#cacheGrad)" stroke="#f57c00" stroke-width="2" filter="url(#shadow)"/><text x="1050" y="110" font-size="18" font-weight="bold" text-anchor="middle" fill="#e65100">Cache</text><text x="1050" y="135" font-size="13" text-anchor="middle" fill="#555">(容量小，速度快)</text><g id="cacheBlocks"><rect x="970" y="160" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="182" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 0</text><rect x="970" y="200" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="222" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 1</text><rect x="970" y="240" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="262" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 2</text><rect x="970" y="280" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="302" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 3</text><text x="1050" y="340" font-size="20" text-anchor="middle" fill="#666">⋮</text><rect x="970" y="360" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="382" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 M-2</text><rect x="970" y="400" width="160" height="35" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/><text x="1050" y="422" font-size="14" text-anchor="middle" fill="#e65100">Cache 块 M-1</text></g></g><g id="mappingExplanation"><rect x="300" y="120" width="600" height="540" rx="10" fill="#f5f5f5" stroke="#666" stroke-width="2" stroke-dasharray="5,5" opacity=".9"/><text x="600" y="160" font-size="20" font-weight="bold" text-anchor="middle" fill="#d32f2f">核心问题：主存块该放到 Cache 的哪里？</text><g id="threeElements"><rect x="330" y="200" width="540" height="100" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/><text x="600" y="225" font-size="16" font-weight="bold" text-anchor="middle" fill="#2e7d32">1. 可放置性 (Placement)</text><text x="600" y="250" font-size="14" text-anchor="middle" fill="#333">主存块 X 允许放入 Cache 的哪些位置？</text><text x="600" y="275" font-size="13" text-anchor="middle" fill="#555">固定一个？多个？任意位置？</text><rect x="330" y="320" width="540" height="100" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/><text x="600" y="345" font-size="16" font-weight="bold" text-anchor="middle" fill="#e65100">2. 灵活性 vs 唯一性</text><text x="600" y="370" font-size="14" text-anchor="middle" fill="#333">放置越自由 → 命中率越高，硬件越复杂</text><text x="600" y="395" font-size="13" text-anchor="middle" fill="#555">放置越受限 → 硬件越简单，冲突失效越多</text><rect x="330" y="440" width="540" height="100" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/><text x="600" y="465" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">3. 硬件代价与性能权衡</text><text x="600" y="490" font-size="14" text-anchor="middle" fill="#333">查找复杂度 ↔ 冲突概率 ↔ 命中率</text><text x="600" y="515" font-size="13" text-anchor="middle" fill="#555">需要在成本、速度、效率之间平衡</text></g><path d="M230 217q170 0 1e2 33" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity=".6"/><path d="M230 297q170 40 1e2 73" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity=".6"/><path d="M230 377q170 80 1e2 113" stroke="#2196f3" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity=".6"/></g><g id="bottomNote"><rect x="300" y="700" width="600" height="60" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/><text x="600" y="725" font-size="15" font-weight="bold" text-anchor="middle" fill="#f57f17">三种经典映射方式</text><text x="600" y="748" font-size="13" text-anchor="middle" fill="#333">直接映射 | 全相联映射 | 组相联映射</text></g><path d="M250 3e2q250 0 7e2.0" stroke="#9e9e9e" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity=".3" stroke-dasharray="10,5"/><text x="600" y="290" font-size="12" text-anchor="middle" fill="#666" opacity=".7">映射规则</text></svg>