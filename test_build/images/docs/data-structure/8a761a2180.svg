<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">宏内核 vs 微内核架构对比</text><g transform="translate(50, 70)"><text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5d6d7e">宏内核 (Monolithic Kernel)</text><rect x="0" y="40" width="300" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/><text x="150" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">用户空间 (User Space)</text><text x="150" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">应用程序</text><line x1="0" y1="100" x2="300" y2="100" stroke="#e67e22" stroke-width="3" stroke-dasharray="5,5"/><text x="150" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">系统调用接口</text><rect x="0" y="130" width="300" height="200" fill="#85929e" stroke="#6c7b7f" stroke-width="2"/><text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">内核空间 (Kernel Space)</text><rect x="10" y="160" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="50" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">进程管理</text><rect x="110" y="160" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="150" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">内存管理</text><rect x="210" y="160" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="250" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">文件系统</text><rect x="10" y="200" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="50" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">设备驱动</text><rect x="110" y="200" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="150" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">网络协议</text><rect x="210" y="200" width="80" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="250" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">IPC</text><rect x="60" y="240" width="180" height="30" fill="#6c7b7f" stroke="#fff" stroke-width="1"/><text x="150" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">其他系统服务</text><rect x="0" y="350" width="300" height="40" fill="#34495e" stroke="#2c3e50" stroke-width="2"/><text x="150" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">硬件层 (Hardware)</text></g><g transform="translate(450, 70)"><text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5dade2">微内核 (Microkernel)</text><rect x="0" y="40" width="300" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/><text x="150" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">用户空间 (User Space)</text><rect x="10" y="65" width="280" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/><text x="150" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">应用程序</text><rect x="10" y="100" width="65" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="42" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">文件系统</text><rect x="85" y="100" width="65" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="117" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">设备驱动</text><rect x="160" y="100" width="65" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="192" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">网络服务</text><rect x="235" y="100" width="55" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="262" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">其他服务</text><path d="M50 135q25 10 50 0" fill="none" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/><path d="M130 135q25 10 50 0" fill="none" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/><text x="150" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f39c12">消息传递</text><line x1="0" y1="160" x2="300" y2="160" stroke="#e67e22" stroke-width="3" stroke-dasharray="5,5"/><text x="150" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e67e22">系统调用接口</text><rect x="0" y="190" width="300" height="80" fill="#85c1e9" stroke="#7fb3d3" stroke-width="2"/><text x="150" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">微内核 (Microkernel)</text><rect x="20" y="220" width="80" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="60" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">进程管理</text><rect x="110" y="220" width="80" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="150" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">内存管理</text><rect x="200" y="220" width="80" height="25" fill="#7fb3d3" stroke="#fff" stroke-width="1"/><text x="240" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">IPC</text><rect x="0" y="290" width="300" height="40" fill="#34495e" stroke="#2c3e50" stroke-width="2"/><text x="150" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">硬件层 (Hardware)</text></g><g transform="translate(50, 420)"><rect x="0" y="0" width="700" height="60" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><rect x="0" y="0" width="100" height="20" fill="#34495e"/><text x="50" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">对比项</text><rect x="100" y="0" width="200" height="20" fill="#85929e"/><text x="200" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">宏内核</text><rect x="300" y="0" width="200" height="20" fill="#85c1e9"/><text x="400" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">微内核</text><rect x="500" y="0" width="200" height="20" fill="#95a5a6"/><text x="600" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">示例系统</text><text x="50" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">性能</text><text x="200" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">高 (直接调用)</text><text x="400" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">中 (消息传递)</text><text x="600" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Linux vs IOS</text><text x="50" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">稳定性</text><text x="200" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">中 (单点故障)</text><text x="400" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">高 (故障隔离)</text><text x="600" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">UNIX vs QNX</text><line x1="100" y1="0" x2="100" y2="60" stroke="#bdc3c7" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="60" stroke="#bdc3c7" stroke-width="1"/><line x1="500" y1="0" x2="500" y2="60" stroke="#bdc3c7" stroke-width="1"/><line x1="0" y1="20" x2="700" y2="20" stroke="#bdc3c7" stroke-width="1"/><line x1="0" y1="40" x2="700" y2="40" stroke="#bdc3c7" stroke-width="1"/></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/></marker></defs></svg>