roke-width="1"/><text x="400" y="205" font-size="12" text-anchor="middle">页面 1</text><rect x="340" y="230" width="120" height="40" fill="#A8E063" stroke="#5FA319" stroke-width="1"/><text x="400" y="255" font-size="12" text-anchor="middle">页面 2</text><rect x="340" y="280" width="120" height="40" fill="#A8E063" stroke="#5FA319" stroke-width="1"/><text x="400" y="305" font-size="12" text-anchor="middle">页面 3</text><rect x="340" y="330" width="120" height="40" fill="#C8F084" stroke="#5FA319" stroke-width="1"/><text x="400" y="355" font-size="12" text-anchor="middle">页面 4</text><text x="400" y="395" font-size="20" text-anchor="middle" fill="#fff">...</text><text x="400" y="460" font-size="11" text-anchor="middle" fill="#fff">连续的虚拟地址空间</text></g><g id="os-mmu"><text x="400" y="525" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">操作系统</text><text x="400" y="543" font-size="12" text-anchor="middle" fill="#fff">地址转换 (MMU)</text></g><g id="physical-memory"><rect x="600" y="80" width="150" height="400" rx="10" fill="url(#physicalGrad)" stroke="#B8780D" stroke-width="2"/><text x="675" y="110" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">物理内存</text><rect x="615" y="140" width="120" height="35" fill="#FFD77A" stroke="#D68910" stroke-width="1"/><text x="675" y="162" font-size="11" text-anchor="middle">帧 5 → 页面1</text><rect x="615" y="190" width="120" height="35" fill="#E0E0E0" stroke="#999" stroke-width="1"/><text x="675" y="212" font-size="11" text-anchor="middle" fill="#666">空闲</text><rect x="615" y="240" width="120" height="35" fill="#FFD77A" stroke="#D68910" stroke-width="1"/><text x="675" y="262" font-size="11" text-anchor="middle">帧 2 → 页面0</text><rect x="615" y="290" width="120" height="35" fill="#FFD77A" stroke="#D68910" stroke-width="1"/><text x="675" y="312" font-size="11" text-anchor="middle">帧 8 → 页面3</text><rect x="615" y="340" width="120" height="35" fill="#E0E0E0" stroke="#999" stroke-width="1"/><text x="675" y="362" font-size="11" text-anchor="middle" fill="#666">空闲</text><rect x="615" y="390" width="120" height="35" fill="#FFD77A" stroke="#D68910" stroke-width="1"/><text x="675" y="412" font-size="11" text-anchor="middle">帧 11 → 页面2</text><text x="675" y="450" font-size="11" text-anchor="middle" fill="#fff">分散的物理地址</text></g><path d="M2e2 140H320" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><text x="260" y="130" font-size="11" text-anchor="middle" fill="#333">访问虚拟地址</text><path d="M4e2 480v10" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M5e2 530l95-250" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><text x="545" y="400" font-size="11" text-anchor="middle" fill="#333">转换后的</text><text x="545" y="415" font-size="11" text-anchor="middle" fill="#333">物理地址</text><path d="M460 150 610 260" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity=".7"/><path d="M460 2e2l150-40" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity=".7"/><path d="M460 250 610 410" stroke="#E74C3C" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity=".7"/><g id="legend"><rect x="50" y="520" width="200" height="60" rx="5" fill="#F8F8F8" stroke="#CCC" stroke-width="1"/><text x="60" y="540" font-size="12" font-weight="bold" fill="#333">关键概念：</text><text x="60" y="558" font-size="10" fill="#555">• 虚拟地址：连续、独立</text><text x="60" y="573" font-size="10" fill="#555">• 物理地址：可能分散</text></g></svg>