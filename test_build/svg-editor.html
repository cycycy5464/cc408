<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SVG 文字位置调整工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
h1 { font-size: 18px; margin-bottom: 12px; }
.controls { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 14px; }
.controls select { padding: 6px 10px; font-size: 14px; border-radius: 6px; border: 1px solid #ccc; }
.controls button { padding: 8px 18px; font-size: 14px; border-radius: 6px; border: none; cursor: pointer; }
.btn-primary { background: #4a90d9; color: #fff; }
.btn-primary:hover { background: #357abd; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-success { background: #27ae60; color: #fff; }
.btn-info { background: #f39c12; color: #fff; }
.preview-container { position: relative; display: inline-block; border: 2px solid #ddd; border-radius: 8px; overflow: auto; background: #fff; }
.preview-container svg { display: block; max-width: none; }
.text-overlay { position: absolute; cursor: move; font-size: 16px; font-family: Helvetica, sans-serif; fill: #000; user-select: none; padding: 2px 6px; border: 1px solid transparent; white-space: nowrap; }
.text-overlay:hover { border-color: #4a90d9; background: rgba(74,144,217,0.1); }
.text-overlay.selected { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
.text-overlay input { width: 80px; padding: 2px 4px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; }
.pos-info { font-size: 12px; color: #666; margin-top: 4px; }
.panel { background: #fff; padding: 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 16px; }
.panel h3 { font-size: 15px; margin-bottom: 8px; }
.coord-table { border-collapse: collapse; font-size: 13px; width: 100%; }
.coord-table th, .coord-table td { padding: 4px 8px; border: 1px solid #eee; text-align: left; }
.coord-table th { background: #f8f8f8; font-weight: 600; }
.coord-table td input { width: 60px; padding: 2px 4px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; }
</style>
</head>
<body>

<h1>SVG 图片文字位置调整工具</h1>

<div class="controls">
  <label>选择题目：
    <select id="fileSelect" style="width:300px"></select>
  </label>
  <button class="btn-info" onclick="loadSelected()">加载</button>
  <button class="btn-success" onclick="saveChanges()">💾 保存</button>
  <button class="btn-danger" onclick="resetAll()">↺ 重置</button>
</div>

<div style="display:flex; gap:20px; flex-wrap:wrap">
  <div class="preview-container" id="previewContainer">
    <div id="svgHost"></div>
    <div id="overlayHost"></div>
  </div>

  <div class="panel" style="flex:1;min-width:300px">
    <h3>文字标签坐标</h3>
    <p style="font-size:13px;color:#666;margin-bottom:8px">拖拽图上文字调整位置，或在表格中直接输入坐标</p>
    <div id="coordPanel"></div>
  </div>
  <div class="panel">
    <h3>全局偏移</h3>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <label>X 偏移: <input id="globalDx" type="number" step="0.5" value="0" style="width:60px"></label>
      <label>Y 偏移: <input id="globalDy" type="number" step="0.5" value="0" style="width:60px"></label>
      <button class="btn-primary" onclick="applyGlobalOffset()">应用</button>
      <span style="font-size:12px;color:#666">对所有文字统一增加偏移量</span>
    </div>
  </div>

<script>
const SVG_BASE = '/cc408/images/questions/';
const API_BASE = 'http://localhost:1313';
let currentFile = '';
let currentSvg = '';
let texts = [];
let dragTarget = null;
let dragOffsetX = 0, dragOffsetY = 0;

// 已知的 SVG 文件列表（含题号）
const SVG_FILES = [
  '2009_Q3_1.svg', '2009_Q4_2.svg', '2009_Q47_9.svg',
  '2010_Q3_1.svg', '2010_Q4_2.svg', '2010_Q8_4.svg', '2010_Q34_7.svg', '2010_Q46_12.svg',
  '2011_Q44_8.svg',
  '2012_Q7_2.svg', '2012_Q40_8.svg', '2012_Q42_10.svg', '2012_Q47_14.svg',
  '2013_Q8_3.svg', '2013_Q9_4.svg', '2013_Q27_6.svg', '2013_Q34_7.svg', '2013_Q44_9.svg', '2013_Q46_12.svg',
  '2014_Q4_1.svg', '2014_Q7_2.svg', '2014_Q34_3.svg', '2014_Q42_4.svg',
  '2015_Q6_2.svg', '2015_Q34_6.svg', '2015_Q41_7.svg', '2015_Q42_9.svg', '2015_Q43_10.svg', '2015_Q44_11.svg', '2015_Q47_13.svg',
  '2016_Q3_1.svg', '2016_Q6_5.svg', '2016_Q8_6.svg', '2016_Q44_14.svg', '2016_Q45_15.svg', '2016_Q47_16.svg',
  '2017_Q5_1.svg', '2017_Q8_2.svg', '2017_Q35_4.svg', '2017_Q41_5.svg', '2017_Q42_6.svg',
  '2018_Q11_4.svg', '2018_Q37_5.svg', '2018_Q42_7.svg', '2018_Q44_9.svg', '2018_Q47_10.svg',
  '2019_Q5_4.svg', '2019_Q38_8.svg', '2019_Q47_11.svg',
  '2020_Q4_1.svg', '2020_Q5_2.svg', '2020_Q7_4.svg', '2020_Q33_8.svg', '2020_Q35_9.svg', '2020_Q37_10.svg', '2020_Q40_11.svg', '2020_Q47_13.svg',
  '2021_Q6_2.svg', '2021_Q7_3.svg', '2021_Q8_4.svg', '2021_Q11_5.svg', '2021_Q34_7.svg', '2021_Q37_8.svg', '2021_Q47_11.svg',
  '2022_Q3_1.svg', '2022_Q5_2.svg', '2022_Q6_3.svg', '2022_Q7_4.svg', '2022_Q8_5.svg', '2022_Q15_6.svg', '2022_Q36_10.svg', '2022_Q41_11.svg', '2022_Q43_14.svg', '2022_Q45_15.svg', '2022_Q47_17.svg',
  '2023_Q33_6.svg', '2023_Q38_7.svg', '2023_Q41_8.svg', '2023_Q45_9.svg', '2023_Q47_10.svg',
  '2024_Q4_1.svg', '2024_Q7_3.svg', '2024_Q9_4.svg', '2024_Q33_5.svg', '2024_Q35_6.svg', '2024_Q37_7.svg', '2024_Q43_8.svg', '2024_Q44_10.svg', '2024_Q47_12.svg',
  '2025_Q36_2.svg', '2025_Q38_3.svg', '2025_Q42_4.svg', '2025_Q47_7.svg'
];

const sel = document.getElementById('fileSelect');
SVG_FILES.forEach(f => {
  const opt = document.createElement('option');
  opt.value = f;
  const label = f.replace(/_/g, ' ').replace('.svg', '');
  opt.textContent = label;
  sel.appendChild(opt);
});

async function loadSelected() {
  currentFile = sel.value;
  if (!currentFile) return;

  const url = API_BASE + SVG_BASE + currentFile;
  try {
    const resp = await fetch(url);
    currentSvg = await resp.text();
    renderSvg();
    extractTexts();
    renderOverlay();
    renderCoordTable();
  } catch(e) {
    alert('加载失败: ' + e.message + '\n请确认 hugo server 在运行');
  }
}

function renderSvg() {
  const host = document.getElementById('svgHost');
  host.innerHTML = currentSvg;
  const svgEl = host.querySelector('svg');
  if (svgEl) {
    svgEl.style.width = '100%';
    svgEl.style.height = 'auto';
    svgEl.style.maxWidth = '852px';
  }
}

function extractTexts() {
  texts = [];
  const parser = new DOMParser();
  const doc = parser.parseFromString(currentSvg, 'image/svg+xml');
  const textEls = doc.querySelectorAll('text');
  textEls.forEach(el => {
    const x = parseFloat(el.getAttribute('x') || 0);
    const y = parseFloat(el.getAttribute('y') || 0);
    const content = el.textContent.trim();
    if (content && content.length > 0) {
      texts.push({ content, x, y, el: null });
    }
  });
}

function renderOverlay() {
  const container = document.getElementById('previewContainer');
  const overlay = document.getElementById('overlayHost');
  overlay.innerHTML = '';
  overlay.style.position = 'absolute';
  overlay.style.top = '0';
  overlay.style.left = '0';
  overlay.style.width = '100%';
  overlay.style.height = '100%';
  overlay.style.pointerEvents = 'none';

  const svgEl = document.querySelector('#svgHost svg');
  if (!svgEl) return;

  const rect = svgEl.getBoundingClientRect();
  const vb = svgEl.getAttribute('viewBox') || '0 0 852 401';
  const vbParts = vb.split(' ').map(Number);
  const svgW = vbParts[2] || 852;
  const svgH = vbParts[3] || 401;
  const scaleX = rect.width / svgW;
  const scaleY = rect.height / svgH;

  texts.forEach(t => {
    const div = document.createElement('div');
    div.className = 'text-overlay';
    div.textContent = t.content;
    div.style.left = (t.x * scaleX) + 'px';
    div.style.top = (t.y * scaleY - 12) + 'px';
    div.style.pointerEvents = 'auto';
    div.style.fontSize = Math.max(12, 16 * scaleX) + 'px';

    div.addEventListener('mousedown', function(e) {
      e.preventDefault();
      dragTarget = this;
      const cRect = container.getBoundingClientRect();
      dragOffsetX = e.clientX - this.getBoundingClientRect().left;
      dragOffsetY = e.clientY - this.getBoundingClientRect().top;
      this.classList.add('selected');
    });

    overlay.appendChild(div);
    t.el = div;
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragTarget) return;
    const cRect = container.getBoundingClientRect();
    const svgRect = svgEl.getBoundingClientRect();
    const vb = svgEl.getAttribute('viewBox') || '0 0 852 401';
    const vbParts = vb.split(' ').map(Number);
    const svgW = vbParts[2] || 852;
    const svgH = vbParts[3] || 401;
    const scaleX = svgW / svgRect.width;
    const scaleY = svgH / svgRect.height;

    const newLeft = e.clientX - cRect.left - dragOffsetX;
    const newTop = e.clientY - cRect.top - dragOffsetY;
    dragTarget.style.left = newLeft + 'px';
    dragTarget.style.top = newTop + 'px';

    // 更新坐标
    const idx = texts.findIndex(t => t.el === dragTarget);
    if (idx >= 0) {
      texts[idx].x = Math.round(newLeft * scaleX * 10) / 10;
      texts[idx].y = Math.round((newTop + 12) * scaleY * 10) / 10;
      renderCoordTable();
    }
  });

  document.addEventListener('mouseup', function() {
    if (dragTarget) {
      dragTarget.classList.remove('selected');
      dragTarget = null;
    }
  });
}

function renderCoordTable() {
  const panel = document.getElementById('coordPanel');
  let html = '<table class="coord-table"><tr><th>文字</th><th>X</th><th>Y</th><th>Δ</th></tr>';
  texts.forEach((t, i) => {
    html += '<tr><td>' + t.content + '</td>' +
      '<td><input id="cx' + i + '" type="number" step="0.5" value="' + t.x + '" onchange="updateCoord(' + i + ')"></td>' +
      '<td><input id="cy' + i + '" type="number" step="0.5" value="' + t.y + '" onchange="updateCoord(' + i + ')"></td>' +
      '<td>' + (i > 0 ? Math.round(Math.sqrt(Math.pow(t.x - texts[i-1].x,2) + Math.pow(t.y - texts[i-1].y,2))) : '-') + '</td></tr>';
  });
  html += '</table>';
  panel.innerHTML = html;
}

function updateCoord(idx) {
  const x = parseFloat(document.getElementById('cx' + idx).value);
  const y = parseFloat(document.getElementById('cy' + idx).value);
  if (!isNaN(x)) texts[idx].x = x;
  if (!isNaN(y)) texts[idx].y = y;
  // 更新覆盖层位置
  const svgEl = document.querySelector('#svgHost svg');
  if (svgEl && texts[idx].el) {
    const vb = svgEl.getAttribute('viewBox') || '0 0 852 401';
    const vbParts = vb.split(' ').map(Number);
    const svgW = vbParts[2] || 852;
    const svgH = vbParts[3] || 401;
    const rect = svgEl.getBoundingClientRect();
    const scaleX = rect.width / svgW;
    const scaleY = rect.height / svgH;
    texts[idx].el.style.left = (texts[idx].x * scaleX) + 'px';
    texts[idx].el.style.top = (texts[idx].y * scaleY - 12) + 'px';
  }
}

async function saveChanges() {
  if (!currentFile || texts.length === 0) return;

  // 用字符串替换更新坐标
  let svg = currentSvg;
  const textRegex = /<text[^>]*>/g;
  let match;
  let idx = 0;
  let result = '';
  let lastEnd = 0;
  while ((match = textRegex.exec(svg)) !== null) {
    result += svg.substring(lastEnd, match.index);
    if (idx < texts.length) {
      let tag = match[0];
      tag = tag.replace(/x=["']?[-\d.]+["']?/g, 'x="' + texts[idx].x + '"');
      tag = tag.replace(/y=["']?[-\d.]+["']?/g, 'y="' + texts[idx].y + '"');
      tag = tag.replace(/opacity=["'][^"']*["']/g, '');
      result += tag;
    } else {
      result += match[0];
    }
    lastEnd = textRegex.lastIndex;
    idx++;
  }
  result += svg.substring(lastEnd);
  result = result.replace(/(<text[^>]*)(>)/g, '$1 font-size="16" fill="#000"$2');
  result = result.replace(/opacity="[^"]*"/g, '');

  currentSvg = result;

  // 发送到保存服务
  try {
    const resp = await fetch('http://localhost:3456', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: currentFile, content: result })
    });
    if (resp.ok) {
      alert('✅ 已自动保存到 static/images/questions/' + currentFile);
    } else {
      throw new Error(await resp.text());
    }
  } catch(e) {
    // 服务未运行时回退到下载
    const blob = new Blob([result], {type: "image/svg+xml"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = currentFile;
    a.click();
    URL.revokeObjectURL(url);
    alert('保存服务未启动，已下载文件。\n请手动覆盖到 static/images/questions/' + currentFile +
      '\n\n要启用自动保存，请运行:\nnode scripts/save-server.js');
  }
}

function applyGlobalOffset() {
  const dx = parseFloat(document.getElementById('globalDx').value) || 0;
  const dy = parseFloat(document.getElementById('globalDy').value) || 0;
  texts.forEach((t, i) => {
    t.x += dx;
    t.y += dy;
  });
  renderCoordTable();
  renderOverlay2();
}
function renderOverlay2() {
  const container = document.getElementById('previewContainer');
  const overlay = document.getElementById('overlayHost');
  const svgEl = document.querySelector('#svgHost svg');
  if (!svgEl) return;
  const rect = svgEl.getBoundingClientRect();
  const vb = svgEl.getAttribute('viewBox') || '0 0 852 401';
  const vbParts = vb.split(' ').map(Number);
  const svgW = vbParts[2] || 852;
  const svgH = vbParts[3] || 401;
  const scaleX = rect.width / svgW;
  const scaleY = rect.height / svgH;
  texts.forEach(t => {
    if (t.el) {
      t.el.style.left = (t.x * scaleX) + 'px';
      t.el.style.top = (t.y * scaleY - 12) + 'px';
    }
  });
}
function resetAll() {
  alert('重新加载将丢弃所有修改');
  loadSelected();
}

// 自动加载第一个
window.onload = function() {
  if (SVG_FILES.length > 0) loadSelected();
};
</script>
</body>
</html>
