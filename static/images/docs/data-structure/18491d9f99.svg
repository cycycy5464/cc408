<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 800"><text x="500" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">IEEE 754 浮点数存储格式</text><text x="500" y="60" text-anchor="middle" font-size="18" fill="#34495e">V = (-1)^s × M × 2^E</text><text x="50" y="120" font-size="20" font-weight="bold" fill="#e74c3c">单精度 (32位)</text><g transform="translate(50, 140)"><rect x="0" y="0" width="40" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="20" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">s</text><text x="20" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">31</text><rect x="40" y="0" width="320" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="200" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">exp (8位)</text><text x="60" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">30</text><text x="340" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">23</text><rect x="360" y="0" width="460" height="50" fill="#27ae60" stroke="#229954" stroke-width="2"/><text x="590" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">frac (23位)</text><text x="380" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">22</text><text x="800" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">0</text></g><g transform="translate(50, 240)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#2c3e50">单精度参数：</text><text x="0" y="25" font-size="14" fill="#34495e">• k = 8, Bias = 127</text><text x="0" y="45" font-size="14" fill="#34495e">• 1 ≤ exp ≤ 254</text><text x="0" y="65" font-size="14" fill="#34495e">• -126 ≤ E ≤ 127</text><text x="0" y="85" font-size="14" fill="#34495e">• n = 23, 1 ≤ M ≤ 2-2^(-23)</text></g><text x="50" y="380" font-size="20" font-weight="bold" fill="#8e44ad">双精度 (64位)</text><g transform="translate(50, 400)"><rect x="0" y="0" width="40" height="50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="20" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">s</text><text x="20" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">63</text><rect x="40" y="0" width="220" height="50" fill="#9b59b6" stroke="#8e44ad" stroke-width="2"/><text x="150" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">exp (11位)</text><text x="60" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">62</text><text x="240" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">52</text><rect x="260" y="0" width="560" height="50" fill="#16a085" stroke="#138d75" stroke-width="2"/><text x="540" y="30" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">frac (52位)</text><text x="280" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">51</text><text x="800" y="70" text-anchor="middle" font-size="12" fill="#2c3e50">0</text></g><g transform="translate(50, 500)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#2c3e50">双精度参数：</text><text x="0" y="25" font-size="14" fill="#34495e">• k = 11, Bias = 1023</text><text x="0" y="45" font-size="14" fill="#34495e">• 1 ≤ exp ≤ 2046</text><text x="0" y="65" font-size="14" fill="#34495e">• -1022 ≤ E ≤ 1023</text><text x="0" y="85" font-size="14" fill="#34495e">• n = 52, 1 ≤ M ≤ 2-2^(-52)</text></g><g transform="translate(50, 620)"><text x="0" y="0" font-size="18" font-weight="bold" fill="#2c3e50">计算公式：</text><rect x="0" y="10" width="900" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="20" y="35" font-size="16" fill="#2c3e50">• 符号位：s = 0 (正数), s = 1 (负数)</text><text x="20" y="55" font-size="16" fill="#2c3e50">• 指数部分：E = exp - Bias</text><text x="20" y="75" font-size="16" fill="#2c3e50">• 尾数部分：M = 1 + frac (隐含的前导1)</text></g><g transform="translate(50, 760)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#e67e22">优势：相比传统浮点表示，IEEE 754格式可以用更少的位数表示更大的数值范围</text><text x="0" y="25" font-size="14" fill="#34495e">例如：5×2^100 在IEEE格式中只需要标准的32位或64位，而不需要103位</text></g><g transform="translate(950, 140)"><text x="0" y="0" font-size="14" font-weight="bold" fill="#2c3e50">图例</text><rect x="0" y="10" width="20" height="15" fill="#e74c3c"/><text x="25" y="22" font-size="12" fill="#2c3e50">符号位</text><rect x="0" y="30" width="20" height="15" fill="#3498db"/><text x="25" y="42" font-size="12" fill="#2c3e50">阶码 (单精度)</text><rect x="0" y="50" width="20" height="15" fill="#9b59b6"/><text x="25" y="62" font-size="12" fill="#2c3e50">阶码 (双精度)</text><rect x="0" y="70" width="20" height="15" fill="#27ae60"/><text x="25" y="82" font-size="12" fill="#2c3e50">尾数 (单精度)</text><rect x="0" y="90" width="20" height="15" fill="#16a085"/><text x="25" y="102" font-size="12" fill="#2c3e50">尾数 (双精度)</text></g></svg>