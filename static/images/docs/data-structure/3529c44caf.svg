<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="706pt" height="850pt" viewBox="0 0 706 850" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 846)"><title>BankersAlgorithm</title><g id="clust1" class="cluster"><title>cluster_legend</title><polygon fill="#f5f5f5" stroke="#000" points="8,-727 8,-819 290,-819 290,-727 8,-727"/><text text-anchor="middle" x="149" y="-803.8" font-family="Microsoft Yahei" font-size="14">关键概念说明</text></g><g id="clust2" class="cluster"><title>cluster_example</title><polygon fill="#f0f8ff" stroke="#000" points="426,-712 426,-834 690,-834 690,-712 426,-712"/><text text-anchor="middle" x="558" y="-818.8" font-family="Microsoft Yahei" font-size="14">算法逻辑</text></g><g id="node1" class="node"><title>legend1</title><polygon fill="#fffef0" stroke="#8b4513" points="276,-788 16,-788 16,-735 282,-735 282,-782 276,-788"/><polyline fill="none" stroke="#8b4513" points="276,-788 276,-782"/><polyline fill="none" stroke="#8b4513" points="282,-782 276,-782"/><text text-anchor="middle" x="149" y="-772.8" font-family="Microsoft Yahei" font-size="14">Need[i]: 进程 i 还需要的资源</text><text text-anchor="middle" x="149" y="-757.8" font-family="Microsoft Yahei" font-size="14">Allocation[i]: 进程 i 已分配的资源</text><text text-anchor="middle" x="149" y="-742.8" font-family="Microsoft Yahei" font-size="14">Work: 当前可用资源(初始为 Available)</text></g><g id="node2" class="node"><title>start</title><polygon fill="#e8f5e8" stroke="#2e7d2e" points="416,-779.5 300,-779.5 300,-743.5 416,-743.5 416,-779.5"/><text text-anchor="middle" x="358" y="-757.8" font-family="Microsoft Yahei" font-size="14">开始安全性检查</text></g><g id="node3" class="node"><title>init</title><polygon fill="#f0f8ff" stroke="#4169e1" points="446,-683 270,-683 270,-615 446,-615 446,-683"/><text text-anchor="middle" x="358" y="-667.8" font-family="Microsoft Yahei" font-size="14">初始化:</text><text text-anchor="middle" x="358" y="-652.8" font-family="Microsoft Yahei" font-size="14">- 设置轮数 round = 1</text><text text-anchor="middle" x="358" y="-637.8" font-family="Microsoft Yahei" font-size="14">- 复制 available 到 work</text><text text-anchor="middle" x="358" y="-622.8" font-family="Microsoft Yahei" font-size="14">- 标记所有进程为未完成</text></g><g id="edge1" class="edge"><title>start-&gt;init</title><path fill="none" stroke="#000" d="M358-743.23C358-729.84 358-710.67 358-693.19"/><polygon fill="#000" stroke="#000" points="361.5,-693.15 358,-683.15 354.5,-693.15 361.5,-693.15"/></g><g id="node4" class="node"><title>check_round</title><polygon fill="#fff8dc" stroke="#daa520" points="419,-578 297,-578 297,-542 419,-542 419,-578"/><text text-anchor="middle" x="358" y="-556.3" font-family="Microsoft Yahei" font-size="14">第 round 轮检查</text></g><g id="edge2" class="edge"><title>init-&gt;check_round</title><path fill="none" stroke="#000" d="M358-614.61C358-605.85 358-596.51 358-588.12"/><polygon fill="#000" stroke="#000" points="361.5,-588.12 358,-578.12 354.5,-588.12 361.5,-588.12"/></g><g id="node5" class="node"><title>find_process</title><polygon fill="#f0f8ff" stroke="#4169e1" points="368.5,-505 203.5,-505 203.5,-467 368.5,-467 368.5,-505"/><text text-anchor="middle" x="286" y="-489.8" font-family="Microsoft Yahei" font-size="14">寻找满足条件的进程 Pi:</text><text text-anchor="middle" x="286" y="-474.8" font-family="Microsoft Yahei" font-size="14">Need[i] ≤ Work</text></g><g id="edge3" class="edge"><title>check_round-&gt;find_process</title><path fill="none" stroke="#000" d="M340.94-541.94C332.12-533.12 321.19-522.19 311.4-512.4"/><polygon fill="#000" stroke="#000" points="313.75,-509.8 304.2,-505.2 308.8,-514.75 313.75,-509.8"/></g><g id="node6" class="node"><title>found</title><polygon fill="#fffacd" stroke="#ff8c00" points="286,-430 196.68,-412 286,-394 375.32,-412 286,-430"/><text text-anchor="middle" x="286" y="-408.3" font-family="Microsoft Yahei" font-size="14">找到进程 Pi?</text></g><g id="edge4" class="edge"><title>find_process-&gt;found</title><path fill="none" stroke="#000" d="M286-466.83c0 7.94.0 17.42.0 26.2"/><polygon fill="#000" stroke="#000" points="289.5,-440.42 286,-430.42 282.5,-440.42 289.5,-440.42"/></g><g id="node7" class="node"><title>allocate</title><polygon fill="#e8f5e8" stroke="#2e7d2e" points="307.5,-343 78.5,-343 78.5,-275 307.5,-275 307.5,-343"/><text text-anchor="middle" x="193" y="-327.8" font-family="Microsoft Yahei" font-size="14">模拟完成进程 Pi:</text><text text-anchor="middle" x="193" y="-312.8" font-family="Microsoft Yahei" font-size="14">1. Work = Work + Allocation[i]</text><text text-anchor="middle" x="193" y="-297.8" font-family="Microsoft Yahei" font-size="14">2. 标记 Pi 为已完成</text><text text-anchor="middle" x="193" y="-282.8" font-family="Microsoft Yahei" font-size="14">3. 记录到安全序列</text></g><g id="edge5" class="edge"><title>found-&gt;allocate</title><path fill="none" stroke="#2e7d2e" d="M272.68-396.53c-10.97 11.91-27.06 29.39-41.93 45.53"/><polygon fill="#2e7d2e" stroke="#2e7d2e" points="232.94,-348.2 223.59,-343.22 227.79,-352.94 232.94,-348.2"/><text text-anchor="middle" x="261.5" y="-364.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="node10" class="node"><title>unsafe_state</title><polygon fill="#ffb6c1" stroke="#dc143c" points="484.5,-328 325.5,-328 325.5,-290 484.5,-290 484.5,-328"/><text text-anchor="middle" x="405" y="-312.8" font-family="Microsoft Yahei" font-size="14">系统处于不安全状态</text><text text-anchor="middle" x="405" y="-297.8" font-family="Microsoft Yahei" font-size="14">无法找到安全分配序列</text></g><g id="edge6" class="edge"><title>found-&gt;unsafe_state</title><path fill="none" stroke="#dc143c" d="M302.55-396.96c18.96 16.1 50.4 42.78 73.45 62.35"/><polygon fill="#dc143c" stroke="#dc143c" points="378.42,-337.15 383.78,-328.01 373.89,-331.82 378.42,-337.15"/><text text-anchor="middle" x="349.5" y="-364.8" font-family="Microsoft Yahei" font-size="14">否</text></g><g id="node8" class="node"><title>all_finished</title><polygon fill="#fffacd" stroke="#ff8c00" points="86,-238 5,-200 86,-162 167,-200 86,-238"/><text text-anchor="middle" x="86" y="-203.8" font-family="Microsoft Yahei" font-size="14">所有进程</text><text text-anchor="middle" x="86" y="-188.8" font-family="Microsoft Yahei" font-size="14">都已完成?</text></g><g id="edge7" class="edge"><title>allocate-&gt;all_finished</title><path fill="none" stroke="#000" d="M159.73-274.73c-13.02 13.02-27.93 27.93-40.91 40.91"/><polygon fill="#000" stroke="#000" points="120.97,-231.02 111.43,-226.43 116.02,-235.97 120.97,-231.02"/></g><g id="edge9" class="edge"><title>all_finished-&gt;find_process</title><path fill="none" stroke="#4169e1" d="M72.73-231.83C61.95-261.84 51.19-307.91 69-343c30.6-60.28 99.96-98.7 152.08-120.16"/><polygon fill="#4169e1" stroke="#4169e1" points="220.02,-466.51 230.6,-466.98 222.62,-460.01 220.02,-466.51"/><text text-anchor="middle" x="97.5" y="-364.8" font-family="Microsoft Yahei" font-size="14">否</text></g><g id="node9" class="node"><title>safe_state</title><polygon fill="#90ee90" stroke="#006400" points="151.5,-111 20.5,-111 20.5,-73 151.5,-73 151.5,-111"/><text text-anchor="middle" x="86" y="-95.8" font-family="Microsoft Yahei" font-size="14">系统处于安全状态</text><text text-anchor="middle" x="86" y="-80.8" font-family="Microsoft Yahei" font-size="14">存在安全分配序列</text></g><g id="edge8" class="edge"><title>all_finished-&gt;safe_state</title><path fill="none" stroke="#2e7d2e" d="M86-161.93c0 13.3.0 28.08.0 40.52"/><polygon fill="#2e7d2e" stroke="#2e7d2e" points="89.5,-121.16 86,-111.16 82.5,-121.16 89.5,-121.16"/><text text-anchor="middle" x="93.5" y="-132.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="node13" class="node"><title>end_safe</title><polygon fill="#90ee90" stroke="#006400" points="127.5,-36 44.5,-36 44.5,0 127.5,0 127.5,-36"/><text text-anchor="middle" x="86" y="-14.3" font-family="Microsoft Yahei" font-size="14">结束: 安全</text></g><g id="edge14" class="edge"><title>safe_state-&gt;end_safe</title><path fill="none" stroke="#000" d="M86-72.83c0 7.94.0 17.42.0 26.2"/><polygon fill="#000" stroke="#000" points="89.5,-46.42 86,-36.42 82.5,-46.42 89.5,-46.42"/></g><g id="node12" class="node"><title>max_rounds</title><polygon fill="#fffacd" stroke="#ff8c00" points="398,-218 306.17,-200 398,-182 489.83,-200 398,-218"/><text text-anchor="middle" x="398" y="-196.3" font-family="Microsoft Yahei" font-size="14">已达到 N 轮?</text></g><g id="edge10" class="edge"><title>unsafe_state-&gt;max_rounds</title><path fill="none" stroke="#000" d="M403.81-289.85C402.7-272.84 401.02-247.22 399.76-227.85"/><polygon fill="#000" stroke="#000" points="403.25,-227.58 399.1,-217.83 396.26,-228.03 403.25,-227.58"/></g><g id="node11" class="node"><title>next_round</title><polygon fill="#f0f8ff" stroke="#4169e1" points="592.5,-111 443.5,-111 443.5,-73 592.5,-73 592.5,-111"/><text text-anchor="middle" x="518" y="-95.8" font-family="Microsoft Yahei" font-size="14">round = round + 1</text><text text-anchor="middle" x="518" y="-80.8" font-family="Microsoft Yahei" font-size="14">继续下一轮</text></g><g id="edge13" class="edge"><title>next_round-&gt;check_round</title><path fill="none" stroke="#000" d="M518-111.01c0-21.08.0-57.07.0-87.99V-487C518-528.82 471.97-546.5 429.29-553.89"/><polygon fill="#000" stroke="#000" points="428.74,-550.44 419.4,-555.44 429.82,-557.35 428.74,-550.44"/></g><g id="edge12" class="edge"><title>max_rounds-&gt;next_round</title><path fill="none" stroke="#4169e1" d="M414.18-184.7c19.32 17.05 51.94 45.88 75.47 66.66"/><polygon fill="#4169e1" stroke="#4169e1" points="492.07,-120.57 497.25,-111.33 487.44,-115.32 492.07,-120.57"/><text text-anchor="middle" x="482.5" y="-132.8" font-family="Microsoft Yahei" font-size="14">否</text></g><g id="node14" class="node"><title>end_unsafe</title><polygon fill="#ffb6c1" stroke="#dc143c" points="425.5,-110 328.5,-110 328.5,-74 425.5,-74 425.5,-110"/><text text-anchor="middle" x="377" y="-88.3" font-family="Microsoft Yahei" font-size="14">结束: 不安全</text></g><g id="edge11" class="edge"><title>max_rounds-&gt;end_unsafe</title><path fill="none" stroke="#dc143c" d="M394.72-182.44C391.41-165.75 386.26-139.74 382.36-120.06"/><polygon fill="#dc143c" stroke="#dc143c" points="385.77,-119.28 380.4,-110.15 378.91,-120.64 385.77,-119.28"/><text text-anchor="middle" x="394.5" y="-132.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="node15" class="node"><title>logic</title><polygon fill="#e6f3ff" stroke="#4682b4" points="676,-803 434,-803 434,-720 682,-720 682,-797 676,-803"/><polyline fill="none" stroke="#4682b4" points="676,-803 676,-797"/><polyline fill="none" stroke="#4682b4" points="682,-797 676,-797"/><text text-anchor="middle" x="558" y="-787.8" font-family="Microsoft Yahei" font-size="14">核心思想:</text><text text-anchor="middle" x="558" y="-772.8" font-family="Microsoft Yahei" font-size="14">1. 每轮寻找 Need ≤ Work 的进程</text><text text-anchor="middle" x="558" y="-757.8" font-family="Microsoft Yahei" font-size="14">2. 模拟该进程完成后回收资源</text><text text-anchor="middle" x="558" y="-742.8" font-family="Microsoft Yahei" font-size="14">3. 重复直到所有进程完成或无法继续</text><text text-anchor="middle" x="558" y="-727.8" font-family="Microsoft Yahei" font-size="14">4. 最多进行 N 轮(N为进程数)</text></g></g></svg>