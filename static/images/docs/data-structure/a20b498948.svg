<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="#f8f9fa"/><text x="400" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">十进制转二进制两种方法</text><g id="method1"><rect x="50" y="60" width="320" height="40" fill="#3498db" rx="5"/><text x="210" y="85" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">方法一：直观分解法</text><text x="60" y="130" font-size="16" font-weight="bold" fill="#2c3e50">示例：73 转换为二进制</text><text x="60" y="160" font-size="14" fill="#34495e">73 = 64 + 8 + 1</text><text x="60" y="180" font-size="14" fill="#34495e">73 = 2⁶ + 2³ + 2⁰</text><g transform="translate(60, 200)"><text x="20" y="15" font-size="12" fill="#7f8c8d">位置:</text><text x="70" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">7</text><text x="100" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">6</text><text x="130" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">5</text><text x="160" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">4</text><text x="190" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">3</text><text x="220" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">2</text><text x="250" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">1</text><text x="280" y="15" font-size="12" fill="#7f8c8d" text-anchor="middle">0</text><text x="20" y="35" font-size="12" fill="#7f8c8d">2的幂:</text><text x="70" y="35" font-size="12" fill="#7f8c8d" text-anchor="middle">2⁷</text><text x="100" y="35" font-size="12" fill="#e74c3c" text-anchor="middle">2⁶</text><text x="130" y="35" font-size="12" fill="#7f8c8d" text-anchor="middle">2⁵</text><text x="160" y="35" font-size="12" fill="#7f8c8d" text-anchor="middle">2⁴</text><text x="190" y="35" font-size="12" fill="#e74c3c" text-anchor="middle">2³</text><text x="220" y="35" font-size="12" fill="#7f8c8d" text-anchor="middle">2²</text><text x="250" y="35" font-size="12" fill="#7f8c8d" text-anchor="middle">2¹</text><text x="280" y="35" font-size="12" fill="#e74c3c" text-anchor="middle">2⁰</text><text x="20" y="55" font-size="12" fill="#7f8c8d">数值:</text><text x="70" y="55" font-size="12" fill="#7f8c8d" text-anchor="middle">128</text><text x="100" y="55" font-size="12" fill="#e74c3c" text-anchor="middle">64</text><text x="130" y="55" font-size="12" fill="#7f8c8d" text-anchor="middle">32</text><text x="160" y="55" font-size="12" fill="#7f8c8d" text-anchor="middle">16</text><text x="190" y="55" font-size="12" fill="#e74c3c" text-anchor="middle">8</text><text x="220" y="55" font-size="12" fill="#7f8c8d" text-anchor="middle">4</text><text x="250" y="55" font-size="12" fill="#7f8c8d" text-anchor="middle">2</text><text x="280" y="55" font-size="12" fill="#e74c3c" text-anchor="middle">1</text><rect x="60" y="70" width="240" height="30" fill="none" stroke="#bdc3c7" stroke-width="2"/><line x1="90" y1="70" x2="90" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="120" y1="70" x2="120" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="150" y1="70" x2="150" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="180" y1="70" x2="180" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="210" y1="70" x2="210" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="240" y1="70" x2="240" y2="100" stroke="#bdc3c7" stroke-width="1"/><line x1="270" y1="70" x2="270" y2="100" stroke="#bdc3c7" stroke-width="1"/><text x="20" y="90" font-size="12" fill="#7f8c8d">二进制:</text><text x="75" y="90" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">0</text><text x="105" y="90" font-size="16" font-weight="bold" fill="#e74c3c" text-anchor="middle">1</text><text x="135" y="90" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">0</text><text x="165" y="90" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">0</text><text x="195" y="90" font-size="16" font-weight="bold" fill="#e74c3c" text-anchor="middle">1</text><text x="225" y="90" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">0</text><text x="255" y="90" font-size="16" font-weight="bold" fill="#7f8c8d" text-anchor="middle">0</text><text x="285" y="90" font-size="16" font-weight="bold" fill="#e74c3c" text-anchor="middle">1</text></g><g transform="translate(60, 200)"><path d="M105 110v15" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M195 110v15" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M285 110v15" stroke="#e74c3c" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><text x="105" y="140" font-size="10" fill="#e74c3c" text-anchor="middle">64</text><text x="195" y="140" font-size="10" fill="#e74c3c" text-anchor="middle">8</text><text x="285" y="140" font-size="10" fill="#e74c3c" text-anchor="middle">1</text></g></g><g id="method2"><rect x="430" y="60" width="320" height="40" fill="#e67e22" rx="5"/><text x="590" text-anchor="middle" y="85" font-size="18" font-weight="bold" fill="#fff">方法二：除2取余法</text><text x="440" y="130" font-size="16" font-weight="bold" fill="#2c3e50">计算过程：</text><g transform="translate(440, 150)"><rect x="0" y="0" width="280" height="25" fill="#ecf0f1" stroke="#bdc3c7"/><text x="10" y="18" font-size="12" font-weight="bold" fill="#2c3e50">除法运算</text><text x="120" y="18" font-size="12" font-weight="bold" fill="#2c3e50">商</text><text x="200" y="18" font-size="12" font-weight="bold" fill="#2c3e50">余数</text><g id="calculations"><rect x="0" y="25" width="280" height="25" fill="#fff" stroke="#bdc3c7"/><text x="10" y="42" font-size="12" fill="#34495e">73 ÷ 2 =</text><text x="120" y="42" font-size="12" fill="#34495e">36</text><text x="200" y="42" font-size="12" font-weight="bold" fill="#e74c3c">1</text><rect x="0" y="50" width="280" height="25" fill="#f8f9fa" stroke="#bdc3c7"/><text x="10" y="67" font-size="12" fill="#34495e">36 ÷ 2 =</text><text x="120" y="67" font-size="12" fill="#34495e">18</text><text x="200" y="67" font-size="12" font-weight="bold" fill="#e74c3c">0</text><rect x="0" y="75" width="280" height="25" fill="#fff" stroke="#bdc3c7"/><text x="10" y="92" font-size="12" fill="#34495e">18 ÷ 2 =</text><text x="120" y="92" font-size="12" fill="#34495e">9</text><text x="200" y="92" font-size="12" font-weight="bold" fill="#e74c3c">0</text><rect x="0" y="100" width="280" height="25" fill="#f8f9fa" stroke="#bdc3c7"/><text x="10" y="117" font-size="12" fill="#34495e">9 ÷ 2 =</text><text x="120" y="117" font-size="12" fill="#34495e">4</text><text x="200" y="117" font-size="12" font-weight="bold" fill="#e74c3c">1</text><rect x="0" y="125" width="280" height="25" fill="#fff" stroke="#bdc3c7"/><text x="10" y="142" font-size="12" fill="#34495e">4 ÷ 2 =</text><text x="120" y="142" font-size="12" fill="#34495e">2</text><text x="200" y="142" font-size="12" font-weight="bold" fill="#e74c3c">0</text><rect x="0" y="150" width="280" height="25" fill="#f8f9fa" stroke="#bdc3c7"/><text x="10" y="167" font-size="12" fill="#34495e">2 ÷ 2 =</text><text x="120" y="167" font-size="12" fill="#34495e">1</text><text x="200" y="167" font-size="12" font-weight="bold" fill="#e74c3c">0</text><rect x="0" y="175" width="280" height="25" fill="#fff" stroke="#bdc3c7"/><text x="10" y="192" font-size="12" fill="#34495e">1 ÷ 2 =</text><text x="120" y="192" font-size="12" fill="#34495e">0</text><text x="200" y="192" font-size="12" font-weight="bold" fill="#e74c3c">1</text></g></g><text x="440" y="380" font-size="14" font-weight="bold" fill="#2c3e50">余数逆序排列：</text><g transform="translate(440, 400)"><rect x="0" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="15" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">1</text><rect x="40" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="55" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">0</text><rect x="80" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="95" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">0</text><rect x="120" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="135" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">1</text><rect x="160" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="175" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">0</text><rect x="200" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="215" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">0</text><rect x="240" y="0" width="30" height="30" fill="#e74c3c" rx="3"/><text x="255" y="20" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">1</text><path d="M15 40q125 20 250 0" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrowhead2)"/><text x="140" y="75" font-size="12" fill="#e67e22" text-anchor="middle">逆序排列</text><text x="0" y="110" font-size="14" font-weight="bold" fill="#2c3e50">8位二进制结果：</text><rect x="0" y="120" width="280" height="35" fill="#2ecc71" rx="5"/><text x="140" y="143" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">01001001</text></g></g><rect x="50" y="520" width="700" height="60" fill="#34495e" rx="10"/><text x="400" y="545" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">两种方法得到相同结果</text><text x="400" y="565" text-anchor="middle" font-size="14" fill="#ecf0f1">73₁₀ = 01001001₂ （8位无符号二进制）</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/></marker></defs></svg>