<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50">CSMA 载波监听多路访问</text><rect x="100" y="200" width="600" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="20"/><text x="400" y="225" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">共享通信介质 (总线/信道)</text><g id="deviceA"><rect x="50" y="120" width="80" height="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/><text x="90" y="140" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 A</text><text x="90" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">准备发送</text><path d="M90 180q0 10 10 20" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead)"/><text x="70" y="175" font-family="Arial" font-size="10" fill="#e74c3c">载波监听</text></g><g id="deviceB"><rect x="200" y="280" width="80" height="60" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="5"/><text x="240" y="300" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 B</text><text x="240" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">等待发送</text><path d="M240 280q0-25-20-40" fill="none" stroke="#f39c12" stroke-width="3" marker-end="url(#arrowhead)"/><text x="250" y="265" font-family="Arial" font-size="10" fill="#f39c12">载波监听</text></g><g id="deviceC"><rect x="520" y="280" width="80" height="60" fill="#27ae60" stroke="#229954" stroke-width="2" rx="5"/><text x="560" y="300" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 C</text><text x="560" y="315" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">等待发送</text><path d="M560 280q0-25 20-40" fill="none" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead)"/><text x="540" y="265" font-family="Arial" font-size="10" fill="#27ae60">载波监听</text></g><g id="deviceD"><rect x="670" y="120" width="80" height="60" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="5"/><text x="710" y="140" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#fff">设备 D</text><text x="710" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">空闲状态</text><path d="M710 180q0 10-10 20" fill="none" stroke="#9b59b6" stroke-width="3" marker-end="url(#arrowhead)"/><text x="720" y="175" font-family="Arial" font-size="10" fill="#9b59b6">载波监听</text></g><g id="dataFlow"><rect x="150" y="205" width="100" height="30" fill="#e8f4fd" stroke="#3498db" stroke-width="2" rx="15"/><text x="200" y="225" text-anchor="middle" font-family="Arial" font-size="12" fill="#2980b9">数据传输中</text><circle cx="170" cy="220" r="3" fill="#3498db"><animate attributeName="cx" values="170;230;170" dur="2s" repeatCount="indefinite"/></circle><circle cx="190" cy="220" r="3" fill="#3498db"><animate attributeName="cx" values="190;250;190" dur="2s" repeatCount="indefinite" begin=".3s"/></circle><circle cx="210" cy="220" r="3" fill="#3498db"><animate attributeName="cx" values="210;270;210" dur="2s" repeatCount="indefinite" begin=".6s"/></circle></g><g id="explanation"><rect x="50" y="380" width="320" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="5"/><text x="210" y="400" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">载波监听 (Carrier Sense)</text><text x="60" y="420" font-family="Arial" font-size="12" fill="#2c3e50">• 发送前检测信道是否空闲</text><text x="60" y="435" font-family="Arial" font-size="12" fill="#2c3e50">• 如果有数据传输，等待</text><text x="60" y="450" font-family="Arial" font-size="12" fill="#2c3e50">• 避免冲突，提高传输效率</text><rect x="430" y="380" width="320" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="5"/><text x="590" y="400" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">多路访问 (Multiple Access)</text><text x="440" y="420" font-family="Arial" font-size="12" fill="#2c3e50">• 多个设备共享同一介质</text><text x="440" y="435" font-family="Arial" font-size="12" fill="#2c3e50">• 任何设备都可尝试发送</text><text x="440" y="450" font-family="Arial" font-size="12" fill="#2c3e50">• 提供公平的访问机会</text></g><text x="400" y="75" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#34495e">工作原理: 监听 → 判断 → 发送/等待</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/></marker></defs><g id="status"><circle cx="130" cy="100" r="8" fill="#e74c3c"/><text x="150" y="105" font-family="Arial" font-size="11" fill="#e74c3c">准备发送</text><circle cx="350" cy="100" r="8" fill="#f39c12"/><text x="370" y="105" font-family="Arial" font-size="11" fill="#f39c12">等待中</text><circle cx="550" y="100" r="8" fill="#3498db"/><text x="570" y="105" font-family="Arial" font-size="11" fill="#3498db">传输中</text><circle cx="720" cy="100" r="8" fill="#95a5a6"/><text x="740" y="105" font-family="Arial" font-size="11" fill="#95a5a6">空闲</text></g></svg>