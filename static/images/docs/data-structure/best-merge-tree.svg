<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="mergeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43e97b"/>
      <stop offset="100%" stop-color="#38f9d7"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
    <filter id="shadow" x="-4" y="-4" width="12" height="12">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="620" fill="#1a1a2e" rx="12"/>

  <!-- title -->
  <text x="450" y="38" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">最佳归并树（哈夫曼树思想）</text>
  <text x="450" y="60" text-anchor="middle" fill="#888" font-size="13">6 个有序表归并过程，最坏比较次数总和 = 825</text>

  <!-- leaf nodes layer Y=480 -->
  <rect x="40" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="75" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">A:10</text>

  <rect x="130" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="165" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">B:35</text>

  <rect x="270" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="305" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">C:40</text>

  <rect x="440" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="475" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">D:50</text>

  <rect x="530" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="565" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">E:60</text>

  <rect x="730" y="470" width="70" height="44" rx="8" fill="url(#leafGrad)" filter="url(#shadow)"/>
  <text x="765" y="494" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">F:200</text>

  <!-- level 4 merge A+B AB:45 Y=370 -->
  <rect x="75" y="360" width="80" height="44" rx="8" fill="url(#mergeGrad)" filter="url(#shadow)"/>
  <text x="115" y="384" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">AB:45</text>

  <line x1="75" y1="414" x2="90" y2="470" stroke="#4facfe" stroke-width="2" opacity="0.6"/>
  <line x1="115" y1="414" x2="160" y2="470" stroke="#4facfe" stroke-width="2" opacity="0.6"/>
  <text x="65" y="438" text-anchor="middle" fill="#ffa07a" font-size="11">10+35-1=44</text>

  <!-- level 3 merge1 AB+C ABC:85 Y=260 -->
  <rect x="160" y="250" width="80" height="44" rx="8" fill="url(#mergeGrad)" filter="url(#shadow)"/>
  <text x="200" y="274" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">ABC:85</text>

  <line x1="135" y1="360" x2="180" y2="294" stroke="#38f9d7" stroke-width="2" opacity="0.6"/>
  <line x1="175" y1="360" x2="220" y2="294" stroke="#38f9d7" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="360" x2="290" y2="470" stroke="#38f9d7" stroke-width="2" opacity="0.6"/>
  <text x="230" y="335" text-anchor="middle" fill="#ffa07a" font-size="11">45+40-1=84</text>

  <!-- level 3 merge2 D+E DE:110 Y=260 -->
  <rect x="450" y="250" width="80" height="44" rx="8" fill="url(#mergeGrad)" filter="url(#shadow)"/>
  <text x="490" y="274" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">DE:110</text>

  <line x1="465" y1="360" x2="460" y2="470" stroke="#38f9d7" stroke-width="2" opacity="0.6"/>
  <line x1="505" y1="360" x2="555" y2="470" stroke="#38f9d7" stroke-width="2" opacity="0.6"/>
  <text x="505" y="388" text-anchor="middle" fill="#ffa07a" font-size="11">50+60-1=109</text>

  <!-- level 2 merge ABC+DE ABCDE:195 Y=150 -->
  <rect x="280" y="140" width="100" height="44" rx="8" fill="url(#mergeGrad)" filter="url(#shadow)"/>
  <text x="330" y="164" text-anchor="middle" fill="#1a1a2e" font-size="13" font-weight="bold">ABCDE:195</text>

  <line x1="225" y1="250" x2="300" y2="184" stroke="#43e97b" stroke-width="2" opacity="0.6"/>
  <line x1="295" y1="250" x2="340" y2="184" stroke="#43e97b" stroke-width="2" opacity="0.6"/>
  <line x1="365" y1="250" x2="380" y2="184" stroke="#43e97b" stroke-width="2" opacity="0.6"/>
  <line x1="405" y1="250" x2="400" y2="184" stroke="#43e97b" stroke-width="2" opacity="0.6"/>
  <text x="330" y="230" text-anchor="middle" fill="#ffa07a" font-size="11">85+110-1=194</text>

  <!-- level 1 root merge ABCDE+F FINAL:395 Y=50 -->
  <rect x="370" y="40" width="100" height="44" rx="10" fill="url(#rootGrad)" filter="url(#shadow)"/>
  <text x="420" y="64" text-anchor="middle" fill="#1a1a2e" font-size="14" font-weight="bold">总:395</text>

  <line x1="335" y1="140" x2="390" y2="84" stroke="#fa709a" stroke-width="2.5" opacity="0.7"/>
  <line x1="385" y1="140" x2="425" y2="84" stroke="#fa709a" stroke-width="2.5" opacity="0.7"/>
  <line x1="445" y1="140" x2="455" y2="84" stroke="#fa709a" stroke-width="2.5" opacity="0.7"/>
  <line x1="485" y1="140" x2="455" y2="84" stroke="#fa709a" stroke-width="2.5" opacity="0.7"/>
  <text x="330" y="120" text-anchor="middle" fill="#ffa07a" font-size="11">195+200-1=394</text>

  <!-- merge sequence labels -->
  <text x="15" y="395" fill="#888" font-size="11">①</text>
  <text x="140" y="310" fill="#888" font-size="11">②</text>
  <text x="420" y="325" fill="#888" font-size="11">③</text>
  <text x="240" y="210" fill="#888" font-size="11">④</text>
  <text x="490" y="100" fill="#888" font-size="11">⑤</text>

  <!-- legend -->
  <rect x="580" y="530" width="12" height="12" rx="3" fill="url(#leafGrad)"/>
  <text x="598" y="541" fill="#aaa" font-size="12">初始有序表</text>
  <rect x="700" y="530" width="12" height="12" rx="3" fill="url(#mergeGrad)"/>
  <text x="718" y="541" fill="#aaa" font-size="12">合并后有序表</text>
  <rect x="580" y="555" width="12" height="12" rx="3" fill="url(#rootGrad)"/>
  <text x="598" y="566" fill="#aaa" font-size="12">最终有序表</text>
  <text x="700" y="566" fill="#ffa07a" font-size="12">最坏比较次数</text>

  <!-- footnote -->
  <text x="450" y="610" text-anchor="middle" fill="#666" font-size="11">注：最坏比较次数 = m + n − 1</text>
</svg>
