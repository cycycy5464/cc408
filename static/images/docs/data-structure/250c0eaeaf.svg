<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280"><rect width="600" height="280" fill="#f8f9fa" stroke="#e9ecef" stroke-width="1"/><text x="300" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">线性表 Linear List</text><g transform="translate(50, 50)"><text x="0" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">L = (a₁, a₂, a₃, ..., aᵢ, aᵢ₊₁, ..., aₙ)</text><g transform="translate(0, 35)"><rect x="0" y="0" width="50" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">a₁</text><rect x="65" y="0" width="50" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="90" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">a₂</text><rect x="130" y="0" width="50" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="155" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">a₃</text><text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7f8c8d">...</text><rect x="230" y="0" width="50" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="4"/><text x="255" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">aᵢ</text><rect x="295" y="0" width="50" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="320" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">aᵢ₊₁</text><text x="365" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7f8c8d">...</text><rect x="395" y="0" width="50" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="420" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">aₙ</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs><line x1="52" y1="50" x2="63" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="117" y1="50" x2="128" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><line x1="282" y1="50" x2="293" y2="50" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><text x="255" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">当前元素</text><text x="90" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">前驱</text><text x="320" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">后继</text><line x1="90" y1="42" x2="90" y2="60" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2"/><line x1="255" y1="42" x2="255" y2="60" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2,2"/><line x1="320" y1="42" x2="320" y2="60" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,2"/></g></g><g transform="translate(50, 180)"><text x="0" y="0" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">线性表特点：</text><g transform="translate(0, 25)"><circle cx="8" cy="8" r="4" fill="#3498db"/><text x="20" y="12" font-family="Arial, sans-serif" font-size="13" fill="#34495e"><tspan font-weight="bold">个数有限：</tspan>表中元素个数是确定的有限值</text></g><g transform="translate(0, 45)"><circle cx="8" cy="8" r="4" fill="#e74c3c"/><text x="20" y="12" font-family="Arial, sans-serif" font-size="13" fill="#34495e"><tspan font-weight="bold">类型相同：</tspan>所有元素数据类型一致，占用相同存储空间</text></g><g transform="translate(0, 65)"><circle cx="8" cy="8" r="4" fill="#27ae60"/><text x="20" y="12" font-family="Arial, sans-serif" font-size="13" fill="#34495e"><tspan font-weight="bold">逻辑有序：</tspan>元素间存在先后顺序，有前驱和后继关系</text></g></g><rect x="10" y="10" width="580" height="260" fill="none" stroke="#bdc3c7" stroke-width="1" rx="8"/></svg>