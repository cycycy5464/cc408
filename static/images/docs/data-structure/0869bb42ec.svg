<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 850"><defs><style>.title{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#2c3e50}.subtitle{font-family:Arial,sans-serif;font-size:16px;fill:#34495e}.label{font-family:Arial,sans-serif;font-size:14px;fill:#2c3e50}.small-label{font-family:Arial,sans-serif;font-size:12px;fill:#555}.free-block{fill:#e8f5e9;stroke:#4caf50;stroke-width:2}.allocated-block{fill:#ffebee;stroke:#f44336;stroke-width:2}.arrow{fill:none;stroke:#666;stroke-width:2;marker-end:url(#arrowhead)}.code{font-family:courier new,monospace;font-size:13px;fill:#c7254e}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#666"/></marker></defs><text x="500" y="30" class="title" text-anchor="middle">进程堆内存分配与释放过程</text><g id="stage1"><text x="50" y="80" class="subtitle">1. 初始状态（空闲堆空间）</text><rect x="50" y="100" width="600" height="80" class="free-block" rx="4"/><text x="350" y="145" class="label" text-anchor="middle">空闲块（600 KB）</text><text x="50" y="195" class="small-label">0x1000</text><text x="630" y="195" class="small-label" text-anchor="end">0x1258</text></g><g id="stage2"><text x="50" y="240" class="subtitle">2. malloc(200KB) - 首次适应分配</text><text x="700" y="265" class="code">p1 = malloc(200*1024)</text><rect x="50" y="260" width="200" height="80" class="allocated-block" rx="4"/><text x="150" y="300" class="label" text-anchor="middle">已分配</text><text x="150" y="320" class="small-label" text-anchor="middle">200 KB (p1)</text><rect x="250" y="260" width="400" height="80" class="free-block" rx="4"/><text x="450" y="305" class="label" text-anchor="middle">空闲块（400 KB）</text><text x="50" y="355" class="small-label">0x1000</text><text x="250" y="355" class="small-label">0x1064</text><text x="630" y="355" class="small-label" text-anchor="end">0x1258</text></g><g id="stage3"><text x="50" y="400" class="subtitle">3. malloc(150KB) - 继续分配</text><text x="700" y="425" class="code">p2 = malloc(150*1024)</text><rect x="50" y="420" width="200" height="80" class="allocated-block" rx="4"/><text x="150" y="455" class="small-label" text-anchor="middle">200 KB (p1)</text><rect x="250" y="420" width="150" height="80" class="allocated-block" rx="4"/><text x="325" y="455" class="small-label" text-anchor="middle">150 KB (p2)</text><rect x="400" y="420" width="250" height="80" class="free-block" rx="4"/><text x="525" y="465" class="label" text-anchor="middle">空闲块（250 KB）</text><text x="50" y="515" class="small-label">0x1000</text><text x="250" y="515" class="small-label">0x1064</text><text x="400" y="515" class="small-label">0x10C8</text><text x="630" y="515" class="small-label" text-anchor="end">0x1258</text></g><g id="stage4"><text x="50" y="560" class="subtitle">4. free(p1) - 释放第一块内存</text><text x="700" y="585" class="code">free(p1)</text><rect x="50" y="580" width="200" height="80" class="free-block" rx="4"/><text x="150" y="615" class="small-label" text-anchor="middle">空闲块（200 KB）</text><rect x="250" y="580" width="150" height="80" class="allocated-block" rx="4"/><text x="325" y="615" class="small-label" text-anchor="middle">150 KB (p2)</text><rect x="400" y="580" width="250" height="80" class="free-block" rx="4"/><text x="525" y="625" class="label" text-anchor="middle">空闲块（250 KB）</text><text x="50" y="675" class="small-label">0x1000</text><text x="250" y="675" class="small-label">0x1064</text><text x="400" y="675" class="small-label">0x10C8</text></g><g id="stage5"><text x="50" y="720" class="subtitle">5. free(p2) - 释放并合并相邻空闲块</text><text x="700" y="745" class="code">free(p2)</text><rect x="50" y="740" width="600" height="80" class="free-block" rx="4"/><text x="350" y="775" class="label" text-anchor="middle">空闲块（600 KB）- 已合并</text><text x="350" y="795" class="small-label" text-anchor="middle">减少内存碎片</text><text x="50" y="835" class="small-label">0x1000</text><text x="630" y="835" class="small-label" text-anchor="end">0x1258</text></g><g id="legend" transform="translate(700, 100)"><text x="0" y="0" class="label" font-weight="bold">图例：</text><rect x="0" y="10" width="40" height="25" class="free-block" rx="2"/><text x="50" y="27" class="small-label">空闲块</text><rect x="0" y="45" width="40" height="25" class="allocated-block" rx="2"/><text x="50" y="62" class="small-label">已分配块</text></g></svg>