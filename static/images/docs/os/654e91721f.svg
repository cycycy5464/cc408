<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="504pt" height="875pt" viewBox="0 0 504.01 875" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 871)"><title>DijkstraAlgorithm</title><g id="node1" class="node"><title>start</title><polygon fill="#90ee90" stroke="#000" points="364,-867 310,-867 310,-831 364,-831 364,-867"/><text text-anchor="middle" x="337" y="-845.3" font-family="Microsoft Yahei" font-size="14">开始</text></g><g id="node2" class="node"><title>init</title><polygon fill="#add8e6" stroke="#000" points="447,-794 227,-794 227,-726 447,-726 447,-794"/><text text-anchor="middle" x="337" y="-778.8" font-family="Microsoft Yahei" font-size="14">初始化阶段</text><text text-anchor="middle" x="337" y="-763.8" font-family="Microsoft Yahei" font-size="14">• dist[source] = 0</text><text text-anchor="middle" x="337" y="-748.8" font-family="Microsoft Yahei" font-size="14">• dist[v] = ∞ (其他节点)</text><text text-anchor="middle" x="337" y="-733.8" font-family="Microsoft Yahei" font-size="14">• visited[v] = false (所有节点)</text></g><g id="edge1" class="edge"><title>start-&gt;init</title><path fill="none" stroke="#000" d="M337-830.81C337-823.1 337-813.63 337-804.17"/><polygon fill="#000" stroke="#000" points="340.5,-804 337,-794 333.5,-804 340.5,-804"/></g><g id="node3" class="node"><title>loop_check</title><polygon fill="#ff0" stroke="#000" points="337,-689 177.97,-671 337,-653 496.03,-671 337,-689"/><text text-anchor="middle" x="337" y="-667.3" font-family="Microsoft Yahei" font-size="14">是否还有未访问的节点？</text></g><g id="edge2" class="edge"><title>init-&gt;loop_check</title><path fill="none" stroke="#000" d="M337-725.61C337-716.85 337-707.51 337-699.12"/><polygon fill="#000" stroke="#000" points="340.5,-699.12 337,-689.12 333.5,-699.12 340.5,-699.12"/></g><g id="node4" class="node"><title>find_min</title><polygon fill="#e0ffff" stroke="#000" points="249.5,-602 102.5,-602 102.5,-564 249.5,-564 249.5,-602"/><text text-anchor="middle" x="176" y="-586.8" font-family="Microsoft Yahei" font-size="14">找到未访问节点中</text><text text-anchor="middle" x="176" y="-571.8" font-family="Microsoft Yahei" font-size="14">dist[]值最小的节点u</text></g><g id="edge3" class="edge"><title>loop_check-&gt;find_min</title><path fill="none" stroke="#000" d="M310.41-655.8C285.59-642.54 248.11-622.52 219.03-606.99"/><polygon fill="#000" stroke="#000" points="220.38,-603.74 209.91,-602.11 217.08,-609.91 220.38,-603.74"/><text text-anchor="middle" x="278.5" y="-623.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="node11" class="node"><title>finish</title><polygon fill="#90ee90" stroke="#000" points="406,-602 268,-602 268,-564 406,-564 406,-602"/><text text-anchor="middle" x="337" y="-586.8" font-family="Microsoft Yahei" font-size="14">算法结束</text><text text-anchor="middle" x="337" y="-571.8" font-family="Microsoft Yahei" font-size="14">dist[]包含最短路径</text></g><g id="edge4" class="edge"><title>loop_check-&gt;finish</title><path fill="none" stroke="#000" d="M337-652.6C337-641.06 337-625.65 337-612.36"/><polygon fill="#000" stroke="#000" points="340.5,-612.27 337,-602.27 333.5,-612.27 340.5,-612.27"/><text text-anchor="middle" x="344.5" y="-623.8" font-family="Microsoft Yahei" font-size="14">否</text></g><g id="node5" class="node"><title>mark_visited</title><polygon fill="#e0ffff" stroke="#000" points="249,-527 109,-527 109,-489 249,-489 249,-527"/><text text-anchor="middle" x="179" y="-511.8" font-family="Microsoft Yahei" font-size="14">标记节点u为已访问</text><text text-anchor="middle" x="179" y="-496.8" font-family="Microsoft Yahei" font-size="14">visited[u] = true</text></g><g id="edge5" class="edge"><title>find_min-&gt;mark_visited</title><path fill="none" stroke="#000" d="M176.74-563.96C177.07-555.88 177.47-546.18 177.84-537.18"/><polygon fill="#000" stroke="#000" points="181.34,-537.23 178.26,-527.09 174.35,-536.94 181.34,-537.23"/></g><g id="node6" class="node"><title>check_neighbors</title><polygon fill="#e0ffff" stroke="#000" points="256,-452 122,-452 122,-416 256,-416 256,-452"/><text text-anchor="middle" x="189" y="-430.3" font-family="Microsoft Yahei" font-size="14">遍历u的所有邻居v</text></g><g id="edge6" class="edge"><title>mark_visited-&gt;check_neighbors</title><path fill="none" stroke="#000" d="M181.52-488.83C182.64-480.81 183.97-471.2 185.2-462.34"/><polygon fill="#000" stroke="#000" points="188.67,-462.8 186.58,-452.42 181.74,-461.84 188.67,-462.8"/></g><g id="node7" class="node"><title>neighbor_condition</title><polygon fill="#ff0" stroke="#000" points="203,-365 0,-327 203,-289 406,-327 203,-365"/><text text-anchor="middle" x="203" y="-330.8" font-family="Microsoft Yahei" font-size="14">v未访问 且</text><text text-anchor="middle" x="203" y="-315.8" font-family="Microsoft Yahei" font-size="14">dist[u] + w(u,v) &lt; dist[v] ?</text></g><g id="edge7" class="edge"><title>check_neighbors-&gt;neighbor_condition</title><path fill="none" stroke="#000" d="M191.31-415.66C192.81-404.4 194.85-389.14 196.8-374.51"/><polygon fill="#000" stroke="#000" points="200.28,-374.91 198.13,-364.54 193.34,-373.98 200.28,-374.91"/></g><g id="node8" class="node"><title>relax</title><polygon fill="orange" stroke="#000" points="280.5,-238 89.5,-238 89.5,-200 280.5,-200 280.5,-238"/><text text-anchor="middle" x="185" y="-222.8" font-family="Microsoft Yahei" font-size="14">松弛操作</text><text text-anchor="middle" x="185" y="-207.8" font-family="Microsoft Yahei" font-size="14">dist[v] = dist[u] + w(u,v)</text></g><g id="edge8" class="edge"><title>neighbor_condition-&gt;relax</title><path fill="none" stroke="#000" d="M196.91-290.11c-2.31 13.6-4.91 28.9-7.09 41.72"/><polygon fill="#000" stroke="#000" points="193.23,-247.56 188.11,-238.29 186.33,-248.73 193.23,-247.56"/><text text-anchor="middle" x="201.5" y="-259.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="node9" class="node"><title>next_neighbor</title><polygon fill="#e0ffff" stroke="#000" points="350,-149 234,-149 234,-113 350,-113 350,-149"/><text text-anchor="middle" x="292" y="-127.3" font-family="Microsoft Yahei" font-size="14">检查下一个邻居</text></g><g id="edge9" class="edge"><title>neighbor_condition-&gt;next_neighbor</title><path fill="none" stroke="#000" d="M243.35-296.3c17.41 15.28 35.98 35.49 45.65 58.3C299.62-212.95 298.98-181.49 296.54-159.37"/><polygon fill="#000" stroke="#000" points="299.99,-158.8 295.24,-149.33 293.05,-159.7 299.99,-158.8"/><text text-anchor="middle" x="305.5" y="-215.3" font-family="Microsoft Yahei" font-size="14">否</text></g><g id="edge10" class="edge"><title>relax-&gt;next_neighbor</title><path fill="none" stroke="#000" d="M207.43-199.97c16.01 12.87 37.7 30.3 55.11 44.29"/><polygon fill="#000" stroke="#000" points="265.09,-158.12 270.69,-149.13 260.71,-152.66 265.09,-158.12"/></g><g id="node10" class="node"><title>all_neighbors_done</title><polygon fill="#ff0" stroke="#000" points="378,-76 276,-38 378,0 480,-38 378,-76"/><text text-anchor="middle" x="378" y="-41.8" font-family="Microsoft Yahei" font-size="14">u的所有邻居</text><text text-anchor="middle" x="378" y="-26.8" font-family="Microsoft Yahei" font-size="14">都检查完了？</text></g><g id="edge11" class="edge"><title>next_neighbor-&gt;all_neighbors_done</title><path fill="none" stroke="#000" d="M308.18-112.88c10.42 11.03 24.36 25.77 37.03 39.18"/><polygon fill="#000" stroke="#000" points="347.77,-76.08 352.09,-66.41 342.68,-71.28 347.77,-76.08"/></g><g id="edge13" class="edge"><title>all_neighbors_done-&gt;loop_check</title><path fill="none" stroke="#000" d="M405.34-65.91C419.56-82.79 434-105.88 434-130V-584c0-31.2-28.45-53.84-54.54-68.03"/><polygon fill="#000" stroke="#000" points="377.67,-649.01 370.38,-656.69 380.88,-655.23 377.67,-649.01"/><text text-anchor="middle" x="441.5" y="-386.8" font-family="Microsoft Yahei" font-size="14">是</text></g><g id="edge12" class="edge"><title>all_neighbors_done-&gt;neighbor_condition</title><path fill="none" stroke="#000" d="M374.3-74.75C371.44-96.55 366.65-124.79 359-149c-13.18-41.71-18-52.44-42-89-14.17-21.58-35.46-40.07-55.82-54.46"/><polygon fill="#000" stroke="#000" points="259.12,-289.63 252.84,-298.16 263.07,-295.4 259.12,-289.63"/><text text-anchor="middle" x="360.5" y="-170.8" font-family="Microsoft Yahei" font-size="14">否</text></g></g></svg>