<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550"><rect x="0" y="0" width="800" height="600" fill="none"/><g transform="translate(150, 80)"><rect x="0" y="-30" width="150" height="400" fill="none" stroke="#34495e" stroke-width="3"/><rect x="0" y="-30" width="150" height="100" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/><text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">系统区</text><text x="75" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">操作系统</text><rect x="0" y="70" width="150" height="300" fill="#3498db" stroke="#2980b9" stroke-width="1"/><text x="75" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">用户区</text><text x="75" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">单一用户程序</text><text x="75" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">独占整个用户空间</text></g><g transform="translate(120, 80)"><text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">高地址</text><text x="0" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">低地址</text></g><g transform="translate(400, 100)"><rect x="0" y="-30" width="300" height="140" fill="#d5f4e6" stroke="#27ae60" stroke-width="2" rx="10"/><text x="150" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#27ae60">优点</text><circle cx="20" cy="20" r="4" fill="#27ae60"/><text x="35" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">实现简单</text><circle cx="20" cy="45" r="4" fill="#27ae60"/><text x="35" y="50" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">无外部碎片</text><circle cx="20" cy="70" r="4" fill="#27ae60"/><text x="35" y="75" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">无需内存保护</text><circle cx="20" cy="95" r="4" fill="#27ae60"/><text x="35" y="100" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">内存中永远只有一道程序</text><rect x="0" y="140" width="300" height="140" fill="#fdeaa7" stroke="#f39c12" stroke-width="2" rx="10"/><text x="150" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e67e22">缺点</text><circle cx="20" cy="190" r="4" fill="#e67e22"/><text x="35" y="195" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">只能用于单用户、单任务系统</text><circle cx="20" cy="215" r="4" fill="#e67e22"/><text x="35" y="220" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">存储器利用率极低</text><circle cx="20" cy="240" r="4" fill="#e67e22"/><text x="35" y="245" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">不支持多任务处理</text><circle cx="20" cy="265" r="4" fill="#e67e22"/><text x="35" y="270" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">无法并发执行多个程序</text></g><g transform="translate(400, 350)"><text x="100" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">系统区 + 单一程序 + 未使用空间</text><rect x="0" y="70" width="15" height="15" fill="#e74c3c"/><text x="25" y="82" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">系统区</text><rect x="80" y="70" width="15" height="15" fill="#3498db"/><text x="105" y="82" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">用户程序</text><rect x="170" y="70" width="15" height="15" fill="#ecf0f1" stroke="#bdc3c7"/><text x="195" y="82" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">未使用</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/></marker></defs><text x="400" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">这是最简单的内存管理方式，适用于早期的单任务操作系统</text></svg>