<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="headerGrad" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#2563eb;stop-opacity:1"/><stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"/></linearGradient><linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#f8fafc;stop-opacity:1"/><stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1"/></linearGradient></defs><rect width="800" height="600" fill="#f1f5f9"/><rect x="0" y="0" width="800" height="50" fill="url(#headerGrad)"/><text x="400" y="32" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">死锁预防 (Deadlock Prevention)</text><g transform="translate(40, 80)"><rect x="0" y="0" width="340" height="120" fill="url(#cardGrad)" stroke="#cbd5e1" stroke-width="2" rx="8"/><circle cx="25" cy="25" r="8" fill="#ef4444"/><text x="40" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">1. 破坏互斥条件</text><text x="15" y="55" font-family="Arial, sans-serif" font-size="13" fill="#475569"><tspan x="15" dy="0">• 资源复制或虚拟化技术</tspan><tspan x="15" dy="18">• 减少资源的互斥使用</tspan><tspan x="15" dy="18">• 某些硬件资源难以避免互斥</tspan></text><g transform="translate(280, 15)"><rect x="0" y="0" width="20" height="15" fill="#3b82f6" rx="2"/><rect x="25" y="0" width="20" height="15" fill="#3b82f6" rx="2"/><line x1="20" y1="8" x2="25" y2="8" stroke="#10b981" stroke-width="2"/><text x="10" y="30" text-anchor="middle" font-size="10" fill="#64748b">共享</text></g></g><g transform="translate(420, 80)"><rect x="0" y="0" width="340" height="120" fill="url(#cardGrad)" stroke="#cbd5e1" stroke-width="2" rx="8"/><circle cx="25" cy="25" r="8" fill="#f59e0b"/><text x="40" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">2. 破坏占有并等待</text><text x="15" y="55" font-family="Arial, sans-serif" font-size="13" fill="#475569"><tspan x="15" dy="0">• 一次性申请所有所需资源</tspan><tspan x="15" dy="18">• 申请失败则释放已分配资源</tspan></text><g transform="translate(280, 15)"><rect x="5" y="5" width="12" height="12" fill="#f59e0b" rx="2"/><rect x="20" y="5" width="12" height="12" fill="#f59e0b" rx="2"/><rect x="35" y="5" width="12" height="12" fill="#f59e0b" rx="2"/><text x="26" y="30" text-anchor="middle" font-size="10" fill="#64748b">一次性</text></g></g><g transform="translate(40, 230)"><rect x="0" y="0" width="340" height="120" fill="url(#cardGrad)" stroke="#cbd5e1" stroke-width="2" rx="8"/><circle cx="25" cy="25" r="8" fill="#10b981"/><text x="40" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">3. 破坏非抢占</text><text x="15" y="55" font-family="Arial, sans-serif" font-size="13" fill="#475569"><tspan x="15" dy="0">• 允许进程抢占其他进程的资源</tspan><tspan x="15" dy="18">• 需要时可强制回收资源</tspan></text><g transform="translate(280, 15)"><rect x="0" y="0" width="15" height="15" fill="#64748b" rx="2"/><rect x="20" y="0" width="15" height="15" fill="#10b981" rx="2"/><polygon points="15,8 25,3 25,13" fill="#ef4444"/><text x="17" y="30" text-anchor="middle" font-size="10" fill="#64748b">抢占</text></g></g><g transform="translate(420, 230)"><rect x="0" y="0" width="340" height="120" fill="url(#cardGrad)" stroke="#cbd5e1" stroke-width="2" rx="8"/><circle cx="25" cy="25" r="8" fill="#8b5cf6"/><text x="40" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">4. 破坏循环等待</text><text x="15" y="55" font-family="Arial, sans-serif" font-size="13" fill="#475569"><tspan x="15" dy="0">• 对资源申请顺序进行限制</tspan><tspan x="15" dy="18">• 按固定顺序申请资源</tspan></text><g transform="translate(280, 15)"><circle cx="10" cy="8" r="6" fill="#8b5cf6"/><circle cx="25" cy="8" r="6" fill="#8b5cf6"/><circle cx="40" cy="8" r="6" fill="#8b5cf6"/><text x="10" y="12" text-anchor="middle" font-size="8" fill="#fff">1</text><text x="25" y="12" text-anchor="middle" font-size="8" fill="#fff">2</text><text x="40" y="12" text-anchor="middle" font-size="8" fill="#fff">3</text><text x="25" y="30" text-anchor="middle" font-size="10" fill="#64748b">顺序</text></g></g><g transform="translate(40, 380)"><rect x="0" y="0" width="720" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="8"/><circle cx="25" cy="25" r="10" fill="#f59e0b"/><text x="25" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff">!</text><text x="45" y="32" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">核心思想</text><text x="45" y="55" font-family="Arial, sans-serif" font-size="14" fill="#92400e">通过破坏死锁产生的四个必要条件中的至少一个，从根本上避免死锁的发生</text></g><g transform="translate(40, 480)"><rect x="0" y="0" width="350" height="100" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/><text x="15" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">优点</text><text x="15" y="45" font-family="Arial, sans-serif" font-size="12" fill="#15803d"><tspan x="15" dy="0">• 彻底避免死锁</tspan><tspan x="15" dy="16">• 实现相对简单</tspan><tspan x="15" dy="16">• 易于理解和验证</tspan></text></g><g transform="translate(410, 480)"><rect x="0" y="0" width="350" height="100" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="8"/><text x="15" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">缺点</text><text x="15" y="45" font-family="Arial, sans-serif" font-size="12" fill="#dc2626"><tspan x="15" dy="0">• 资源利用率低</tspan><tspan x="15" dy="16">• 限制并发度</tspan><tspan x="15" dy="16">• 可能导致饥饿</tspan></text></g></svg>