<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">inode (索引节点) 结构</text><text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">存储文件元数据，不包括文件名和实际内容</text><rect x="100" y="80" width="250" height="480" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="10"/><text x="225" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">inode</text><g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50"><rect x="120" y="120" width="210" height="30" fill="#3498db" rx="5"/><text x="225" y="140" text-anchor="middle" fill="#fff" font-weight="bold">文件类型</text><rect x="120" y="160" width="210" height="30" fill="#e74c3c" rx="5"/><text x="225" y="180" text-anchor="middle" fill="#fff" font-weight="bold">权限</text><rect x="120" y="200" width="210" height="30" fill="#f39c12" rx="5"/><text x="225" y="220" text-anchor="middle" fill="#fff" font-weight="bold">所有者</text><rect x="120" y="240" width="210" height="30" fill="#27ae60" rx="5"/><text x="225" y="260" text-anchor="middle" fill="#fff" font-weight="bold">大小</text><rect x="120" y="280" width="210" height="30" fill="#9b59b6" rx="5"/><text x="225" y="300" text-anchor="middle" fill="#fff" font-weight="bold">时间戳</text><rect x="120" y="320" width="210" height="30" fill="#1abc9c" rx="5"/><text x="225" y="340" text-anchor="middle" fill="#fff" font-weight="bold">链接计数</text><rect x="120" y="360" width="210" height="180" fill="#95a5a6" rx="5"/><text x="225" y="380" text-anchor="middle" fill="#fff" font-weight="bold">数据块指针</text></g><g font-family="Arial, sans-serif" font-size="11" fill="#2c3e50"><rect x="380" y="120" width="380" height="30" fill="#ecf0f1" stroke="#3498db" stroke-width="1" rx="3"/><text x="390" y="140" font-weight="bold">普通文件、目录、链接文件等</text><rect x="380" y="160" width="380" height="30" fill="#ecf0f1" stroke="#e74c3c" stroke-width="1" rx="3"/><text x="390" y="180" font-weight="bold">用户、组、其他用户的读、写、执行权限 (rwxrwxrwx)</text><rect x="380" y="200" width="380" height="30" fill="#ecf0f1" stroke="#f39c12" stroke-width="1" rx="3"/><text x="390" y="220" font-weight="bold">文件所有者和组的 UID/GID</text><rect x="380" y="240" width="380" height="30" fill="#ecf0f1" stroke="#27ae60" stroke-width="1" rx="3"/><text x="390" y="260" font-weight="bold">文件大小（字节数）</text><rect x="380" y="280" width="380" height="30" fill="#ecf0f1" stroke="#9b59b6" stroke-width="1" rx="3"/><text x="390" y="300" font-weight="bold">创建时间、修改时间、访问时间</text><rect x="380" y="320" width="380" height="30" fill="#ecf0f1" stroke="#1abc9c" stroke-width="1" rx="3"/><text x="390" y="340" font-weight="bold">硬链接数量，为0时文件被删除</text><rect x="380" y="360" width="380" height="180" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" rx="3"/><text x="390" y="380" font-weight="bold">指向存储文件内容的磁盘块：</text><rect x="400" y="390" width="340" height="25" fill="#bdc3c7" rx="3"/><text x="410" y="407" font-weight="bold">• 直接指针：直接指向数据块</text><rect x="400" y="420" width="340" height="25" fill="#bdc3c7" rx="3"/><text x="410" y="437" font-weight="bold">• 间接指针：指向包含数据块地址的块</text><rect x="400" y="450" width="340" height="25" fill="#bdc3c7" rx="3"/><text x="410" y="467" font-weight="bold">• 二级间接指针：指向间接指针块</text><rect x="400" y="480" width="340" height="25" fill="#bdc3c7" rx="3"/><text x="410" y="497" font-weight="bold">• 三级间接指针：指向二级间接指针块</text><text x="570" y="525" text-anchor="middle" font-style="italic" fill="#7f8c8d">(支持大文件存储)</text></g><g stroke="#34495e" stroke-width="1" opacity=".6"><line x1="350" y1="135" x2="380" y2="135"/><line x1="350" y1="175" x2="380" y2="175"/><line x1="350" y1="215" x2="380" y2="215"/><line x1="350" y1="255" x2="380" y2="255"/><line x1="350" y1="295" x2="380" y2="295"/><line x1="350" y1="335" x2="380" y2="335"/><line x1="350" y1="450" x2="380" y2="450"/></g><rect x="50" y="570" width="700" height="25" fill="#34495e" rx="5"/><text x="400" y="587" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">inode 是 UNIX/Linux 文件系统的核心概念，每个文件都有唯一的 inode 编号</text></svg>