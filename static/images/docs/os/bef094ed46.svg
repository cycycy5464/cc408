<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">段表与地址翻译</text><g><text x="50" y="80" font-size="14" font-weight="bold" fill="#e74c3c">逻辑地址 (段地址)</text><rect x="50" y="90" width="120" height="40" fill="#fff2cc" stroke="#d4ad00" stroke-width="2"/><text x="70" y="105" font-size="12" fill="#333">段号</text><text x="70" y="118" font-size="12" font-weight="bold" fill="#333">2</text><rect x="170" y="90" width="120" height="40" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/><text x="200" y="105" font-size="12" fill="#333">段内偏移</text><text x="210" y="118" font-size="12" font-weight="bold" fill="#333">300</text></g><path d="M110 140v40h90v40" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="120" y="175" font-size="11" fill="#e74c3c">用段号查表</text><g><text x="240" y="200" font-size="14" font-weight="bold" fill="#27ae60">段表</text><rect x="150" y="210" width="60" height="30" fill="#e8f5e8" stroke="#27ae60" stroke-width="2"/><text x="165" y="225" font-size="11" font-weight="bold" fill="#333">段号</text><rect x="210" y="210" width="80" height="30" fill="#e8f5e8" stroke="#27ae60" stroke-width="2"/><text x="230" y="225" font-size="11" font-weight="bold" fill="#333">基地址</text><rect x="290" y="210" width="80" height="30" fill="#e8f5e8" stroke="#27ae60" stroke-width="2"/><text x="315" y="225" font-size="11" font-weight="bold" fill="#333">限制</text><rect x="150" y="240" width="60" height="25" fill="#fff" stroke="#27ae60"/><text x="175" y="255" font-size="11" text-anchor="middle" fill="#333">0</text><rect x="210" y="240" width="80" height="25" fill="#fff" stroke="#27ae60"/><text x="250" y="255" font-size="11" text-anchor="middle" fill="#333">1000</text><rect x="290" y="240" width="80" height="25" fill="#fff" stroke="#27ae60"/><text x="330" y="255" font-size="11" text-anchor="middle" fill="#333">400</text><rect x="150" y="265" width="60" height="25" fill="#fff" stroke="#27ae60"/><text x="175" y="280" font-size="11" text-anchor="middle" fill="#333">1</text><rect x="210" y="265" width="80" height="25" fill="#fff" stroke="#27ae60"/><text x="250" y="280" font-size="11" text-anchor="middle" fill="#333">2000</text><rect x="290" y="265" width="80" height="25" fill="#fff" stroke="#27ae60"/><text x="330" y="280" font-size="11" text-anchor="middle" fill="#333">600</text><rect x="150" y="290" width="60" height="25" fill="#fff2cc" stroke="#d4ad00" stroke-width="3"/><text x="175" y="305" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">2</text><rect x="210" y="290" width="80" height="25" fill="#fff2cc" stroke="#d4ad00" stroke-width="3"/><text x="250" y="305" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">3000</text><rect x="290" y="290" width="80" height="25" fill="#fff2cc" stroke="#d4ad00" stroke-width="3"/><text x="330" y="305" font-size="11" text-anchor="middle" font-weight="bold" fill="#333">800</text></g><g><text x="400" y="260" font-size="12" font-weight="bold" fill="#e67e22">越界检查</text><rect x="400" y="270" width="160" height="50" fill="#fef2e0" stroke="#e67e22" stroke-width="2" rx="5"/><text x="410" y="285" font-size="11" fill="#333">偏移(300) &lt; 限制(800) ?</text><text x="450" y="300" font-size="12" font-weight="bold" fill="#27ae60">✓ 通过</text><text x="410" y="315" font-size="10" fill="#666">如果超出则产生段越界错误</text></g><path d="M250 330v50H480" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><text x="280" y="375" font-size="11" fill="#27ae60">获取基地址</text><g><text x="500" y="360" font-size="14" font-weight="bold" fill="#8e44ad">地址计算</text><rect x="480" y="370" width="200" height="60" fill="#f4ecf7" stroke="#8e44ad" stroke-width="2" rx="5"/><text x="490" y="390" font-size="12" fill="#333">物理地址 = 基地址 + 偏移</text><text x="530" y="410" font-size="14" font-weight="bold" fill="#8e44ad">3000 + 300 = 3300</text></g><g><text x="500" y="470" font-size="14" font-weight="bold" fill="#c0392b">物理地址</text><rect x="480" y="480" width="120" height="40" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/><text x="520" y="500" font-size="16" font-weight="bold" text-anchor="middle" fill="#c0392b">3300</text></g><path d="M580 390v80" fill="none" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowhead)"/><g><text x="50" y="370" font-size="12" font-weight="bold" fill="#34495e">翻译步骤:</text><text x="50" y="390" font-size="11" fill="#34495e">1. 从逻辑地址提取段号(2)</text><text x="50" y="410" font-size="11" fill="#34495e">2. 用段号查段表获得基地址(3000)和限制(800)</text><text x="50" y="430" font-size="11" fill="#34495e">3. 检查偏移(300)是否小于限制(800)</text><text x="50" y="450" font-size="11" fill="#34495e">4. 计算物理地址: 3000 + 300 = 3300</text></g><g><text x="650" y="120" font-size="12" font-weight="bold" fill="#16a085">物理内存</text><rect x="630" y="130" width="80" height="200" fill="#e8f8f5" stroke="#16a085" stroke-width="2"/><rect x="635" y="135" width="70" height="40" fill="#f0f0f0" stroke="#999"/><text x="655" y="150" font-size="10" fill="#333">段0</text><text x="650" y="165" font-size="9" fill="#666">1000-1399</text><rect x="635" y="180" width="70" height="60" fill="#f0f0f0" stroke="#999"/><text x="655" y="205" font-size="10" fill="#333">段1</text><text x="650" y="220" font-size="9" fill="#666">2000-2599</text><rect x="635" y="245" width="70" height="80" fill="#fff2cc" stroke="#d4ad00" stroke-width="3"/><text x="655" y="270" font-size="10" font-weight="bold" fill="#333">段2</text><text x="650" y="285" font-size="9" fill="#666">3000-3799</text><circle cx="670" cy="300" r="3" fill="#e74c3c"/><text x="675" y="305" font-size="8" fill="#e74c3c">3300</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#666"/></marker></defs><text x="400" y="580" text-anchor="middle" font-size="11" fill="#7f8c8d">段表实现了逻辑地址到物理地址的映射，同时提供越界保护</text></svg>