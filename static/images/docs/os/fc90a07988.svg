<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">LRU 页面置换算法</text><line x1="100" y1="100" x2="700" y2="100" stroke="#34495e" stroke-width="3"/><text x="50" y="105" font-size="14" fill="#34495e">时间</text><g font-size="12" fill="#7f8c8d"><line x1="700" y1="95" x2="700" y2="105" stroke="#34495e"/><text x="695" y="120" text-anchor="middle">现在</text><line x1="550" y1="95" x2="550" y2="105" stroke="#34495e"/><text x="545" y="120" text-anchor="middle">1分钟前</text><line x1="400" y1="95" x2="400" y2="105" stroke="#34495e"/><text x="395" y="120" text-anchor="middle">2分钟前</text><line x1="250" y1="95" x2="250" y2="105" stroke="#34495e"/><text x="245" y="120" text-anchor="middle">3分钟前</text></g><rect x="150" y="200" width="500" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="10"/><text x="400" y="190" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">内存中的页面</text><g><rect x="180" y="220" width="100" height="80" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="5"/><text x="230" y="250" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">页面 A</text><text x="230" y="270" text-anchor="middle" font-size="12" fill="#fff">1分钟前使用</text><text x="230" y="285" text-anchor="middle" font-size="12" fill="#fff">较新</text></g><g><rect x="320" y="220" width="100" height="80" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="5"/><text x="370" y="250" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">页面 B</text><text x="370" y="270" text-anchor="middle" font-size="12" fill="#fff">2分钟前使用</text><text x="370" y="285" text-anchor="middle" font-size="12" fill="#fff">中等</text></g><g><rect x="460" y="220" width="100" height="80" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="5"/><text x="510" y="250" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">页面 C</text><text x="510" y="270" text-anchor="middle" font-size="12" fill="#fff">3分钟前使用</text><text x="510" y="285" text-anchor="middle" font-size="12" fill="#fff">最旧</text></g><g stroke="#34495e" stroke-width="2" fill="none"><path d="M550 130q-1e2 20-320 70" stroke="#3498db"/><polygon points="225,195 235,205 235,200 245,200 225,185" fill="#3498db"/><path d="M4e2 130q-20 30-30 70" stroke="#f39c12"/><polygon points="365,195 375,205 375,200 385,200 365,185" fill="#f39c12"/><path d="M250 130q1e2 20 260 70" stroke="#e74c3c"/><polygon points="505,195 515,205 515,200 525,200 505,185" fill="#e74c3c"/></g><rect x="150" y="370" width="500" height="100" fill="#fff" stroke="#e74c3c" stroke-width="3" rx="10"/><text x="400" y="395" text-anchor="middle" font-size="16" font-weight="bold" fill="#e74c3c">LRU 算法决策</text><text x="400" y="420" text-anchor="middle" font-size="14" fill="#2c3e50">选择"最近最少使用"的页面进行替换</text><g><path d="M510 320q0 20 0 40" stroke="#e74c3c" stroke-width="4" fill="none"/><polygon points="505,355 515,365 515,360 525,360 505,345" fill="#e74c3c"/><text x="470" y="350" text-anchor="middle" font-size="14" font-weight="bold" fill="#e74c3c">被替换</text></g><text x="400" y="445" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">页面C距离现在时间最远，优先被替换出内存</text><rect x="50" y="500" width="700" height="80" fill="#e8f6ff" stroke="#3498db" stroke-width="2" rx="10"/><text x="400" y="525" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">算法原理：时间局部性</text><text x="400" y="545" text-anchor="middle" font-size="13" fill="#34495e">最近被使用的页面，在将来被再次使用的可能性更大</text><text x="400" y="565" text-anchor="middle" font-size="13" fill="#34495e">因此保留最近使用的页面，替换最久未使用的页面</text></svg>