<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">哈希表中的同义词与非同义词</text><text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7f8c8d">哈希函数：h(key) = key % 10</text><g id="keys-section"><text x="50" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">键 (Keys)</text><rect x="50" y="130" width="60" height="40" rx="5" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="80" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">15</text><rect x="50" y="190" width="60" height="40" rx="5" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="80" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">25</text><rect x="50" y="250" width="60" height="40" rx="5" fill="#27ae60" stroke="#229954" stroke-width="2"/><text x="80" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff">17</text></g><g id="hash-calculation"><text x="150" y="155" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">15 % 10 = 5</text><line x1="110" y1="150" x2="240" y2="150" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead-blue)"/><text x="150" y="215" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">25 % 10 = 5</text><line x1="110" y1="210" x2="240" y2="210" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead-red)"/><text x="150" y="275" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">17 % 10 = 7</text><line x1="110" y1="270" x2="240" y2="270" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)"/></g><g id="hash-table"><text x="450" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">哈希表 (Hash Table)</text><g id="slots"><text x="400" y="140" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">索引</text><text x="480" y="140" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">槽位</text><rect x="420" y="150" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">0</text><rect x="460" y="150" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="190" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">1</text><rect x="460" y="190" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="230" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">2</text><rect x="460" y="230" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="270" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">3</text><rect x="460" y="270" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="310" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">4</text><rect x="460" y="310" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="350" width="30" height="35" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/><text x="435" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#856404">5</text><rect x="460" y="350" width="80" height="35" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/><text x="500" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#856404">冲突!</text><rect x="420" y="390" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">6</text><rect x="460" y="390" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="430" width="30" height="35" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2"/><text x="435" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c5460">7</text><rect x="460" y="430" width="80" height="35" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2"/><text x="500" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0c5460">17</text><rect x="420" y="470" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="492" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">8</text><rect x="460" y="470" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><rect x="420" y="510" width="30" height="35" fill="#ecf0f1" stroke="#bdc3c7"/><text x="435" y="532" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">9</text><rect x="460" y="510" width="80" height="35" fill="#ecf0f1" stroke="#bdc3c7"/></g></g><line x1="240" y1="180" x2="380" y2="367" stroke="#3498db" stroke-width="3" marker-end="url(#arrowhead-blue)" stroke-dasharray="5,5"/><line x1="240" y1="200" x2="380" y2="367" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead-red)" stroke-dasharray="5,5"/><line x1="240" y1="270" x2="380" y2="447" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowhead-green)"/><g id="explanations"><text x="600" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e74c3c">同义词 (Synonyms)</text><text x="600" y="220" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">键 15 和 25 都映射到索引 5</text><text x="600" y="240" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">它们竞争同一个槽位</text><text x="600" y="260" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">→ 产生哈希冲突</text><line x1="590" y1="280" x2="720" y2="280" stroke="#bdc3c7" stroke-width="1"/><text x="600" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">非同义词 (Non-synonyms)</text><text x="600" y="340" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">键 15 映射到索引 5</text><text x="600" y="360" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">键 17 映射到索引 7</text><text x="600" y="380" font-family="Arial, sans-serif" font-size="14" fill="#27ae60">→ 没有冲突</text></g><rect x="50" y="560" width="700" height="30" rx="5" fill="#e8f4f8" stroke="#3498db"/><text x="400" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50"><tspan font-weight="bold">总结：</tspan>同义词导致哈希冲突，需要冲突解决策略；非同义词可以和谐共存于不同槽位</text><defs><marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/></marker><marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker><marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs></svg>