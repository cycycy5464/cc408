<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="444pt" height="817pt" viewBox="0 0 444 817" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 813)"><title>KruskalAlgorithm</title><g id="node1" class="node"><title>start</title><ellipse fill="#90ee90" stroke="#000" cx="196.5" cy="-791" rx="29.5" ry="18"/><text text-anchor="middle" x="196.5" y="-787.3" font-family="Microsoft Yahei" font-size="14">开始</text></g><g id="node2" class="node"><title>init</title><polygon fill="#add8e6" stroke="#000" points="266,-736 127,-736 127,-698 266,-698 266,-736"/><text text-anchor="middle" x="196.5" y="-720.8" font-family="Microsoft Yahei" font-size="14">初始化空的生成树T</text><text text-anchor="middle" x="196.5" y="-705.8" font-family="Microsoft Yahei" font-size="14">边集合E = ∅</text></g><g id="edge1" class="edge"><title>start-&gt;init</title><path fill="none" stroke="#000" d="M196.5-772.94C196.5-764.99 196.5-755.31 196.5-746.31"/><polygon fill="#000" stroke="#000" points="200,-746.2 196.5,-736.2 193,-746.2 200,-746.2"/></g><g id="node3" class="node"><title>sort</title><polygon fill="#add8e6" stroke="#000" points="254.5,-661 138.5,-661 138.5,-623 254.5,-623 254.5,-661"/><text text-anchor="middle" x="196.5" y="-645.8" font-family="Microsoft Yahei" font-size="14">将所有边按权重</text><text text-anchor="middle" x="196.5" y="-630.8" font-family="Microsoft Yahei" font-size="14">从小到大排序</text></g><g id="edge2" class="edge"><title>init-&gt;sort</title><path fill="none" stroke="#000" d="M196.5-697.96C196.5-689.88 196.5-680.18 196.5-671.18"/><polygon fill="#000" stroke="#000" points="200,-671.09 196.5,-661.09 193,-671.09 200,-671.09"/></g><g id="node4" class="node"><title>select</title><polygon fill="#ffffe0" stroke="#000" points="259,-578.5 134,-578.5 134,-540.5 259,-540.5 259,-578.5"/><text text-anchor="middle" x="196.5" y="-563.3" font-family="Microsoft Yahei" font-size="14">从排序边列表中</text><text text-anchor="middle" x="196.5" y="-548.3" font-family="Microsoft Yahei" font-size="14">选取最小权重边e</text></g><g id="edge3" class="edge"><title>sort-&gt;select</title><path fill="none" stroke="#000" d="M196.5-622.73C196.5-612.75 196.5-600.16 196.5-588.93"/><polygon fill="#000" stroke="#000" points="200,-588.69 196.5,-578.69 193,-588.69 200,-588.69"/></g><g id="node5" class="node"><title>check</title><polygon fill="orange" stroke="#000" points="131.5,-496 29.5,-458 131.5,-420 233.5,-458 131.5,-496"/><text text-anchor="middle" x="131.5" y="-461.8" font-family="Microsoft Yahei" font-size="14">添加边e是否</text><text text-anchor="middle" x="131.5" y="-446.8" font-family="Microsoft Yahei" font-size="14">会形成环路？</text></g><g id="edge4" class="edge"><title>select-&gt;check</title><path fill="none" stroke="#000" d="M184.58-540.25C176.73-528.24 166.18-512.08 156.54-497.33"/><polygon fill="#000" stroke="#000" points="159.4,-495.31 151,-488.85 153.54,-499.14 159.4,-495.31"/></g><g id="node8" class="node"><title>complete</title><polygon fill="orange" stroke="#000" points="192.5,-281 76.5,-228 192.5,-175 308.5,-228 192.5,-281"/><text text-anchor="middle" x="192.5" y="-239.3" font-family="Microsoft Yahei" font-size="14">生成树是否包含</text><text text-anchor="middle" x="192.5" y="-224.3" font-family="Microsoft Yahei" font-size="14">n-1条边？</text><text text-anchor="middle" x="192.5" y="-209.3" font-family="Microsoft Yahei" font-size="14">(n为顶点数)</text></g><g id="node6" class="node"><title>add</title><polygon fill="#90ee90" stroke="#000" points="133,-354 0,-354 0,-318 133,-318 133,-354"/><text text-anchor="middle" x="66.5" y="-332.3" font-family="Microsoft Yahei" font-size="14">将边e加入生成树T</text></g><g id="edge5" class="edge"><title>check-&gt;add</title><path fill="none" stroke="#000" d="M98.25-432.14C89.1-423.61 80.15-413.32 74.5-402 68.73-390.43 66.5-376.32 65.82-364.2"/><polygon fill="#000" stroke="#000" points="69.32,-364.09 65.56,-354.18 62.32,-364.27 69.32,-364.09"/><text text-anchor="middle" x="115.5" y="-390.8" font-family="Microsoft Yahei" font-size="14">否</text><text text-anchor="middle" x="115.5" y="-375.8" font-family="Microsoft Yahei" font-size="14">(不形成环路)</text></g><g id="node7" class="node"><title>skip</title><polygon fill="#f08080" stroke="#000" points="233.5,-354 151.5,-354 151.5,-318 233.5,-318 233.5,-354"/><text text-anchor="middle" x="192.5" y="-332.3" font-family="Microsoft Yahei" font-size="14">跳过此边e</text></g><g id="edge6" class="edge"><title>check-&gt;skip</title><path fill="none" stroke="#000" d="M147.37-425.78C157.23-406.39 169.76-381.73 179.12-363.33"/><polygon fill="#000" stroke="#000" points="182.28,-364.83 183.69,-354.33 176.04,-361.66 182.28,-364.83"/><text text-anchor="middle" x="208.5" y="-390.8" font-family="Microsoft Yahei" font-size="14">是</text><text text-anchor="middle" x="208.5" y="-375.8" font-family="Microsoft Yahei" font-size="14">(形成环路)</text></g><g id="edge7" class="edge"><title>add-&gt;complete</title><path fill="none" stroke="#000" d="M86.74-317.97C102.28-304.9 124.39-286.3 144.38-269.49"/><polygon fill="#000" stroke="#000" points="146.8,-272.02 152.2,-262.9 142.3,-266.66 146.8,-272.02"/></g><g id="edge8" class="edge"><title>skip-&gt;complete</title><path fill="none" stroke="#000" d="M192.5-317.97c0 7.47000000000003.0 16.75.0 26.46"/><polygon fill="#000" stroke="#000" points="196,-291.28 192.5,-281.28 189,-291.28 196,-291.28"/></g><g id="edge9" class="edge"><title>complete-&gt;select</title><path fill="none" stroke="#000" d="M241.61-258.66c13.53-10.86 26.5-24.44 33.89-40.34 40.46-87.06 48.84-133.35.0-216C270.82-522.92 264.13-529.49 256.59-534.93"/><polygon fill="#000" stroke="#000" points="254.65,-532.02 248.14,-540.38 258.44,-537.9 254.65,-532.02"/><text text-anchor="middle" x="372" y="-390.8" font-family="Microsoft Yahei" font-size="14">否</text><text text-anchor="middle" x="372" y="-375.8" font-family="Microsoft Yahei" font-size="14">(继续选取下一条边)</text></g><g id="node9" class="node"><title>result</title><polygon fill="#90ee90" stroke="#000" points="255,-109 130,-109 130,-73 255,-73 255,-109"/><text text-anchor="middle" x="192.5" y="-87.3" font-family="Microsoft Yahei" font-size="14">返回最小生成树T</text></g><g id="edge10" class="edge"><title>complete-&gt;result</title><path fill="none" stroke="#000" d="M192.5-174.81c0 18.93.0 39.56.0 55.49"/><polygon fill="#000" stroke="#000" points="196,-119.12 192.5,-109.12 189,-119.12 196,-119.12"/><text text-anchor="middle" x="233.5" y="-145.8" font-family="Microsoft Yahei" font-size="14">是</text><text text-anchor="middle" x="233.5" y="-130.8" font-family="Microsoft Yahei" font-size="14">(生成树完成)</text></g><g id="node10" class="node"><title>end</title><ellipse fill="#90ee90" stroke="#000" cx="192.5" cy="-18" rx="29.5" ry="18"/><text text-anchor="middle" x="192.5" y="-14.3" font-family="Microsoft Yahei" font-size="14">结束</text></g><g id="edge11" class="edge"><title>result-&gt;end</title><path fill="none" stroke="#000" d="M192.5-72.81c0 8.02.0 17.76.0 26.74"/><polygon fill="#000" stroke="#000" points="196,-46.03 192.5,-36.03 189,-46.03 196,-46.03"/></g><g id="node11" class="node"><title>note1</title><polygon fill="#ffffe0" stroke="#000" points="430,-586 277,-586 277,-533 436,-533 436,-580 430,-586"/><polyline fill="none" stroke="#000" points="430,-586 430,-580"/><polyline fill="none" stroke="#000" points="436,-580 430,-580"/><text text-anchor="middle" x="356.5" y="-570.8" font-family="Microsoft Yahei" font-size="14">核心思想：贪心策略</text><text text-anchor="middle" x="356.5" y="-555.8" font-family="Microsoft Yahei" font-size="14">每次选择最小权重的边</text><text text-anchor="middle" x="356.5" y="-540.8" font-family="Microsoft Yahei" font-size="14">同时避免形成环路</text></g></g></svg>