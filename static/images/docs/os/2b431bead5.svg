<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="physicalGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#e2e8f0;stop-opacity:1"/><stop offset="100%" style="stop-color:#cbd5e0;stop-opacity:1"/></linearGradient><linearGradient id="hypervisorGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#bee3f8;stop-opacity:1"/><stop offset="100%" style="stop-color:#90cdf4;stop-opacity:1"/></linearGradient><linearGradient id="vmGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#c6f6d5;stop-opacity:1"/><stop offset="100%" style="stop-color:#9ae6b4;stop-opacity:1"/></linearGradient><linearGradient id="osGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#fed7d7;stop-opacity:1"/><stop offset="100%" style="stop-color:#fbb6ce;stop-opacity:1"/></linearGradient></defs><text x="400" y="30" text-anchor="middle" style="font-size:24px;font-weight:700;fill:#2d3748">虚拟机架构图</text><rect x="50" y="480" width="700" height="100" fill="url(#physicalGrad)" rx="8"/><text x="400" y="520" text-anchor="middle" style="font-size:18px;font-weight:700;fill:#4a5568">物理硬件 (Physical Hardware)</text><text x="400" y="545" text-anchor="middle" style="font-size:14px;fill:#718096">CPU • 内存 (RAM) • 存储设备 • 网络设备</text><rect x="50" y="420" width="700" height="50" fill="url(#hypervisorGrad)" rx="8"/><text x="400" y="440" text-anchor="middle" style="font-size:16px;font-weight:700;fill:#2d3748">Hypervisor (虚拟机监视器)</text><text x="400" y="455" text-anchor="middle" style="font-size:12px;fill:#4a5568">资源管理 • 隔离 • 虚拟化</text><rect x="80" y="200" width="200" height="200" fill="url(#vmGrad)" rx="8" stroke="#2f855a" stroke-width="2"/><text x="180" y="225" text-anchor="middle" style="font-size:16px;font-weight:700;fill:#2d3748">虚拟机 1</text><rect x="100" y="240" width="160" height="40" fill="url(#osGrad)" rx="4"/><text x="180" y="265" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#fff">Linux OS</text><rect x="110" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="132" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">App1</text><rect x="165" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="187" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">App2</text><rect x="220" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="242" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">Web</text><rect x="100" y="330" width="160" height="60" fill="#f7fafc" rx="4" stroke="#cbd5e0"/><text x="180" y="350" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#4a5568">虚拟硬件</text><text x="180" y="365" text-anchor="middle" style="font-size:10px;fill:#718096">vCPU: 2核</text><text x="180" y="378" text-anchor="middle" style="font-size:10px;fill:#718096">vRAM: 4GB</text><rect x="300" y="200" width="200" height="200" fill="url(#vmGrad)" rx="8" stroke="#2f855a" stroke-width="2"/><text x="400" y="225" text-anchor="middle" style="font-size:16px;font-weight:700;fill:#2d3748">虚拟机 2</text><rect x="320" y="240" width="160" height="40" fill="url(#osGrad)" rx="4"/><text x="400" y="265" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#fff">Windows OS</text><rect x="330" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="352" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">SQL</text><rect x="385" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="407" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">IIS</text><rect x="440" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="462" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">Office</text><rect x="320" y="330" width="160" height="60" fill="#f7fafc" rx="4" stroke="#cbd5e0"/><text x="400" y="350" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#4a5568">虚拟硬件</text><text x="400" y="365" text-anchor="middle" style="font-size:10px;fill:#718096">vCPU: 4核</text><text x="400" y="378" text-anchor="middle" style="font-size:10px;fill:#718096">vRAM: 8GB</text><rect x="520" y="200" width="200" height="200" fill="url(#vmGrad)" rx="8" stroke="#2f855a" stroke-width="2"/><text x="620" y="225" text-anchor="middle" style="font-size:16px;font-weight:700;fill:#2d3748">虚拟机 3</text><rect x="540" y="240" width="160" height="40" fill="url(#osGrad)" rx="4"/><text x="620" y="265" text-anchor="middle" style="font-size:14px;font-weight:700;fill:#fff">Ubuntu OS</text><rect x="550" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="572" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">Docker</text><rect x="605" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="627" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">K8s</text><rect x="660" y="290" width="45" height="30" fill="#f7fafc" rx="3" stroke="#cbd5e0"/><text x="682" y="309" text-anchor="middle" style="font-size:10px;fill:#4a5568">DB</text><rect x="540" y="330" width="160" height="60" fill="#f7fafc" rx="4" stroke="#cbd5e0"/><text x="620" y="350" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#4a5568">虚拟硬件</text><text x="620" y="365" text-anchor="middle" style="font-size:10px;fill:#718096">vCPU: 6核</text><text x="620" y="378" text-anchor="middle" style="font-size:10px;fill:#718096">vRAM: 16GB</text><line x1="180" y1="400" x2="180" y2="420" stroke="#2c5282" stroke-width="2" stroke-dasharray="5,5"/><polygon points="175,415 180,420 185,415" fill="#2c5282"/><line x1="400" y1="400" x2="400" y2="420" stroke="#2c5282" stroke-width="2" stroke-dasharray="5,5"/><polygon points="395,415 400,420 405,415" fill="#2c5282"/><line x1="620" y1="400" x2="620" y2="420" stroke="#2c5282" stroke-width="2" stroke-dasharray="5,5"/><polygon points="615,415 620,420 625,415" fill="#2c5282"/><line x1="400" y1="470" x2="400" y2="480" stroke="#4a5568" stroke-width="3"/><polygon points="395,475 400,480 405,475" fill="#4a5568"/><g transform="translate(50, 60)"><rect x="0" y="0" width="300" height="120" fill="#f8f9fa" rx="8" stroke="#e2e8f0"/><text x="10" y="25" style="font-size:14px;font-weight:700;fill:#2d3748">主要功能：</text><text x="10" y="45" style="font-size:12px;fill:#4a5568">• 资源虚拟化与分配</text><text x="10" y="60" style="font-size:12px;fill:#4a5568">• 多操作系统并行运行</text><text x="10" y="75" style="font-size:12px;fill:#4a5568">• 虚拟机间隔离保护</text><text x="10" y="90" style="font-size:12px;fill:#4a5568">• 硬件资源动态调度</text><text x="10" y="105" style="font-size:12px;fill:#4a5568">• 快照与迁移支持</text></g><g transform="translate(450, 60)"><rect x="0" y="0" width="300" height="120" fill="#f0fff4" rx="8" stroke="#9ae6b4"/><text x="10" y="25" style="font-size:14px;font-weight:700;fill:#2d3748">技术优势：</text><text x="10" y="45" style="font-size:12px;fill:#4a5568">• 提高硬件利用率</text><text x="10" y="60" style="font-size:12px;fill:#4a5568">• 降低运维成本</text><text x="10" y="75" style="font-size:12px;fill:#4a5568">• 简化环境部署</text><text x="10" y="90" style="font-size:12px;fill:#4a5568">• 增强系统安全性</text><text x="10" y="105" style="font-size:12px;fill:#4a5568">• 支持灾难恢复</text></g></svg>