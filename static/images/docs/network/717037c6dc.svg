<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg viewBox="0 0 800 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #1a1a1a; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #1a1a1a; }
      .small-text { font-family: Arial, sans-serif; font-size: 10px; fill: #1a1a1a; }
      .small-text-white { font-family: Arial, sans-serif; font-size: 10px; fill: #ffffff; }
      .text-white { font-family: Arial, sans-serif; font-size: 12px; fill: #ffffff; }
      .text-red { font-family: Arial, sans-serif; font-size: 10px; fill: #e74c3c; }
      .frame { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .switch { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .arrow { fill: #27ae60; stroke: #27ae60; stroke-width: 2; }
      .check { fill: #f39c12; stroke: #e67e22; stroke-width: 2; }
      .time-line { stroke: #95a5a6; stroke-width: 1; stroke-dasharray: 5,5; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" class="title">交换机交换方式对比</text>
  
  <!-- Data frame representation -->
  <text x="50" y="60" class="subtitle">数据帧结构：</text>
  <rect x="50" y="70" width="60" height="20" class="frame" rx="3"/>
  <text x="80" y="83" text-anchor="middle" class="small-text-white">目的MAC</text>
  <rect x="110" y="70" width="40" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="130" y="83" text-anchor="middle" class="small-text-white">其他</text>
  <rect x="150" y="70" width="80" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="190" y="83" text-anchor="middle" class="small-text-white">数据载荷</text>
  <rect x="230" y="70" width="40" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  <text x="250" y="83" text-anchor="middle" class="small-text-white">CRC</text>
  
  <!-- Method 1: Cut-through switching -->
  <g transform="translate(0, 120)">
    <text x="50" y="0" class="subtitle">1. 直通交换</text>
    
    <!-- Timeline -->
    <line x1="50" y1="40" x2="700" y2="40" class="time-line"/>
    <text x="50" y="35" class="small-text">时间</text>
    
    <!-- Frame arrival -->
    <rect x="100" y="20" width="200" height="15" class="frame" rx="2"/>
    <text x="200" y="30" text-anchor="middle" class="small-text-white">数据帧到达</text>
    
    <!-- MAC reading -->
    <rect x="100" y="50" width="60" height="15" fill="#f39c12" stroke="#e67e22" stroke-width="1" rx="2"/>
    <text x="130" y="60" text-anchor="middle" class="small-text-white">读取MAC</text>
    
    <!-- Forwarding starts -->
    <polygon points="170,45 190,55 170,65" class="arrow"/>
    <rect x="200" y="50" width="300" height="15" fill="#27ae60" stroke="#229954" stroke-width="1" rx="2"/>
    <text x="350" y="60" text-anchor="middle" class="small-text-white">立即开始转发（无需等待完整帧）</text>
    
    <text x="50" y="85" class="text">特点：延迟最低，但可能转发错误帧</text>
  </g>
  
  <!-- Method 2: Store and Forward -->
  <g transform="translate(0, 240)">
    <text x="50" y="0" class="subtitle">2. 存储转发</text>
    
    <!-- Timeline -->
    <line x1="50" y1="40" x2="700" y2="40" class="time-line"/>
    
    <!-- Frame arrival -->
    <rect x="100" y="20" width="200" height="15" class="frame" rx="2"/>
    <text x="200" y="30" text-anchor="middle" class="small-text-white">完整数据帧接收</text>
    
    <!-- Storage -->
    <rect x="100" y="50" width="200" height="15" fill="#9b59b6" stroke="#8e44ad" stroke-width="1" rx="2"/>
    <text x="200" y="60" text-anchor="middle" class="small-text-white">存储到缓冲区</text>
    
    <!-- CRC Check -->
    <rect x="320" y="50" width="80" height="15" class="check" rx="2"/>
    <text x="360" y="60" text-anchor="middle" class="small-text-white">CRC校验</text>
    
    <!-- Forwarding -->
    <polygon points="410,45 430,55 410,65" class="arrow"/>
    <rect x="440" y="50" width="150" height="15" fill="#27ae60" stroke="#229954" stroke-width="1" rx="2"/>
    <text x="515" y="60" text-anchor="middle" class="small-text-white">确认无误后转发</text>
    
    <text x="50" y="85" class="text">特点：可靠性最高，能检测并丢弃错误帧，但延迟较大</text>
  </g>
  
  <!-- Method 3: Fragment-free -->
  <g transform="translate(0, 360)">
    <text x="50" y="0" class="subtitle">3. 碎片隔离</text>
    
    <!-- Timeline -->
    <line x1="50" y1="40" x2="700" y2="40" class="time-line"/>
    
    <!-- Frame arrival -->
    <rect x="100" y="20" width="200" height="15" class="frame" rx="2"/>
    <text x="200" y="30" text-anchor="middle" class="small-text-white">数据帧到达</text>
    
    <!-- 64 bytes check -->
    <rect x="100" y="50" width="120" height="15" fill="#f39c12" stroke="#e67e22" stroke-width="1" rx="2"/>
    <text x="160" y="60" text-anchor="middle" class="small-text-white">检查前64字节</text>
    
    <!-- Decision diamond -->
    <polygon points="240,45 260,55 240,65 220,55" fill="#e67e22" stroke="#d35400" stroke-width="1"/>
    <text x="240" y="58" text-anchor="middle" class="small-text-white">≥64?</text>
    
    <!-- Forward path -->
    <polygon points="270,45 290,55 270,65" class="arrow"/>
    <rect x="300" y="50" width="100" height="15" fill="#27ae60" stroke="#229954" stroke-width="1" rx="2"/>
    <text x="350" y="60" text-anchor="middle" class="small-text-white">正常转发</text>
    
    <!-- Drop path -->
    <line x1="240" y1="65" x2="240" y2="85" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="235,80 240,90 245,80" fill="#e74c3c"/>
    <text x="240" y="105" text-anchor="middle" class="text-red">丢弃碎片</text>
    
    <text x="50" y="125" class="text">特点：介于两者之间，能过滤碎片帧，延迟适中</text>
  </g>
  
  <!-- Comparison table -->
  <g transform="translate(50, 520)">
    <text x="0" y="0" class="subtitle">性能对比：</text>
    
    <!-- Table headers -->
    <rect x="0" y="10" width="150" height="25" fill="#2c3e50" rx="3"/>
    <text x="75" y="27" text-anchor="middle" class="text-white">交换方式</text>
    
    <rect x="150" y="10" width="120" height="25" fill="#2c3e50" rx="3"/>
    <text x="210" y="27" text-anchor="middle" class="text-white">转发延迟</text>
    
    <rect x="270" y="10" width="120" height="25" fill="#2c3e50" rx="3"/>
    <text x="330" y="27" text-anchor="middle" class="text-white">错误检测</text>
    
    <rect x="390" y="10" width="150" height="25" fill="#2c3e50" rx="3"/>
    <text x="465" y="27" text-anchor="middle" class="text-white">适用场景</text>
    
    <!-- Row 1 -->
    <rect x="0" y="35" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="75" y="52" text-anchor="middle" class="text">直通交换</text>
    
    <rect x="150" y="35" width="120" height="25" fill="#d5f4e6" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="210" y="52" text-anchor="middle" class="text">最低</text>
    
    <rect x="270" y="35" width="120" height="25" fill="#fadbd8" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="330" y="52" text-anchor="middle" class="text">无</text>
    
    <rect x="390" y="35" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="465" y="52" text-anchor="middle" class="text">高速网络</text>
    
    <!-- Row 2 -->
    <rect x="0" y="60" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="75" y="77" text-anchor="middle" class="text">存储转发</text>
    
    <rect x="150" y="60" width="120" height="25" fill="#fadbd8" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="210" y="77" text-anchor="middle" class="text">最高</text>
    
    <rect x="270" y="60" width="120" height="25" fill="#d5f4e6" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="330" y="77" text-anchor="middle" class="text">完整CRC</text>
    
    <rect x="390" y="60" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="465" y="77" text-anchor="middle" class="text">可靠性要求高</text>
    
    <!-- Row 3 -->
    <rect x="0" y="85" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="75" y="102" text-anchor="middle" class="text">碎片隔离</text>
    
    <rect x="150" y="85" width="120" height="25" fill="#fef9e7" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="210" y="102" text-anchor="middle" class="text">适中</text>
    
    <rect x="270" y="85" width="120" height="25" fill="#fef9e7" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="330" y="102" text-anchor="middle" class="text">碎片检测</text>
    
    <rect x="390" y="85" width="150" height="25" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="465" y="102" text-anchor="middle" class="text">平衡性能</text>
  </g>
</svg>
