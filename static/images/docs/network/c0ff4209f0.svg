<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="none"/><text x="400" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">KMP算法 - 修正后的next数组 (nextval)</text><text x="50" y="55" font-size="14" font-weight="bold" fill="#e74c3c">问题：</text><text x="100" y="55" font-size="13" fill="#2c3e50">当 pattern[i] == pattern[next[i]] 时，会导致重复比较相同字符</text><text x="50" y="75" font-size="14" font-weight="bold" fill="#27ae60">解决：</text><text x="100" y="75" font-size="13" fill="#2c3e50">nextval数组避免跳转到相同字符位置</text><text x="50" y="110" font-size="14" font-weight="bold" fill="#34495e">示例：pattern = "ababaa"</text><g transform="translate(50, 130)"><rect x="0" y="0" width="60" height="25" fill="#3498db" stroke="#2c3e50"/><text x="30" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">字符</text><rect x="60" y="0" width="60" height="25" fill="#3498db" stroke="#2c3e50"/><text x="90" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">索引</text><rect x="120" y="0" width="60" height="25" fill="#3498db" stroke="#2c3e50"/><text x="150" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">next</text><rect x="180" y="0" width="80" height="25" fill="#e67e22" stroke="#2c3e50"/><text x="220" y="17" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">nextval</text><g id="data-rows"><rect x="0" y="25" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="30" y="42" text-anchor="middle" font-size="12" fill="#2c3e50">a</text><rect x="60" y="25" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="90" y="42" text-anchor="middle" font-size="12" fill="#2c3e50">0</text><rect x="120" y="25" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="42" text-anchor="middle" font-size="12" fill="#2c3e50">-1</text><rect x="180" y="25" width="80" height="25" fill="#fff3cd" stroke="#2c3e50"/><text x="220" y="42" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">-1</text><rect x="0" y="50" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="30" y="67" text-anchor="middle" font-size="12" fill="#2c3e50">b</text><rect x="60" y="50" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="90" y="67" text-anchor="middle" font-size="12" fill="#2c3e50">1</text><rect x="120" y="50" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="67" text-anchor="middle" font-size="12" fill="#2c3e50">0</text><rect x="180" y="50" width="80" height="25" fill="#fff3cd" stroke="#2c3e50"/><text x="220" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">0</text><rect x="0" y="75" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="30" y="92" text-anchor="middle" font-size="12" fill="#2c3e50">a</text><rect x="60" y="75" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="90" y="92" text-anchor="middle" font-size="12" fill="#2c3e50">2</text><rect x="120" y="75" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="92" text-anchor="middle" font-size="12" fill="#2c3e50">0</text><rect x="180" y="75" width="80" height="25" fill="#fff3cd" stroke="#2c3e50"/><text x="220" y="92" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">0</text><rect x="0" y="100" width="60" height="25" fill="#ffeaa7" stroke="#2c3e50" stroke-width="2"/><text x="30" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">b</text><rect x="60" y="100" width="60" height="25" fill="#ffeaa7" stroke="#2c3e50" stroke-width="2"/><text x="90" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">3</text><rect x="120" y="100" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="117" text-anchor="middle" font-size="12" fill="#2c3e50">1</text><rect x="180" y="100" width="80" height="25" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/><text x="220" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c5460">0</text><rect x="0" y="125" width="60" height="25" fill="#ffeaa7" stroke="#2c3e50" stroke-width="2"/><text x="30" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">a</text><rect x="60" y="125" width="60" height="25" fill="#ffeaa7" stroke="#2c3e50" stroke-width="2"/><text x="90" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">4</text><rect x="120" y="125" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="142" text-anchor="middle" font-size="12" fill="#2c3e50">2</text><rect x="180" y="125" width="80" height="25" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/><text x="220" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#0c5460">0</text><rect x="0" y="150" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="30" y="167" text-anchor="middle" font-size="12" fill="#2c3e50">a</text><rect x="60" y="150" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="90" y="167" text-anchor="middle" font-size="12" fill="#2c3e50">5</text><rect x="120" y="150" width="60" height="25" fill="#fff" stroke="#2c3e50"/><text x="150" y="167" text-anchor="middle" font-size="12" fill="#2c3e50">3</text><rect x="180" y="150" width="80" height="25" fill="#fff3cd" stroke="#2c3e50"/><text x="220" y="167" text-anchor="middle" font-size="12" font-weight="bold" fill="#856404">3</text></g></g><g transform="translate(350, 100)"><rect x="0" y="0" width="400" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-dasharray="5,5" rx="5"/><text x="10" y="20" font-size="14" font-weight="bold" fill="#495057">优化过程说明：</text><text x="10" y="40" font-size="12" fill="#6c757d">• nextval[3]: pattern[3]='b' == pattern[next[3]]='b'</text><text x="20" y="55" font-size="12" fill="#28a745">→ nextval[3] = nextval[1] = 0</text><text x="10" y="75" font-size="12" fill="#6c757d">• nextval[4]: pattern[4]='a' == pattern[next[4]]='a'</text><text x="20" y="90" font-size="12" fill="#28a745">→ nextval[4] = nextval[2] = 0</text><text x="10" y="110" font-size="12" fill="#6c757d">• nextval[5]: pattern[5]='a' != pattern[3]='b' → 保持3</text></g><g transform="translate(50, 320)"><rect x="0" y="0" width="700" height="80" fill="#e8f4fd" stroke="#06c" rx="5"/><text x="10" y="20" font-size="14" font-weight="bold" fill="#06c">nextval 计算规则：</text><text x="10" y="40" font-size="13" fill="#2c3e50">if (pattern[i] == pattern[next[i]])</text><text x="10" y="55" font-size="13" fill="#2c3e50">nextval[i] = nextval[next[i]] // 继续向前跳，避免重复比较</text><text x="10" y="70" font-size="13" fill="#2c3e50">else nextval[i] = next[i] // 保持原值</text></g><g transform="translate(50, 420)"><rect x="0" y="0" width="700" height="60" fill="#d4edda" stroke="#28a745" rx="5"/><text x="10" y="20" font-size="14" font-weight="bold" fill="#155724">nextval 的优势：</text><text x="10" y="38" font-size="13" fill="#155724">• 避免在匹配失败时跳转到相同字符位置</text><text x="10" y="52" font-size="13" fill="#155724">• 减少无意义的重复比较，提高匹配效率</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs><line x1="320" y1="245" x2="290" y2="245" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="325" y="245" font-size="11" fill="#e74c3c">字符相同，优化</text><line x1="320" y1="270" x2="290" y2="270" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><text x="325" y="270" font-size="11" fill="#e74c3c">字符相同，优化</text></svg>