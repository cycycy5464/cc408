<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370"><rect width="800" height="370" fill="none"/><text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">违规编码法 - 曼彻斯特编码帧定界</text><line x1="80" y1="80" x2="720" y2="80" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="2,2"/><text x="50" y="85" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">时钟</text><g stroke="#bdc3c7" stroke-width="1"><line x1="100" y1="75" x2="100" y2="85"/><line x1="140" y1="75" x2="140" y2="85"/><line x1="180" y1="75" x2="180" y2="85"/><line x1="220" y1="75" x2="220" y2="85"/><line x1="260" y1="75" x2="260" y2="85"/><line x1="300" y1="75" x2="300" y2="85"/><line x1="340" y1="75" x2="340" y2="85"/><line x1="380" y1="75" x2="380" y2="85"/><line x1="420" y1="75" x2="420" y2="85"/><line x1="460" y1="75" x2="460" y2="85"/><line x1="500" y1="75" x2="500" y2="85"/><line x1="540" y1="75" x2="540" y2="85"/><line x1="580" y1="75" x2="580" y2="85"/><line x1="620" y1="75" x2="620" y2="85"/><line x1="660" y1="75" x2="660" y2="85"/><line x1="700" y1="75" x2="700" y2="85"/></g><text x="50" y="115" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">数据位</text><text x="120" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">1</text><text x="200" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">0</text><text x="280" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">1</text><text x="360" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">0</text><text x="380" y="165" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">正常编码</text><line x1="80" y1="140" x2="720" y2="140" stroke="#ecf0f1" stroke-width="1"/><text x="75" y="138" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">高</text><line x1="80" y1="180" x2="720" y2="180" stroke="#ecf0f1" stroke-width="1"/><text x="75" y="185" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">低</text><g stroke="#3498db" stroke-width="2.5" fill="none"><path d="M1e2 140h20v40h20"/><path d="M140 180h20V140h20"/><path d="M180 140h20v40h20"/><path d="M220 180h20V140h20"/></g><g font-family="Arial, sans-serif" font-size="10" fill="#3498db"><text x="120" y="200" text-anchor="middle">1: 高→低</text><text x="200" y="200" text-anchor="middle">0: 低→高</text><text x="280" y="200" text-anchor="middle">1: 高→低</text><text x="360" y="200" text-anchor="middle">0: 低→高</text></g><text x="380" y="260" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">违规编码</text><text x="380" y="275" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">(帧定界)</text><line x1="80" y1="240" x2="720" y2="240" stroke="#ecf0f1" stroke-width="1"/><text x="75" y="238" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">高</text><line x1="80" y1="280" x2="720" y2="280" stroke="#ecf0f1" stroke-width="1"/><text x="75" y="285" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">低</text><g stroke="#e74c3c" stroke-width="2.5" fill="none"><path d="M1e2 240h20 20"/><path d="M140 240l20 40V240h20"/><path d="M180 240h20v40h20"/><path d="M220 280h20V240h20"/><path d="M260 240h20v40h20"/><path d="M3e2 280h20 20"/></g><g font-family="Arial, sans-serif" font-size="10" fill="#e74c3c"><text x="120" y="300" text-anchor="middle" font-weight="bold">高-高</text><text x="120" y="312" text-anchor="middle">(帧开始)</text><text x="320" y="300" text-anchor="middle" font-weight="bold">低-低</text><text x="320" y="312" text-anchor="middle">(帧结束)</text></g><g font-family="Arial, sans-serif" font-size="10" fill="#27ae60"><text x="220" y="300" text-anchor="middle">正常数据: 0 1 0 1</text></g><rect x="450" y="160" width="250" height="120" fill="#fff" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="465" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">违规编码法原理</text><g font-family="Arial, sans-serif" font-size="11" fill="#2c3e50"><text x="465" y="195">• 正常编码:</text><text x="475" y="210">- 数据"1": 高→低电平</text><text x="475" y="225">- 数据"0": 低→高电平</text><text x="465" y="245">• 违规编码(帧定界):</text><text x="475" y="260">- 高→高: 帧开始标记</text><text x="475" y="275">- 低→低: 帧结束标记</text></g><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/></marker></defs><path d="M120 220q0 10 0 15" stroke="#e74c3c" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/><path d="M320 220q0 10 0 15" stroke="#e74c3c" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/><text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">利用未使用的电平组合进行帧定界，避免了额外开销</text></svg>