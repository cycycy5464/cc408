e"><title>check-&gt;result</title><path fill="none" stroke="#000" d="M200.57-354.74C191.74-335.46 180.14-310.11 171.52-291.27"/><polygon fill="#000" stroke="#000" points="174.66,-289.72 167.32,-282.08 168.3,-292.63 174.66,-289.72"/><text text-anchor="middle" x="195.5" y="-324" font-family="Microsoft Yahei" font-size="10">是</text></g><g id="node5" class="node"><title>merge</title><polygon fill="#f08080" stroke="#000" points="362.5,-203.5 220.5,-203.5 220.5,-167.5 362.5,-167.5 362.5,-203.5"/><text text-anchor="middle" x="291.5" y="-188.9" font-family="Microsoft Yahei" font-size="12">合并为新树</text><text text-anchor="middle" x="291.5" y="-175.9" font-family="Microsoft Yahei" font-size="12">新权值 = 两树权值之和</text></g><g id="edge4" class="edge"><title>select-&gt;merge</title><path fill="none" stroke="#000" d="M291.5-245.64c0 9.44999999999999.0 21.37.0 32.02"/><polygon fill="#000" stroke="#000" points="295,-213.53 291.5,-203.53 288,-213.53 295,-213.53"/></g><g id="node10" class="node"><title>step2</title><polygon fill="#fff" stroke="#000" points="496.5,-203.5 382.5,-203.5 382.5,-167.5 502.5,-167.5 502.5,-197.5 496.5,-203.5"/><polyline fill="none" stroke="#000" points="496.5,-203.5 496.5,-197.5"/><polyline fill="none" stroke="#000" points="502.5,-197.5 496.5,-197.5"/><text text-anchor="middle" x="442.5" y="-188.9" font-family="Microsoft Yahei" font-size="12">第1次合并:</text><text text-anchor="middle" x="442.5" y="-175.9" font-family="Microsoft Yahei" font-size="12">C(2)+D(1)=CD(3)</text></g><g id="edge13" class="edge"><title>select-&gt;step2</title><path fill="none" stroke="gray" stroke-dasharray="1,5" d="M325.39-245.83c21.95 11.12 50.73 25.7 74.27 37.63"/><polygon fill="gray" stroke="gray" points="401.39,-211.25 408.73,-203.61 398.22,-205.01 401.39,-211.25"/></g><g id="node6" class="node"><title>addback</title><polygon fill="#d3d3d3" stroke="#000" points="101,-125 0,-125 0,-89 101,-89 101,-125"/><text text-anchor="middle" x="50.5" y="-103.9" font-family="Microsoft Yahei" font-size=