<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450"><defs><style>.header-text{font-family:Arial,sans-serif;font-size:14px;font-weight:700;fill:#333}.content-text{font-family:Arial,sans-serif;font-size:12px;fill:#555}.small-text{font-family:Arial,sans-serif;font-size:10px;fill:#666}.title-text{font-family:Arial,sans-serif;font-size:18px;font-weight:700;fill:#222}.header-bg{fill:#4a90e2}.row-bg-1{fill:#f5f5f5}.row-bg-2{fill:#fff}.metadata-bg{fill:#e8f4f8}.data-bg{fill:#fff4e6}.border{stroke:#999;stroke-width:1.5;fill:none}.dashed{stroke:#999;stroke-width:1;stroke-dasharray:5,5;fill:none}</style></defs><text x="450" y="30" text-anchor="middle" class="title-text">Cache 存储结构</text><rect x="50" y="50" width="350" height="30" class="metadata-bg" stroke="#4A90E2" stroke-width="1"/><text x="225" y="70" text-anchor="middle" class="header-text">元数据部分 (控制信息)</text><rect x="400" y="50" width="450" height="30" class="data-bg" stroke="#E67E22" stroke-width="1"/><text x="625" y="70" text-anchor="middle" class="header-text">数据部分 (缓存内容)</text><rect x="50" y="90" width="100" height="40" class="header-bg"/><rect x="150" y="90" width="80" height="40" class="header-bg"/><rect x="230" y="90" width="80" height="40" class="header-bg"/><rect x="310" y="90" width="90" height="40" class="header-bg"/><rect x="400" y="90" width="450" height="40" class="header-bg"/><text x="100" y="115" text-anchor="middle" class="header-text" fill="#fff">Valid</text><text x="100" y="115" text-anchor="middle" class="header-text" fill="#fff">Valid</text><text x="190" y="105" text-anchor="middle" class="header-text" fill="#fff">Tag</text><text x="190" y="120" text-anchor="middle" class="small-text" fill="#fff">(标记)</text><text x="270" y="105" text-anchor="middle" class="header-text" fill="#fff">Dirty</text><text x="270" y="120" text-anchor="middle" class="small-text" fill="#fff">(脏位)</text><text x="355" y="105" text-anchor="middle" class="header-text" fill="#fff">Reference</text><text x="355" y="120" text-anchor="middle" class="small-text" fill="#fff">(访问位)</text><text x="625" y="105" text-anchor="middle" class="header-text" fill="#fff">Cache Block (Data)</text><text x="625" y="120" text-anchor="middle" class="small-text" fill="#fff">(数据块)</text><rect x="50" y="130" width="100" height="35" class="row-bg-1"/><rect x="150" y="130" width="80" height="35" class="row-bg-1"/><rect x="230" y="130" width="80" height="35" class="row-bg-1"/><rect x="310" y="130" width="90" height="35" class="row-bg-1"/><rect x="400" y="130" width="450" height="35" class="row-bg-1"/><text x="100" y="152" text-anchor="middle" class="content-text">1</text><text x="190" y="152" text-anchor="middle" class="content-text">0x3A2F</text><text x="270" y="152" text-anchor="middle" class="content-text">0</text><text x="355" y="152" text-anchor="middle" class="content-text">0011</text><text x="625" y="152" text-anchor="middle" class="content-text">主存块副本 (Block 0)</text><rect x="50" y="165" width="100" height="35" class="row-bg-2"/><rect x="150" y="165" width="80" height="35" class="row-bg-2"/><rect x="230" y="165" width="80" height="35" class="row-bg-2"/><rect x="310" y="165" width="90" height="35" class="row-bg-2"/><rect x="400" y="165" width="450" height="35" class="row-bg-2"/><text x="100" y="187" text-anchor="middle" class="content-text">1</text><text x="190" y="187" text-anchor="middle" class="content-text">0x1B8C</text><text x="270" y="187" text-anchor="middle" class="content-text">1</text><text x="355" y="187" text-anchor="middle" class="content-text">0101</text><text x="625" y="187" text-anchor="middle" class="content-text">主存块副本 (Block 1)</text><rect x="50" y="200" width="100" height="35" class="row-bg-1"/><rect x="150" y="200" width="80" height="35" class="row-bg-1"/><rect x="230" y="200" width="80" height="35" class="row-bg-1"/><rect x="310" y="200" width="90" height="35" class="row-bg-1"/><rect x="400" y="200" width="450" height="35" class="row-bg-1"/><text x="100" y="222" text-anchor="middle" class="content-text">0</text><text x="190" y="222" text-anchor="middle" class="content-text">-</text><text x="270" y="222" text-anchor="middle" class="content-text">-</text><text x="355" y="222" text-anchor="middle" class="content-text">-</text><text x="625" y="222" text-anchor="middle" class="content-text" fill="#999">(无效数据)</text><text x="100" y="255" text-anchor="middle" class="content-text" font-size="20">⋮</text><text x="190" y="255" text-anchor="middle" class="content-text" font-size="20">⋮</text><text x="270" y="255" text-anchor="middle" class="content-text" font-size="20">⋮</text><text x="355" y="255" text-anchor="middle" class="content-text" font-size="20">⋮</text><text x="625" y="255" text-anchor="middle" class="content-text" font-size="20">⋮</text><rect x="50" y="90" width="800" height="180" class="border"/><g transform="translate(50, 300)"><text x="0" y="0" class="header-text" fill="#4A90E2">字段说明：</text><circle cx="10" cy="25" r="3" fill="#4A90E2"/><text x="20" y="30" class="content-text"><tspan font-weight="bold">Valid (有效位)</tspan>: 1位，标识该cache行是否存储有效数据</text><circle cx="10" cy="50" r="3" fill="#4A90E2"/><text x="20" y="55" class="content-text"><tspan font-weight="bold">Tag (标记)</tspan>: 与物理地址的tag字段匹配，判断是否命中</text><circle cx="10" cy="75" r="3" fill="#4A90E2"/><text x="20" y="80" class="content-text"><tspan font-weight="bold">Dirty (脏位)</tspan>: 1位，标记数据是否被修改(回写法需要)</text><circle cx="10" cy="100" r="3" fill="#4A90E2"/><text x="20" y="105" class="content-text"><tspan font-weight="bold">Reference (访问位)</tspan>: 记录访问信息，用于替换算法(如LRU)</text><circle cx="10" cy="125" r="3" fill="#E67E22"/><text x="20" y="130" class="content-text"><tspan font-weight="bold">Block (数据块)</tspan>: 缓存的主存块副本，实际存储的数据</text></g></svg>