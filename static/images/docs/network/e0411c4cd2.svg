<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="401pt" height="590pt" viewBox="0 0 401.1 590" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 586)"><title>ClockAlgorithm</title><text text-anchor="middle" x="196.55" y="-73.4" font-family="Times,serif" font-size="12">Clock 页面置换算法流程图</text><text text-anchor="middle" x="196.55" y="-46.4" font-family="Times,serif" font-size="12">说明：</text><text text-anchor="middle" x="196.55" y="-33.4" font-family="Times,serif" font-size="12">• 使用循环数组模拟时钟结构</text><text text-anchor="middle" x="196.55" y="-20.4" font-family="Times,serif" font-size="12">• 每个元素包含页面号和引用位</text><text text-anchor="middle" x="196.55" y="-7.4" font-family="Times,serif" font-size="12">• 指针按顺序遍历数组元素</text><g id="node1" class="node"><title>start</title><ellipse fill="#add8e6" stroke="#000" cx="140.1" cy="-564" rx="56.59" ry="18"/><text text-anchor="middle" x="140.1" y="-560.3" font-family="Times,serif" font-size="14">访问页面 P</text></g><g id="node2" class="node"><title>check_in_memory</title><polygon fill="#ffffe0" stroke="#000" points="140.1,-509 48.1,-471 140.1,-433 232.1,-471 140.1,-509"/><text text-anchor="middle" x="140.1" y="-474.8" font-family="Times,serif" font-size="14">页面 P 是否</text><text text-anchor="middle" x="140.1" y="-459.8" font-family="Times,serif" font-size="14">在内存中？</text></g><g id="edge1" class="edge"><title>start-&gt;check_in_memory</title><path fill="none" stroke="#000" d="M140.1-545.88c0 7.63.0 17.05.0 26.5700000000001"/><polygon fill="#000" stroke="#000" points="143.6,-519.02 140.1,-509.02 136.6,-519.02 143.6,-519.02"/></g><g id="node3" class="node"><title>page_hit</title><polygon fill="#90ee90" stroke="#000" points="125.1,-386 19.1,-386 19.1,-333 125.1,-333 125.1,-386"/><text text-anchor="middle" x="72.1" y="-370.8" font-family="Times,serif" font-size="14">页面命中</text><text text-anchor="middle" x="72.1" y="-355.8" font-family="Times,serif" font-size="14">将 P 的引用位</text><text text-anchor="middle" x="72.1" y="-340.8" font-family="Times,serif" font-size="14">设置为 1</text></g><g id="edge2" class="edge"><title>check_in_memory-&gt;page_hit</title><path fill="none" stroke="#000" d="M121.69-440.37c-8.73 14.06-19.21 30.94-28.28 45.55"/><polygon fill="#000" stroke="#000" points="96.22,-392.71 87.97,-386.06 90.27,-396.4 96.22,-392.71"/><text text-anchor="middle" x="109.1" y="-407" font-family="Times,serif" font-size="10">是</text></g><g id="node4" class="node"><title>check_reference_bit</title><polygon fill="#f08080" stroke="#000" points="286.6,-378.5 155.6,-378.5 155.6,-340.5 286.6,-340.5 286.6,-378.5"/><text text-anchor="middle" x="221.1" y="-363.3" font-family="Times,serif" font-size="14">检查指针指向页面</text><text text-anchor="middle" x="221.1" y="-348.3" font-family="Times,serif" font-size="14">的引用位</text></g><g id="edge3" class="edge"><title>check_in_memory-&gt;check_reference_bit</title><path fill="none" stroke="#000" d="M161.17-441.52c12.53 16.95 28.32 38.29 40.54 54.82"/><polygon fill="#000" stroke="#000" points="204.61,-388.67 207.74,-378.55 198.98,-384.51 204.61,-388.67"/><text text-anchor="middle" x="193.1" y="-407" font-family="Times,serif" font-size="10">否</text></g><g id="node8" class="node"><title>end_hit</title><ellipse fill="#d3d3d3" stroke="#000" cx="48.1" cy="-278" rx="48.19" ry="18"/><text text-anchor="middle" x="48.1" y="-274.3" font-family="Times,serif" font-size="14">访问完成</text></g><g id="edge4" class="edge"><title>page_hit-&gt;end_hit</title><path fill="none" stroke="#000" d="M64.37-332.91C61.77-324.3 58.86-314.66 56.23-305.95"/><polygon fill="#000" stroke="#000" points="59.55,-304.82 53.31,-296.26 52.84,-306.84 59.55,-304.82"/></g><g id="node5" class="node"><title>reference_bit_check</title><polygon fill="#ffffe0" stroke="#000" points="234.1,-296 114.61,-278 234.1,-260 353.58,-278 234.1,-296"/><text text-anchor="middle" x="234.1" y="-274.3" font-family="Times,serif" font-size="14">引用位是否为 0？</text></g><g id="edge5" class="edge"><title>check_reference_bit-&gt;reference_bit_check</title><path fill="none" stroke="#000" d="M224.05-340.46C225.73-330.15 227.88-317.02 229.75-305.55"/><polygon fill="#000" stroke="#000" points="233.22,-306.05 231.38,-295.61 226.31,-304.92 233.22,-306.05"/></g><g id="node6" class="node"><title>replace_page</title><polygon fill="#90ee90" stroke="#000" points="221.1,-213 73.1,-213 73.1,-160 221.1,-160 221.1,-213"/><text text-anchor="middle" x="147.1" y="-197.8" font-family="Times,serif" font-size="14">替换该页面为 P</text><text text-anchor="middle" x="147.1" y="-182.8" font-family="Times,serif" font-size="14">设置 P 的引用位为 1</text><text text-anchor="middle" x="147.1" y="-167.8" font-family="Times,serif" font-size="14">指针移动到下一位置</text></g><g id="edge6" class="edge"><title>reference_bit_check-&gt;replace_page</title><path fill="none" stroke="#000" d="M197.6-265.38C185.5-259.96 172.9-252.35 164.1-242 159.48-236.57 156.12-229.89 153.66-223.1"/><polygon fill="#000" stroke="#000" points="156.92,-221.76 150.69,-213.19 150.21,-223.77 156.92,-221.76"/><text text-anchor="middle" x="196.1" y="-234" font-family="Times,serif" font-size="10">是 (引用位=0)</text></g><g id="node7" class="node"><title>clear_and_move</title><polygon fill="orange" stroke="#000" points="388.6,-213 243.6,-213 243.6,-160 388.6,-160 388.6,-213"/><text text-anchor="middle" x="316.1" y="-197.8" font-family="Times,serif" font-size="14">将该页面引用位</text><text text-anchor="middle" x="316.1" y="-182.8" font-family="Times,serif" font-size="14">设置为 0</text><text text-anchor="middle" x="316.1" y="-167.8" font-family="Times,serif" font-size="14">指针移动到下一位置</text></g><g id="edge7" class="edge"><title>reference_bit_check-&gt;clear_and_move</title><path fill="none" stroke="#000" d="M230.54-260.1C229.51-250.86 229.84-239.58 235.1-231 237.56-226.99 240.52-223.32 243.85-219.98"/><polygon fill="#000" stroke="#000" points="246.42,-222.38 251.64,-213.16 241.81,-217.11 246.42,-222.38"/><text text-anchor="middle" x="267.1" y="-234" font-family="Tim