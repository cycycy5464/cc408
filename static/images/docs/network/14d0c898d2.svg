<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 700"><defs><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#333"/></marker><marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/></marker><marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#3498db"/></marker></defs><text x="500" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">PTBR、MMU 与多进程页表关系</text><rect x="50" y="80" width="250" height="220" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="8"/><text x="175" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">CPU Core</text><rect x="80" y="130" width="190" height="60" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="4"/><text x="175" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">PTBR</text><text x="175" y="175" text-anchor="middle" font-size="12" fill="#fff">(Page Table Base Register)</text><rect x="80" y="210" width="190" height="30" fill="#fff" stroke="#c0392b" stroke-width="2" rx="4"/><text x="175" y="230" text-anchor="middle" font-size="11" fill="#c0392b" font-family="monospace">0x3000 (进程 A 页表)</text><rect x="80" y="260" width="190" height="30" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="175" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">MMU (地址翻译)</text><rect x="400" y="80" width="550" height="580" fill="#f8f9fa" stroke="#34495e" stroke-width="2" rx="8"/><text x="675" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">物理内存 (Physical Memory)</text><g><rect x="450" y="140" width="220" height="140" fill="#ffebee" stroke="#e74c3c" stroke-width="2" rx="4"/><text x="560" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">进程 A 页表</text><text x="560" y="182" text-anchor="middle" font-size="10" fill="#666">(物理地址: 0x3000)</text><rect x="460" y="195" width="190" height="20" fill="#fff" stroke="#e74c3c" stroke-width="1"/><text x="470" y="209" font-size="10" fill="#333">VPN 0x00 → PPN 0x1000</text><rect x="460" y="220" width="190" height="20" fill="#fff" stroke="#e74c3c" stroke-width="1"/><text x="470" y="234" font-size="10" fill="#333">VPN 0x01 → PPN 0x1001</text><rect x="460" y="245" width="190" height="20" fill="#fff" stroke="#e74c3c" stroke-width="1"/><text x="470" y="259" font-size="10" fill="#333">VPN 0x02 → PPN 0x1002</text></g><g><rect x="450" y="310" width="220" height="140" fill="#e3f2fd" stroke="#3498db" stroke-width="2" rx="4"/><text x="560" y="335" text-anchor="middle" font-size="13" font-weight="bold" fill="#2980b9">进程 B 页表</text><text x="560" y="352" text-anchor="middle" font-size="10" fill="#666">(物理地址: 0x5000)</text><rect x="460" y="365" width="190" height="20" fill="#fff" stroke="#3498db" stroke-width="1"/><text x="470" y="379" font-size="10" fill="#333">VPN 0x00 → PPN 0x2000</text><rect x="460" y="390" width="190" height="20" fill="#fff" stroke="#3498db" stroke-width="1"/><text x="470" y="404" font-size="10" fill="#333">VPN 0x01 → PPN 0x2001</text><rect x="460" y="415" width="190" height="20" fill="#fff" stroke="#3498db" stroke-width="1"/><text x="470" y="429" font-size="10" fill="#333">VPN 0x02 → PPN 0x2002</text></g><g><rect x="450" y="480" width="220" height="140" fill="#f3e5f5" stroke="#9b59b6" stroke-width="2" rx="4"/><text x="560" y="505" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">进程 C 页表</text><text x="560" y="522" text-anchor="middle" font-size="10" fill="#666">(物理地址: 0x7000)</text><rect x="460" y="535" width="190" height="20" fill="#fff" stroke="#9b59b6" stroke-width="1"/><text x="470" y="549" font-size="10" fill="#333">VPN 0x00 → PPN 0x3000</text><rect x="460" y="560" width="190" height="20" fill="#fff" stroke="#9b59b6" stroke-width="1"/><text x="470" y="574" font-size="10" fill="#333">VPN 0x01 → PPN 0x3001</text><rect x="460" y="585" width="190" height="20" fill="#fff" stroke="#9b59b6" stroke-width="1"/><text x="470" y="599" font-size="10" fill="#333">VPN 0x02 → PPN 0x3002</text></g><g><text x="800" y="145" font-size="12" font-weight="bold" fill="#2c3e50">实际物理页面</text><rect x="720" y="160" width="200" height="30" fill="#dcedc8" stroke="#689f38" stroke-width="1" rx="2"/><text x="730" y="180" font-size="10" fill="#333">0x1000 ~ (进程 A 数据)</text><rect x="720" y="200" width="200" height="30" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="2"/><text x="730" y="220" font-size="10" fill="#333">0x2000 ~ (进程 B 数据)</text><rect x="720" y="240" width="200" height="30" fill="#e1bee7" stroke="#8e24aa" stroke-width="1" rx="2"/><text x="730" y="260" font-size="10" fill="#333">0x3000 ~ (进程 C 数据)</text><text x="820" y="295" text-anchor="middle" font-size="9" fill="#666">...</text></g><path d="M270 225q70 0 180-15" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowhead-red)"/><text x="330" y="215" font-size="11" fill="#e74c3c" font-weight="bold">当前活跃</text><path d="M270 275q70 0 180-35" fill="none" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/><text x="330" y="295" font-size="10" fill="#7f8c8d">查询页表</text><g><rect x="50" y="370" width="250" height="120" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="8"/><text x="175" y="395" text-anchor="middle" font-size="13" font-weight="bold" fill="#d68910">上下文切换时</text><text x="60" y="420" font-size="11" fill="#333">1. 保存当前 PTBR 值</text><text x="60" y="440" font-size="11" fill="#333">2. 加载新进程的页表地址</text><text x="60" y="460" font-size="11" fill="#333">3. 更新 PTBR 寄存器</text><text x="60" y="480" font-size="11" fill="#e74c3c" font-weight="bold">→ CPU 立即切换地址空间</text></g><g><rect x="50" y="520" width="250" height="140" fill="#e8f5e9" stroke="#27ae60" stroke-width="2" rx="8"/><text x="175" y="545" text-anchor="middle" font-size="13" font-weight="bold" fill="#229954">关键特性</text><text x="60" y="570" font-size="11" fill="#333">• 每个进程有独立页表</text><text x="60" y="590" font-size="11" fill="#333">• PTBR 保存物理地址</text><text x="60" y="610" font-size="11" fill="#333">• 同一时刻仅一个 PTBR 生效</text><text x="60" y="630" font-size="11" fill="#333">• MMU 从 PTBR 开始翻译</text><text x="60" y="650" font-size="11" fill="#e74c3c" font-weight="bold">• 地址空间隔离由此实现</text></g><text x="730" y="335" font-size="10" fill="#666">VPN: Virtual Page Number</text><text x="730" y="350" font-size="10" fill="#666">PPN: Physical Page Number</text></svg>