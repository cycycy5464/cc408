<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550"><defs><style>.title{font:700 16px sans-serif;fill:#2c3e50}.label{font:14px sans-serif;fill:#34495e}.small-label{font:12px sans-serif;fill:#7f8c8d}.key{font:700 14px monospace;fill:#2980b9}.value{font:13px sans-serif;fill:#27ae60}.slot{fill:#ecf0f1;stroke:#95a5a6;stroke-width:2}.slot-filled{fill:#d5e8f7;stroke:#3498db;stroke-width:2}.slot-target{fill:#ffeaa7;stroke:#fdcb6e;stroke-width:2.5}.slot-conflict{fill:#fab1a0;stroke:#e17055;stroke-width:2}.arrow{stroke:#e74c3c;stroke-width:2;fill:none;marker-end:url(#arrowhead)}.arrow-blue{stroke:#3498db;stroke-width:2;fill:none;marker-end:url(#arrowhead-blue)}.arrow-green{stroke:#27ae60;stroke-width:2;fill:none;marker-end:url(#arrowhead-green)}.hash-box{fill:#fff;stroke:#3498db;stroke-width:2;rx:5}.step-box{fill:#e8f5e9;stroke:#27ae60;stroke-width:1.5;rx:4}</style><marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#e74c3c"/></marker><marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#3498db"/></marker><marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><polygon points="0 0, 10 3, 0 6" fill="#27ae60"/></marker></defs><g transform="translate(50, 30)"><rect class="hash-box" x="0" y="0" width="120" height="45"/><text class="label" x="60" y="20" text-anchor="middle">查找键</text><text class="key" x="60" y="38" text-anchor="middle">key = "Bob"</text></g><path class="arrow-blue" d="M170 52h50"/><g transform="translate(220, 30)"><rect class="hash-box" x="0" y="0" width="140" height="45"/><text class="label" x="70" y="20" text-anchor="middle">h(key) % n</text><text class="small-label" x="70" y="38" text-anchor="middle">hash("Bob") = 3</text></g><path class="arrow" d="M290 75v35"/><g transform="translate(150, 120)"><text class="label" x="0" y="-5">散列表 (n=7)</text><rect class="slot" x="0" y="10" width="60" height="45"/><text class="small-label" x="30" y="25" text-anchor="middle">0</text><text class="small-label" x="30" y="45" text-anchor="middle">—</text><rect class="slot-filled" x="70" y="10" width="60" height="45"/><text class="small-label" x="100" y="25" text-anchor="middle">1</text><text class="key" x="100" y="38" text-anchor="middle" font-size="11">Alice</text><text class="value" x="100" y="50" text-anchor="middle" font-size="10">100</text><rect class="slot" x="140" y="10" width="60" height="45"/><text class="small-label" x="170" y="25" text-anchor="middle">2</text><text class="small-label" x="170" y="45" text-anchor="middle">—</text><rect class="slot-conflict" x="210" y="10" width="60" height="45"/><text class="small-label" x="240" y="25" text-anchor="middle">3</text><text class="key" x="240" y="38" text-anchor="middle" font-size="11">Tom</text><text class="value" x="240" y="50" text-anchor="middle" font-size="10">200</text><rect class="slot-target" x="280" y="10" width="60" height="45"/><text class="small-label" x="310" y="25" text-anchor="middle">4</text><text class="key" x="310" y="38" text-anchor="middle" font-size="11">Bob</text><text class="value" x="310" y="50" text-anchor="middle" font-size="10">300</text><rect class="slot-filled" x="350" y="10" width="60" height="45"/><text class="small-label" x="380" y="25" text-anchor="middle">5</text><text class="key" x="380" y="38" text-anchor="middle" font-size="11">Eve</text><text class="value" x="380" y="50" text-anchor="middle" font-size="10">150</text><rect class="slot" x="420" y="10" width="60" height="45"/><text class="small-label" x="450" y="25" text-anchor="middle">6</text><text class="small-label" x="450" y="45" text-anchor="middle">—</text></g><g transform="translate(50, 200)"><text class="label" x="0" y="0" font-weight="bold">查找过程：</text><g transform="translate(0, 20)"><circle cx="8" cy="0" r="8" fill="#3498db"/><text class="small-label" x="8" y="4" text-anchor="middle" fill="#fff" font-weight="bold">1</text><text class="label" x="25" y="5">计算哈希：h("Bob") % 7 = 3，访问索引3</text></g><path class="arrow" d="M290 215l1e2-45" stroke-dasharray="5,3"/><g transform="translate(0, 45)"><circle cx="8" cy="0" r="8" fill="#e74c3c"/><text class="small-label" x="8" y="4" text-anchor="middle" fill="#fff" font-weight="bold">2</text><text class="label" x="25" y="5">发现冲突：索引3存储的是"Tom"，不匹配</text></g><g transform="translate(0, 70)"><circle cx="8" cy="0" r="8" fill="#f39c12"/><text class="small-label" x="8" y="4" text-anchor="middle" fill="#fff" font-weight="bold">3</text><text class="label" x="25" y="5">探测下一位置：(3 + 1) % 7 = 4，访问索引 4（假设使用线性探测）</text></g><path class="arrow" d="M4e2 165q20 15 50 0" stroke-dasharray="5,3"/><g transform="translate(0, 95)"><circle cx="8" cy="0" r="8" fill="#27ae60"/><text class="small-label" x="8" y="4" text-anchor="middle" fill="#fff" font-weight="bold">4</text><text class="label" x="25" y="5">找到匹配：索引4存储的是"Bob"，返回值300 ✓</text></g><path class="arrow-green" d="M450 165V330"/></g><g transform="translate(380, 340)"><rect class="step-box" x="0" y="0" width="140" height="40"/><text class="label" x="70" y="18" text-anchor="middle">查找成功</text><text class="value" x="70" y="33" text-anchor="middle" font-weight="bold">返回值：300</text></g><g transform="translate(50, 410)"><text class="label" x="0" y="0" font-weight="bold">时间复杂度分析：</text><rect fill="#e8f8f5" stroke="#16a085" stroke-width="1" x="0" y="10" width="700" height="110" rx="5"/><g transform="translate(15, 30)"><text class="label" x="0" y="0">• 最好情况：O(1) - 无冲突，直接命中目标位置</text><text class="label" x="0" y="25">• 平均情况：O(1) - 在负载因子合理时，冲突较少</text><text class="label" x="0" y="50">• 最坏情况：O(n) - 所有键哈希到同一位置，需遍历全部槽位</text><text class="small-label" x="0" y="75" fill="#7f8c8d">※ 负载因子 α = 已用槽位数 / 总槽位数，建议保持 α &lt; 0.75</text></g></g></svg>