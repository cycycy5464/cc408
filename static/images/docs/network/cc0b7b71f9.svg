<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c3e50">奈奎斯特定理</text><text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">无噪声理想信道的极限传输速率</text><rect x="250" y="80" width="300" height="60" fill="#3498db" rx="10" opacity=".1"/><text x="400" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">C = 2W × log₂V</text><text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">信道容量 = 2×带宽 × 每码元比特数</text><g><rect x="50" y="170" width="160" height="80" fill="#e74c3c" opacity=".1" rx="8"/><text x="130" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e74c3c">C</text><text x="130" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">信道容量</text><text x="130" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">最大传输速率</text><text x="130" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(bps)</text><rect x="230" y="170" width="160" height="80" fill="#f39c12" opacity=".1" rx="8"/><text x="310" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f39c12">W</text><text x="310" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">信道带宽</text><text x="310" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">频率范围</text><text x="310" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(Hz)</text><rect x="410" y="170" width="160" height="80" fill="#9b59b6" opacity=".1" rx="8"/><text x="490" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#9b59b6">V</text><text x="490" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">离散电平数</text><text x="490" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">每码元状态数</text><rect x="590" y="170" width="160" height="80" fill="#27ae60" opacity=".1" rx="8"/><text x="670" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">2W</text><text x="670" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">波特率</text><text x="670" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">每秒码元数</text><text x="670" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(Baud)</text></g><g><text x="400" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">信号电平示例</text><g><text x="150" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">二进制 (V=2)</text><text x="150" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">log₂2 = 1 bit/码元</text><g stroke="#e74c3c" stroke-width="2" fill="none"><path d="M80 350h20V340h40v10h40V340h40"/><circle cx="100" cy="340" r="2" fill="#e74c3c"/><circle cx="140" cy="340" r="2" fill="#e74c3c"/><circle cx="180" cy="340" r="2" fill="#e74c3c"/><circle cx="100" cy="350" r="2" fill="#e74c3c"/><circle cx="140" cy="350" r="2" fill="#e74c3c"/><circle cx="180" cy="350" r="2" fill="#e74c3c"/></g><text x="90" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0</text><text x="130" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">1</text><text x="170" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0</text><text x="210" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">1</text></g><g><text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">四进制 (V=4)</text><text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">log₂4 = 2 bits/码元</text><g stroke="#f39c12" stroke-width="2" fill="none"><path d="M330 360h20V340h40v10h40V330h40"/><circle cx="350" cy="340" r="2" fill="#f39c12"/><circle cx="390" cy="350" r="2" fill="#f39c12"/><circle cx="430" cy="330" r="2" fill="#f39c12"/><circle cx="350" cy="360" r="2" fill="#f39c12"/></g><text x="340" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">00</text><text x="380" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">01</text><text x="420" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">10</text><text x="460" y="375" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">11</text></g><g><text x="650" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">八进制 (V=8)</text><text x="650" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">log₂8 = 3 bits/码元</text><g stroke="#9b59b6" stroke-width="2" fill="none"><path d="M580 365h20V325h40v20h40V335h40"/><circle cx="600" cy="325" r="2" fill="#9b59b6"/><circle cx="640" cy="345" r="2" fill="#9b59b6"/><circle cx="680" cy="335" r="2" fill="#9b59b6"/><circle cx="600" cy="365" r="2" fill="#9b59b6"/></g><text x="590" y="380" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">000</text><text x="630" y="380" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">111</text><text x="670" y="380" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">101</text><text x="710" y="380" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">110</text></g></g><rect x="50" y="420" width="700" height="120" fill="#ecf0f1" rx="10"/><text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">定理要点</text><g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50"><circle cx="80" cy="465" r="3" fill="#3498db"/><text x="95" y="470">理想条件：无噪声干扰、带宽有限的低通信道</text><circle cx="80" cy="485" r="3" fill="#3498db"/><text x="95" y="490">避免码间串扰：相邻码元不互相干扰的最大传输速率</text><circle cx="80" cy="505" r="3" fill="#3498db"/><text x="95" y="510">带宽限制：即使无噪声，带宽仍限制传输能力</text><circle cx="80" cy="525" r="3" fill="#3498db"/><text x="95" y="530">优化策略：增加带宽(W)或提高调制电平数(V)可提升传输速率</text></g><text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#95a5a6">奈奎斯特定理为无噪声信道提供了理论极限，实际应用中还需考虑香农定理(有噪声情况)</text></svg>