<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560"><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">动态分区分配算法</text><g transform="translate(20, 60)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#2563eb">First Fit (首次适应)</text><text x="0" y="20" font-size="12" fill="#666">从头遍历，选择第一个满足的空闲块</text><g transform="translate(0, 30)"><rect x="0" y="0" width="60" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="11">已用</text><rect x="60" y="0" width="40" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="80" y="25" text-anchor="middle" font-size="11">15K</text><rect x="100" y="0" width="50" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="125" y="25" text-anchor="middle" font-size="11">已用</text><rect x="150" y="0" width="70" height="40" fill="#86efac" stroke="#16a34a" stroke-width="2"/><text x="185" y="25" text-anchor="middle" font-size="11">30K ✓</text><rect x="220" y="0" width="40" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="240" y="25" text-anchor="middle" font-size="11">已用</text><rect x="260" y="0" width="50" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="285" y="25" text-anchor="middle" font-size="11">35K</text><text x="180" y="-30" font-size="10" fill="#2563eb">需求: 25K</text></g></g><g transform="translate(420, 60)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#7c3aed">Next Fit (临近适应)</text><text x="0" y="20" font-size="12" fill="#666">从上次分配位置的下一个继续查找</text><g transform="translate(0, 30)"><rect x="0" y="0" width="60" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="11">已用</text><rect x="60" y="0" width="40" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="80" y="25" text-anchor="middle" font-size="11">15K</text><rect x="100" y="0" width="10" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><rect x="110" y="0" width="50" height="40" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/><text x="130" y="25" text-anchor="middle" font-size="11">已用</text><rect x="150" y="0" width="40" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="170" y="25" text-anchor="middle" font-size="11">20K</text><rect x="190" y="0" width="30" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="205" y="25" text-anchor="middle" font-size="11">已用</text><rect x="220" y="0" width="70" height="40" fill="#86efac" stroke="#16a34a" stroke-width="2"/><text x="255" y="25" text-anchor="middle" font-size="11">35K ✓</text><text x="165" y="-35" font-size="10" fill="#7c3aed">需求: 25K</text></g></g><g transform="translate(20, 180)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#dc2626">Best Fit (最佳适应)</text><text x="0" y="20" font-size="12" fill="#666">遍历全部，选择最小满足的空闲块</text><g transform="translate(0, 30)"><rect x="0" y="0" width="60" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="11">已用</text><rect x="60" y="0" width="40" height="40" fill="#fee2e2" stroke="#333" stroke-width="1"/><text x="80" y="25" text-anchor="middle" font-size="11">15K</text><text x="80" y="55" text-anchor="middle" font-size="9" fill="#999">太小 ✗</text><rect x="100" y="0" width="50" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="125" y="25" text-anchor="middle" font-size="11">已用</text><rect x="150" y="0" width="70" height="40" fill="#86efac" stroke="#16a34a" stroke-width="2"/><text x="185" y="25" text-anchor="middle" font-size="11">28K ✓</text><text x="185" y="55" text-anchor="middle" font-size="9" fill="#16a34a">最佳!</text><rect x="220" y="0" width="40" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="240" y="25" text-anchor="middle" font-size="11">已用</text><rect x="260" y="0" width="65" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="292" y="25" text-anchor="middle" font-size="11">35K</text><text x="292" y="55" text-anchor="middle" font-size="9" fill="#666">浪费多</text><rect x="325" y="0" width="45" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="347" y="25" text-anchor="middle" font-size="11">已用</text><rect x="370" y="0" width="70" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="405" y="25" text-anchor="middle" font-size="11">40K</text><text x="405" y="55" text-anchor="middle" font-size="9" fill="#666">浪费多</text><text x="195" y="-10" font-size="10" fill="#dc2626">需求: 25K</text></g></g><g transform="translate(20, 300)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#ea580c">Worst Fit (最坏适应)</text><text x="0" y="20" font-size="12" fill="#666">遍历全部，选择最大的空闲块</text><g transform="translate(0, 30)"><rect x="0" y="0" width="60" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="30" y="25" text-anchor="middle" font-size="11">已用</text><rect x="60" y="0" width="40" height="40" fill="#fee2e2" stroke="#333" stroke-width="1"/><text x="80" y="25" text-anchor="middle" font-size="11">15K</text><text x="80" y="55" text-anchor="middle" font-size="9" fill="#999">太小 ✗</text><rect x="100" y="0" width="45" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="122" y="25" text-anchor="middle" font-size="11">已用</text><rect x="145" y="0" width="65" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="177" y="25" text-anchor="middle" font-size="11">28K</text><rect x="210" y="0" width="40" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="230" y="25" text-anchor="middle" font-size="11">已用</text><rect x="250" y="0" width="65" height="40" fill="#e0f2fe" stroke="#333" stroke-width="1"/><text x="282" y="25" text-anchor="middle" font-size="11">35K</text><rect x="315" y="0" width="35" height="40" fill="#ffcccb" stroke="#333" stroke-width="1"/><text x="332" y="25" text-anchor="middle" font-size="11">已用</text><rect x="350" y="0" width="80" height="40" fill="#86efac" stroke="#16a34a" stroke-width="2"/><text x="390" y="25" text-anchor="middle" font-size="11">50K ✓</text><text x="390" y="55" text-anchor="middle" font-size="9" fill="#ea580c">最大!</text><text x="270" y="-10" font-size="10" fill="#ea580c">需求: 25K</text></g></g><g transform="translate(20, 420)"><text x="0" y="0" font-size="16" font-weight="bold" fill="#333">算法特点对比</text><rect x="0" y="10" width="760" height="120" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/><line x1="0" y1="35" x2="760" y2="35" stroke="#d1d5db" stroke-width="1"/><line x1="190" y1="10" x2="190" y2="130" stroke="#d1d5db" stroke-width="1"/><line x1="380" y1="10" x2="380" y2="130" stroke="#d1d5db" stroke-width="1"/><line x1="570" y1="10" x2="570" y2="130" stroke="#d1d5db" stroke-width="1"/><text x="95" y="28" text-anchor="middle" font-size="12" font-weight="bold">First Fit</text><text x="285" y="28" text-anchor="middle" font-size="12" font-weight="bold">Next Fit</text><text x="475" y="28" text-anchor="middle" font-size="12" font-weight="bold">Best Fit</text><text x="665" y="28" text-anchor="middle" font-size="12" font-weight="bold">Worst Fit</text><text x="10" y="55" font-size="11" fill="#16a34a">优点:</text><text x="20" y="70" font-size="10">• 速度快</text><text x="20" y="82" font-size="10">• 实现简单</text><text x="200" y="55" font-size="11" fill="#16a34a">优点:</text><text x="210" y="70" font-size="10">• 分配均匀</text><text x="210" y="82" font-size="10">• 避免低地址碎片</text><text x="390" y="55" font-size="11" fill="#16a34a">优点:</text><text x="400" y="70" font-size="10">• 内存利用率高</text><text x="400" y="82" font-size="10">• 碎片最小</text><text x="580" y="55" font-size="11" fill="#16a34a">优点:</text><text x="590" y="70" font-size="10">• 碎片更少</text><text x="10" y="100" font-size="11" fill="#dc2626">缺点:</text><text x="20" y="115" font-size="10">• 低地址碎片多</text><text x="200" y="100" font-size="11" fill="#dc2626">缺点:</text><text x="210" y="115" font-size="10">• 可能循环查找</text><text x="390" y="100" font-size="11" fill="#dc2626">缺点:</text><text x="400" y="115" font-size="10">• 速度慢(需遍历)，产生内存碎片</text><text x="580" y="100" font-size="11" fill="#dc2626">缺点:</text><text x="590" y="115" font-size="10">• 大空间被过度使用，碎片可能较大</text></g><defs><marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#2563eb"/></marker><marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#7c3aed"/></marker></defs></svg>