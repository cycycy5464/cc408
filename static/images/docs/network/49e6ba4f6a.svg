<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740"><text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">Cache 块替换算法的使用场景</text><g id="direct-mapping"><rect x="50" y="60" width="350" height="680" fill="#f0f4f8" stroke="#3498db" stroke-width="2" rx="8"/><text x="225" y="90" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">直接映射 (Direct Mapping)</text><text x="100" y="130" font-size="14" font-weight="bold" fill="#34495e">主存块:</text><g id="main-mem-direct"><rect x="100" y="140" width="80" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="140" y="165" font-size="12" text-anchor="middle" fill="#fff">块 0</text><rect x="100" y="190" width="80" height="40" fill="#e67e22" stroke="#d35400" stroke-width="2"/><text x="140" y="215" font-size="12" text-anchor="middle" fill="#fff">块 1</text><rect x="100" y="240" width="80" height="40" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="140" y="265" font-size="12" text-anchor="middle" fill="#fff">块 2</text><rect x="100" y="290" width="80" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="140" y="315" font-size="12" text-anchor="middle" fill="#fff">块 3</text><text x="140" y="350" font-size="12" text-anchor="middle" fill="#7f8c8d">...</text></g><path d="M180 160l60 40" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrowred)"/><path d="M180 210l60 30" stroke="#e67e22" stroke-width="3" fill="none" marker-end="url(#arroworange)"/><path d="M180 260l60-60" stroke="#f39c12" stroke-width="3" fill="none" marker-end="url(#arrowyellow)"/><path d="M180 310l60-70" stroke="#3498db" stroke-width="3" fill="none" marker-end="url(#arrowblue)"/><text x="260" y="130" font-size="14" font-weight="bold" fill="#34495e">Cache:</text><g id="cache-direct"><rect x="260" y="185" width="80" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/><text x="300" y="210" font-size="12" text-anchor="middle" fill="#2c3e50">Cache 0</text><rect x="260" y="235" width="80" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/><text x="300" y="260" font-size="12" text-anchor="middle" fill="#2c3e50">Cache 1</text></g><rect x="70" y="400" width="310" height="320" fill="#fff9e6" stroke="#f39c12" stroke-width="2" rx="5"/><text x="225" y="435" font-size="20" font-weight="bold" text-anchor="middle" fill="#d35400">❌ 不需要替换算法</text><text x="80" y="475" font-size="15" fill="#34495e"><tspan x="80" dy="0">• 每个主存块只能映射到</tspan><tspan x="80" dy="22">唯一的一个Cache块</tspan><tspan x="80" dy="27">• 例如: 块0、块2 → Cache 0</tspan><tspan x="80" dy="22">块1、块3 → Cache 1</tspan><tspan x="80" dy="27">• 发生冲突时,直接覆盖</tspan><tspan x="80" dy="22">对应的Cache块即可</tspan><tspan x="80" dy="27">• 无需选择淘汰哪一个</tspan><tspan x="80" dy="22">(因为只有唯一选择)</tspan></text></g><g id="fully-associative"><rect x="430" y="60" width="350" height="680" fill="#f0f4f8" stroke="#9b59b6" stroke-width="2" rx="8"/><text x="605" y="90" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">全相联映射 (Fully Associative)</text><text x="480" y="130" font-size="14" font-weight="bold" fill="#34495e">主存块:</text><g id="main-mem-full"><rect x="480" y="140" width="80" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="520" y="165" font-size="12" text-anchor="middle" fill="#fff">块 0</text><rect x="480" y="190" width="80" height="40" fill="#e67e22" stroke="#d35400" stroke-width="2"/><text x="520" y="215" font-size="12" text-anchor="middle" fill="#fff">块 1</text><rect x="480" y="240" width="80" height="40" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="520" y="265" font-size="12" text-anchor="middle" fill="#fff">块 2</text><rect x="480" y="290" width="80" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="520" y="315" font-size="12" text-anchor="middle" fill="#fff">块 3</text></g><path d="M560 160l60 10" stroke="#e74c3c" stroke-width="2" fill="none" opacity=".6"/><path d="M560 160l60 50" stroke="#e74c3c" stroke-width="2" fill="none" opacity=".6"/><path d="M560 160l60 90" stroke="#e74c3c" stroke-width="2" fill="none" opacity=".6"/><path d="M560 210l60-40" stroke="#e67e22" stroke-width="2" fill="none" opacity=".6"/><path d="M560 210h60" stroke="#e67e22" stroke-width="2" fill="none" opacity=".6"/><path d="M560 210l60 40" stroke="#e67e22" stroke-width="2" fill="none" opacity=".6"/><text x="640" y="130" font-size="14" font-weight="bold" fill="#34495e">Cache:</text><g id="cache-full"><rect x="640" y="155" width="80" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/><text x="680" y="180" font-size="12" text-anchor="middle" fill="#2c3e50">Cache 0</text><rect x="640" y="195" width="80" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/><text x="680" y="220" font-size="12" text-anchor="middle" fill="#2c3e50">Cache 1</text><rect x="640" y="235" width="80" height="40" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2"/><text x="680" y="260" font-size="12" text-anchor="middle" fill="#2c3e50">Cache 2</text></g><text x="605" y="320" font-size="40" text-anchor="middle" fill="#9b59b6">?</text><rect x="450" y="400" width="310" height="320" fill="#f3e5f5" stroke="#9b59b6" stroke-width="2" rx="5"/><text x="605" y="435" font-size="20" font-weight="bold" text-anchor="middle" fill="#8e44ad">✅ 需要替换算法</text><text x="460" y="475" font-size="15" fill="#34495e"><tspan x="460" dy="0">• 任何主存块可以映射到</tspan><tspan x="460" dy="22">任意Cache块</tspan><tspan x="460" dy="27">• Cache满时,新块可以</tspan><tspan x="460" dy="22">替换任何一个现有块</tspan><tspan x="460" dy="27">• 必须使用替换算法决定</tspan><tspan x="460" dy="22">淘汰哪个块:</tspan><tspan x="460" dy="22">- LRU (最近最少使用)</tspan><tspan x="460" dy="22">- FIFO (先进先出)</tspan><tspan x="460" dy="22">- Random (随机)</tspan></text></g><g id="set-associative"><rect x="810" y="60" width="350" height="680" fill="#f0f4f8" stroke="#16a085" stroke-width="2" rx="8"/><text x="985" y="90" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">组相联映射 (Set Associative)</text><text x="860" y="130" font-size="14" font-weight="bold" fill="#34495e">主存块:</text><g id="main-mem-set"><rect x="860" y="140" width="80" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="900" y="165" font-size="12" text-anchor="middle" fill="#fff">块 0</text><rect x="860" y="190" width="80" height="40" fill="#e67e22" stroke="#d35400" stroke-width="2"/><text x="900" y="215" font-size="12" text-anchor="middle" fill="#fff">块 1</text><rect x="860" y="240" width="80" height="40" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="900" y="265" font-size="12" text-anchor="middle" fill="#fff">块 2</text><rect x="860" y="290" width="80" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="900" y="315" font-size="12" text-anchor="middle" fill="#fff">块 3</text></g><path d="M940 160l60 10" stroke="#e74c3c" stroke-width="2" fill="none" opacity=".7"/><path d="M940 160l60 50" stroke="#e74c3c" stroke-width="2" fill="none" opacity=".7"/><path d="M940 260l60-90" stroke="#f39c12" stroke-width="2" fill="none" opacity=".7"/><path d="M940 260l60-50" stroke="#f39c12" stroke-width="2" fill="none" opacity=".7"/><path d="M940 210l60 60" stroke="#e67e22" stroke-width="2" fill="none" opacity=".7"/><path d="M940 210l60 1e2" stroke="#e67e22" stroke-width="2" fill="none" opacity=".7"/><path d="M940 310l60-40" stroke="#3498db" stroke-width="2" fill="none" opacity=".7"/><path d="M940 310h60" stroke="#3498db" stroke-width="2" fill="none" opacity=".7"/><text x="1020" y="130" font-size="14" font-weight="bold" fill="#34495e">Cache组:</text><rect x="1e3" y="150" width="130" height="80" fill="#e8f5e9" stroke="#16a085" stroke-width="2" rx="4"/><text x="1065" y="168" font-size="11" font-weight="bold" text-anchor="middle" fill="#16a085">组 0</text><rect x="1010" y="175" width="50" height="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5"/><text x="1035" y="195" font-size="10" text-anchor="middle" fill="#2c3e50">路0</text><rect x="1070" y="175" width="50" height="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5"/><text x="1095" y="195" font-size="10" text-anchor="middle" fill="#2c3e50">路1</text><text x="1065" y="222" font-size="9" text-anchor="middle" fill="#16a085">块0,2在此组</text><rect x="1e3" y="250" width="130" height="80" fill="#e8f5e9" stroke="#16a085" stroke-width="2" rx="4"/><text x="1065" y="268" font-size="11" font-weight="bold" text-anchor="middle" fill="#16a085">组 1</text><rect x="1010" y="275" width="50" height="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5"/><text x="1035" y="295" font-size="10" text-anchor="middle" fill="#2c3e50">路0</text><rect x="1070" y="275" width="50" height="30" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1.5"/><text x="1095" y="295" font-size="10" text-anchor="middle" fill="#2c3e50">路1</text><text x="1065" y="322" font-size="9" text-anchor="middle" fill="#16a085">块1,3在此组</text><text x="985" y="365" font-size="35" text-anchor="middle" fill="#16a085">?</text><rect x="830" y="400" width="310" height="320" fill="#e8f5e9" stroke="#16a085" stroke-width="2" rx="5"/><text x="985" y="435" font-size="20" font-weight="bold" text-anchor="middle" fill="#16a085">✅ 需要替换算法</text><text x="840" y="475" font-size="15" fill="#34495e"><tspan x="840" dy="0">• 主存块映射到特定组,</tspan><tspan x="840" dy="22">但可在组内任意路</tspan><tspan x="840" dy="27">• 例如(2路组相联):</tspan><tspan x="840" dy="22">块0,2 → 组0的路0或路1</tspan><tspan x="840" dy="22">块1,3 → 组1的路0或路1</tspan><tspan x="840" dy="27">• 组内满时,需要替换</tspan><tspan x="840" dy="22">算法决定淘汰哪一路</tspan><tspan x="840" dy="27">• 常用算法: LRU, FIFO等</tspan></text></g><defs><marker id="arrowred" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#e74c3c"/></marker><marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#e67e22"/></marker><marker id="arrowyellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#f39c12"/></marker><marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#3498db"/></marker></defs></svg>