<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="none"/><text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">IP数据报分片与重组</text><text x="50" y="55" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">原始数据报 (4000字节)</text><rect x="50" y="65" width="300" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="200" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">ID=12345, 总长度=4000</text><text x="430" y="88" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">以太网MTU=1500字节</text><path d="M360 85h60" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/><path d="M2e2 115v35" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><text x="220" y="130" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">分片</text><text x="50" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">分片后的数据包</text><rect x="50" y="175" width="120" height="35" fill="#27ae60" stroke="#219a52" stroke-width="2" rx="3"/><text x="110" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">分片1</text><text x="110" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">ID=12345, 偏移=0</text><text x="110" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">1480字节数据</text><rect x="185" y="175" width="120" height="35" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="3"/><text x="245" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">分片2</text><text x="245" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">ID=12345, 偏移=185</text><text x="245" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">1480字节数据</text><rect x="320" y="175" width="120" height="35" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="3"/><text x="380" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">分片3</text><text x="380" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">ID=12345, 偏移=370</text><text x="380" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">1020字节数据</text><text x="500" y="195" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">网络传输</text><path d="M450 195h30" stroke="#7f8c8d" stroke-width="2"/><path d="M460 185q10-10 20 0" stroke="#7f8c8d" stroke-width="1" fill="none"/><path d="M460 205q10 10 20 0" stroke="#7f8c8d" stroke-width="1" fill="none"/><text x="50" y="285" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34495e">接收端重组过程</text><rect x="50" y="295" width="100" height="30" fill="#27ae60" stroke="#219a52" stroke-width="2" rx="3"/><text x="100" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">分片1 (偏移=0)</text><rect x="160" y="295" width="100" height="30" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="3"/><text x="210" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">分片2 (偏移=185)</text><rect x="270" y="295" width="100" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="3"/><text x="320" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">分片3 (偏移=370)</text><path d="M2e2 335v25" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowhead)"/><text x="220" y="350" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">重组</text><rect x="50" y="370" width="300" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="4"/><text x="200" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">原始数据报已恢复 (4000字节)</text><rect x="450" y="260" width="320" height="180" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/><text x="610" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">关键字段说明</text><rect x="465" y="295" width="15" height="15" fill="#e74c3c"/><text x="490" y="306" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Identification (标识符)</text><text x="465" y="320" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 16位字段，标识同一数据报</text><text x="465" y="335" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 同一数据报的所有分片具有相同ID</text><rect x="465" y="350" width="15" height="15" fill="#3498db"/><text x="490" y="361" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">Fragment Offset (分片偏移)</text><text x="465" y="375" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 13位字段，单位为8字节</text><text x="465" y="390" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 指示分片在原数据报中的位置</text><text x="465" y="405" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• 用于接收端正确重组数据</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/></marker></defs><text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">通过标识符区分不同数据报的分片，通过偏移量确定分片的重组顺序</text></svg>