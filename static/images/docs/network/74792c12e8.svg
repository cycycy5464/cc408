<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="processGrad1" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#4A90E2;stop-opacity:1"/><stop offset="100%" style="stop-color:#357ABD;stop-opacity:1"/></linearGradient><linearGradient id="processGrad2" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#E94B3C;stop-opacity:1"/><stop offset="100%" style="stop-color:#C44133;stop-opacity:1"/></linearGradient><linearGradient id="mmuGrad" x1="0" y1="0" x2="0" y2="100%"><stop offset="0" style="stop-color:#50C878;stop-opacity:1"/><stop offset="100%" style="stop-color:#3DA55F;stop-opacity:1"/></linearGradient><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity=".3"/></filter></defs><text x="600" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#2C3E50">MMU地址翻译与进程切换机制</text><text x="600" y="58" font-size="12" text-anchor="middle" fill="#7F8C8D">(页表基址寄存器 PTBR 的作用)</text><g id="processA"><rect x="50" y="80" width="200" height="280" rx="10" fill="url(#processGrad1)" filter="url(#shadow)"/><text x="150" y="110" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">进程 A</text><rect x="70" y="130" width="160" height="120" rx="5" fill="#fff" fill-opacity=".9"/><text x="150" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">PCB (task_struct)</text><line x1="80" y1="160" x2="220" y2="160" stroke="#4A90E2" stroke-width="2"/><text x="80" y="180" font-size="12" fill="#34495E">• CPU寄存器状态</text><text x="80" y="200" font-size="12" fill="#34495E">• 进程ID</text><text x="80" y="220" font-size="12" fill="#34495E">• 优先级</text><text x="80" y="240" font-size="12" font-weight="bold" fill="#E74C3C">• PTBR = 0x1000</text><rect x="70" y="270" width="160" height="70" rx="5" fill="#fff" fill-opacity=".9"/><text x="150" y="290" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">虚拟地址空间</text><text x="150" y="310" font-size="11" text-anchor="middle" fill="#7F8C8D">0x00400000 - Code</text><text x="150" y="327" font-size="11" text-anchor="middle" fill="#7F8C8D">0x00600000 - Data</text></g><g id="processB"><rect x="950" y="80" width="200" height="280" rx="10" fill="url(#processGrad2)" filter="url(#shadow)"/><text x="1050" y="110" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">进程 B</text><rect x="970" y="130" width="160" height="120" rx="5" fill="#fff" fill-opacity=".9"/><text x="1050" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">PCB (task_struct)</text><line x1="980" y1="160" x2="1120" y2="160" stroke="#E94B3C" stroke-width="2"/><text x="980" y="180" font-size="12" fill="#34495E">• CPU寄存器状态</text><text x="980" y="200" font-size="12" fill="#34495E">• 进程ID</text><text x="980" y="220" font-size="12" fill="#34495E">• 优先级</text><text x="980" y="240" font-size="12" font-weight="bold" fill="#E74C3C">• PTBR = 0x2000</text><rect x="970" y="270" width="160" height="70" rx="5" fill="#fff" fill-opacity=".9"/><text x="1050" y="290" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">虚拟地址空间</text><text x="1050" y="310" font-size="11" text-anchor="middle" fill="#7F8C8D">0x00400000 - Code</text><text x="1050" y="327" font-size="11" text-anchor="middle" fill="#7F8C8D">0x00600000 - Data</text></g><g id="ptbrRegister"><rect x="500" y="120" width="200" height="60" rx="8" fill="#F39C12" stroke="#D68910" stroke-width="3" filter="url(#shadow)"/><text x="600" y="145" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">PTBR 寄存器</text><text x="600" y="167" font-size="13" text-anchor="middle" fill="#fff" id="ptbrValue">当前值: 0x1000</text></g><g id="contextSwitch"><path d="M230 240q120-40 270-90" fill="none" stroke="#4A90E2" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowBlue)"/><text x="340" y="190" font-size="11" fill="#4A90E2" font-weight="bold">① 保存状态</text><path d="M970 240q-120-40-270-90" fill="none" stroke="#E94B3C" stroke-width="3" marker-end="url(#arrowRed)"/><text x="815" y="190" font-size="11" fill="#E94B3C" font-weight="bold">② 加载PTBR</text><defs><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#4A90E2"/></marker><marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#E94B3C"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#50C878"/></marker></defs></g><g id="mmu"><rect x="450" y="250" width="300" height="120" rx="10" fill="url(#mmuGrad)" filter="url(#shadow)"/><text x="600" y="280" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">MMU (内存管理单元)</text><rect x="470" y="295" width="260" height="60" rx="5" fill="#fff" fill-opacity=".15"/><text x="600" y="315" font-size="13" text-anchor="middle" fill="#fff">虚拟地址 → 物理地址</text><text x="600" y="335" font-size="12" text-anchor="middle" fill="#fff">使用 PTBR 指向的页表</text></g><path d="M6e2 180v70" fill="none" stroke="#F39C12" stroke-width="4" marker-end="url(#arrowOrange)"/><text x="620" y="220" font-size="12" fill="#F39C12" font-weight="bold">提供页表基址</text><defs><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0 0V6L9 3z" fill="#F39C12"/></marker></defs><g id="physicalMemory"><rect x="200" y="450" width="800" height="300" rx="10" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="2" filter="url(#shadow)"/><text x="600" y="480" font-size="18" font-weight="bold" text-anchor="middle" fill="#2C3E50">物理内存</text><rect x="230" y="510" width="180" height="200" rx="5" fill="#D6EAF8" stroke="#4A90E2" stroke-width="2"/><text x="320" y="535" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">进程A的页表</text><text x="320" y="555" font-size="11" font-weight="bold" text-anchor="middle" fill="#E74C3C">@ 0x1000</text><line x1="240" y1="565" x2="400" y2="565" stroke="#4A90E2" stroke-width="1"/><text x="240" y="585" font-size="11" fill="#34495E">PML4 Table</text><text x="240" y="605" font-size="11" fill="#34495E">PDPT Table</text><text x="240" y="625" font-size="11" fill="#34495E">PD Table</text><text x="240" y="645" font-size="11" fill="#34495E">PT Table</text><text x="240" y="670" font-size="10" fill="#7F8C8D">0x00400000 → 0x3000</text><text x="240" y="690" font-size="10" fill="#7F8C8D">0x00600000 → 0x4000</text><rect x="790" y="510" width="180" height="200" rx="5" fill="#FADBD8" stroke="#E94B3C" stroke-width="2"/><text x="880" y="535" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">进程B的页表</text><text x="880" y="555" font-size="11" font-weight="bold" text-anchor="middle" fill="#E74C3C">@ 0x2000</text><line x1="800" y1="565" x2="960" y2="565" stroke="#E94B3C" stroke-width="1"/><text x="800" y="585" font-size="11" fill="#34495E">PML4 Table</text><text x="800" y="605" font-size="11" fill="#34495E">PDPT Table</text><text x="800" y="625" font-size="11" fill="#34495E">PD Table</text><text x="800" y="645" font-size="11" fill="#34495E">PT Table</text><text x="800" y="670" font-size="10" fill="#7F8C8D">0x00400000 → 0x5000</text><text x="800" y="690" font-size="10" fill="#7F8C8D">0x00600000 → 0x6000</text><rect x="470" y="530" width="220" height="160" rx="5" fill="#D5F4E6" stroke="#50C878" stroke-width="2"/><text x="580" y="555" font-size="13" font-weight="bold" text-anchor="middle" fill="#2C3E50">实际物理页</text><text x="480" y="580" font-size="10" fill="#34495E">0x3000 - A的代码</text><text x="480" y="600" font-size="10" fill="#34495E">0x4000 - A的数据</text><text x="480" y="620" font-size="10" fill="#34495E">0x5000 - B的代码</text><text x="480" y="640" font-size="10" fill="#34495E">0x6000 - B的数据</text><text x="480" y="665" font-size="10" fill="#7F8C8D">...</text></g><path d="M520 370 320 510" fill="none" stroke="#50C878" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowGreen)"/><text x="380" y="430" font-size="11" fill="#50C878" font-weight="bold">查找A的页表</text><path d="M680 370 880 510" fill="none" stroke="#50C878" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowGreen)"/><text x="800" y="430" font-size="11" fill="#50C878" font-weight="bold">查找B的页表</text><g id="steps"><rect x="20" y="390" width="160" height="50" rx="5" fill="#3498DB" fill-opacity=".1" stroke="#3498DB" stroke-width="1"/><text x="100" y="410" font-size="11" font-weight="bold" text-anchor="middle" fill="#2C3E50">上下文切换步骤:</text><text x="30" y="428" font-size="10" fill="#34495E">1. 保存A的状态到PCB</text><rect x="1020" y="390" width="160" height="50" rx="5" fill="#E74C3C" fill-opacity=".1" stroke="#E74C3C" stroke-width="1"/><text x="1030" y="410" font-size="10" fill="#34495E">2. 加载B的PTBR到寄存器</text><text x="1030" y="428" font-size="10" fill="#34495E">3. 恢复B的CPU状态</text></g></svg>