<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="856pt" height="394pt" viewBox="0 0 855.5 394.43" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 390.43)"><title>ConditionFlags</title><g id="node1" class="node"><title>title</title><polygon fill="#add8e6" stroke="#000" stroke-width="2" points="478.5,-386.43 282.5,-386.43 282.5,-350.43 478.5,-350.43 478.5,-386.43"/><text text-anchor="middle" x="380.5" y="-364.73" font-family="Microsoft Yahei" font-size="14">条件标志 (Condition Flags)</text></g><g id="node2" class="node"><title>definition</title><ellipse fill="#ffffe0" stroke="#000" cx="380.5" cy="-293.21" rx="108.38" ry="21.43"/><text text-anchor="middle" x="380.5" y="-296.21" font-family="Microsoft Yahei" font-size="10">用于标记指令执行后的结果状态</text><text text-anchor="middle" x="380.5" y="-285.21" font-family="Microsoft Yahei" font-size="10">影响程序控制流</text></g><g id="edge1" class="edge"><title>title-&gt;definition</title><path fill="none" stroke="#000" d="M380.5-350.08c0 7.57999999999998.0 16.69.0 25.34"/><polygon fill="#000" stroke="#000" points="384,-324.56 380.5,-314.56 377,-324.56 384,-324.56"/></g><g id="node3" class="node"><title>OF</title><polygon fill="#f08080" stroke="#000" points="125,-236 0,-236 0,-195 125,-195 125,-236"/><text text-anchor="middle" x="62.5" y="-224" font-family="Microsoft Yahei" font-size="10">OF (Overflow Flag)</text><text text-anchor="middle" x="62.5" y="-213" font-family="Microsoft Yahei" font-size="10">溢出标志</text><text text-anchor="middle" x="62.5" y="-202" font-family="Microsoft Yahei" font-size="10">有符号整数溢出时 OF=1</text></g><g id="edge2" class="edge"><title>definition-&gt;OF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M310.61-277.02c-46.93 10.38-110.36 24.76-175.31 40.86"/><polygon fill="#000" stroke="#000" points="135.84,-232.68 125.29,-233.66 134.15,-239.48 135.84,-232.68"/></g><g id="node4" class="node"><title>CF</title><polygon fill="#90ee90" stroke="#000" points="847.5,-236 701.5,-236 701.5,-195 847.5,-195 847.5,-236"/><text text-anchor="middle" x="774.5" y="-224" font-family="Microsoft Yahei" font-size="10">CF (Carry Flag)</text><text text-anchor="middle" x="774.5" y="-213" font-family="Microsoft Yahei" font-size="10">进位标志</text><text text-anchor="middle" x="774.5" y="-202" font-family="Microsoft Yahei" font-size="10">无符号整数进位/借位时 CF=1</text></g><g id="edge3" class="edge"><title>definition-&gt;CF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M460.62-278.91c60.54 10.33 145.92 25.47 230.56 42.9"/><polygon fill="#000" stroke="#000" points="692.14,-239.39 701.23,-233.93 690.72,-232.53 692.14,-239.39"/></g><g id="node5" class="node"><title>SF</title><polygon fill="#ffb6c1" stroke="#000" points="247.5,-236 143.5,-236 143.5,-195 247.5,-195 247.5,-236"/><text text-anchor="middle" x="195.5" y="-224" font-family="Microsoft Yahei" font-size="10">SF (Sign Flag)</text><text text-anchor="middle" x="195.5" y="-213" font-family="Microsoft Yahei" font-size="10">符号标志</text><text text-anchor="middle" x="195.5" y="-202" font-family="Microsoft Yahei" font-size="10">结果为负数时 SF=1</text></g><g id="edge4" class="edge"><title>definition-&gt;SF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M335.72-273.89c-24.86 10.18-56.05 22.94-82.7 33.85"/><polygon fill="#000" stroke="#000" points="254.01,-236.67 243.43,-236.12 251.36,-243.14 254.01,-236.67"/></g><g id="node6" class="node"><title>ZF</title><polygon fill="#b0c4de" stroke="#000" points="361,-236 266,-236 266,-195 361,-195 361,-236"/><text text-anchor="middle" x="313.5" y="-224" font-family="Microsoft Yahei" font-size="10">ZF (Zero Flag)</text><text text-anchor="middle" x="313.5" y="-213" font-family="Microsoft Yahei" font-size="10">零标志</text><text text-anchor="middle" x="313.5" y="-202" font-family="Microsoft Yahei" font-size="10">结果为零时 ZF=1</text></g><g id="edge5" class="edge"><title>definition-&gt;ZF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M362.55-271.92C354.85-263.23 345.76-252.95 337.5-243.62"/><polygon fill="#000" stroke="#000" points="340.06,-241.23 330.81,-236.06 334.82,-245.87 340.06,-241.23"/></g><g id="node7" class="node"><title>AF</title><polygon fill="#ffa07a" stroke="#000" points="516,-236 379,-236 379,-195 516,-195 516,-236"/><text text-anchor="middle" x="447.5" y="-224" font-family="Microsoft Yahei" font-size="10">AF (Auxiliary Carry Flag)</text><text text-anchor="middle" x="447.5" y="-213" font-family="Microsoft Yahei" font-size="10">辅助进位标志</text><text text-anchor="middle" x="447.5" y="-202" font-family="Microsoft Yahei" font-size="10">BCD运算低四位进位</text></g><g id="edge6" class="edge"><title>definition-&gt;AF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M398.45-271.92C406.15-263.23 415.24-252.95 423.5-243.62"/><polygon fill="#000" stroke="#000" points="426.18,-245.87 430.19,-236.06 420.94,-241.23 426.18,-245.87"/></g><g id="node8" class="node"><title>PF</title><polygon fill="#d3d3d3" stroke="#000" points="683,-236 534,-236 534,-195 683,-195 683,-236"/><text text-anchor="middle" x="608.5" y="-224" font-family="Microsoft Yahei" font-size="10">PF (Parity Flag)</text><text text-anchor="middle" x="608.5" y="-213" font-family="Microsoft Yahei" font-size="10">奇偶校验标志</text><text text-anchor="middle" x="608.5" y="-202" font-family="Microsoft Yahei" font-size="10">结果中1的个数为偶数时 PF=1</text></g><g id="edge7" class="edge"><title>definition-&gt;PF</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M433.38-274.65c31.61 10.49 72.12 23.95 106.21 35.27"/><polygon fill="#000" stroke="#000" points="541.1,-242.57 549.49,-236.1 538.89,-235.93 541.1,-242.57"/></g><g id="node9" class="node"><title>auto_set</title><polygon fill="wheat" stroke="#000" points="380.5,-159 233.5,-118 380.5,-77 527.5,-118 380.5,-159"/><text text-anchor="middle" x="380.5" y="-126.5" font-family="Microsoft Yahei" font-size="10">自动设置</text><text text-anchor="middle" x="380.5" y="-115.5" font-family="Microsoft Yahei" font-size="10">算数/逻辑指令 (ADD, AND...)</text><text text-anchor="middle" x="380.5" y="-104.5" font-family="Microsoft Yahei" font-size="10">比较指令 (CMP)</text></g><g id="edge8" class="edge"><title>OF-&gt;auto_set</title><path fill="none" stroke="#000" d="M125.33-195.63c50.54 15.18 121.85 36.59 176.24 52.93"/><polygon fill="#000" stroke="#000" points="302.61,-146.05 311.18,-139.82 300.6,-139.34 302.61,-146.05"/></g><g id="edge9" class="edge"><title>CF-&gt;auto_set</title><path fill="none" stroke="#000" d="M701.31-196.76c-66.17 16.04-163.7 39.68-233.84 56.68"/><polygon fill="#000" stroke="#000" points="467.87,-136.58 457.33,-137.62 466.22,-143.38 467.87,-136.58"/></g><g id="node11" class="node"><title>cf_detail</title><polygon fill="#90ee90" stroke="#000" points="816,-136 727,-136 727,-100 822,-100 822,-130 816,-136"/><polyline fill="none" stroke="#000" points="816,-136 816,-130"/><polyline fill="none" stroke="#000" points="822,-130 816,-130"/><text text-anchor="middle" x="774.5" y="-120.6" font-family="Microsoft Yahei" font-size="8">加法: CF=1 表示进位</text><text text-anchor="middle" x="774.5" y="-111.6" font-family="Microsoft Yahei" font-size="8">减法: CF=1 表示借位</text></g><g id="edge15" class="edge"><title>CF-&gt;cf_detail</title><path fill="none" stroke="#000" stroke-dasharray="5,2" d="M774.5-194.71c0 17.26.0 42.06.0 58.51"/></g><g id="edge10" class="edge"><title>SF-&gt;auto_set</title><path fill="none" stroke="#000" d="M233.38-194.94c25.19 13 58.78 30.34 87.51 45.17"/><polygon fill="#000" stroke="#000" points="322.75,-152.75 330.03,-145.05 319.54,-146.53 322.75,-152.75"/></g><g id="edge11" class="edge"><title>ZF-&gt;auto_set</title><path fill="none" stroke="#000" d="M327.38-194.71C334.23-184.95 342.77-172.79 350.98-161.08"/><polygon fill="#000" stroke="#000" points="353.99,-162.88 356.87,-152.68 348.26,-158.86 353.99,-162.88"/></g><g id="edge12" class="edge"><title>AF-&gt;auto_set</title><path fill="none" stroke="#000" d="M433.62-194.71C426.77-184.95 418.23-172.79 410.02-161.08"/><polygon fill="#000" stroke="#000" points="412.74,-158.86 404.13,-152.68 407.01,-162.88 412.74,-158.86"/></g><g id="edge13" class="edge"><title>PF-&gt;auto_set</title><path fill="none" stroke="#000" d="M561.81-194.94c-32.89 13.77-77.42 32.43-114.12 47.8"/><polygon fill="#000" stroke="#000" points="448.63,-143.74 438.05,-143.11 445.92,-150.2 448.63,-143.74"/></g><g id="node10" class="node"><title>usage</title><polygon fill="#e6e6fa" stroke="#000" points="431.5,-41 329.5,-41 329.5,0 431.5,0 431.5,-41"/><text text-anchor="middle" x="380.5" y="-29" font-family="Microsoft Yahei" font-size="10">条件跳转指令 (JXX)</text><text text-anchor="middle" x="380.5" y="-18" font-family="Microsoft Yahei" font-size="10">检查标志位状态</text><text text-anchor="middle" x="380.5" y="-7" font-family="Microsoft Yahei" font-size="10">决定程序流程跳转</text></g><g id="edge14" class="edge"><title>auto_set-&gt;usage</title><path fill="none" stroke="#000" d="M380.5-76.78c0 8.58.0 17.49.0 25.59"/><polygon fill="#000" stroke="#000" points="384,-51.11 380.5,-41.11 377,-51.11 384,-51.11"/></g></g></svg>