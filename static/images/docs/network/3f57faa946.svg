<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><rect width="800" height="400" fill="#f8f9fa"/><text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">单链表结构示意图</text><g><rect x="50" y="80" width="120" height="80" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/><rect x="50" y="80" width="60" height="80" fill="#bbdefb" stroke="#2196f3" stroke-width="1"/><rect x="110" y="80" width="60" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/><line x1="110" y1="80" x2="110" y2="160" stroke="#333" stroke-width="1"/><text x="80" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">data</text><text x="80" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2"/><text x="140" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">next</text><text x="140" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f57c00">→</text><text x="110" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Node 1</text></g><path d="M170 120h78" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead)"/><g><rect x="250" y="80" width="120" height="80" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" rx="5"/><rect x="250" y="80" width="60" height="80" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/><rect x="310" y="80" width="60" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/><line x1="310" y1="80" x2="310" y2="160" stroke="#333" stroke-width="1"/><text x="280" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">data</text><text x="280" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#388e3c">20</text><text x="340" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">next</text><text x="340" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f57c00">→</text><text x="310" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Node 2</text></g><path d="M370 120h78" stroke="#f57c00" stroke-width="2" marker-end="url(#arrowhead)"/><g><rect x="450" y="80" width="120" height="80" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/><rect x="450" y="80" width="60" height="80" fill="#f8bbd9" stroke="#e91e63" stroke-width="1"/><rect x="510" y="80" width="60" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/><line x1="510" y1="80" x2="510" y2="160" stroke="#333" stroke-width="1"/><text x="480" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">data</text><text x="480" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c2185b">30</text><text x="540" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">next</text><text x="540" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#666">NULL</text><text x="510" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Node 3</text></g><rect x="50" y="220" width="300" height="120" fill="#f5f5f5" stroke="#666" stroke-width="1" rx="5"/><text x="60" y="240" font-family="monospace" font-size="12" font-weight="bold" fill="#333">typedef struct Node {</text><text x="80" y="260" font-family="monospace" font-size="12" fill="#1976d2">int data;</text><text x="220" y="260" font-family="Arial, sans-serif" font-size="14" fill="#666">// 存储数据</text><text x="80" y="280" font-family="monospace" font-size="12" fill="#f57c00">struct Node *next;</text><text x="220" y="280" font-family="Arial, sans-serif" font-size="14" fill="#666">// 指向下一个节点</text><text x="60" y="300" font-family="monospace" font-size="12" font-weight="bold" fill="#333">} Node;</text><text x="400" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">特点说明：</text><text x="400" y="270" font-family="Arial, sans-serif" font-size="12" fill="#666">• 每个节点包含数据和指针两部分</text><text x="400" y="290" font-family="Arial, sans-serif" font-size="12" fill="#666">• 通过指针连接各个节点</text><text x="400" y="310" font-family="Arial, sans-serif" font-size="12" fill="#666">• 最后一个节点的指针指向NULL</text><text x="400" y="330" font-family="Arial, sans-serif" font-size="12" fill="#666">• 在内存中可以非连续存储</text><rect x="80" y="20" width="50" height="20" fill="#ffecb3" stroke="#ffa000" stroke-width="1" rx="3"/><text x="105" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">head</text><path d="M108 40V78" stroke="#ffa000" stroke-width="2" marker-end="url(#arrowhead)"/><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f57c00"/></marker></defs></svg>