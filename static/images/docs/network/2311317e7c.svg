<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><text x="400" y="25" text-anchor="middle" font-size="20" font-weight="bold" fill="#2563eb">内存分配策略</text><g><rect x="50" y="50" width="320" height="30" fill="#3b82f6" rx="5"/><text x="210" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">固定分配</text><text x="60" y="105" font-size="12" font-weight="bold" fill="#1e40af">相同大小分区</text><g transform="translate(60, 110)"><rect x="0" y="0" width="50" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><rect x="50" y="0" width="50" height="40" fill="#fef3c7" stroke="#3b82f6" stroke-width="2"/><rect x="100" y="0" width="50" height="40" fill="#dcfce7" stroke="#3b82f6" stroke-width="2"/><rect x="150" y="0" width="50" height="40" fill="#fce7f3" stroke="#3b82f6" stroke-width="2"/><rect x="200" y="0" width="50" height="40" fill="#f3e8ff" stroke="#3b82f6" stroke-width="2"/><text x="125" y="55" text-anchor="middle" font-size="10" fill="#374151">每个区块大小相同</text><text x="25" y="25" text-anchor="middle" font-size="10" fill="#1e40af">程序A</text><text x="75" y="25" text-anchor="middle" font-size="10" fill="#b45309">程序B</text><text x="125" y="25" text-anchor="middle" font-size="10" fill="#166534">程序C</text><text x="175" y="25" text-anchor="middle" font-size="10" fill="#be185d">空闲</text><text x="225" y="25" text-anchor="middle" font-size="10" fill="#7c3aed">空闲</text></g><text x="60" y="185" font-size="12" font-weight="bold" fill="#1e40af">不同大小分区</text><g transform="translate(60, 190)"><rect x="0" y="0" width="80" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/><rect x="80" y="0" width="60" height="40" fill="#fef3c7" stroke="#3b82f6" stroke-width="2"/><rect x="140" y="0" width="40" height="40" fill="#dcfce7" stroke="#3b82f6" stroke-width="2"/><rect x="180" y="0" width="70" height="40" fill="#fce7f3" stroke="#3b82f6" stroke-width="2"/><text x="125" y="55" text-anchor="middle" font-size="10" fill="#374151">区块大小可以不同</text><text x="40" y="25" text-anchor="middle" font-size="10" fill="#1e40af">程序A</text><text x="110" y="25" text-anchor="middle" font-size="10" fill="#b45309">程序B</text><text x="160" y="25" text-anchor="middle" font-size="10" fill="#166534">程序C</text><text x="215" y="25" text-anchor="middle" font-size="10" fill="#be185d">空闲</text></g><rect x="60" y="260" width="300" height="50" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="5"/><text x="70" y="280" font-size="11" fill="#475569">• 内存被预先划分为固定区块</text><text x="70" y="295" font-size="11" fill="#475569">• 程序分配到固定大小的区块中</text></g><line x1="400" y1="50" x2="400" y2="450" stroke="#e2e8f0" stroke-width="2"/><g><rect x="430" y="50" width="320" height="30" fill="#10b981" rx="5"/><text x="590" y="70" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">可变分配</text><text x="440" y="105" font-size="12" font-weight="bold" fill="#047857">初始状态</text><g transform="translate(440, 110)"><rect x="0" y="0" width="280" height="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="140" y="25" text-anchor="middle" font-size="10" fill="#047857">空闲内存</text></g><text x="440" y="185" font-size="12" font-weight="bold" fill="#047857">动态分配后</text><g transform="translate(440, 190)"><rect x="0" y="0" width="90" height="40" fill="#bfdbfe" stroke="#10b981" stroke-width="2"/><rect x="90" y="0" width="70" height="40" fill="#fed7aa" stroke="#10b981" stroke-width="2"/><rect x="160" y="0" width="50" height="40" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/><rect x="210" y="0" width="70" height="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="45" y="25" text-anchor="middle" font-size="10" fill="#1e40af">程序A (90MB)</text><text x="125" y="25" text-anchor="middle" font-size="10" fill="#ea580c">程序B (70MB)</text><text x="185" y="25" text-anchor="middle" font-size="10" fill="#059669">程序C</text><text x="245" y="25" text-anchor="middle" font-size="10" fill="#047857">剩余空闲</text></g><text x="440" y="265" font-size="12" font-weight="bold" fill="#047857">程序B结束，内存释放</text><g transform="translate(440, 270)"><rect x="0" y="0" width="90" height="40" fill="#bfdbfe" stroke="#10b981" stroke-width="2"/><rect x="90" y="0" width="70" height="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><rect x="160" y="0" width="50" height="40" fill="#bbf7d0" stroke="#10b981" stroke-width="2"/><rect x="210" y="0" width="70" height="40" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/><text x="45" y="25" text-anchor="middle" font-size="10" fill="#1e40af">程序A</text><text x="125" y="25" text-anchor="middle" font-size="10" fill="#047857">空闲</text><text x="185" y="25" text-anchor="middle" font-size="10" fill="#059669">程序C</text><text x="245" y="25" text-anchor="middle" font-size="10" fill="#047857">空闲</text></g><rect x="440" y="340" width="300" height="65" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" rx="5"/><text x="450" y="360" font-size="11" fill="#047857">• 根据程序需求动态分配内存</text><text x="450" y="375" font-size="11" fill="#047857">• 内存利用率更高</text><text x="450" y="390" font-size="11" fill="#047857">• 分配和释放更灵活</text></g><g transform="translate(380, 430)"><path d="M0 0 15-8v5H40V3H15V8z" fill="#6b7280"/><text x="45" y="0" font-size="11" fill="#6b7280" alignment-baseline="middle">对比</text></g><rect x="50" y="450" width="700" height="35" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" rx="5"/><text x="60" y="470" font-size="12" font-weight="bold" fill="#334155">总结: 固定分配简单但可能浪费内存，可变分配更灵活但管理复杂</text></svg>