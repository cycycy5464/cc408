<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><linearGradient id="clientGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#4CAF50;stop-opacity:1"/><stop offset="100%" style="stop-color:#45a049;stop-opacity:1"/></linearGradient><linearGradient id="serverGrad" x1="0" y1="0" x2="100%" y2="100%"><stop offset="0" style="stop-color:#2196F3;stop-opacity:1"/><stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/></linearGradient><filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity=".3"/></filter></defs><rect width="800" height="500" fill="none" stroke="#e9ecef" stroke-width="1"/><text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">FTP 工作原理</text><rect x="50" y="80" width="120" height="80" rx="8" fill="url(#clientGrad)" filter="url(#shadow)"/><text x="110" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">FTP 客户端</text><text x="110" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Client</text><rect x="630" y="80" width="120" height="80" rx="8" fill="url(#serverGrad)" filter="url(#shadow)"/><text x="690" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">FTP 服务器</text><text x="690" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff">Server</text><line x1="170" y1="100" x2="630" y2="100" stroke="#FF5722" stroke-width="3" marker-end="url(#arrowhead)"/><text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF5722">控制连接 (端口 21)</text><text x="400" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">命令与响应</text><line x1="170" y1="140" x2="630" y2="140" stroke="#9C27B0" stroke-width="3" marker-end="url(#arrowhead2)"/><text x="400" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#9C27B0">数据连接 (端口 20 或动态)</text><text x="400" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">文件传输</text><text x="50" y="200" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">工作流程：</text><rect x="40" y="220" width="720" height="250" rx="8" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#shadow)"/><circle cx="70" cy="250" r="12" fill="#FF5722"/><text x="70" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">1</text><text x="100" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">建立连接</text><text x="100" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">• 建立 TCP 控制连接 (端口 21)</text><circle cx="270" cy="250" r="12" fill="#FF9800"/><text x="270" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">2</text><text x="300" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">身份验证</text><text x="300" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">• 用户名和密码验证</text><circle cx="470" cy="250" r="12" fill="#4CAF50"/><text x="470" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">3</text><text x="500" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">命令交换</text><text x="500" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">• 通过控制连接发送命令</text><circle cx="650" cy="250" r="12" fill="#2196F3"/><text x="650" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff">4</text><text x="680" y="255" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">数据传输</text><text x="680" y="270" font-family="Arial, sans-serif" font-size="10" fill="#666">• 建立数据连接传输文件</text><text x="70" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">传输模式：</text><rect x="70" y="320" width="150" height="60" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/><text x="145" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976D2">主动模式 (Active)</text><text x="145" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">客户端开放端口</text><text x="145" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">服务器主动连接</text><rect x="240" y="320" width="150" height="60" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/><text x="315" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F57C00">被动模式 (Passive)</text><text x="315" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">服务器开放端口</text><text x="315" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">客户端主动连接</text><text x="450" y="310" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">文件类型：</text><rect x="450" y="320" width="120" height="30" rx="5" fill="#E8F5E8" stroke="#4CAF50" stroke-width="1"/><text x="510" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">ASCII 模式</text><rect x="580" y="320" width="120" height="30" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/><text x="640" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2">二进制模式</text><rect x="450" y="360" width="250" height="60" rx="5" fill="#FAFAFA" stroke="#ccc" stroke-width="1"/><text x="575" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">常用命令</text><text x="575" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">LIST (列表) • RETR (下载) • STOR (上传)</text><text x="575" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">PWD (当前目录) • CWD (切换目录) • QUIT (退出)</text><rect x="70" y="400" width="320" height="50" rx="5" fill="#FAFAFA" stroke="#ccc" stroke-width="1"/><text x="230" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">常见状态码</text><text x="230" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">200 (成功) • 220 (连接就绪) • 226 (传输完成) • 530 (认证失败)</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF5722"/></marker><marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9C27B0"/></marker></defs></svg>