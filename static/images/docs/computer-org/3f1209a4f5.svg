<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1e3 700"><rect width="1e3" height="700" fill="#f8f9fa"/><text x="500" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">C语言函数调用汇编过程</text><rect x="50" y="50" width="200" height="80" fill="#e8f4fd" stroke="#3498db" stroke-width="2" rx="5"/><text x="150" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">术语说明</text><text x="60" y="90" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Caller: 调用函数的一方</text><text x="60" y="110" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Callee: 被调用的函数</text><line x1="100" y1="180" x2="900" y2="180" stroke="#34495e" stroke-width="3" marker-end="url(#arrowhead)"/><text x="500" y="200" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">时间轴</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/></marker></defs><rect x="120" y="220" width="200" height="200" fill="#ff7675" fill-opacity=".1" stroke="#ff7675" stroke-width="2" rx="10"/><text x="220" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#ff7675">1. 函数入口</text><rect x="140" y="260" width="80" height="120" fill="#fff" stroke="#333" stroke-width="1"/><text x="180" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">栈</text><rect x="145" y="280" width="70" height="20" fill="#3498db" fill-opacity=".3"/><text x="180" y="293" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">Caller栈帧</text><rect x="145" y="300" width="70" height="20" fill="#e74c3c" fill-opacity=".3"/><text x="180" y="313" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">保存寄存器</text><rect x="145" y="320" width="70" height="20" fill="#f39c12" fill-opacity=".3"/><text x="180" y="333" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">返回地址</text><rect x="145" y="340" width="70" height="20" fill="#27ae60" fill-opacity=".3"/><text x="180" y="353" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">Callee栈帧</text><rect x="240" y="260" width="60" height="80" fill="#fff" stroke="#333" stroke-width="1"/><text x="270" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">寄存器</text><rect x="245" y="280" width="50" height="15" fill="#e74c3c" fill-opacity=".5"/><text x="270" y="290" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">EBP保存</text><rect x="245" y="300" width="50" height="15" fill="#3498db" fill-opacity=".5"/><text x="270" y="310" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">ESP调整</text><text x="130" y="395" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 保存Caller寄存器</text><text x="130" y="410" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 设置新栈帧</text><rect x="380" y="220" width="200" height="200" fill="#00b894" fill-opacity=".1" stroke="#00b894" stroke-width="2" rx="10"/><text x="480" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#00b894">2. 函数体执行</text><rect x="400" y="260" width="80" height="120" fill="#fff" stroke="#333" stroke-width="1"/><text x="440" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">栈</text><rect x="405" y="280" width="70" height="15" fill="#3498db" fill-opacity=".3"/><text x="440" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">Caller栈帧</text><rect x="405" y="300" width="70" height="25" fill="#27ae60" fill-opacity=".3"/><text x="440" y="315" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">局部变量</text><rect x="405" y="330" width="70" height="25" fill="#f39c12" fill-opacity=".3"/><text x="440" y="345" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">参数</text><rect x="405" y="360" width="70" height="15" fill="#9b59b6" fill-opacity=".3"/><text x="440" y="370" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">临时数据</text><rect x="500" y="260" width="60" height="100" fill="#fff" stroke="#333" stroke-width="1"/><text x="530" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">执行</text><text x="530" y="290" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">MOV</text><text x="530" y="305" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">ADD</text><text x="530" y="320" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">SUB</text><text x="530" y="335" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">CMP</text><text x="530" y="350" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">...</text><text x="390" y="395" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 局部变量分配</text><text x="390" y="410" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 业务逻辑执行</text><rect x="640" y="220" width="200" height="200" fill="#6c5ce7" fill-opacity=".1" stroke="#6c5ce7" stroke-width="2" rx="10"/><text x="740" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6c5ce7">3. 函数返回</text><rect x="660" y="260" width="80" height="120" fill="#fff" stroke="#333" stroke-width="1"/><text x="700" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">栈</text><rect x="665" y="280" width="70" height="25" fill="#3498db" fill-opacity=".3"/><text x="700" y="295" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">恢复Caller</text><rect x="665" y="310" width="70" height="20" fill="#e74c3c" fill-opacity=".5" stroke="#e74c3c" stroke-dasharray="3,3"/><text x="700" y="323" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">清理栈帧</text><rect x="665" y="335" width="70" height="20" fill="#f39c12" fill-opacity=".5" stroke="#f39c12" stroke-dasharray="3,3"/><text x="700" y="348" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">恢复寄存器</text><rect x="760" y="260" width="60" height="60" fill="#fff" stroke="#333" stroke-width="1"/><text x="790" y="275" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">EAX</text><rect x="765" y="285" width="50" height="25" fill="#e67e22" fill-opacity=".5"/><text x="790" y="300" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">返回值</text><text x="650" y="395" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 返回值→EAX</text><text x="650" y="410" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• 恢复栈帧和寄存器</text><path d="M320 3e2q30-20 60 0" fill="none" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/><path d="M580 3e2q30-20 60 0" fill="none" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/><rect x="100" y="450" width="800" height="200" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="10"/><text x="500" y="475" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">关键汇编指令</text><text x="120" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ff7675">入口指令:</text><text x="120" y="520" font-family="Courier, monospace" font-size="12" fill="#2c3e50">push %ebp</text><text x="120" y="535" font-family="Courier, monospace" font-size="12" fill="#2c3e50">mov %esp, %ebp</text><text x="120" y="550" font-family="Courier, monospace" font-size="12" fill="#2c3e50">sub $n, %esp</text><text x="120" y="570" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">保存栈帧，分配空间</text><text x="380" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#00b894">执行指令:</text><text x="380" y="520" font-family="Courier, monospace" font-size="12" fill="#2c3e50">mov %eax, -4(%ebp)</text><text x="380" y="535" font-family="Courier, monospace" font-size="12" fill="#2c3e50">add $10, %eax</text><text x="380" y="550" font-family="Courier, monospace" font-size="12" fill="#2c3e50">call function</text><text x="380" y="570" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">业务逻辑处理</text><text x="640" y="500" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#6c5ce7">返回指令:</text><text x="640" y="520" font-family="Courier, monospace" font-size="12" fill="#2c3e50">mov %ebp, %esp</text><text x="640" y="535" font-family="Courier, monospace" font-size="12" fill="#2c3e50">pop %ebp</text><text x="640" y="550" font-family="Courier, monospace" font-size="12" fill="#2c3e50">ret</text><text x="640" y="570" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">恢复并返回</text><rect x="200" y="590" width="600" height="50" fill="#fff3cd" stroke="#ffc107" stroke-width="1" rx="5"/><text x="500" y="610" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#856404">💡 重点：EBP(栈帧指针) 和 ESP(栈顶指针) 的协调管理是函数调用的核心</text><text x="500" y="630" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#856404">通过精确的栈帧管理，实现参数传递、局部变量存储和返回值传递</text></svg>