<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" width="1166pt" height="473pt" viewBox="0 0 1166 473.05" xmlns:xlink="http://www.w3.org/1999/xlink"><g id="graph0" class="graph" transform="scale(1 1) rotate(0) translate(4 469.05)"><title>GBN_Protocol</title><g id="clust1" class="cluster"><title>cluster_sender</title><polygon fill="#add8e6" stroke="#add8e6" points="153,-84 153,-200 607,-200 607,-84 153,-84"/><text text-anchor="middle" x="380" y="-184.8" font-family="Times,serif" font-size="14">发送方 (Sender)</text></g><g id="clust2" class="cluster"><title>cluster_send_window</title><polygon fill="#e0ffff" stroke="#e0ffff" points="161,-92 161,-169 599,-169 599,-92 161,-92"/><text text-anchor="middle" x="380" y="-153.8" font-family="Times,serif" font-size="14">发送窗口 (W ≤ 2^n - 1)</text></g><g id="clust3" class="cluster"><title>cluster_receiver</title><polygon fill="#ffb6c1" stroke="#ffb6c1" points="8,-92 8,-169 145,-169 145,-92 8,-92"/><text text-anchor="middle" x="76.5" y="-153.8" font-family="Times,serif" font-size="14">接收方 (Receiver)</text></g><g id="clust4" class="cluster"><title>cluster_seq_space</title><polygon fill="#ffffe0" stroke="#ffffe0" points="276,-229 276,-330.05 570,-330.05 570,-229 276,-229"/><text text-anchor="middle" x="423" y="-314.85" font-family="Times,serif" font-size="14">序号空间 (n位二进制)</text></g><g id="node1" class="node"><title>frame0</title><polygon fill="#90ee90" stroke="#000" points="503,-138 433,-138 433,-100 503,-100 503,-138"/><text text-anchor="middle" x="468" y="-122.8" font-family="Times,serif" font-size="14">帧0</text><text text-anchor="middle" x="468" y="-107.8" font-family="Times,serif" font-size="14">(已发送)</text></g><g id="node8" class="node"><title>channel</title><polygon fill="#d3d3d3" stroke="#000" points="379,-36 310.96,-18 379,0 447.04,-18 379,-36"/><text text-anchor="middle" x="379" y="-14.3" font-family="Times,serif" font-size="14">传输信道</text></g><g id="edge1" class="edge"><title>frame0-&gt;channel</title><path fill="none" stroke="blue" d="M467.87-99.88C466.88-85.95 463.47-66.96 453-54 444.82-43.88 433.04-36.52 421.26-31.25"/><polygon fill="blue" stroke="blue" points="422.47,-27.96 411.89,-27.45 419.84,-34.45 422.47,-27.96"/><text text-anchor="middle" x="481" y="-62.5" font-family="Times,serif" font-size="10">发送帧0</text></g><g id="node2" class="node"><title>frame1</title><polygon fill="#90ee90" stroke="#000" points="415,-138 345,-138 345,-100 415,-100 415,-138"/><text text-anchor="middle" x="380" y="-122.8" font-family="Times,serif" font-size="14">帧1</text><text text-anchor="middle" x="380" y="-107.8" font-family="Times,serif" font-size="14">(已发送)</text></g><g id="edge2" class="edge"><title>frame1-&gt;channel</title><path fill="none" stroke="blue" d="M363.76-99.64C358.64-92.72 353.64-84.46 351-76 348.09-66.67 347.76-63.23 351-54 352.68-49.2 355.33-44.58 358.34-40.35"/><polygon fill="blue" stroke="blue" points="361.28,-42.27 364.83,-32.29 355.83,-37.88 361.28,-42.27"/><text text-anchor="middle" x="369" y="-62.5" font-family="Times,serif" font-size="10">发送帧1</text></g><g id="node3" class="node"><title>frame2</title><polygon fill="#90ee90" stroke="#000" points="591,-138 521,-138 521,-100 591,-100 591,-138"/><text text-anchor="middle" x="556" y="-122.8" font-family="Times,serif" font-size="14">帧2</text><text text-anchor="middle" x="556" y="-107.8" font-family="Times,serif" font-size="14">(已发送)</text></g><g id="edge3" class="edge"><title>frame2-&gt;channel</title><path fill="none" stroke="blue" d="M545.4-99.95C536.01-85.48 521.01-65.73 503-54c-21.15 13.77-47.73 22.2-70.86 27.32"/><polygon fill="blue" stroke="blue" points="432.63,-23.21 422.13,-24.61 431.21,-30.06 432.63,-23.21"/><text text-anchor="middle" x="544" y="-62.5" font-family="Times,serif" font-size="10">发送帧2</text></g><g id="node4" class="node"><title>frame3</title><polygon fill="#ffffe0" stroke="#000" points="327,-138 257,-138 257,-100 327,-100 327,-138"/><text text-anchor="middle" x="292" y="-122.8" font-family="Times,serif" font-size="14">帧3</text><text text-anchor="middle" x="292" y="-107.8" font-family="Times,serif" font-size="14">(可发送)</text></g><g id="node5" class="node"><title>frame4</title><polygon fill="#ffffe0" stroke="#000" points="239,-138 169,-138 169,-100 239,-100 239,-138"/><text text-anchor="middle" x="204" y="-122.8" font-family="Times,serif" font-size="14">帧4</text><text text-anchor="middle" x="204" y="-107.8" font-family="Times,serif" font-size="14">(可发送)</text></g><g id="node6" class="node"><title>timer</title><ellipse fill="orange" stroke="#000" cx="652" cy="-416.05" rx="82.05" ry="26.74"/><text text-anchor="middle" x="652" y="-419.85" font-family="Times,serif" font-size="14">单一超时计时器</text><text text-anchor="middle" x="652" y="-404.85" font-family="Times,serif" font-size="14">(针对帧0)</text></g><g id="node12" class="node"><title>timeout_action</title><polygon fill="salmon" stroke="#000" points="718.5,-294.53 579.5,-294.53 579.5,-241.53 724.5,-241.53 724.5,-288.53 718.5,-294.53"/><polyline fill="none" stroke="#000" points="718.5,-294.53 718.5,-288.53"/><polyline fill="none" stroke="#000" points="724.5,-288.53 718.5,-288.53"/><text text-anchor="middle" x="652" y="-279.33" font-family="Times,serif" font-size="14">超时触发:</text><text text-anchor="middle" x="652" y="-264.33" font-family="Times,serif" font-size="14">从最早未确认帧开始</text><text text-anchor="middle" x="652" y="-249.33" font-family="Times,serif" font-size="14">重传窗口内所有帧</text></g><g id="edge7" class="edge"><title>timer-&gt;timeout_action</title><path fill="none" stroke="red" d="M652-388.95c0 23.36.0 57.84.0 83.83"/><polygon fill="red" stroke="red" points="655.5,-304.91 652,-294.91 648.5,-304.91 655.5,-304.91"/><text text-anchor="middle" x="672" y="-341.05" font-family="Times,serif" font-size="10">超时触发</text></g><g id="node7" class="node"><title>send_action</title><polygon fill="#b0c4de" stroke="#000" points="946,-442.55 752,-442.55 752,-389.55 952,-389.55 952,-436.55 946,-442.55"/><polyline fill="none" stroke="#000" points="946,-442.55 946,-436.55"/><polyline fill="none" stroke="#000" points="952,-436.55 946,-436.55"/><text text-anchor="middle" x="852" y="-427.35" font-family="Times,serif" font-size="14">发送动作:</text><text text-anchor="middle" x="852" y="-412.35" font-family="Times,serif" font-size="14">• 依次发送窗口内帧</text><text text-anchor="middle" x="852" y="-397.35" font-family="Times,serif" font-size="14">• 为最早未确认帧启动计时器</text></g><g id="edge6" class="edge"><title>channel-&gt;frame0</title><path fill="none" stroke="purple" stroke-dasharray="5,2" d="M383.25-35.09C387.29-47.63 394.48-64.76 406-76 412.26-82.12 416.48-79.51 424-84 428.87-86.91 433.82-90.27 438.56-93.73"/><polygon fill="purple" stroke="purple" points="436.72,-96.72 446.8,-99.97 440.95,-91.14 436.72,-96.72"/><text text-anchor="middle" x="427.5" y="-62.5" font-family="Times,serif" font-size="10">ACK确认</text></g><g id="node9" class="node"><title>recv_window</title><polygon fill="#f08080" stroke="#000" points="137,-138 33,-138 33,-100 137,-100 137,-138"/><text text-anchor="middle" x="85" y="-122.8" font-family="Times,serif" font-size="14">接收窗口 = 1</text><text text-anchor="middle" x="85" y="-107.8" font-family="Times,serif" font-size="14">期望序号: 0</text></g><g id="edge4" class="edge"><title>channel-&gt;recv_window</title><path fill="none" stroke="green" d="M331.41-23.45C293.31-28.09 238.99-37.12 194-54c-26.79-10.05-54.56-26.46-75.37-40.15"/><polygon fill="green" stroke="green" points="116.52,-91.35 110.16,-99.82 120.42,-97.17 116.52,-91.35"/><text text-anchor="middle" x="209" y="-62.5" font-family="Times,serif" font-size="10">接收帧</text></g><g id="edge5" class="edge"><title>recv_window-&gt;channel</title><path fill="none" stroke="purple" d="M117.46-99.94C129.54-93.96 143.58-87.86 157-84 185.82-75.71 194.84-83 224-76c43.14 10.36 90.77 29.02 121.69 42.17"/><polygon fill="purple" stroke="purple" points="347.31,-36.95 355.11,-29.78 344.54,-30.52 347.31,-36.95"/><text text-anchor="middle" x="316.5" y="-68" font-family="Times,serif" font-size="10">发送ACK</text><text text-anchor="middle" x="316.5" y="-57" font-family="Times,serif" font-size="10">(累计确认)</text></g><g id="node13" class="node"><title>sliding_action</title><polygon fill="#98fb98" stroke="#000" points="217.5,-294.53 92.5,-294.53 92.5,-241.53 223.5,-241.53 223.5,-288.53 217.5,-294.53"/><polyline fill="none" stroke="#000" points="217.5,-294.53 217.5,-288.53"/><polyline fill="none" stroke="#000" points="223.5,-288.53 217.5,-288.53"/><text text-anchor="middle" x="158" y="-279.33" font-family="Times,serif" font-size="14">收到累计ACK:</text><text text-anchor="middle" x="158" y="-264.33" font-family="Times,serif" font-size="14">窗口向前滑动</text><text text-anchor="middle" x="158" y="-249.33" font-family="Times,serif" font-size="14">释放已确认帧位置</text></g><g id="edge9" class="edge"><title>recv_window-&gt;sliding_action</title><path fill="none" stroke="green" d="M94.11-138.35c11.64-23.45 32.03-64.52 46.65-93.95"/><polygon fill="green" stroke="green" points="137.7,-234.02 145.28,-241.42 143.97,-230.9 137.7,-234.02"/><text text-anchor="middle" x="152" y="-211" font-family="Times,serif" font-size="10">正确接收</text></g><g id="node10" class="node"><title>recv_action</title><polygon fill="#ffe4e1" stroke="#000" points="993.5,-294.53 742.5,-294.53 742.5,-241.53 999.5,-241.53 999.5,-288.53 993.5,-294.53"/><polyline fill="none" stroke="#000" points="993.5,-294.53 993.5,-288.53"/><polyline fill="none" stroke="#000" points="999.5,-288.53 993.5,-288.53"/><text text-anchor="middle" x="871" y="-279.33" font-family="Times,serif" font-size="14">接收动作:</text><text text-anchor="middle" x="871" y="-264.33" font-family="Times,serif" font-size="14">• 序号 = 期望序号 → 接受+ACK</text><text text-anchor="middle" x="871" y="-249.33" font-family="Times,serif" font-size="14">• 序号 ≠ 期望序号 → 丢弃+重发ACK</text></g><g id="node11" class="node"><title>seq_space</title><polygon fill="#ff0" stroke="#000" points="561.61,-268.03 492.3,-299.08 353.7,-299.08 284.39,-268.03 353.7,-236.97 492.3,-236.97 561.61,-268.03"/><text text-anchor="middle" x="423" y="-271.83" font-family="Times,serif" font-size="14">序号范围: 0 到 2^n - 1</text><text text-anchor="middle" x="423" y="-256.83" font-family="Times,serif" font-size="14">最大窗口: W ≤ 2^n - 1</text></g><g id="edge11" class="edge"><title>seq_space-&gt;frame0</title><path fill="none" stroke="#000" stroke-dasharray="1,5" d="M432.22-236.92c8 26.14 19.49 63.69 27.27 89.12"/><polygon fill="#000" stroke="#000" points="462.9,-148.62 462.48,-138.03 456.21,-146.57 462.9,-148.62"/><text text-anchor="middle" x="460" y="-211" font-family="Times,serif" font-size="10">序号约束</text></g><g id="edge8" class="edge"><title>timeout_action-&gt;frame0</title><path fill="none" stroke="red" stroke-dasharray="5,2" d="M599.61-241.34C591.06-237.19 582.29-232.96 574-229 546.55-215.89 534.2-220.8 512-2e2c-15.38 14.4-26.65 35.42-33.93 52.29"/><polygon fill="red" stroke="red" points="481.26,-146.27 474.24,-138.33 474.78,-148.91 481.26,-146.27"/><text text-anchor="middle" x="584.5" y="-211" font-family="Times,serif" font-size="10">重传所有未确认帧</text></g><g id="edge10" class="edge"><title>sliding_action-&gt;frame0</title><path fill="none" stroke="green" stroke-dasharray="5,2" d="M223.56-243.5c15.74 5.19 32.59 10.36 48.44 14.5C280.32-226.83 417.04-205.05 424-2e2c17.37 12.62 28.67 34.27 35.47 51.87"/><polygon fill="green" stroke="green" points="462.9,-148.93 462.96,-138.33 456.31,-146.58 462.9,-148.93"/><text text-anchor="middle" x="409" y="-211" font-family="Times,serif" font-size="10">窗口滑动</text></g><g id="node14" class="node"><title>features</title><polygon fill="#fff" stroke="#000" stroke-dasharray="5,2" points="1152,-465.05 970,-465.05 970,-367.05 1158,-367.05 1158,-459.05 1152,-465.05"/><polyline fill="none" stroke="#000" stroke-dasharray="5,2" points="1152,-465.05 1152,-459.05"/><polyline fill="none" stroke="#000" stroke-dasharray="5,2" points="1158,-459.05 1152,-459.05"/><text text-anchor="middle" x="1064" y="-449.85" font-family="Times,serif" font-size="14">GBN关键特性:</text><text text-anchor="middle" x="1064" y="-434.85" font-family="Times,serif" font-size="14">1. 发送窗口: W ≤ 2^n - 1</text><text text-anchor="middle" x="1064" y="-419.85" font-family="Times,serif" font-size="14">2. 接收窗口: 固定为1</text><text text-anchor="middle" x="1064" y="-404.85" font-family="Times,serif" font-size="14">3. 累计确认机制</text><text text-anchor="middle" x="1064" y="-389.85" font-family="Times,serif" font-size="14">4. 超时重传所有未确认帧</text><text text-anchor="middle" x="1064" y="-374.85" font-family="Times,serif" font-size="14">5. 序号不连续则丢弃</text></g></g></svg>