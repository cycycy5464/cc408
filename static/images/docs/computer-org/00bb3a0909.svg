<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="grad1" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#4A90E2;stop-opacity:1"/><stop offset="100%" style="stop-color:#357ABD;stop-opacity:1"/></linearGradient><linearGradient id="grad2" x1="0" y1="0" x2="100%" y2="0"><stop offset="0" style="stop-color:#E85D75;stop-opacity:1"/><stop offset="100%" style="stop-color:#D63447;stop-opacity:1"/></linearGradient><filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity=".3"/></filter></defs><text x="400" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Cache 写策略组合</text><g filter="url(#shadow)"><rect x="50" y="70" width="320" height="480" rx="15" fill="#F0F8FF" stroke="#4A90E2" stroke-width="3"/><rect x="50" y="70" width="320" height="50" rx="15" fill="url(#grad1)"/><text x="210" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">组合一：倾向主存</text><rect x="70" y="145" width="280" height="60" rx="8" fill="#fff" stroke="#4A90E2" stroke-width="2"/><text x="210" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4A90E2">直写法 (Write Through)</text><text x="210" y="188" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666">命中时：同步写 Cache + 主存</text><circle cx="210" cy="235" r="20" fill="#4A90E2"/><text x="210" y="243" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#fff">+</text><rect x="70" y="265" width="280" height="60" rx="8" fill="#fff" stroke="#4A90E2" stroke-width="2"/><text x="210" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4A90E2">非写分配法 (Not Write Allocate)</text><text x="210" y="308" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666">未命中时：直接写主存</text><rect x="70" y="350" width="280" height="180" rx="8" fill="#E8F4FD" stroke="#4A90E2" stroke-width="1" stroke-dasharray="5,5"/><text x="210" y="375" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#4A90E2">特点与适用场景</text><text x="85" y="400" font-family="Arial, sans-serif" font-size="13" fill="#444">• 都倾向于操作主存</text><text x="85" y="425" font-family="Arial, sans-serif" font-size="13" fill="#444">• 保持数据一致性简单</text><text x="85" y="450" font-family="Arial, sans-serif" font-size="13" fill="#444">• 写操作延迟较高</text><text x="85" y="480" font-family="Arial, sans-serif" font-size="13" fill="#06C">✓ 写操作不频繁的场景</text><text x="85" y="505" font-family="Arial, sans-serif" font-size="13" fill="#06C">✓ 数据局部性较差的场景</text></g><g filter="url(#shadow)"><rect x="430" y="70" width="320" height="480" rx="15" fill="#FFF5F5" stroke="#E85D75" stroke-width="3"/><rect x="430" y="70" width="320" height="50" rx="15" fill="url(#grad2)"/><text x="590" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#fff">组合二：倾向 Cache</text><rect x="450" y="145" width="280" height="60" rx="8" fill="#fff" stroke="#E85D75" stroke-width="2"/><text x="590" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#E85D75">回写法 (Write Back)</text><text x="590" y="188" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666">命中时：仅写 Cache（延迟回写）</text><circle cx="590" cy="235" r="20" fill="#E85D75"/><text x="590" y="243" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#fff">+</text><rect x="450" y="265" width="280" height="60" rx="8" fill="#fff" stroke="#E85D75" stroke-width="2"/><text x="590" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#E85D75">写分配法 (Write Allocate)</text><text x="590" y="308" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#666">未命中时：加载到 Cache 再写</text><rect x="450" y="350" width="280" height="180" rx="8" fill="#FFEBEE" stroke="#E85D75" stroke-width="1" stroke-dasharray="5,5"/><text x="590" y="375" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#E85D75">特点与适用场景</text><text x="465" y="400" font-family="Arial, sans-serif" font-size="13" fill="#444">• 都倾向于操作 Cache</text><text x="465" y="425" font-family="Arial, sans-serif" font-size="13" fill="#444">• 减少主存访问次数</text><text x="465" y="450" font-family="Arial, sans-serif" font-size="13" fill="#444">• 写操作延迟较低</text><text x="465" y="480" font-family="Arial, sans-serif" font-size="13" fill="#C06">✓ 写操作频繁的场景</text><text x="465" y="505" font-family="Arial, sans-serif" font-size="13" fill="#C06">✓ 数据局部性较好的场景</text></g><rect x="100" y="560" width="600" height="30" rx="5" fill="#FFF9E6" stroke="#FFA726" stroke-width="2"/><text x="400" y="580" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#F57C00">💡 记忆要点：直写 + 非分配 → 主存优先 | 回写 + 写分配 → Cache 优先</text></svg>