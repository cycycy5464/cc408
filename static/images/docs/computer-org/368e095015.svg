<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="none"/><text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">固定分区分配示意图</text><g><text x="150" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">内存空间</text><rect x="50" y="70" width="200" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><text x="150" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff" font-weight="bold">操作系统</text><rect x="50" y="110" width="200" height="60" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="150" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">分区1 (100KB)</text><text x="150" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">作业A</text><rect x="50" y="170" width="200" height="80" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,5"/><text x="150" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">分区2 (150KB)</text><text x="150" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">空闲</text><rect x="50" y="250" width="200" height="100" fill="#3498db" stroke="#2980b9" stroke-width="2"/><text x="150" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">分区3 (200KB)</text><text x="150" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">作业B</text><rect x="50" y="350" width="200" height="80" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2" stroke-dasharray="5,5"/><text x="150" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">分区4 (120KB)</text><text x="150" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">空闲</text><text x="30" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">0K</text><text x="30" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">100K</text><text x="30" y="215" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">200K</text><text x="30" y="305" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">350K</text><text x="30" y="395" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">550K</text><text x="30" y="435" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">670K</text></g><g><text x="450" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">分区说明表</text><rect x="320" y="70" width="260" height="220" fill="#fff" stroke="#bdc3c7" stroke-width="1"/><rect x="320" y="70" width="260" height="30" fill="#34495e"/><line x1="370" y1="70" x2="370" y2="290" stroke="#bdc3c7" stroke-width="1"/><line x1="450" y1="70" x2="450" y2="290" stroke="#bdc3c7" stroke-width="1"/><line x1="520" y1="70" x2="520" y2="290" stroke="#bdc3c7" stroke-width="1"/><text x="345" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">分区号</text><text x="410" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">起始地址</text><text x="485" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">大小</text><text x="550" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">状态</text><line x1="320" y1="130" x2="580" y2="130" stroke="#bdc3c7" stroke-width="1"/><text x="345" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">1</text><text x="410" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">100K</text><text x="485" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">100KB</text><rect x="525" y="110" width="50" height="15" fill="#e74c3c" rx="3"/><text x="550" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">已分配</text><line x1="320" y1="170" x2="580" y2="170" stroke="#bdc3c7" stroke-width="1"/><text x="345" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">2</text><text x="410" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">200K</text><text x="485" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">150KB</text><rect x="525" y="150" width="50" height="15" fill="#27ae60" rx="3"/><text x="550" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">空闲</text><line x1="320" y1="210" x2="580" y2="210" stroke="#bdc3c7" stroke-width="1"/><text x="345" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">3</text><text x="410" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">350K</text><text x="485" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">200KB</text><rect x="525" y="190" width="50" height="15" fill="#e74c3c" rx="3"/><text x="550" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">已分配</text><line x1="320" y1="250" x2="580" y2="250" stroke="#bdc3c7" stroke-width="1"/><text x="345" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">4</text><text x="410" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">550K</text><text x="485" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">120KB</text><rect x="525" y="230" width="50" height="15" fill="#27ae60" rx="3"/><text x="550" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff" font-weight="bold">空闲</text></g><g><text x="680" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">后备作业队列</text><rect x="620" y="80" width="120" height="35" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="680" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">作业C (80KB)</text><rect x="620" y="120" width="120" height="35" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="680" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">作业D (180KB)</text><rect x="620" y="160" width="120" height="35" fill="#f39c12" stroke="#e67e22" stroke-width="2"/><text x="680" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff" font-weight="bold">作业E (110KB)</text></g><path d="M620 97q-40 0-40 63 0 20-55 20" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead)"/><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/></marker></defs><text x="570" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">可分配</text><g><text x="50" y="460" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">特点：</text><text x="90" y="460" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• 分区大小固定，一个分区只能装入一道作业</text><text x="90" y="475" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• 通过分区说明表管理内存分配状态</text><text x="90" y="490" font-family="Arial, sans-serif" font-size="11" fill="#34495e">• 简单易实现，但可能产生内存碎片</text></g></svg>