<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><rect width="800" height="600" fill="none"/><text x="400" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#2c3e50">排序算法时间复杂度层次图</text><rect x="50" y="80" width="700" height="80" fill="#2ecc71" fill-opacity=".2" stroke="#27ae60" stroke-width="2" rx="10"/><text x="70" y="105" font-size="18" font-weight="bold" fill="#27ae60">O(n + k) - 线性时间</text><text x="70" y="125" font-size="14" fill="#27ae60">桶排序（理想情况）</text><text x="70" y="145" font-size="14" fill="#27ae60">基数排序：O(d·(n+k))</text><rect x="50" y="180" width="700" height="100" fill="#3498db" fill-opacity=".2" stroke="#2980b9" stroke-width="2" rx="10"/><text x="70" y="205" font-size="18" font-weight="bold" fill="#2980b9">O(n log n) - 对数线性时间</text><text x="70" y="225" font-size="14" fill="#2980b9">归并排序（稳定）</text><text x="70" y="245" font-size="14" fill="#2980b9">堆排序</text><text x="70" y="265" font-size="14" fill="#2980b9">快速排序（平均情况）</text><circle cx="200" cy="220" r="8" fill="#27ae60"/><text x="215" y="224" font-size="12" fill="#27ae60">稳定</text><rect x="50" y="300" width="700" height="140" fill="#e74c3c" fill-opacity=".2" stroke="#c0392b" stroke-width="2" rx="10"/><text x="70" y="325" font-size="18" font-weight="bold" fill="#c0392b">O(n²) - 二次时间</text><text x="70" y="350" font-size="14" fill="#c0392b">冒泡排序（稳定）</text><text x="70" y="370" font-size="14" fill="#c0392b">选择排序</text><text x="70" y="390" font-size="14" fill="#c0392b">插入排序（稳定）</text><text x="70" y="410" font-size="14" fill="#c0392b">希尔排序（最坏情况）</text><text x="70" y="430" font-size="14" fill="#c0392b">快速排序（最坏情况）</text><circle cx="185" cy="344" r="8" fill="#27ae60"/><text x="200" y="349" font-size="12" fill="#27ae60">稳定</text><circle cx="185" cy="384" r="8" fill="#27ae60"/><text x="200" y="388" font-size="12" fill="#27ae60">稳定</text><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/></marker></defs><line x1="770" y1="120" x2="770" y2="400" stroke="#7f8c8d" stroke-width="3" marker-end="url(#arrowhead)"/><text x="780" y="260" font-size="14" fill="#7f8c8d">↓</text><rect x="50" y="460" width="700" height="120" fill="#f39c12" fill-opacity=".1" stroke="#e67e22" stroke-width="1" rx="5"/><text x="70" y="485" font-size="16" font-weight="bold" fill="#d35400">空间复杂度对比</text><text x="70" y="510" font-size="12" fill="#d35400">O(1) 常数空间：冒泡、选择、插入、希尔排序、堆排序</text><text x="70" y="530" font-size="12" fill="#d35400">O(log n) 对数空间：快速排序（递归栈）</text><text x="70" y="550" font-size="12" fill="#d35400">O(n) 线性空间：归并排序</text><text x="70" y="570" font-size="12" fill="#d35400">O(n + k) 线性空间：桶排序、基数排序</text><circle cx="420" cy="349" r="8" fill="#27ae60"/><text x="435" y="353" font-size="12" fill="#666">绿色圆点表示稳定排序</text></svg>