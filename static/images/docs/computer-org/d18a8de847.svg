<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#333"/></marker></defs><rect x="0" y="0" width="800" height="300" fill="none"/><rect x="0" y="300" width="800" height="300" fill="none"/><text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1565c0">CPU自陷机制流程</text><text x="50" y="50" font-size="16" font-weight="bold" fill="#1976d2">用户态 (User Mode)</text><text x="50" y="320" font-size="16" font-weight="bold" fill="#f57c00">内核态 (Kernel Mode)</text><line x1="0" y1="300" x2="800" y2="300" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/><rect x="100" y="80" width="140" height="60" rx="5" fill="#2196f3" opacity=".8"/><text x="170" y="105" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">用户程序执行</text><text x="170" y="125" text-anchor="middle" font-size="11" fill="#fff">正常指令流</text><g transform="translate(300, 60)"><rect x="0" y="0" width="180" height="100" rx="10" fill="#ff9800" opacity=".9"/><text x="90" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">自陷触发条件</text><circle cx="30" cy="45" r="3" fill="#fff"/><text x="40" y="49" font-size="10" fill="#fff">异常 (除零、越界)</text><circle cx="30" cy="65" r="3" fill="#fff"/><text x="40" y="69" font-size="10" fill="#fff">系统调用 (syscall)</text><circle cx="30" cy="85" r="3" fill="#fff"/><text x="40" y="89" font-size="10" fill="#fff">调试断点</text></g><path d="M240 110q40 0 60 0" stroke="#d32f2f" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/><text x="270" y="100" font-size="10" fill="#d32f2f" font-weight="bold">触发</text><g transform="translate(550, 80)"><rect x="0" y="0" width="120" height="80" rx="5" fill="#9c27b0" opacity=".8"/><text x="60" y="20" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">CPU检测</text><text x="60" y="40" text-anchor="middle" font-size="10" fill="#fff">保存状态:</text><text x="60" y="55" text-anchor="middle" font-size="9" fill="#fff">• PC (程序计数器)</text><text x="60" y="70" text-anchor="middle" font-size="9" fill="#fff">• 寄存器状态</text></g><path d="M480 110q40 0 70 0" stroke="#7b1fa2" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/><path d="M610 160q0 40 0 150" stroke="#4caf50" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/><text x="625" y="200" font-size="11" fill="#4caf50" font-weight="bold">切换到内核态</text><g transform="translate(480, 350)"><rect x="0" y="0" width="200" height="80" rx="10" fill="#4caf50" opacity=".8"/><text x="100" y="25" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">操作系统处理</text><text x="100" y="45" text-anchor="middle" font-size="10" fill="#fff">• 异常处理程序</text><text x="100" y="60" text-anchor="middle" font-size="10" fill="#fff">• 系统调用服务</text><text x="100" y="75" text-anchor="middle" font-size="10" fill="#fff">• 调试器介入</text></g><g transform="translate(100, 480)"><rect x="0" y="0" width="140" height="50" rx="5" fill="#f44336" opacity=".8"/><text x="70" y="20" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">不可恢复</text><text x="70" y="35" text-anchor="middle" font-size="10" fill="#fff">终止程序</text></g><g transform="translate(300, 480)"><rect x="0" y="0" width="140" height="50" rx="5" fill="#4caf50" opacity=".8"/><text x="70" y="20" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">可恢复</text><text x="70" y="35" text-anchor="middle" font-size="10" fill="#fff">恢复执行</text></g><path d="M530 430q-130 20-360 50" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M550 430q-1e2 20-180 50" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/><path d="M370 480q0-230 0-290" stroke="#2196f3" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/><text x="385" y="300" font-size="10" fill="#2196f3" font-weight="bold">恢复用户态</text><text x="385" y="315" font-size="9" fill="#2196f3">继续执行</text><g transform="translate(50, 200)"><rect x="0" y="0" width="200" height="80" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/><text x="100" y="20" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">陷阱指令</text><text x="100" y="40" text-anchor="middle" font-size="10" fill="#666">程序主动发起的指令</text><text x="100" y="55" text-anchor="middle" font-size="10" fill="#666">如: x86的syscall指令</text><text x="100" y="70" text-anchor="middle" font-size="10" fill="#666">用于系统调用和调试</text></g><circle cx="170" cy="70" r="12" fill="#fff" stroke="#2196f3" stroke-width="2"/><text x="170" y="76" text-anchor="middle" font-size="11" fill="#2196f3" font-weight="bold">1</text><circle cx="390" cy="45" r="12" fill="#fff" stroke="#ff9800" stroke-width="2"/><text x="390" y="51" text-anchor="middle" font-size="11" fill="#ff9800" font-weight="bold">2</text><circle cx="610" cy="70" r="12" fill="#fff" stroke="#9c27b0" stroke-width="2"/><text x="610" y="76" text-anchor="middle" font-size="11" fill="#9c27b0" font-weight="bold">3</text><circle cx="720" cy="390" r="12" fill="#fff" stroke="#4caf50" stroke-width="2"/><text x="720" y="396" text-anchor="middle" font-size="11" fill="#4caf50" font-weight="bold">4</text><circle cx="170" cy="460" r="12" fill="#fff" stroke="#f44336" stroke-width="2"/><text x="170" y="466" text-anchor="middle" font-size="11" fill="#f44336" font-weight="bold">5a</text><circle cx="370" cy="460" r="12" fill="#fff" stroke="#4caf50" stroke-width="2"/><text x="370" y="466" text-anchor="middle" font-size="11" fill="#4caf50" font-weight="bold">5b</text></svg>