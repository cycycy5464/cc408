<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <linearGradient id="memoryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecb3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff176;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 标题 -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1976d2">
    多维数组的存储方式与地址计算
  </text>
  
  <!-- 二维数组逻辑视图 -->
  <text x="50" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
    二维数组逻辑视图 (3×4 数组)
  </text>
  
  <!-- 绘制二维数组 -->
  <g transform="translate(50, 75)">
    <!-- 行索引 -->
    <text x="-15" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">i=0</text>
    <text x="-15" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">i=1</text>
    <text x="-15" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">i=2</text>
    
    <!-- 列索引 -->
    <text x="15" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">j=0</text>
    <text x="45" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">j=1</text>
    <text x="75" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">j=2</text>
    <text x="105" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">j=3</text>
    
    <!-- 数组元素 -->
    <rect x="0" y="30" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="15" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[0][0]</text>
    
    <rect x="30" y="30" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="45" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[0][1]</text>
    
    <rect x="60" y="30" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[0][2]</text>
    
    <rect x="90" y="30" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[0][3]</text>
    
    <rect x="0" y="60" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="15" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[1][0]</text>
    
    <rect x="30" y="60" width="30" height="25" fill="url(#highlightGradient)" stroke="#ff9800" stroke-width="2"/>
    <text x="45" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">[1][1]</text>
    
    <rect x="60" y="60" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[1][2]</text>
    
    <rect x="90" y="60" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[1][3]</text>
    
    <rect x="0" y="90" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="15" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[2][0]</text>
    
    <rect x="30" y="90" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="45" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[2][1]</text>
    
    <rect x="60" y="90" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[2][2]</text>
    
    <rect x="90" y="90" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">[2][3]</text>
  </g>
  
  <!-- 箭头 -->
  <line x1="200" y1="150" x2="280" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="240" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">按行优先存储</text>
  
  <!-- 一维线性存储视图 -->
  <text x="300" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
    内存中的一维线性存储
  </text>
  
  <!-- 绘制一维存储 -->
  <g transform="translate(300, 80)">
    <!-- 地址标识 -->
    <text x="15" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A</text>
    <text x="45" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A+B</text>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A+2B</text>
    <text x="105" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A+3B</text>
    <text x="135" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A+4B</text>
    <text x="165" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">A+5B</text>
    
    <!-- 第一行 -->
    <rect x="0" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="15" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[0][0]</text>
    
    <rect x="30" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="45" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[0][1]</text>
    
    <rect x="60" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="75" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[0][2]</text>
    
    <rect x="90" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="105" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[0][3]</text>
    
    <rect x="120" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="135" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[1][0]</text>
    
    <rect x="150" y="45" width="30" height="25" fill="url(#highlightGradient)" stroke="#ff9800" stroke-width="2"/>
    <text x="165" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333" font-weight="bold">[1][1]</text>
    
    <!-- 继续第二行的其他元素 -->
    <rect x="180" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="195" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[1][2]</text>
    
    <rect x="210" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="225" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[1][3]</text>
    
    <rect x="240" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="255" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[2][0]</text>
    
    <rect x="270" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="285" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[2][1]</text>
    
    <rect x="300" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="315" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[2][2]</text>
    
    <rect x="330" y="45" width="30" height="25" fill="url(#memoryGradient)" stroke="#1976d2" stroke-width="1"/>
    <text x="345" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">[2][3]</text>
    
    <!-- 索引标识 -->
    <text x="15" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">0</text>
    <text x="45" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">1</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">2</text>
    <text x="105" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">3</text>
    <text x="135" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">4</text>
    <text x="165" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666" font-weight="bold">5</text>
    <text x="195" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">6</text>
    <text x="225" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">7</text>
    <text x="255" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">8</text>
    <text x="285" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">9</text>
    <text x="315" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">10</text>
    <text x="345" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">11</text>
    
    <text x="180" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">一维数组索引</text>
  </g>
  
  <!-- 地址计算公式部分 -->
  <rect x="50" y="230" width="700" height="180" fill="#f5f5f5" stroke="#ddd" stroke-width="1" rx="5"/>
  
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1976d2">
    地址计算公式
  </text>
  
  <!-- 公式 -->
  <text x="70" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">
    Addr(a[i][j]) = A + (i × C + j) × B
  </text>
  
  <!-- 参数说明 -->
  <text x="70" y="315" font-family="Arial, sans-serif" font-size="12" fill="#333">
    其中：
  </text>
  <text x="90" y="335" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • A = 数组起始地址
  </text>
  <text x="90" y="355" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • B = 每个元素占用的字节数
  </text>
  <text x="90" y="375" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • C = 数组的列数（本例中 C = 4）
  </text>
  <text x="90" y="395" font-family="Arial, sans-serif" font-size="12" fill="#333">
    • i, j = 行索引和列索引
  </text>
  
  <!-- 具体计算示例 -->
  <text x="450" y="315" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ff9800">
    计算 a[1][1] 的地址：
  </text>
  <text x="470" y="335" font-family="Arial, sans-serif" font-size="12" fill="#333">
    i = 1, j = 1, C = 4
  </text>
  <text x="470" y="355" font-family="Arial, sans-serif" font-size="12" fill="#333">
    线性索引 = i × C + j = 1 × 4 + 1 = 5
  </text>
  <text x="470" y="375" font-family="Arial, sans-serif" font-size="12" fill="#333">
    地址 = A + 5 × B
  </text>
  <text x="470" y="395" font-family="Arial, sans-serif" font-size="11" fill="#666">
    （对应一维数组中的第5个位置）
  </text>
</svg>
